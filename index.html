                { label: 'QRIS',     nilai: bd.QRIS         || 0, note: 'non-tunai',        rgb: [124, 58, 237] },
                { label: 'Kartu',    nilai: bd.Kartu        || 0, note: 'non-tunai',        rgb: [37, 99, 235]  },
                { label: 'E-Wallet', nilai: bd['E-Wallet']  || 0, note: 'non-tunai',        rgb: [234, 88, 12]  },
                { label: 'Hutang',   nilai: bd.Hutang       || 0, note: 'belum diterima',   rgb: [220, 38, 38]  },
            ];

            // Hitung ulang total dari breakdown agar akurat
            var totalDariBd = metodePdfList.reduce(function(s, m){ return s + m.nilai; }, 0);
            if (totalDariBd > 0) omzetTotalPdf = totalDariBd;

            // ── Tabel metode bayar ──
            var colMetode = lm + 4;
            var colNilai  = pageW - rm;
            var colPersen = colNilai - 22;
            var rowH = 7;

            // Header tabel — background abu
            doc.setFillColor(240, 240, 240);
            doc.rect(lm, y - 4, cw, rowH, 'F');
            doc.setFontSize(8); doc.setFont(undefined, 'bold'); doc.setTextColor(60);
            doc.text('Metode Pembayaran', colMetode, y);
            doc.text('%', colPersen, y, { align: 'right' });
            doc.text('Jumlah', colNilai, y, { align: 'right' });
            y += rowH;

            // Garis bawah header
            doc.setDrawColor(200); doc.setLineWidth(0.3);
            doc.line(lm, y - 1.5, pageW - rm, y - 1.5);

            // Baris tiap metode — tampilkan semua tanpa terkecuali
            metodePdfList.forEach(function(m) {
                var persen = omzetTotalPdf > 0 ? ((m.nilai / omzetTotalPdf) * 100).toFixed(1) + '%' : '0%';
                var isEmpty = m.nilai <= 0;

                // Kotak warna indikator
                doc.setFillColor(m.rgb[0], m.rgb[1], m.rgb[2]);
                doc.rect(colMetode, y - 3.5, 3, 4, 'F');

                // Nama metode
                doc.setFontSize(9.5);
                doc.setFont(undefined, isEmpty ? 'normal' : 'bold');
                doc.setTextColor(isEmpty ? 150 : 20);
                doc.text(m.label, colMetode + 5, y);

                // Keterangan kecil di bawah nama
                doc.setFontSize(7); doc.setFont(undefined, 'normal');
                doc.setTextColor(160);
                doc.text(m.note, colMetode + 5, y + 3.5);

                // Persentase
                doc.setFontSize(8.5); doc.setFont(undefined, 'normal');
                doc.setTextColor(isEmpty ? 160 : 80);
                doc.text(persen, colPersen, y, { align: 'right' });

                // Nilai rupiah — warna metode jika ada nilai, abu jika nol
                doc.setFontSize(9.5); doc.setFont(undefined, isEmpty ? 'normal' : 'bold');
                doc.setTextColor(
                    isEmpty ? 160 : m.rgb[0],
                    isEmpty ? 160 : m.rgb[1],
                    isEmpty ? 160 : m.rgb[2]
                );
                doc.text(formatRp(m.nilai), colNilai, y, { align: 'right' });

                y += rowH + 2; // beri ruang untuk teks keterangan kecil

                // Garis tipis pemisah baris
                doc.setDrawColor(230); doc.setLineWidth(0.1);
                doc.line(lm, y - 1.5, pageW - rm, y - 1.5);
            });

            // Baris TOTAL
            y += 1;
            doc.setDrawColor(22, 163, 74); doc.setLineWidth(0.5);
            doc.line(lm, y - 1, pageW - rm, y - 1);
            doc.setFillColor(240, 253, 244);
            doc.rect(lm, y - 1, cw, 8, 'F');
            doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text('TOTAL OMZET', colMetode, y + 4);
            doc.text('100%', colPersen, y + 4, { align: 'right' });
            doc.setTextColor(22, 163, 74);
            doc.text(formatRp(omzetTotalPdf), colNilai, y + 4, { align: 'right' });
            y += 12;

            // Catatan kaki
            doc.setFontSize(7.5); doc.setFont(undefined, 'normal');
            doc.setTextColor(140);
            doc.text('* Tunai masuk laci kas. QRIS, Kartu, E-Wallet tidak masuk laci.', lm, y);
            y += 4;
            if ((bd.Hutang || 0) > 0) {
                doc.setTextColor(180, 30, 30);
                doc.text('* Hutang: pembayaran belum diterima / masih piutang kepada toko.', lm, y);
                y += 4;
            }
            y += 3;

            // ── SECTION: Status Verifikasi Non-Tunai ─────────────────────
            var nonTunaiPdfList = [
                { label: 'Kartu ATM (EDC)', key: 'Kartu',    petunjuk: 'Struk Settlement mesin EDC',          nilai: bd.Kartu        || 0 },
                { label: 'QRIS',            key: 'QRIS',     petunjuk: 'Mutasi/notifikasi bank atau dashboard', nilai: bd.QRIS         || 0 },
                { label: 'E-Wallet',        key: 'E-Wallet', petunjuk: 'Riwayat transaksi aplikasi e-wallet',  nilai: bd['E-Wallet']  || 0 },
                { label: 'Hutang/Kasbon',   key: 'Hutang',   petunjuk: 'Nota fisik atau buku bon pelanggan',   nilai: bd.Hutang       || 0 },
            ];
            var adaNonTunaiPdf = nonTunaiPdfList.some(function(m){ return m.nilai > 0; });
            if (adaNonTunaiPdf) {
                doc.setDrawColor(200); doc.setLineWidth(0.2);
                doc.line(lm, y, pageW - rm, y);
                y += 6;

                doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
                doc.text('Checklist Verifikasi Non-Tunai', lm, y);
                y += 3;
                doc.setFontSize(8); doc.setFont(undefined, 'normal'); doc.setTextColor(120);
                doc.text('Centang pada saat tutup shift menunjukkan kasir telah memverifikasi sumber eksternal.', lm, y + 4);
                y += 9;

                // Header checklist
                doc.setFillColor(240, 240, 240);
                doc.rect(lm, y - 4, cw, 7, 'F');
                doc.setFontSize(8); doc.setFont(undefined, 'bold'); doc.setTextColor(60);
                doc.text('Metode', lm + 4, y);
                doc.text('Sumber Verifikasi', lm + 60, y);
                doc.text('Nominal', pageW - rm - 26, y);
                doc.text('Status', pageW - rm, y, { align: 'right' });
                y += 7;
                doc.setDrawColor(200); doc.setLineWidth(0.2);
                doc.line(lm, y - 1.5, pageW - rm, y - 1.5);

                var verifData = r.verifikasiNonTunai || {};
                nonTunaiPdfList.filter(function(m){ return m.nilai > 0; }).forEach(function(m) {
                    var ok = verifData[m.key] === true;
                    // Kotak centang
                    doc.setDrawColor(ok ? 22 : 200); doc.setLineWidth(0.5);
                    doc.rect(lm + 4, y - 3.5, 5, 5);
                    if (ok) {
                        doc.setTextColor(22, 163, 74); doc.setFontSize(8); doc.setFont(undefined, 'bold');
                        doc.text('v', lm + 5.2, y + 0.5);
                    }
                    // Label metode
                    doc.setFontSize(9); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
                    doc.text(m.label, lm + 12, y);
                    // Sumber verifikasi
                    doc.setFontSize(7.5); doc.setFont(undefined, 'normal'); doc.setTextColor(100);
                    doc.text(m.petunjuk, lm + 60, y);
                    // Nominal
                    doc.setFontSize(9); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
                    doc.text(formatRp(m.nilai), pageW - rm - 26, y);
                    // Status badge
                    doc.setFontSize(8.5); doc.setFont(undefined, 'bold');
                    doc.setTextColor(ok ? 22 : 180, ok ? 163 : 140, ok ? 74 : 30);
                    doc.text(ok ? 'VERIFIED' : 'BELUM CEK', pageW - rm, y, { align: 'right' });
                    y += 9;
                    doc.setDrawColor(230); doc.setLineWidth(0.1);
                    doc.line(lm, y - 1.5, pageW - rm, y - 1.5);
                });

                var semuaVerif = nonTunaiPdfList.filter(function(m){ return m.nilai > 0; })
                                               .every(function(m){ return verifData[m.key] === true; });
                y += 2;
                doc.setFontSize(8.5); doc.setFont(undefined, 'bold');
                doc.setTextColor(semuaVerif ? 22 : 180, semuaVerif ? 163 : 140, semuaVerif ? 74 : 30);
                doc.text(semuaVerif ? '✓ Semua metode non-tunai sudah diverifikasi.' : '⚠ Ada metode non-tunai yang belum diverifikasi saat tutup shift.', lm, y);
                y += 7;
            }

            // ── FOOTER ───────────────────────────────────────────
            doc.setDrawColor(200); doc.setLineWidth(0.2);
            doc.line(lm, y, pageW - rm, y);
            y += 5;
            doc.setFontSize(8); doc.setFont(undefined, 'normal'); doc.setTextColor(150);
            doc.text('Dicetak: ' + new Date().toLocaleDateString('id-ID') + '  ' + new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), pageW / 2, y, { align: 'center' });

            var fileName = 'Shift_' + r.kasir.replace(/\s/g,'_') + '_' + tglMulai.replace(/\s/g,'_') + '.pdf';
            doc.save(fileName);
            showToast('PDF shift ' + r.kasir + ' berhasil diunduh!', 'success');
        }

        function hutangSearchHandler(el) {
            var val = el.value;
            var pos = el.selectionStart;
            state.hutangSearch = val;
            state.hutangPage = 1;
            renderContent();
            // Restore fokus & posisi cursor setelah re-render
            var newEl = document.getElementById('hutang-search-input');
            if (newEl) {
                newEl.focus();
                try { newEl.setSelectionRange(pos, pos); } catch(e) {}
            }
        }

        function renderHutangNotifBadge() {
            // Tampilkan badge di sidebar jika ada hutang jatuh tempo hari ini / lewat
            var today = new Date(); today.setHours(0,0,0,0);
            var overdue = hutangPiutangList.filter(function(h){
                if (h.status === 'lunas') return false;
                if (!h.jatuhTempo) return false;
                var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                return jt <= today;
            });
            var badge = document.getElementById('hutang-notif-badge');
            if (badge) {
                if (overdue.length > 0) {
                    badge.textContent = overdue.length;
                    badge.style.display = 'inline-flex';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function getHutangPiutangHTML() {
            var isKaryawan = currentUser && currentUser.role === 'karyawan';
            var tab = state.hutangTab || 'pelanggan';
            var q   = (state.hutangSearch || '').toLowerCase().trim();
            var filterStatus = state.hutangFilterStatus || 'semua';
            var today = new Date(); today.setHours(0,0,0,0);

            // Filter list berdasarkan tab
            var list = hutangPiutangList.filter(function(h){ return h.tipe === tab; });

            // Filter status
            if (filterStatus !== 'semua') {
                list = list.filter(function(h){
                    if (filterStatus === 'belum')    return h.status === 'belum';
                    if (filterStatus === 'cicilan')  return h.status === 'cicilan';
                    if (filterStatus === 'lunas')    return h.status === 'lunas';
                    if (filterStatus === 'jatuh') {
                        if (h.status === 'lunas' || !h.jatuhTempo) return false;
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        return jt <= today;
                    }
                    return true;
                });
            }

            // Filter search
            if (q) list = list.filter(function(h){
                return h.nama.toLowerCase().includes(q) || h.keterangan.toLowerCase().includes(q);
            });

            // Sort
            var hutangSort = state.hutangSort || 'default';
            if (hutangSort === 'default') {
                list.sort(function(a,b){
                    var order = {belum:0, cicilan:1, lunas:2};
                    var ao = order[a.status]||0, bo = order[b.status]||0;
                    if (ao !== bo) return ao - bo;
                    if (a.jatuhTempo && b.jatuhTempo) return new Date(a.jatuhTempo) - new Date(b.jatuhTempo);
                    return 0;
                });
            } else {
                list.sort(function(a,b){
                    if (hutangSort === 'nama_asc')   return a.nama.localeCompare(b.nama, 'id');
                    if (hutangSort === 'nama_desc')  return b.nama.localeCompare(a.nama, 'id');
                    if (hutangSort === 'total_asc')  return a.jumlah - b.jumlah;
                    if (hutangSort === 'total_desc') return b.jumlah - a.jumlah;
                    if (hutangSort === 'sisa_asc')   return (a.jumlah-a.sudahDibayar) - (b.jumlah-b.sudahDibayar);
                    if (hutangSort === 'sisa_desc')  return (b.jumlah-b.sudahDibayar) - (a.jumlah-a.sudahDibayar);
                    return 0;
                });
            }

            // Pagination
            var perPage = 10;
            var totalPages = Math.max(1, Math.ceil(list.length / perPage));
            if (state.hutangPage > totalPages) state.hutangPage = totalPages;
            var shown = list.slice((state.hutangPage-1)*perPage, state.hutangPage*perPage);

            // Summary
            var allTab = hutangPiutangList.filter(function(h){ return h.tipe === tab; });
            var totalHutang  = allTab.reduce(function(s,h){ return s+h.jumlah; },0);
            var totalLunas   = allTab.reduce(function(s,h){ return s+h.sudahDibayar; },0);
            var totalSisa    = totalHutang - totalLunas;
            var jumlahAktif  = allTab.filter(function(h){ return h.status !== 'lunas'; }).length;
            var jumlahJatuh  = allTab.filter(function(h){
                if (h.status === 'lunas' || !h.jatuhTempo) return false;
                var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                return jt <= today;
            }).length;

            // Tab buttons
            var tabs = [
                { id:'pelanggan', label:'Hutang Pelanggan', icon:'ph-user', color:'#dc2626' },
                { id:'supplier',  label:'Hutang Supplier',  icon:'ph-storefront', color:'#2563eb' }
            ];
            var tabHtml = tabs.map(function(t){
                var active = tab === t.id;
                return '<button onclick="state.hutangTab=\''+t.id+'\';state.hutangPage=1;renderContent();" '
                    + 'style="display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:'+(active?'700':'500')+';'
                    + 'background:'+(active?t.color:'#f9fafb')+';color:'+(active?'#fff':'#6b7280')+';border:none;cursor:pointer;transition:all 0.15s;">'
                    + '<i class="ph '+t.icon+' text-base"></i>' + t.label + '</button>';
            }).join('');

            // Status filter
            var statusFilters = [
                {k:'semua',   label:'Semua'},
                {k:'belum',   label:'Belum Lunas'},
                {k:'cicilan', label:'Cicilan'},
                {k:'lunas',   label:'Lunas'},
                {k:'jatuh',   label:'Jatuh Tempo'},
            ];
            var filterHtml = statusFilters.map(function(f){
                var active = filterStatus === f.k;
                var color = f.k==='jatuh' ? (active?'#dc2626':'#fecaca') : (active?'#16a34a':'#f3f4f6');
                var textColor = f.k==='jatuh' ? (active?'#fff':'#dc2626') : (active?'#fff':'#6b7280');
                return '<button onclick="state.hutangFilterStatus=\''+f.k+'\';state.hutangPage=1;renderContent();" '
                    + 'style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:'+color+';color:'+textColor+';border:none;cursor:pointer;">'
                    + f.label + (f.k==='jatuh' && jumlahJatuh>0 ? ' ('+jumlahJatuh+')' : '') + '</button>';
            }).join('');

            // Rows
            var rowsHtml = '';
            if (shown.length === 0) {
                rowsHtml = '<tr><td colspan="8" style="padding:48px;text-align:center;color:#9ca3af;">'
                    + '<i class="ph ph-handshake" style="font-size:40px;display:block;margin-bottom:8px;"></i>'
                    + 'Tidak ada data hutang piutang.</td></tr>';
            } else {
                shown.forEach(function(h, idx){
                    var sisa = h.jumlah - h.sudahDibayar;
                    var pct  = h.jumlah > 0 ? Math.round((h.sudahDibayar/h.jumlah)*100) : 0;
                    var isOverdue = false;
                    if (h.status !== 'lunas' && h.jatuhTempo) {
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        isOverdue = jt <= today;
                    }
                    var statusBadge = '';
                    if (h.status === 'lunas') {
                        statusBadge = '<span style="background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">✓ Lunas</span>';
                    } else if (h.status === 'cicilan') {
                        statusBadge = '<span style="background:#fef3c7;color:#d97706;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">Cicilan</span>';
                    } else if (isOverdue) {
                        statusBadge = '<span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">⚠ Jatuh Tempo</span>';
                    } else {
                        statusBadge = '<span style="background:#fce7f3;color:#9333ea;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">Belum</span>';
                    }
                    var rowBg = isOverdue && h.status !== 'lunas' ? '#fff5f5' : (idx%2===0?'#fff':'#fafafa');
                    rowsHtml += '<tr style="border-bottom:1px solid #f0f0f0;background:'+rowBg+';">'
                        + '<td style="padding:10px 12px;font-size:12px;"><div style="font-weight:600;color:#1f2937;">'+h.nama+'</div>'
                        + (h.idPelanggan ? '<div style="font-size:10px;color:#6b7280;font-family:monospace;">'+h.idPelanggan+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;font-size:11px;color:#6b7280;max-width:150px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+h.keterangan+'">'+h.keterangan+'</div>'
                        + (h.catatanTrx ? '<div style="font-size:10px;color:#9ca3af;font-family:monospace;">'+h.catatanTrx+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;font-weight:600;">'+formatRp(h.jumlah)+'</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;color:#16a34a;font-weight:600;">'+formatRp(h.sudahDibayar)+'</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;font-weight:700;color:'+(sisa>0?'#dc2626':'#16a34a')+';">'+formatRp(sisa)+'</td>'
                        + '<td style="padding:10px 12px;min-width:100px;">'
                        + '<div style="background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden;"><div style="background:'+(h.status==='lunas'?'#16a34a':'#f59e0b')+';height:100%;width:'+pct+'%;"></div></div>'
                        + '<div style="font-size:10px;color:#6b7280;margin-top:2px;text-align:center;">'+pct+'%</div>'
                        + '</td>'
                        + '<td style="padding:10px 12px;font-size:11px;color:'+(isOverdue&&h.status!=='lunas'?'#dc2626':'#6b7280')+';">'
                        + '<div>'+statusBadge+'</div>'
                        + (h.jatuhTempo ? '<div style="font-size:10px;margin-top:2px;">'+h.jatuhTempo+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;">'

                + '<p style="font-size:18px;font-weight:800;color:#dc2626;">'+formatRp(totalSisa)+'</p></div>'

                + '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;">'
                + '<p style="font-size:11px;color:#9ca3af;margin-bottom:4px;">Aktif</p>'
                + '<p style="font-size:18px;font-weight:800;color:#374151;">'+jumlahAktif+'</p></div>'
                + '<div style="background:'+(jumlahJatuh>0?'#fff5f5':'#fff')+';border:1px solid '+(jumlahJatuh>0?'#fca5a5':'#e5e7eb')+';border-radius:12px;padding:14px 16px;">'
                + '<p style="font-size:11px;color:#9ca3af;margin-bottom:4px;">Jatuh Tempo</p>'

                + '</div>'
                // Panel utama
                + '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">'
                // Tab + Tambah button
                + '<div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">'
                + '<div style="display:flex;gap:8px;">'+tabHtml+'</div>'
                + (!isKaryawan ? '<button onclick="openTambahHutangModal(\''+tab+'\')" style="display:flex;align-items:center;gap:6px;padding:9px 16px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;"><i class="ph ph-plus text-sm"></i> Tambah</button>' : '')
                + '</div>'
                // Search + Filter bar
                + '<div style="padding:10px 16px;border-bottom:1px solid #f0f0f0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">'

                + '<input type="text" id="hutang-search-input" value="'+(state.hutangSearch||'')+'" oninput="hutangSearchHandler(this)" placeholder="Cari nama / keterangan..." style="width:100%;box-sizing:border-box;padding:7px 10px 7px 30px;border:1px solid #e5e7eb;border-radius:7px;font-size:12px;outline:none;"></div>'
                + '<select onchange="state.hutangSort=this.value;state.hutangPage=1;renderContent();" style="padding:7px 10px;border:1px solid #e5e7eb;border-radius:7px;font-size:12px;color:#374151;background:#fff;cursor:pointer;outline:none;">'
                + '<option value="default"'+(hutangSort==='default'?' selected':'')+'>Urutan default</option>'

        // ── UNDUH PDF SEMUA SUPPLIER ──────────────────────────────────
        function downloadHutangSupplierPDF() {
            var suppliers = hutangPiutangList.filter(function(h){ return h.tipe === 'supplier'; });
            if (suppliers.length === 0) {
                showAlert('Tidak Ada Data', 'Belum ada data hutang supplier.', 'info');
                return;
            }

            // Sort sesuai state aktif
            var sortKey = state.hutangSort || 'default';
            if (sortKey === 'default') {
                suppliers.sort(function(a,b){
                    var order = {belum:0, cicilan:1, lunas:2};
                    var ao = order[a.status]||0, bo = order[b.status]||0;
                    if (ao !== bo) return ao - bo;
                    if (a.jatuhTempo && b.jatuhTempo) return new Date(a.jatuhTempo) - new Date(b.jatuhTempo);
                    return 0;
                });
            } else {
                suppliers.sort(function(a,b){
                    if (sortKey === 'nama_asc')   return a.nama.localeCompare(b.nama, 'id');
                    if (sortKey === 'nama_desc')  return b.nama.localeCompare(a.nama, 'id');
                    if (sortKey === 'total_asc')  return a.jumlah - b.jumlah;
                    if (sortKey === 'total_desc') return b.jumlah - a.jumlah;
                    if (sortKey === 'sisa_asc')   return (a.jumlah-a.sudahDibayar) - (b.jumlah-b.sudahDibayar);
                    if (sortKey === 'sisa_desc')  return (b.jumlah-b.sudahDibayar) - (a.jumlah-a.sudahDibayar);
                    return 0;
                });
            }

            var { jsPDF } = window.jspdf;
            var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var namaToko = (typeof pengaturan !== 'undefined' && pengaturan.nama_toko) ? pengaturan.nama_toko : 'Z-TRONIK';
            var now = new Date();
            var tglCetak = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });
            var w = doc.internal.pageSize.getWidth();
            var margin = 14;

            // ── Header ──
            doc.setFillColor(37, 99, 235);
            doc.rect(0, 0, w, 28, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(15);
            doc.setFont('helvetica', 'bold');
            doc.text('LAPORAN HUTANG SUPPLIER', margin, 11);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.text(namaToko, margin, 18);
            doc.text('Dicetak: ' + tglCetak, w - margin, 18, { align: 'right' });

            // ── Summary bar ──
            var totalHutang = suppliers.reduce(function(s,h){ return s+h.jumlah; }, 0);
            var totalBayar  = suppliers.reduce(function(s,h){ return s+h.sudahDibayar; }, 0);
            var totalSisa   = totalHutang - totalBayar;
            var jumlahAktif = suppliers.filter(function(h){ return h.status !== 'lunas'; }).length;

            doc.setFillColor(239, 246, 255);
            doc.rect(0, 28, w, 18, 'F');
            doc.setTextColor(37, 99, 235);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            var summaryItems = [
                { label: 'Total Supplier', val: suppliers.length + ' supplier' },
                { label: 'Total Hutang',   val: formatRp(totalHutang) },
                { label: 'Sudah Dibayar',  val: formatRp(totalBayar) },
                { label: 'Sisa Hutang',    val: formatRp(totalSisa) },
                { label: 'Aktif',          val: jumlahAktif + ' aktif' }
            ];
            var colW = (w - margin*2) / summaryItems.length;
            summaryItems.forEach(function(item, i) {
                var x = margin + i * colW;
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(100, 116, 139);
                doc.text(item.label, x, 34);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(30, 64, 175);
                doc.text(item.val, x, 40);
            });

            // ── Table ──
            var startY = 50;
            var cols = [
                { header: 'No',          width: 8,  align: 'center' },
                { header: 'Nama Supplier', width: 38, align: 'left' },
                { header: 'Keterangan',  width: 44, align: 'left' },
                { header: 'Total Hutang', width: 28, align: 'right' },
                { header: 'Sudah Bayar', width: 28, align: 'right' },
                { header: 'Sisa',        width: 24, align: 'right' },
                { header: 'Status',      width: 18, align: 'center' }
            ];

            // Header row
            doc.setFillColor(37, 99, 235);
            doc.rect(margin, startY, w - margin*2, 7, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(7.5);
            doc.setFont('helvetica', 'bold');
            var cx = margin;
            cols.forEach(function(col) {
                var tx = col.align === 'right' ? cx + col.width - 1 : (col.align === 'center' ? cx + col.width/2 : cx + 1);
                doc.text(col.header, tx, startY + 4.8, { align: col.align });
                cx += col.width;
            });

            var y = startY + 7;
            var today = new Date(); today.setHours(0,0,0,0);

            suppliers.forEach(function(h, idx) {
                var sisa = h.jumlah - h.sudahDibayar;
                var isOverdue = h.status !== 'lunas' && h.jatuhTempo && (new Date(h.jatuhTempo) <= today);
                var rowH = 8;

                // Zebra + overdue tint
                if (isOverdue && h.status !== 'lunas') {
                    doc.setFillColor(255, 245, 245);
                } else if (idx % 2 === 0) {
                    doc.setFillColor(255, 255, 255);
                } else {
                    doc.setFillColor(248, 250, 252);
                }
                doc.rect(margin, y, w - margin*2, rowH, 'F');

                // Light border bottom
                doc.setDrawColor(240, 240, 240);
                doc.line(margin, y + rowH, w - margin, y + rowH);

                doc.setFontSize(7.5);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(31, 41, 55);

                var statusLabel = h.status === 'lunas' ? 'Lunas' : (h.status === 'cicilan' ? 'Cicilan' : (isOverdue ? 'Jatuh Tempo' : 'Belum'));
                var cells = [
                    { val: String(idx+1),           align: 'center' },
                    { val: h.nama,                  align: 'left',   maxW: 36 },
                    { val: (h.keterangan||'-'),     align: 'left',   maxW: 42 },
                    { val: formatRp(h.jumlah),      align: 'right',  color: [31,41,55] },
                    { val: formatRp(h.sudahDibayar), align: 'right', color: [22,163,74] },
                    { val: formatRp(sisa),           align: 'right',  color: sisa > 0 ? [220,38,38] : [22,163,74] },
                    { val: statusLabel,              align: 'center', color: h.status==='lunas'?[22,163,74]:(isOverdue?[220,38,38]:[217,119,6]) }
                ];

                cx = margin;
                cells.forEach(function(cell, ci) {
                    var col = cols[ci];
                    if (cell.color) doc.setTextColor(cell.color[0], cell.color[1], cell.color[2]);
                    else doc.setTextColor(31, 41, 55);
                    var tx = col.align === 'right' ? cx + col.width - 1 : (col.align === 'center' ? cx + col.width/2 : cx + 1);
                    var val = cell.maxW ? doc.splitTextToSize(String(cell.val), cell.maxW)[0] : String(cell.val);
                    doc.text(val, tx, y + 5.2, { align: col.align });
                    cx += col.width;
                });

                // Jatuh tempo sub-row
                if (h.jatuhTempo) {
                    doc.setFontSize(6.5);
                    doc.setTextColor(150, 150, 150);
                    doc.text('JT: ' + h.jatuhTempo, margin + cols[0].width + 1, y + rowH - 1.2);
                }

                y += rowH;

                // New page if needed
                if (y > 270) {
                    doc.addPage();
                    y = 14;
                    // Repeat header
                    doc.setFillColor(37, 99, 235);
                    doc.rect(margin, y, w - margin*2, 7, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(7.5);
                    doc.setFont('helvetica', 'bold');
                    var cx2 = margin;
                    cols.forEach(function(col) {
                        var tx2 = col.align === 'right' ? cx2 + col.width - 1 : (col.align === 'center' ? cx2 + col.width/2 : cx2 + 1);
                        doc.text(col.header, tx2, y + 4.8, { align: col.align });
                        cx2 += col.width;
                    });
                    y += 7;
                }
            });

            // ── Footer total ──
            doc.setFillColor(37, 99, 235);
            doc.rect(margin, y, w - margin*2, 8, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            var totCx = margin;
            [cols[0].width + cols[1].width + cols[2].width, cols[3].width, cols[4].width, cols[5].width, cols[6].width].forEach(function(cw, i) {
                if (i === 0) { doc.text('TOTAL (' + suppliers.length + ' supplier)', totCx + 1, y + 5.2); }
                else if (i === 1) { doc.text(formatRp(totalHutang), totCx + cw - 1, y + 5.2, { align:'right' }); }
                else if (i === 2) { doc.text(formatRp(totalBayar),  totCx + cw - 1, y + 5.2, { align:'right' }); }
                else if (i === 3) { doc.text(formatRp(totalSisa),   totCx + cw - 1, y + 5.2, { align:'right' }); }
                totCx += cw;
            });

            // ── Page numbers ──
            var pageCount = doc.internal.getNumberOfPages();
            for (var p = 1; p <= pageCount; p++) {
                doc.setPage(p);
                doc.setFontSize(7);
                doc.setFont('helvetica', 'normal');
                doc.setTextColor(156, 163, 175);
                doc.text('Hal ' + p + ' dari ' + pageCount, w - margin, 292, { align:'right' });
                doc.text(namaToko + ' — Laporan Hutang Supplier', margin, 292);
            }

            var fileName = 'Hutang_Supplier_' + namaToko.replace(/\s/g,'_') + '_' + now.toISOString().slice(0,10) + '.pdf';
            doc.save(fileName);
        }

        // ── MODAL TAMBAH HUTANG ────────────────────────────
        function openTambahHutangModal(tipe) {

            var iconWrap = document.getElementById('notif-icon-wrap');
            var titleEl  = document.getElementById('notif-title');
            var msgEl    = document.getElementById('notif-msg');
            var btns     = document.getElementById('notif-buttons');

            iconWrap.className = 'w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 ' + (tipe==='pelanggan'?'bg-red-100':'bg-blue-100');

            msgEl.innerHTML = '<div style="text-align:left;max-height:70vh;overflow-y:auto;">'
                + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">'
                // Nama / Pelanggan
                + (tipe==='pelanggan'
                    ? '<div style="grid-column:1/-1;"><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Pelanggan *</label>'
                      + '<select id="hp-pelanggan" style="width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;" onchange="(function(){ var v=document.getElementById(\'hp-pelanggan\').value; var n=document.getElementById(\'hp-nama\'); if(n){ var parts=v.split(\'|\'); n.value=parts[1]||\'\';}})()">'+pelOptions+'</select>'
                      + '<input type="hidden" id="hp-nama" />'
                      + '</div>'
                    : '<div style="grid-column:1/-1;"><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Nama Supplier *</label>'
                      + '<input type="text" id="hp-nama-supplier" placeholder="Nama supplier/vendor..." style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;"></div>'
                  )
                // Jumlah
                + '<div><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Jumlah Hutang (Rp) *</label>'
                + '<input type="number" id="hp-jumlah" min="1" placeholder="0" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;"></div>'
                // Tanggal
                + '<div><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Tanggal Hutang</label>'
                + '<input type="date" id="hp-tanggal" value="'+today+'" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;"></div>'
                // Jatuh Tempo
                + '<div style="grid-column:1/-1;"><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Jatuh Tempo (opsional)</label>'
                + '<input type="date" id="hp-jatuh-tempo" style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;"></div>'
                // Keterangan
                + '<div style="grid-column:1/-1;"><label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px;">Keterangan *</label>'
                + '<input type="text" id="hp-keterangan" placeholder="Contoh: Pembelian barang konter, Hutang dagangan..." style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;outline:none;"></div>'
                + '</div></div>';

            btns.innerHTML = '<button onclick="closeNotif()" style="padding:9px 18px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:600;border-radius:10px;cursor:pointer;">Batal</button>'
                + '<button onclick="simpanTambahHutang(\''+tipe+'\')" style="padding:9px 20px;background:'+(tipe==='pelanggan'?'#dc2626':'#2563eb')+';color:#fff;font-weight:700;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;"><i class="ph ph-floppy-disk"></i> Simpan</button>';

            overlay.classList.remove('hidden');
            setTimeout(function(){
                var el = document.getElementById(tipe==='pelanggan'?'hp-pelanggan':'hp-nama-supplier');
                if(el) el.focus();
            }, 100);
        }

        function simpanTambahHutang(tipe) {
            var jumlah = Number(document.getElementById('hp-jumlah').value) || 0;
            var ket    = (document.getElementById('hp-keterangan').value||'').trim();
            var tgl    = document.getElementById('hp-tanggal').value || new Date().toISOString().split('T')[0];
            var jt     = document.getElementById('hp-jatuh-tempo').value || '';
            var nama   = '', idPel = '';

            if (tipe === 'pelanggan') {
                var selVal = document.getElementById('hp-pelanggan').value;
                if (!selVal) { showAlert('Wajib','Pilih pelanggan terlebih dahulu.','warning'); return; }
                var parts = selVal.split('|');
                idPel = parts[0]; nama = parts[1] || idPel;
            } else {
                nama = (document.getElementById('hp-nama-supplier').value||'').trim();
                if (!nama) { showAlert('Wajib','Nama supplier wajib diisi.','warning'); return; }
            }

            if (!jumlah || jumlah <= 0) { showAlert('Wajib','Jumlah hutang harus lebih dari 0.','warning'); return; }
            if (!ket) { showAlert('Wajib','Keterangan wajib diisi.','warning'); return; }

            var newId = 'HTP' + Date.now().toString().slice(-8);
            var newHutang = {
                id: newId, tipe: tipe, nama: nama, idPelanggan: idPel,
                keterangan: ket, jumlah: jumlah, sudahDibayar: 0,
                tanggal: tgl, jatuhTempo: jt, status: 'belum',
                kasir: currentUser ? currentUser.nama : '-',
                catatanTrx: '', riwayatBayar: []
            };
            hutangPiutangList.push(newHutang);
            closeNotif();

            // Catat sebagai mutasi kas jika hutang supplier (kas keluar)
            if (tipe === 'supplier') {
                var mutasi = { id:'MUT'+Date.now(), tipe:'keluar', jumlah:jumlah,
                    keterangan:'Hutang Supplier: '+ket, waktu:Date.now(), idShift:clerekState.shiftId||'' };
                clerekMutasiKas.unshift(mutasi);
                if (GAS_URL) gasPost({ action:'saveMutasiKas', mutasi:mutasi }).catch(function(){});
            }

            if (GAS_URL) {
                gasPost({ action:'saveHutang', hutang: Object.assign({}, newHutang, { riwayatBayar: JSON.stringify(newHutang.riwayatBayar) }) })
                    .catch(function(){});
            }
            renderContent();
            showToast('Hutang berhasil ditambahkan!','success');
        }

        // ── LUNASI HUTANG PENUH ────────────────────────────
        function prosesLunasHutang(id) {
            var h = hutangPiutangList.find(function(x){ return x.id === id; });
            if (!h) return;

            var sisa = h.jumlah - h.sudahDibayar;
            if (sisa <= 0) {
                showAlert('Hutang Sudah Lunas', 'Hutang ini sudah terlunas sepenuhnya.', 'info');
                return;
            }

            // Konfirmasi pelunasan
            showConfirm('Lunasi Hutang?',
                'Lunasi hutang ' + h.nama + ' sebesar ' + formatRp(sisa) + '?\n\n'
                + 'Status akan berubah menjadi "Lunas" dan riwayat pembayaran akan tercatat.',
                'warning',
                function() {
                    // Proses pelunasan
                    var now = new Date();
                    var dd = String(now.getDate()).padStart(2,'0');
                    var mm = String(now.getMonth()+1).padStart(2,'0');
                    var yyyy = now.getFullYear();
                    var hh = String(now.getHours()).padStart(2,'0');
                    var mi = String(now.getMinutes()).padStart(2,'0');
                    var tglStr = dd+'/'+mm+'/'+yyyy+' '+hh+':'+mi;

                    // Update riwayat pembayaran
                    if (!h.riwayatBayar) h.riwayatBayar = [];
                    h.riwayatBayar.push({
                        tanggal: now.toISOString(),
                        tgl: tglStr,
                        ket: 'Pelunasan Penuh',
                        jumlah: sisa
                    });

                    // Update status hutang
                    h.sudahDibayar = h.jumlah;
                    h.status = 'lunas';

                    // Catat ke mutasi kas
                    var mutasiTipe = h.tipe === 'pelanggan' ? 'masuk' : 'keluar';
                    var mutasiKet  = (h.tipe==='pelanggan'?'Pembayaran Piutang (Lunas): ':'Bayar Hutang Supplier (Lunas): ') + h.nama;
                    var mutasi = { id:'MUT'+Date.now(), tipe:mutasiTipe, jumlah:sisa,
                        keterangan:mutasiKet, waktu:Date.now(), idShift:clerekState.shiftId||'' };
                    clerekMutasiKas.unshift(mutasi);
                    if (GAS_URL) gasPost({ action:'saveMutasiKas', mutasi:mutasi }).catch(function(){});

                    // Sync hutang ke GAS
                    if (GAS_URL) {
                        gasPost({
                            action: 'updateHutang',
                            hutang: Object.assign({}, h, { riwayatBayar: JSON.stringify(h.riwayatBayar) })
                        }).catch(function(){});
                    }

                    // ── Tambah poin yang tertunda jika semua hutang pelanggan lunas ──
                    if (h.tipe === 'pelanggan' && h.idPelanggan) {
                        var masihAdaHutang = hutangPiutangList.some(function(hx){
                            return hx.id !== h.id && hx.tipe==='pelanggan' && hx.idPelanggan===h.idPelanggan && hx.status!=='lunas';
                        });
                        if (!masihAdaHutang) {
                            // Hitung total poin tertunda dari semua transaksi hutang pelanggan ini
                            var totalPoinTertunda = 0;
                            state.salesHistory.forEach(function(s){
                                if (s.memberId === h.idPelanggan && s.method === 'Hutang' && (s.poinDidapat === 0 || !s.poinDidapat)) {
                                    // Hitung ulang poin dari transaksi ini berdasarkan total
                                    var poinTrx = 0;
                                    if (rewardData.belanjaPoinMin > 0 && rewardData.belanjaPoinDapat > 0) {
                                        poinTrx = Math.floor(s.total / rewardData.belanjaPoinMin) * rewardData.belanjaPoinDapat;
                                    }
                                    totalPoinTertunda += poinTrx;
                                }
                            });
                            if (totalPoinTertunda > 0) {
                                var cust = state.customers.find(function(c){ return c.id === h.idPelanggan; });
                                if (cust) {
                                    cust.poin = (cust.poin || 0) + totalPoinTertunda;
                                    cust.poinAkumulasi = (cust.poinAkumulasi || 0) + totalPoinTertunda;
                                    rewardData.customers = state.customers.map(function(c){ return Object.assign({}, c, { tier: getTierInfo(c.poin).name }); });
                                    if (GAS_URL) gasPost({ action:'updatePoinAfterCheckout', customerId:cust.id, poin:cust.poin, poinAkumulasi:cust.poinAkumulasi, totalBelanja:cust.totalBelanja }).catch(function(){});
                                    showToast('Semua hutang '+h.nama+' lunas! Poin tertunda sebesar '+totalPoinTertunda+' poin berhasil ditambahkan.', 'success');
                                } else {
                                    showToast('Hutang '+h.nama+' lunas!', 'success');
                                }
                            } else {
                                showToast('Hutang '+h.nama+' lunas!', 'success');
                            }
                        }
                    }

                    renderContent();
                    showAlert('Hutang Terlunas!',
                        'Hutang ' + h.nama + ' sebesar ' + formatRp(sisa) + ' telah berhasil dilunas.\n'
                        + 'Status berubah menjadi "Lunas" dan tercatat di riwayat.',
                        'success');
                }
            );
        }

                + riwayatHtml
                + '</div>';

            msgEl.innerHTML = msgId;
            btns.innerHTML = '<button onclick="closeNotif()" style="padding:9px 18px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:600;border-radius:10px;cursor:pointer;">Batal</button>'
                + '<button onclick="prosesHutangBayar(\''+id+'\')" style="padding:9px 20px;background:#16a34a;color:#fff;font-weight:700;border-radius:10px;border:none;cursor:pointer;"><i class="ph ph-check"></i> Konfirmasi Bayar</button>';

            overlay.classList.remove('hidden');
            setTimeout(function(){ var el = document.getElementById('cicilan-jumlah'); if(el){ el.focus(); el.select(); }}, 100);
        }

        function prosesHutangBayar(id) {
            var h = hutangPiutangList.find(function(x){ return x.id === id; });
            if (!h) { closeNotif(); return; }
            var bayar = Number(document.getElementById('cicilan-jumlah').value) || 0;
            var ket   = (document.getElementById('cicilan-ket').value||'').trim() || 'Pembayaran';
            var sisa  = h.jumlah - h.sudahDibayar;
            if (bayar <= 0 || bayar > sisa) {
                showAlert('Tidak Valid','Jumlah bayar harus antara 1 dan '+formatRp(sisa)+'.','warning');
                return;
            }
            h.sudahDibayar += bayar;
            var tglBayar = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
            h.riwayatBayar.push({ tgl: tglBayar, jumlah: bayar, ket: ket });
            h.status = h.sudahDibayar >= h.jumlah ? 'lunas' : 'cicilan';
            closeNotif();

            // Catat ke mutasi kas
            var mutasiTipe = h.tipe === 'pelanggan' ? 'masuk' : 'keluar';
            var mutasiKet  = (h.tipe==='pelanggan'?'Pembayaran Piutang: ':'Bayar Hutang Supplier: ') + h.nama + ' — ' + ket;
            var mutasi = { id:'MUT'+Date.now(), tipe:mutasiTipe, jumlah:bayar,
                keterangan:mutasiKet, waktu:Date.now(), idShift:clerekState.shiftId||'' };
            clerekMutasiKas.unshift(mutasi);
            if (GAS_URL) gasPost({ action:'saveMutasiKas', mutasi:mutasi }).catch(function(){});

            // Jika pelanggan hutang sekarang lunas → tambah poin yang tertunda
            if (h.tipe === 'pelanggan' && h.status === 'lunas' && h.idPelanggan) {
                var masihAdaHutang = hutangPiutangList.some(function(hx){
                    return hx.id !== h.id && hx.tipe==='pelanggan' && hx.idPelanggan===h.idPelanggan && hx.status!=='lunas';
                });
                if (!masihAdaHutang) {
                    // Hitung total poin tertunda dari semua transaksi hutang pelanggan ini
                    var totalPoinTertunda = 0;
                    state.salesHistory.forEach(function(s){
                        if (s.memberId === h.idPelanggan && s.method === 'Hutang' && (s.poinDidapat === 0 || !s.poinDidapat)) {
                            var poinTrx = 0;
                            if (rewardData.belanjaPoinMin > 0 && rewardData.belanjaPoinDapat > 0) {
                                poinTrx = Math.floor(s.total / rewardData.belanjaPoinMin) * rewardData.belanjaPoinDapat;
                            }
                            totalPoinTertunda += poinTrx;
                        }
                    });
                    if (totalPoinTertunda > 0) {
                        var custPoin = state.customers.find(function(c){ return c.id === h.idPelanggan; });
                        if (custPoin) {
                            custPoin.poin = (custPoin.poin || 0) + totalPoinTertunda;
                            custPoin.poinAkumulasi = (custPoin.poinAkumulasi || 0) + totalPoinTertunda;
                            rewardData.customers = state.customers.map(function(c){ return Object.assign({}, c, { tier: getTierInfo(c.poin).name }); });
                            if (GAS_URL) gasPost({ action:'updatePoinAfterCheckout', customerId:custPoin.id, poin:custPoin.poin, poinAkumulasi:custPoin.poinAkumulasi, totalBelanja:custPoin.totalBelanja }).catch(function(){});
                            showToast('Semua hutang '+h.nama+' lunas! '+totalPoinTertunda+' poin tertunda berhasil ditambahkan.', 'success');
                        } else {
                            showToast('Semua hutang '+h.nama+' lunas. Poin pelanggan akan aktif di transaksi berikutnya.','info');
                        }
                    } else {
                        showToast('Semua hutang '+h.nama+' lunas. Poin pelanggan akan aktif di transaksi berikutnya.','info');
                    }
                }
            }

            // Sync ke GAS
            if (GAS_URL) {
                gasPost({ action:'updateHutang', hutang: Object.assign({}, h, { riwayatBayar: JSON.stringify(h.riwayatBayar) }) })
                    .catch(function(){});
            }

            renderContent();
            showToast('Pembayaran '+formatRp(bayar)+' berhasil dicatat!','success');
        }

            btns.innerHTML = '<button onclick="closeNotif()" style="padding:9px 18px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:600;border-radius:10px;cursor:pointer;">Tutup</button>'

            overlay.classList.remove('hidden');

                    role: 'all', icon: 'ph-wrench', color: '#dc2626',
                    title: '🔧 Troubleshooting — Masalah Umum',
                    desc: 'Solusi masalah yang sering terjadi: (1) Tidak bisa cetak struk — pastikan browser tidak memblokir print. Di Chrome: Settings → Privacy → Site Settings → izinkan pop-up. (2) Kamera tidak bisa scan barcode — izinkan akses kamera di browser (klik ikon kunci di address bar). (3) Struk tidak rapi — di dialog print, set paper size ke 58mm. (4) Login tidak bisa — pastikan username dan password benar, perhatikan huruf kapital. (5) Data tidak muncul setelah Refresh — tunggu lalu klik Refresh lagi, atau tutup dan buka ulang browser. (6) Produk tidak muncul di POS — pastikan stok > 0 atau aktifkan Unlimited.'
                },
                {
                    role: 'all', icon: 'ph-prohibit', color: '#dc2626',
                    title: '🚫 Hal yang Sebaiknya Tidak Dilakukan',
                    desc: 'Hindari hal berikut agar sistem berjalan normal: (1) Jangan gunakan lebih dari satu tab browser untuk Z-TRONIK secara bersamaan. (2) Jangan tutup tab browser saat sedang menyimpan data — tunggu notifikasi "berhasil" sebelum menutup. (3) Jangan input karakter khusus seperti tanda kutip di nama produk atau nama toko. (4) Jangan hapus akun admin satu-satunya sebelum membuat admin cadangan. (5) Jangan berbagi akun login — buat akun karyawan terpisah untuk setiap kasir. (6) Jangan lupa tutup shift sebelum kasir pulang — jika lupa, admin bisa ambil alih shift via menu Clerek.'
                },
            ];

            // Filter berdasarkan role user yang login
            var faqs = isAdmin
                ? allFaqs
                : allFaqs.filter(function(f){ return f.role !== 'admin'; });

            var totalPages = Math.ceil(faqs.length / _faqPerPage);
            if (_faqPage >= totalPages) _faqPage = totalPages - 1;
            if (_faqPage < 0) _faqPage = 0;
            var start = _faqPage * _faqPerPage;
            var pageItems = faqs.slice(start, start + _faqPerPage);

            var accordionItems = pageItems.map(function(f, i) {
                var globalIdx = start + i;
                var adminBadge = (isAdmin && f.role === 'admin')
                    ? '<span style="font-size:9px;font-weight:700;background:#ede9fe;color:#6d28d9;border-radius:4px;padding:2px 6px;margin-left:6px;flex-shrink:0;">ADMIN</span>'
                    : '';
                return '<div style="border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;" id="faq-item-' + globalIdx + '">'
                    + '<button onclick="toggleFaq(' + globalIdx + ')" '
                    + 'style="width:100%;display:flex;align-items:center;gap:12px;padding:13px 16px;background:#fff;border:none;cursor:pointer;text-align:left;"'
                    + 'onmouseover="this.style.background=\'#f9fafb\'" onmouseout="this.style.background=\'#fff\'">'
                    + '<div style="width:36px;height:36px;border-radius:9px;background:' + f.color + '15;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
                    + '<i class="ph ' + f.icon + '" style="color:' + f.color + ';font-size:18px;"></i>'
                    + '</div>'
                    + '<span style="flex:1;font-size:13px;font-weight:600;color:#1f2937;">' + f.title + '</span>'
                    + adminBadge
                    + '<i id="faq-arrow-' + globalIdx + '" class="ph ph-caret-down" style="color:#9ca3af;font-size:16px;transition:transform 0.2s;flex-shrink:0;"></i>'
                    + '</button>'
                    + '<div id="faq-body-' + globalIdx + '" style="display:none;padding:0 16px 14px 64px;background:#fafafa;border-top:1px solid #f0f0f0;">'
                    + '<p style="font-size:12px;color:#4b5563;line-height:1.7;margin:10px 0 0;">' + f.desc + '</p>'
                    + '</div>'
                    + '</div>';
            }).join('');

            var prevDisabled = _faqPage === 0;
            var nextDisabled = _faqPage >= totalPages - 1;
            var navHtml = '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">'
                + '<button onclick="changeFaqPage(-1)" ' + (prevDisabled ? 'disabled' : '') + ' '
                + 'style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid ' + (prevDisabled ? '#e5e7eb' : '#16a34a') + ';background:' + (prevDisabled ? '#f9fafb' : '#fff') + ';color:' + (prevDisabled ? '#d1d5db' : '#16a34a') + ';font-size:13px;font-weight:600;cursor:' + (prevDisabled ? 'not-allowed' : 'pointer') + ';">'
                + '<i class="ph ph-caret-left"></i> Prev'
                + '</button>'
                + '<span style="font-size:12px;color:#6b7280;">Hal ' + (_faqPage + 1) + ' / ' + totalPages + ' &bull; ' + faqs.length + ' topik</span>'
                + '<button onclick="changeFaqPage(1)" ' + (nextDisabled ? 'disabled' : '') + ' '
                + 'style="display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid ' + (nextDisabled ? '#e5e7eb' : '#16a34a') + ';background:' + (nextDisabled ? '#f9fafb' : '#16a34a') + ';color:' + (nextDisabled ? '#d1d5db' : '#fff') + ';font-size:13px;font-weight:600;cursor:' + (nextDisabled ? 'not-allowed' : 'pointer') + ';">'
                + 'Next <i class="ph ph-caret-right"></i>'
                + '</button>'
                + '</div>';

            var adminCount = allFaqs.filter(function(f){ return f.role === 'admin'; }).length;
            var subtitle = isAdmin
                ? 'Admin: ' + allFaqs.length + ' topik tersedia (' + adminCount + ' khusus admin) &bull; Klik untuk membuka'
                : faqs.length + ' topik tersedia &bull; Klik untuk membuka';

            return '<div style="max-width:680px;">'
                + '<div style="background:linear-gradient(135deg,#14532d,#16a34a);border-radius:16px;padding:20px 24px;margin-bottom:20px;color:#fff;">'
                + '<div style="display:flex;align-items:center;gap:12px;">'
                + '<i class="ph ph-question" style="font-size:32px;opacity:0.9;"></i>'
                + '<div><div style="font-size:18px;font-weight:900;letter-spacing:0.3px;">FAQ & Panduan Penggunaan</div>'
                + '<div style="font-size:12px;opacity:0.8;margin-top:2px;">' + subtitle + '</div>'
                + '</div></div>'
                + '</div>'
                + '<div style="display:flex;flex-direction:column;gap:6px;">'
                + accordionItems
                + '</div>'
                + navHtml
                + '<p style="text-align:center;font-size:11px;color:#9ca3af;margin-top:16px;">Z-TRONIK POS &bull; Sistem Kasir Digital</p>'
                + '</div>';
        }

        function toggleFaq(i) {
            var body  = document.getElementById('faq-body-' + i);
            var arrow = document.getElementById('faq-arrow-' + i);
            if (!body) return;
            var isOpen = body.style.display !== 'none';
            body.style.display  = isOpen ? 'none' : 'block';
            if (arrow) arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function changeFaqPage(dir) {
            _faqPage += dir;
            var contentArea = document.getElementById('content-area');
            if (contentArea) contentArea.innerHTML = getFaqHTML();
        }

        // --- INIT APP ---
        document.addEventListener('DOMContentLoaded', () => {
            var ln = document.getElementById('login-toko-nama');
            if (ln && namaTokoStruk) ln.textContent = namaTokoStruk;

            // Restore sesi jika browser belum ditutup
            var savedSession = sessionStorage.getItem('ztronik_session');
            if (savedSession) {
                try {
                    currentUser = JSON.parse(savedSession);
                    // Pulihkan status ambil alih SEBELUM showApp agar tidak direset
                    try {
                        if (sessionStorage.getItem('ztronik_ambil_alih') === '1') {
                            adminAmbilAlih = true;
                        }
                    } catch(e) {}
                    showApp(true); // true = jangan reset adminAmbilAlih
                    // Pulihkan posisi menu terakhir sebelum F5
                    try {
                        var savedMenu = sessionStorage.getItem('ztronik_menu');
                        if (savedMenu) { state.activeMenu = savedMenu; }
                    } catch(e) {}
                } catch(e) {
                    sessionStorage.removeItem('ztronik_session');
                }
            }

            // Mobile: sidebar default tertutup (tidak perlu toggle)
            // Desktop: sidebar default terbuka (state.isSidebarOpen = true sudah di state)
            if (window.innerWidth < 1024) {
                // Set state closed tanpa memanggil toggleSidebar (agar tidak flip state)
                state.isSidebarOpen = false;
                var backdrop = document.getElementById('sidebar-backdrop');
                if (backdrop) backdrop.classList.add('hidden');
            }

            // Muat cache lokal dulu agar tampil instan saat F5, fetch server di background
            try {
                var cache = localStorage.getItem('ztronik_cache');
                if (cache) {
                    var cacheData = JSON.parse(cache);
                    var cacheAge = (Date.now() - (cacheData.ts || 0)) / 1000;
                    if (cacheAge < 3600) { // pakai cache jika < 1 jam
                        if (cacheData.products)      state.products     = cacheData.products;
                        if (cacheData.customers)     state.customers    = cacheData.customers;
                        if (cacheData.salesHistory)  state.salesHistory = cacheData.salesHistory;
                        if (cacheData.hutangPiutang) hutangPiutangList  = cacheData.hutangPiutang;
                        if (cacheData.mutasiKas)     clerekMutasiKas    = cacheData.mutasiKas;
                        rewardData.customers = state.customers.map(function(c){
                            return Object.assign({}, c, { tier: getTierInfo(c.poin).name });
                        });
                        state.isLoading = false;
                    }
                }
            } catch(e) {}
            fetchData();
            renderSidebarMenu();
            renderContent();
        });

    </script>
</body>
</html>
