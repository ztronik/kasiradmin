<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-TRONIK POS System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Library jsPDF untuk Export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Library HTML5 QrCode untuk Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        #sidebar { transition: width 0.3s ease-in-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Desktop: scale keseluruhan 85% */
        @media (min-width: 1024px) {
            html { zoom: 0.85; }
        }
        /* Mobile: sidebar sebagai fixed overlay, defaultnya tersembunyi */
        @media (max-width: 1023px) {
            #sidebar {
                position: fixed !important;
                top: 0;
                left: 0;
                height: 100vh !important;
                overflow-y: auto !important;
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out !important;
                z-index: 30;
                width: 220px !important;
            }
            #sidebar.mobile-open {
                transform: translateX(0);
            }
        }
        /* Mobile: kurangi padding content-area agar POS lebih luas */
        @media (max-width: 767px) {
            #content-area { padding: 0.4rem !important; }
            html { font-size: 13px; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .toast-anim { animation: slideUp 0.3s ease forwards; }
        .modal-anim { animation: fadeIn 0.2s ease forwards; }
        /* Struk 58mm print styles */
        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; width: 58mm; font-family: monospace; font-size: 10px; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background:linear-gradient(135deg,#14532d 0%,#166534 40%,#15803d 70%,#16a34a 100%);">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <h1 id="login-toko-nama" class="text-5xl font-black text-white tracking-widest mb-2">Z-TRONIK</h1>
                <p class="text-green-200 text-sm italic mt-1" style="font-family:Georgia,serif;">Online Payment, Printing &amp; Document Creation Services</p>
            </div>
            <div class="bg-white rounded-2xl shadow-2xl p-7">
                <h2 class="text-center text-lg font-bold text-gray-700 mb-6 flex items-center justify-center gap-2">
                    <i class="ph ph-lock-key text-green-600 text-xl"></i> Masuk ke Sistem
                </h2>
                <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm text-center"></div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-600 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-600"><i class="ph ph-user-circle text-xl"></i></span>
                        <input type="text" id="login-username" placeholder="Masukkan username..."
                            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm bg-gray-50 focus:bg-white transition-colors"
                            onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" />
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-600"><i class="ph ph-key text-xl"></i></span>
                        <input type="password" id="login-password" placeholder="Masukkan password..."
                            class="w-full pl-10 pr-11 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm bg-gray-50 focus:bg-white transition-colors"
                            onkeydown="if(event.key==='Enter')doLogin()" />
                        <button type="button" onclick="toggleLoginPwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                            <i id="login-eye-icon" class="ph ph-eye text-xl"></i>
                        </button>
                    </div>
                </div>
                <button onclick="doLogin()" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-colors text-base flex items-center justify-center gap-2 shadow-md">
                    <i class="ph ph-sign-in text-xl"></i> Masuk
                </button>
                <p class="text-center text-xs text-gray-400 mt-5">Z-TRONIK POS &bull; Sistem Kasir Digital</p>
            </div>
        </div>
    </div>

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/50 z-[15]"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 flex flex-col z-20 shrink-0" style="background:linear-gradient(180deg,#14532d 0%,#166534 55%,#15803d 100%);position:sticky;top:0;height:auto;min-height:100vh;overflow-y:visible;">
        <div class="h-16 flex items-center justify-between px-4 shrink-0" style="border-bottom:1px solid rgba(255,255,255,0.15);">
            <div>
                <span id="sidebar-logo" class="font-bold text-xl" style="color:#fff;letter-spacing:1px;">Z-TRONIK</span>
                <div id="sidebar-role-badge" style="display:none;margin-top:1px;"></div>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-1 rounded-md" style="color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.12);">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>
        <nav class="py-4 flex flex-col">
            <ul id="menu-list" class="space-y-1 px-3">
                <!-- Menu items akan di-render di sini oleh JS -->
            </ul>
            <div class="px-3 pb-4 mt-2 shrink-0" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;">
                <button onclick="doLogout()"
                    class="w-full flex items-center p-3 rounded-lg transition-colors"
                    style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);font-weight:500;"
                    onmouseover="this.style.background='rgba(239,68,68,0.35)';this.style.color='#fff'"
                    onmouseout="this.style.background='rgba(255,255,255,0.08)';this.style.color='rgba(255,255,255,0.85)'"
                    title="Keluar">
                    <i class="ph ph-sign-out text-xl" style="color:rgba(255,200,200,0.9);"></i>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col w-full relative">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 shrink-0 sticky top-0 z-10" style="background:linear-gradient(90deg,#14532d 0%,#16a34a 100%);box-shadow:0 2px 8px rgba(21,128,61,.35);">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="p-2 mr-3 rounded-md focus:outline-none" style="color:#fff;background:rgba(255,255,255,0.12);">

                </button>

            </div>
            
            <div class="flex items-center space-x-3">
                <button onclick="fetchData()" title="Refresh data dari spreadsheet" class="p-2 rounded-lg transition-colors flex items-center gap-1.5 text-sm font-medium" style="color:#fff;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);">
                    <i class="ph ph-arrows-clockwise text-lg" id="refresh-icon" style="color:#fff;"></i>
                    <span style="color:#fff;" class="hidden sm:inline">Refresh</span>
                </button>
                <div class="flex items-center gap-2 py-1.5 px-3 rounded-full" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);">

                        <div id="header-admin-role" class="text-xs opacity-75 leading-tight" style="color:#fff;">-</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 bg-gray-50 p-4 lg:p-6">
            <!-- Konten halaman akan di-render di sini -->
        </div>
    </main>

    <!-- Modal Form Produk -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <!-- Konten form di-inject via JS -->

    <!-- Modal Form Pelanggan -->

    <!-- Custom Notification Modal -->
    <div id="notif-overlay" class="hidden fixed inset-0 bg-black/40 z-[80] flex items-center justify-center p-4 modal-anim">

    <!-- Payment Modal (Tunai/QRIS/Kartu) -->

    </div>

    <!-- Struk Preview Modal -->
    <div id="struk-preview-modal" class="hidden fixed inset-0 bg-black/60 z-[75] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm relative">
            <div class="flex items-center justify-between p-4 border-b border-gray-100">
                <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-receipt text-green-600 text-xl"></i> Preview Struk</h3>
                <button onclick="document.getElementById('struk-preview-modal').classList.add('hidden')" class="p-1.5 text-gray-400 hover:bg-gray-100 rounded-lg"><i class="ph ph-x"></i></button>
            </div>
            <div class="p-4 overflow-y-auto max-h-[60vh]">
                <div id="struk-preview-content" class="font-mono text-xs bg-gray-50 rounded-xl p-4 border border-gray-200 whitespace-pre-wrap leading-relaxed"></div>
            </div>
            <div class="p-4 border-t border-gray-100 flex gap-3">
                <button onclick="document.getElementById('struk-preview-modal').classList.add('hidden')" class="flex-1 py-2.5 border border-gray-200 text-gray-600 font-semibold rounded-xl hover:bg-gray-50">Tutup</button>

                </button>

    <!-- Hidden print area for struk 58mm -->

    <!-- Modal Barcode Scanner -->
    <div id="scanner-modal" class="hidden fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-md relative">
            <button onclick="closeScanner()" class="absolute top-2 right-2 p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200"><i class="ph ph-x text-xl"></i></button>
            <h3 class="font-bold text-center mb-4 text-gray-800">Scan Barcode / QR Code</h3>
            <div id="reader" class="w-full rounded-lg overflow-hidden"></div>
            <p class="text-xs text-center text-gray-500 mt-4">Arahkan kamera ke barcode produk.</p>
        </div>
    </div>

    <!-- App Logic -->
    <script>
        // --- KONFIGURASI APLIKASI ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyadIKSjcbvDYX2yS-gepUrv0X7_XYdfbsXiSnMJ2B5DNVsQm6Dqr7EdLxCSyzO-mVO/exec"; 

        // Menu lengkap admin
        const MENUS_ADMIN = [
            { name: 'Dashboard',       icon: 'ph-squares-four' },
            { name: 'Penjualan',       icon: 'ph-shopping-cart' },
            { name: 'Produk Saya',     icon: 'ph-package' },
            { name: 'Pelanggan',       icon: 'ph-users' },
            { name: 'Stock Opname',    icon: 'ph-clipboard-text' },
            { name: 'Poin & Reward',   icon: 'ph-star' },
            { name: 'Laporan',         icon: 'ph-file-text' },
            { name: 'Pengaturan',      icon: 'ph-gear' },
            { name: 'Karyawan',        icon: 'ph-user-circle-gear' },
            { name: 'Kas Awal & Clerek', icon: 'ph-user-check' },
            { name: 'FAQ',             icon: 'ph-question' },
        ];
        // Menu terbatas karyawan
        const MENUS_KARYAWAN = [
            { name: 'Dashboard',       icon: 'ph-squares-four' },
            { name: 'Penjualan',       icon: 'ph-shopping-cart' },
            { name: 'Pelanggan',       icon: 'ph-users' },
            { name: 'Poin & Reward',   icon: 'ph-star' },
            { name: 'Laporan',         icon: 'ph-file-text' },
            { name: 'Kas Awal & Clerek', icon: 'ph-user-check' },
            { name: 'FAQ',             icon: 'ph-question' },
        ];
        function getMenus() {
            if (!currentUser) return MENUS_ADMIN;
            return currentUser.role === 'admin' ? MENUS_ADMIN : MENUS_KARYAWAN;
        }

        // --- AUTH DATA (dimuat dari GAS saat fetchData) ---
        var authAdmin    = { username: 'user', password: 'user13' };
        var authKaryawan = [];
        var currentUser  = null;
        var adminAmbilAlih = false;  // true = admin ambil alih shift karyawan
        // Password khusus untuk membatalkan transaksi (bisa diatur di Pengaturan)
        var cancelRefundPwd = 'batal123';

        function doLogin() {
            var uname = (document.getElementById('login-username').value || '').trim();
            var pwd   = (document.getElementById('login-password').value || '');
            var err   = document.getElementById('login-error');
            if (!uname || !pwd) { err.textContent='Username dan password wajib diisi.'; err.classList.remove('hidden'); return; }
            if (uname === authAdmin.username && pwd === authAdmin.password) {
                currentUser = { username: uname, role: 'admin', nama: 'Admin' };
                showApp(); return;
            }
            var kar = authKaryawan.find(function(k){ return k.username===uname && k.password===pwd; });
            if (kar) { currentUser = { username: uname, role: 'karyawan', nama: kar.nama }; showApp(); return; }
            err.textContent = 'Username atau password salah.';
            err.classList.remove('hidden');
            document.getElementById('login-password').value = '';
        }

        function showApp() {
            adminAmbilAlih = false;
            // Reset ke menu awal yang sesuai role
            state.activeMenu = 'Dashboard';
            document.getElementById('login-screen').style.display = 'none';
            // Update info user di header
            var nl = document.getElementById('header-admin-name');
            if (nl) nl.textContent = currentUser.nama;
            var rl = document.getElementById('header-admin-role');
            if (rl) rl.textContent = currentUser.role === 'admin' ? 'Admin' : 'Karyawan';
            var htEl = document.getElementById('header-title');
            if (htEl) htEl.innerText = 'Dashboard';
            sessionStorage.setItem('ztronik_session', JSON.stringify(currentUser));
            // Render ulang menu dan konten sesuai role secara realtime
            updateHeaderRole();
            renderSidebarMenu();
            renderContent();
        }

        function updateHeaderRole() {
            if (!currentUser) return;
            var nl = document.getElementById('header-admin-name');
            if (nl) nl.textContent = currentUser.nama;
            var rl = document.getElementById('header-admin-role');
            if (rl) {
                if (currentUser.role === 'admin') {
                    rl.textContent = adminAmbilAlih ? 'Admin (Ambil Alih)' : 'Admin';
                } else {
                    rl.textContent = 'Karyawan';
                }
            }
        }

        function doLogout() {
            showConfirm(
                'Keluar dari Sistem',
                'Apakah Anda yakin ingin keluar?\nSesi Anda akan diakhiri.',
                'warning',
                function() {
                    currentUser = null;
                    adminAmbilAlih = false;
                    sessionStorage.removeItem('ztronik_session');
                    // Reset state aktif
                    state.activeMenu = 'Dashboard';
                    document.getElementById('login-username').value = '';
                    document.getElementById('login-password').value = '';
                    document.getElementById('login-error').classList.add('hidden');
                    document.getElementById('login-screen').style.display = 'flex';
                    // Render ulang sidebar bersih (tanpa session)
                    renderSidebarMenu();
                }
            );
        }

        function toggleLoginPwd() {
            var inp = document.getElementById('login-password');
            var ico = document.getElementById('login-eye-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            ico.className = inp.type === 'password' ? 'ph ph-eye text-xl' : 'ph ph-eye-slash text-xl';
        }

        function togglePwdField(inputId, iconId) {
            var inp = document.getElementById(inputId);
            var ico = document.getElementById(iconId);
            if (!inp) return;
            inp.type = inp.type === 'password' ? 'text' : 'password';
            if (ico) ico.className = inp.type === 'password' ? 'ph ph-eye text-base' : 'ph ph-eye-slash text-base';
        }

        function saveAdminAuth() {
            if (GAS_URL) gasPost({ action: 'saveAdminLogin', username: authAdmin.username, password: authAdmin.password }).catch(function(){});
        }

        function saveKaryawanAuth(karData, oldUsername, isDelete) {
            if (!GAS_URL || !karData) return;
            if (isDelete) {
                gasPost({ action: 'deleteKaryawan', username: karData.username }).catch(function(){});
            } else {
                gasPost({ action: 'saveKaryawan', karyawan: karData, oldUsername: oldUsername||null }).catch(function(){});
            }
        }

        // --- GLOBAL STATE ---
        let state = {
            activeMenu: 'Dashboard',
            isSidebarOpen: true,
            products: [], 
            customers: [],
            cart: [],
            searchQuery: '',
            paymentMethod: 'Tunai',
            isLoading: false,
            
            // State untuk POS
            posPage: 1, 
            posCategory: 'Semua',

            // State untuk Produk Saya
            productPage: 1,
            productSort: 'none',

            // State untuk Pelanggan
            customerPage: 1,
            customerSort: 'none',
            customerSearch: '',

            // State untuk Stock Opname
            opnameSearch: '',
            opnameSort: 'none',
            opnamePage: 1,
            
            discountType: 'Rp',
            discountValue: 0,
            fetchError: null,

            // State untuk member di kasir
            posActiveMember: null,
            posPoinRedeem: 0,

            // Riwayat penjualan (diisi saat checkout)
            salesHistory: [],

            // State paginasi Poin & Reward
            rewardListPage: 1,
            produkRulePage: 1,
            custPoinPage:   1,

            // State laporan
            laporanPage: 1,
            laporanFilter: 'semua',  // semua | hari | minggu | bulan
            laporanSearch: ''
        };

        // --- UTILS ---
        const formatRp = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        // Mengkalkulasi harga aktif suatu produk (Cek grosir & Promo)
        function getItemActivePrice(item) {
            let price = item.price;
            // Cek harga grosir
            if (item.wholesaleMin > 0 && item.qty >= item.wholesaleMin) {
                price = item.wholesalePrice;
            }
            // Kurangi dengan diskon/promo per produk
            return Math.max(0, price - (item.discount || 0));
        }

        // --- FETCH DATA — fetch() dengan fallback JSONP ---
        function fetchData() {
            if (!GAS_URL) return;
            state.isLoading = true;
            state.fetchError = null;
            var icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');
            renderContent();

            var fetchUrl = GAS_URL + '?t=' + Date.now();
            fetch(fetchUrl, {
                method: 'GET',
                redirect: 'follow',
                cache: 'no-store',
                headers: { 'Accept': 'application/json, text/javascript, */*' }
            })
                .then(function(res) {
                    // Cek apakah di-redirect ke Google login (artinya GAS belum public)
                    if (res.url && res.url.indexOf('accounts.google.com') >= 0) {
                        throw new Error('redirect-google');
                    }
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(function(text) {
                    // Cek redirect ke Google login di dalam response body
                    if (text.indexOf('accounts.google.com') >= 0 || text.indexOf('SignIn') >= 0) {
                        throw new Error('redirect-google');
                    }
                    var data;
                    try { data = JSON.parse(text); } catch(e) {
                        // Mungkin JSONP-wrapped (ada callback name di depan)
                        var m = text.match(/\{[\s\S]*\}/);
                        if (m) { try { data = JSON.parse(m[0]); } catch(e2) { throw new Error('Parse error'); } }
                        else throw new Error('Response tidak valid');
                    }
                    var ic = document.getElementById('refresh-icon');
                    if (ic) ic.classList.remove('animate-spin');
                    applyGasData(data);
                })
                .catch(function(err) {
                    // fetch gagal — fallback ke JSONP
                    console.log('fetch() gagal (' + err.message + '), fallback ke JSONP');
                    fetchDataJSONP();
                });
        }

        function fetchDataJSONP() {
            // Hapus script lama
            var old = document.getElementById('jsonp-loader');
            if (old) old.remove();

            var cbName = '__gasCallback_' + Date.now();

            var timer = setTimeout(function() {
                delete window[cbName];
                state.isLoading = false;
                state.fetchError = 'Timeout: GAS tidak merespons 15 detik. Pastikan sudah di-deploy ulang dengan Who has access: Anyone.';
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                showToast('Gagal memuat — timeout.', 'error');
                renderContent();
            }, 15000);

            window[cbName] = function(data) {
                clearTimeout(timer);
                delete window[cbName];
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                applyGasData(data);
            };

            var script = document.createElement('script');
            script.id = 'jsonp-loader';
            script.src = GAS_URL + '?callback=' + cbName + '&t=' + Date.now();
            script.onerror = function() {
                clearTimeout(timer);
                delete window[cbName];
                state.isLoading = false;
                state.fetchError = 'URL GAS tidak valid atau GAS belum di-deploy. Pastikan URL berakhiran /exec dan Who has access: Anyone.';
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                showToast('Gagal — cek URL GAS.', 'error');
                renderContent();
            };
            document.head.appendChild(script);
        }

        function applyGasData(data) {
                if (data && data.status === 'success') {
                    if (data.products) {
                        state.products = data.products.map(function(p) { return {
                            id: p.ID_Produk, barcode: p.Barcode || '',
                            name: p.Nama_Barang, category: p.Kategori,
                            modal: p.Modal||0, price: p.Harga_Jual||0,
                            wholesalePrice: p.Harga_Grosir||0, wholesaleMin: p.Min_Grosir||0,
                            discount: p.Diskon||0, stock: p.Stok||0,
                            minStock: p.Stok_Minimal||10, poinPerUnit: p.Poin_Per_Unit||0, image: '📦'
                        }; });
                    }
                    if (data.customers) {
                        state.customers = data.customers.map(function(c) { return {
                            id: c.ID_Pelanggan, name: c.Nama_Pelanggan,
                            phone: c.No_HP||'', email: c.Email||'',
                            address: c.Alamat||'', poin: c.Poin_Reward||0,
                            poinAkumulasi: c.Poin_Akumulasi||0, totalBelanja: c.Total_Transaksi||0
                        }; });
                        rewardData.customers = state.customers.map(function(c) {
                            return Object.assign({}, c, { tier: getTierInfo(c.poin).name });
                        });
                    }
                    if (data.adminLogin)   authAdmin    = data.adminLogin;
                    if (data.karyawanList) authKaryawan = data.karyawanList;
                    if (data.salesHistory) state.salesHistory = data.salesHistory;
                    if (data.shiftAktif) {
                        clerekState.shiftId              = data.shiftAktif.id;
                        clerekState.shiftMulai           = data.shiftAktif.mulai;
                        clerekState.shiftSelesai         = null;
                        clerekState.kasirShift           = data.shiftAktif.kasir || '-';
                        clerekState.kasAwal              = data.shiftAktif.kasAwal;
                        clerekState.kasAwalInput         = data.shiftAktif.kasAwal;
                        clerekState.kasAwalKonfirmasi    = true;
                        clerekState.kasAkhirKonfirmasi   = false;
                    } else {
                        clerekState.shiftId              = null;
                        clerekState.shiftMulai           = null;
                        clerekState.shiftSelesai         = null;
                        clerekState.kasirShift           = null;
                        clerekState.kasAwalKonfirmasi    = false;
                        clerekState.kasAkhirKonfirmasi   = false;
                    }
                    if (data.riwayatShift)  clerekState.riwayatShift = data.riwayatShift;
                    if (data.mutasiKas)     clerekMutasiKas          = data.mutasiKas;
                    if (data.pengaturan) {
                        if (data.pengaturan.qris_image) qrisImageBase64 = data.pengaturan.qris_image;
                        if (data.pengaturan.nama_toko)  namaTokoStruk   = data.pengaturan.nama_toko;
                        if (data.pengaturan.cancel_pwd) cancelRefundPwd = data.pengaturan.cancel_pwd;
                    }
                    state.isLoading = false;
                    showToast('Data dimuat: ' + state.products.length + ' produk, ' + state.customers.length + ' pelanggan.', 'success');
                    // Auto-cleanup silent: transaksi > 30 hari
                    (function() {
                        var batas = new Date();
                        batas.setDate(batas.getDate() - 30);
                        var adaYangLama = state.salesHistory.some(function(s) {
                            return new Date(s.date) < batas;
                        });
                        if (adaYangLama && GAS_URL) {
                            gasPost({ action: 'bersihkanTransaksiLama', hariMaksimal: 30 }).then(function(res) {
                                if (res && res.status === 'success' && res.dihapus > 0) {
                                    state.salesHistory = state.salesHistory.filter(function(s) {
                                        return new Date(s.date) >= batas;
                                    });
                                }
                            }).catch(function(){});
                        }
                    })();
                    // Auto-cleanup silent: riwayat shift > 30 hari
                    (function() {
                        var batas = new Date();
                        batas.setDate(batas.getDate() - 30);
                        var adaLama = clerekState.riwayatShift.some(function(r) {
                            return r.mulai && new Date(r.mulai) < batas;
                        });
                        if (adaLama) {
                            clerekState.riwayatShift = clerekState.riwayatShift.filter(function(r) {
                                return r.mulai && new Date(r.mulai) >= batas;
                            });
                            // Kirim ke GAS untuk hapus di spreadsheet juga
                            if (GAS_URL) gasPost({ action: 'bersihkanShiftLama', hariMaksimal: 30 }).catch(function(){});
                        }
                    })();
                } else {
                    state.isLoading = false;
                    state.fetchError = (data && data.message) || 'Status error dari server';
                    showToast('Error dari GAS: ' + state.fetchError, 'error');
                }
                renderContent();
        }

        // GAS POST — tetap pakai fetch (POST tidak kena CORS di GAS)
        async function gasPost(payload) {
            if (!GAS_URL) return { status: 'error', message: 'GAS_URL kosong' };
            try {
                const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await r.json();
            } catch(e) {
                console.error('gasPost:', e);
                return { status: 'error', message: e.message };
            }
        }

        function testGasUrl() {
            if (!GAS_URL) { showAlert('GAS_URL Kosong', 'Belum ada URL di variabel GAS_URL.', 'warning'); return; }
            showToast('Menguji koneksi...', 'info');
            var cbName = '__gasTest_' + Date.now();
            var timer = setTimeout(function() {
                delete window[cbName];
                showAlert('Timeout', 'GAS tidak merespons 10 detik.\n\nPastikan:\n1. GAS sudah di-deploy ulang\n2. Who has access: Anyone\n3. URL berakhiran /exec', 'error');
            }, 10000);
            window[cbName] = function(data) {
                clearTimeout(timer); delete window[cbName];
                if (data && data.status === 'success') {
                    showAlert('Koneksi Berhasil!', 'GAS merespons.\nProduk: ' + (data.products ? data.products.length : 0) + '\nPelanggan: ' + (data.customers ? data.customers.length : 0) + '\n\nKlik OK lalu Refresh.', 'success');
                } else {
                    showAlert('GAS Error', 'Respons: ' + JSON.stringify(data).slice(0, 200), 'warning');
                }
            };
            var s = document.createElement('script');
            s.src = GAS_URL + '?callback=' + cbName + '&t=' + Date.now();
            s.onerror = function() {
                clearTimeout(timer); delete window[cbName];
                showAlert('Gagal', 'URL tidak valid atau belum di-deploy.\n\nPastikan Who has access: Anyone (bukan \"Anyone with Google account\").', 'error');
            };
            document.head.appendChild(s);
        }

                function toggleSidebar() {
            state.isSidebarOpen = !state.isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const logo = document.getElementById('sidebar-logo');
            const backdrop = document.getElementById('sidebar-backdrop');
            const isMobile = window.innerWidth < 1024;
            
            if (state.isSidebarOpen) {
                if (isMobile) {
                    // Mobile: geser masuk (fixed overlay)
                    sidebar.classList.add('mobile-open');
                    if (backdrop) backdrop.classList.remove('hidden');
                } else {
                    // Desktop: tampilkan lebar penuh
                    sidebar.classList.remove('w-0', 'lg:w-20');
                    sidebar.classList.add('w-64');
                }
                logo.classList.remove('hidden', 'lg:block', 'lg:text-center', 'lg:w-full');
                logo.innerText = 'Z-TRONIK';
                var rb = document.getElementById('sidebar-role-badge');
                if (rb) rb.style.display = 'block';

                if (isMobile) {
                    // Mobile: geser keluar
                    sidebar.classList.remove('mobile-open');

                    // Desktop: ciutkan

        // =====================================================
        // SISTEM NOTIFIKASI CUSTOM (menggantikan alert/confirm)
        // =====================================================
        function showToast(msg, type = 'success') {
            let toast = document.getElementById('pos-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'pos-toast';
                document.body.appendChild(toast);
            }
            const colors = {
                success: { bg: '#22c55e', icon: 'ph-check-circle' },
                error:   { bg: '#ef4444', icon: 'ph-x-circle' },
                warning: { bg: '#f59e0b', icon: 'ph-warning' },
                info:    { bg: '#3b82f6', icon: 'ph-info' }
            };
            const c = colors[type] || colors.success;
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-5 py-3 rounded-2xl text-white text-sm font-semibold shadow-2xl toast-anim';
            toast.style.background = c.bg;
            toast.style.minWidth = '220px';
            toast.innerHTML = `<i class="ph ${c.icon} text-xl shrink-0"></i><span>${msg}</span>`;
            toast.style.opacity = '1';
            toast.style.display = 'flex';
            clearTimeout(toast._timeout);
            clearTimeout(toast._hideTimeout);
            toast._timeout = setTimeout(() => { toast.style.transition = 'opacity 0.4s'; toast.style.opacity = '0'; }, 3000);
            toast._hideTimeout = setTimeout(() => { toast.style.display = 'none'; toast.style.transition = ''; }, 3400);
        }

        // showAlert: pengganti alert() — tombol satu (OK)

            const iconWrap = document.getElementById('notif-icon-wrap');
            const titleEl = document.getElementById('notif-title');
            const msgEl = document.getElementById('notif-msg');
            const btns = document.getElementById('notif-buttons');

                error:   { bg: 'bg-red-100',    text: 'text-red-600',    icon: 'ph-x-circle' },
                warning: { bg: 'bg-yellow-100', text: 'text-yellow-600', icon: 'ph-warning-circle' },
                info:    { bg: 'bg-blue-100',   text: 'text-blue-600',   icon: 'ph-info' }
            };
            const c = cfg[type] || cfg.info;
            iconWrap.className = `w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 ${c.bg}`;
            iconWrap.innerHTML = `<i class="ph ${c.icon} text-3xl ${c.text}"></i>`;

            overlay._onOk = onOk;

        // showPromptModal: pengganti prompt() — input teks/angka

        function closeNotif() {
            document.getElementById('notif-overlay').classList.add('hidden');

            const fn = document.getElementById('notif-overlay')._onYes;

        function promptSubmit() {
            const val = document.getElementById('notif-input')?.value;

        // --- RENDERERS ---
        function renderSidebarMenu() {
            const menuList = document.getElementById('menu-list');
            const shiftAktif = clerekState.shiftMulai && !clerekState.shiftSelesai;
            menuList.innerHTML = getMenus().map(menu => {
                const isActive   = state.activeMenu === menu.name;
                const isLocked   = menu.name === 'Penjualan' && !shiftAktif;
                const activeBg   = 'rgba(255,255,255,0.22)';
                const inactiveBg = 'transparent';
                const hoverBg    = 'rgba(255,255,255,0.1)';
                const btnBg    = isActive ? activeBg : inactiveBg;
                const btnColor = isLocked ? 'rgba(255,255,255,0.38)' : isActive ? '#fff' : 'rgba(255,255,255,0.78)';
                const btnFw    = isActive ? '700' : '400';
                const iconClr  = isLocked ? 'rgba(255,255,255,0.32)' : isActive ? '#fff' : 'rgba(255,255,255,0.72)';
                const lockBadge = isLocked && state.isSidebarOpen
                    ? `<i class="ph ph-lock text-xs" style="margin-left:auto;opacity:0.5;"></i>`
                    : '';
                const textSpan = state.isSidebarOpen
                    ? `<span style="margin-left:10px;flex:1;">${menu.name}</span>${lockBadge}`
                    : '';
                return `<li>
                    <button onclick="setActiveMenu('${menu.name}')"
                        class="w-full flex items-center p-3 rounded-lg transition-colors text-left"
                        style="background:${btnBg};color:${btnColor};font-weight:${btnFw};${isLocked?'cursor:not-allowed;':''}"
                        onmouseover="this.style.background='${isActive ? activeBg : isLocked ? 'transparent' : hoverBg}'"
                        onmouseout="this.style.background='${isActive ? activeBg : inactiveBg}'"
                        title="${isLocked ? 'Buka shift di menu Kas Awal & Clerek terlebih dahulu' : menu.name}">
                        <i class="ph ${menu.icon} text-xl" style="color:${iconClr};"></i>
                        ${textSpan}
                    </button>
                </li>`;
            }).join('');
            // Badge role user di bawah logo (hanya saat sidebar terbuka)
            var roleDiv = document.getElementById('sidebar-role-badge');
            if (roleDiv) {
                if (state.isSidebarOpen && currentUser) {
                    var isAdmin = currentUser.role === 'admin';
                    var badgeTxt = isAdmin ? 'Admin' : 'Karyawan';
                    var badgeColor = isAdmin ? 'background:rgba(167,139,250,0.25);color:#c4b5fd;' : 'background:rgba(110,231,183,0.2);color:#6ee7b7;';
                    var ambilAlihBadge = (isAdmin && adminAmbilAlih) ? ' <span style="font-size:9px;background:rgba(167,139,250,0.4);padding:1px 5px;border-radius:4px;">Ambil Alih</span>' : '';
                    roleDiv.innerHTML = '<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;' + badgeColor + '">' + badgeTxt + ambilAlihBadge + '</span>';
                    roleDiv.style.display = 'block';
                } else {
                    roleDiv.style.display = 'none';
                }
            }
            // Sembunyikan/tampilkan label tombol Keluar sesuai kondisi sidebar
            var logoutLabel = document.getElementById('sidebar-logout-label');
            if (logoutLabel) logoutLabel.style.display = state.isSidebarOpen ? 'inline' : 'none';
        }

        function renderContent() {
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = ''; 

            switch (state.activeMenu) {
                case 'Dashboard':
                    contentArea.innerHTML = getDashboardHTML();
                    break;
                case 'Penjualan':
                    contentArea.innerHTML = getPosHTML();
                    initPosMobileLayout();
                    renderPosGrid();
                    renderCart();
                    (function tickClock(){
                        if (state.activeMenu !== 'Penjualan') return;
                        var el = document.getElementById('pos-clock');
                        if (!el) return;
                        var n = new Date();
                        el.innerText = n.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'})
                                     + ' ' + n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
                        setTimeout(tickClock, 1000);
                    })();
                    break;
                case 'Produk Saya':
                    contentArea.innerHTML = getProductHTML();
                    break;
                case 'Pelanggan':
                    contentArea.innerHTML = getCustomerHTML();
                    break;
                case 'Pengaturan':
                    contentArea.innerHTML = getSettingsHTML();
                    break;
                case 'Stock Opname':
                    contentArea.innerHTML = getStockOpnameHTML();
                    break;
                case 'Poin & Reward':
                    contentArea.innerHTML = getPoinRewardHTML();
                    break;
                case 'Laporan':
                    contentArea.innerHTML = getLaporanHTML();
                    break;
                case 'Karyawan':
                    contentArea.innerHTML = getKaryawanHTML();
                    break;
                case 'Kas Awal & Clerek':
                    contentArea.innerHTML = getClerekHTML();
                    break;
                case 'FAQ':
                    _faqPage = 0;
                    contentArea.innerHTML = getFaqHTML();
                    break;
                default:
                    contentArea.innerHTML = getPlaceholderHTML(state.activeMenu);
                    break;
            }
        }

        // --- VIEWS HTML TEMPLATES ---
        function getDashboardHTML() {
            const today = new Date().toDateString();
            const todaySales = state.salesHistory.filter(s => new Date(s.date).toDateString() === today);
            const omzetHariIni  = todaySales.reduce((sum, s) => sum + s.total, 0);
            const trxHariIni    = todaySales.length;
            const totalMember   = state.customers.length;

            const lowStockProducts = state.products.filter(p => p.stock <= p.minStock);
            const alertCount = lowStockProducts.length;

            // Grafik 7 hari terakhir
            const days = [];
            const dayLabels = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = d.toDateString();
                const total = state.salesHistory.filter(s => new Date(s.date).toDateString() === ds).reduce((sum, s) => sum + s.total, 0);
                days.push({ label: dayLabels[d.getDay()], total, date: d });
            }
            const maxDay = Math.max(...days.map(d => d.total), 1);
            const bars = days.map(d => {
                const h = Math.round((d.total / maxDay) * 100);
                const isToday = d.date.toDateString() === today;
                return `<div class="flex flex-col items-center gap-1 flex-1">
                    <span class="text-[9px] text-gray-500 font-medium">${d.total > 0 ? formatRp(d.total).replace('Rp\u00a0','').replace('.000','K') : ''}</span>
                    <div class="w-full rounded-t-md ${isToday ? 'bg-green-500' : 'bg-green-200'} transition-all" style="height:${Math.max(4,h)}%"></div>
                    <span class="text-[10px] text-gray-500 font-medium">${d.label}</span>
                </div>`;
            }).join('');

            // Top 5 produk terjual
            const prodTally = {};
            state.salesHistory.forEach(s => s.items.forEach(it => {
                prodTally[it.name] = (prodTally[it.name] || 0) + it.qty;
            }));
            const topProd = Object.entries(prodTally).sort((a,b) => b[1]-a[1]).slice(0,5);

            let lowStockHTML = '';

                lowStockHTML = `<div class="text-center py-6 text-gray-400 text-sm">Stok semua produk aman.</div>`;
            } else {
                lowStockHTML = `<ul class="space-y-2">
                    ${lowStockProducts.slice(0,5).map(p => `
                        <li class="flex justify-between items-center border-b border-gray-50 pb-2">
                            <div><p class="text-sm font-medium text-gray-800">${p.name}</p><p class="text-xs text-gray-500">${p.id}</p></div>
                            <span class="text-sm font-bold text-red-500">Sisa ${p.stock}</span>
                        </li>`).join('')}
                </ul>
                ${alertCount > 5 ? `<p class="text-xs text-center text-gray-400 mt-2">+${alertCount-5} lainnya</p>` : ''}
                <button onclick="downloadLowStockPDF()" class="w-full mt-3 py-2 bg-green-50 text-green-600 rounded-lg text-sm font-bold hover:bg-green-100 flex items-center justify-center gap-2">
                    <i class="ph ph-download-simple"></i> Unduh PDF
                </button>`;
            }

            return `
                <div class="space-y-5">
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-3 rounded-lg text-white bg-green-500 shrink-0"><i class="ph ph-bank text-2xl"></i></div>
                            <div><p class="text-xs text-gray-500 font-medium">Omzet Hari Ini</p><p class="text-xl font-bold text-gray-800">${formatRp(omzetHariIni)}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-3 rounded-lg text-white bg-emerald-500 shrink-0"><i class="ph ph-shopping-cart text-2xl"></i></div>
                            <div><p class="text-xs text-gray-500 font-medium">Transaksi Hari Ini</p><p class="text-xl font-bold text-gray-800">${trxHariIni}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-3 rounded-lg text-white bg-teal-500 shrink-0"><i class="ph ph-users text-2xl"></i></div>
                            <div><p class="text-xs text-gray-500 font-medium">Total Member</p><p class="text-xl font-bold text-gray-800">${totalMember}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
                            <div class="p-3 rounded-lg text-white ${alertCount > 0 ? 'bg-red-500' : 'bg-green-400'} shrink-0"><i class="ph ph-package text-2xl"></i></div>
                            <div><p class="text-xs text-gray-500 font-medium">Peringatan Stok</p><p class="text-xl font-bold ${alertCount > 0 ? 'text-red-500' : 'text-gray-800'}">${alertCount} Item</p></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
                        <!-- Grafik 7 hari -->
                        <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-5">

                                <h3 class="font-semibold text-gray-800">Grafik Penjualan (7 Hari)</h3>

                                <h3 class="font-semibold text-gray-800 mb-3 flex items-center justify-between">Stok Menipis ${alertCount > 0 ? `<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">${alertCount}</span>` : ''}</h3>

                    </div>

                @media (min-width: 768px) {
                    .pos-total-mobile { display: none !important; }
                    .pos-mobile-only { display: none !important; }

        // Switch tab di mobile POS
        var _posActiveTab = 'produk';

            _posActiveTab = tab;
            var panelProduk    = document.getElementById('pos-panel-produk');
            var panelKeranjang = document.getElementById('pos-panel-keranjang');
            var tabProduk      = document.getElementById('pos-tab-produk');
            var tabKeranjang   = document.getElementById('pos-tab-keranjang');
            if (!panelProduk || !panelKeranjang) return;
            if (tab === 'produk') {
                panelProduk.className    = 'tab-active';
                panelKeranjang.className = 'tab-mode';
                tabProduk.style.background    = '#16a34a'; tabProduk.style.color    = '#fff';
                tabKeranjang.style.background = '#f0fdf4'; tabKeranjang.style.color = '#16a34a';
            } else {
                panelProduk.className    = 'tab-mode';
                panelKeranjang.className = 'tab-active';
                tabProduk.style.background    = '#f0fdf4'; tabProduk.style.color    = '#16a34a';
                tabKeranjang.style.background = '#16a34a'; tabKeranjang.style.color = '#fff';
            }
        }

        function initPosMobileLayout() {
            if (window.innerWidth <= 767) {
                var panelProduk    = document.getElementById('pos-panel-produk');
                var panelKeranjang = document.getElementById('pos-panel-keranjang');
                if (panelProduk)    panelProduk.className    = 'tab-active';
                if (panelKeranjang) panelKeranjang.className = 'tab-mode';
                _posActiveTab = 'produk';
            }
        }
        function handleSearch(e) {
            state.searchQuery = e.target.value.toLowerCase();
            state.posPage = 1; 
            if(state.activeMenu === 'Produk Saya') {
                state.productPage = 1;
                renderContent();
            } else {
                renderPosGrid();
            }
        }

        function handlePosCategoryChange(e) {
            state.posCategory = e.target.value;
            state.posPage = 1;
            renderPosGrid();
        }

        function handleProductSortChange(e) {
            state.productSort = e.target.value;
            state.productPage = 1;
            renderContent();
        }

        function changePosPage(dir) {
            state.posPage += dir;
            renderPosGrid();
        }

        function handleDiscountChange(e) {
            state.discountValue = Number(e.target.value) || 0;
            renderCartFooter();
        }

        function toggleDiscountType() {
            state.discountType = state.discountType === 'Rp' ? '%' : 'Rp';
            state.discountValue = 0; 
            renderCartFooter();
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if(!product) return;

            const existingItem = state.cart.find(item => item.id === productId);
            if (existingItem) {
                if (existingItem.qty < product.stock) {
                    existingItem.qty += 1;
                } else {
                    showAlert('Stok Tidak Cukup', 'Jumlah melebihi stok yang tersedia!', 'warning');
                }
            } else {
                if (product.stock > 0) {
                    state.cart.push({ ...product, qty: 1 });
                } else {
                    showAlert('Stok Habis', 'Produk ini sedang tidak tersedia.', 'error');
                }
            }
            renderCart();
            // Mobile: auto-switch ke tab keranjang saat item pertama ditambah
            if (window.innerWidth <= 767 && state.cart.length === 1) {
                switchPosTab('keranjang');
            }
        }

        function updateQty(productId, change) {
            const index = state.cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                const product = state.products.find(p => p.id === productId);
                const newQty = state.cart[index].qty + change;
                
                if (newQty > product.stock) {
                    showAlert('Stok Tidak Cukup', 'Jumlah melebihi stok yang tersedia!', 'warning');
                    return;
                }
                
                state.cart[index].qty = newQty;
                if (state.cart[index].qty <= 0) {
                    state.cart.splice(index, 1);
                }
            }
            renderCart();
        }

        function setPaymentMethod(method) {
            state.paymentMethod = method;
            renderCartFooter();
        }

        // --- PAYMENT MODAL & STRUK ---
        // Simpan base64 foto QRIS (diupload via pengaturan)
        let qrisImageBase64 = '';
        let namaTokoStruk   = 'Z-TRONIK';
        let alamatTokoStruk = '';
        let noHpTokoStruk   = '';
        let footerStruk     = 'Terima kasih telah berbelanja!';

        function checkout() {
            if (state.cart.length === 0) return;
            openPaymentModal();
        }

        function openPaymentModal() {
            const subtotal = state.cart.reduce((sum, i) => sum + (getItemActivePrice(i) * i.qty), 0);
            let disc = 0;
            if (state.discountType === 'Rp') disc = state.discountValue;
            else disc = subtotal * (state.discountValue / 100);
            const poinDisc  = state.posPoinRedeem || 0;
            const grandTotal = Math.max(0, subtotal - disc - poinDisc);
            const earnedPoin = state.posActiveMember ? calculateEarnedPoin(grandTotal, state.cart) : 0;

            const modal = document.getElementById('payment-modal');
            const box   = document.getElementById('payment-modal-box');

            if (state.paymentMethod === 'Tunai') {
                box.innerHTML = buildTunaiHTML(grandTotal, earnedPoin);
            } else if (state.paymentMethod === 'QRIS') {
                box.innerHTML = buildQrisHTML(grandTotal, earnedPoin);
            } else {
                box.innerHTML = buildKartuHTML(grandTotal);
            }
            modal.classList.remove('hidden');
            if (state.paymentMethod === 'Tunai') {
                const inp = document.getElementById('pay-cash-input');
                if (inp) { inp.focus(); calcChange(); }
            }
        }

        function closePaymentModal() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function buildTunaiHTML(grandTotal, earnedPoin) {
            return `
                <div class="p-6">
                    <div class="flex items-center justify-between mb-5">
                        <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-money text-green-600 text-xl"></i> Pembayaran Tunai</h3>
                        <button onclick="closePaymentModal()" class="p-1.5 text-gray-400 hover:bg-gray-100 rounded-lg"><i class="ph ph-x text-lg"></i></button>
                    </div>
                    <div class="bg-green-50 rounded-xl p-4 mb-5 text-center">

        function calcChange(total) {
            const inp = document.getElementById('pay-cash-input');
            if (!inp) return;
            const received = Number(inp.value) || 0;
            const change   = Math.max(0, received - (total || 0));
            const rd = document.getElementById('pay-received-display');
            const cd = document.getElementById('pay-change-display');
            if (rd) rd.innerText = formatRp(received);
            if (cd) cd.innerText = formatRp(change);
        }

        function setNominal(total, val) {
            // Round up to nearest val
            const inp = document.getElementById('pay-cash-input');
            if (!inp) return;
            const rounded = Math.ceil(total / val) * val;
            inp.value = rounded;
            calcChange(total);
        }

        function processPayment(grandTotal) {
            const received = Number(document.getElementById('pay-cash-input')?.value) || grandTotal;
            const change   = Math.max(0, received - grandTotal);

            // Finalize poin
            if (state.posActiveMember) {
                const earnedPoin = calculateEarnedPoin(grandTotal, state.cart);
                const cust = state.customers.find(c => c.id === state.posActiveMember.id);
                if (cust) {
                    cust.poin = Math.max(0, (cust.poin || 0) - state.posPoinRedeem + earnedPoin);
                    cust.poinAkumulasi = (cust.poinAkumulasi || 0) + earnedPoin;
                    cust.totalBelanja  = (cust.totalBelanja  || 0) + grandTotal;
                    rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
                    if (GAS_URL) gasPost({ action:'updatePoinAfterCheckout', customerId:cust.id, poin:cust.poin, poinAkumulasi:cust.poinAkumulasi, totalBelanja:cust.totalBelanja }).catch(()=>{});
                }
            }

            // Simpan ke salesHistory
            const noTrx = 'TRX' + Date.now().toString().slice(-8);
            const saleRecord = {
                id: noTrx,
                date: new Date().toISOString(),
                items: state.cart.map(it => ({ name: it.name, qty: it.qty, price: getItemActivePrice(it), total: getItemActivePrice(it) * it.qty })),
                total: grandTotal,
                method: state.paymentMethod,
                member: state.posActiveMember ? state.posActiveMember.name : null,
                memberId: state.posActiveMember ? state.posActiveMember.id : null,
                discount: state.discountValue,
                poinRedeem: state.posPoinRedeem
            };
            state.salesHistory.unshift(saleRecord);
            // Simpan transaksi ke GAS Spreadsheet
            if (GAS_URL) {
                var salePayload = {
                    id: saleRecord.id, date: saleRecord.date,
                    kasir: currentUser ? currentUser.nama : '-',
                    items: saleRecord.items, total: saleRecord.total,
                    paymentMethod: state.paymentMethod,
                    bayar: received, kembalian: change,
                    discount: state.discountValue,
                    customerId: state.posActiveMember ? state.posActiveMember.id : '',
                    customerName: state.posActiveMember ? state.posActiveMember.name : '',
                    poinDipakai: state.posPoinRedeem||0, poinDidapat: saleRecord.poinDidapat||0
                };
                gasPost({ action: 'saveSale', sale: salePayload }).catch(function(){});
            }

            // Print struk
            printStruk(grandTotal, received, change, noTrx);
            closePaymentModal();

            state.cart = [];
            state.discountValue = 0;
            state.posActiveMember = null;
            state.posPoinRedeem = 0;
            renderCart();
            showToast('Transaksi berhasil!', 'success');
        }

        function maskMemberId(mid) {
            if (!mid) return '';
            if (mid.length <= 3) return '***';
            return mid.slice(0, mid.length - 3) + '***';
        }

        function buildStruHtml(opts) {
            // opts: { namaT, alamatT, telp, kasir, noTrx, tgl, jam, memberName, memberId, itemsHtml, subtotal, disc, poinDisc, poinRedeem, grandTotal, method, received, change, footer }
            var memberHtml = '';
            if (opts.memberName) {
                memberHtml += '<div style="display:flex;justify-content:space-between"><span>Member</span><span style="text-align:right;max-width:55%">' + opts.memberName + '</span></div>';
                memberHtml += '<div style="display:flex;justify-content:space-between"><span>ID Member</span><span>' + maskMemberId(opts.memberId) + '</span></div>';
            }
            var discHtml  = opts.disc > 0     ? '<div style="display:flex;justify-content:space-between"><span>Diskon</span><span>-' + opts.discFmt + '</span></div>' : '';
            var poinHtml  = opts.poinDisc > 0  ? '<div style="display:flex;justify-content:space-between"><span>Poin (' + opts.poinRedeem + ')</span><span>-' + opts.poinDiscFmt + '</span></div>' : '';

            return '<div style="width:58mm;font-family:Courier New,Courier,monospace;font-size:10px;padding:4px;line-height:1.5">'
                + '<div style="text-align:center;font-weight:bold;font-size:13px;margin-bottom:2px">' + opts.namaT + '</div>'
                + (opts.alamatT ? '<div style="text-align:center;font-size:9px">' + opts.alamatT + '</div>' : '')

                + '<div style="display:flex;justify-content:space-between"><span>Kasir</span><span style="font-weight:bold">' + kasirNama + '</span></div>'
                + memberHtml
                + '<div style="border-top:1px dashed #000;margin:4px 0"></div>'
                + opts.itemsHtml
                + '<div style="border-top:1px dashed #000;margin:4px 0"></div>'
                + '<div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>' + opts.subtotalFmt + '</span></div>'
                + discHtml + poinHtml
                + '<div style="display:flex;justify-content:space-between;font-weight:bold;border-top:1px solid #000;margin-top:2px;padding-top:2px">'
                +   '<span>TOTAL</span><span>' + opts.totalFmt + '</span></div>'
                + tunaiHtml
                + '<div style="display:flex;justify-content:space-between"><span>Metode</span><span>' + opts.method + '</span></div>'
                + '<div style="border-top:1px dashed #000;margin:4px 0"></div>'
                + '<div style="text-align:center;font-size:9px;margin-top:2px;white-space:pre-wrap">' + opts.footer + '</div>'

        function printStruk(grandTotal, received, change, noTrx) {
            var now  = new Date();
            var tgl  = now.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
            var jam  = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            noTrx = noTrx || ('TRX' + Date.now().toString().slice(-8));

            var itemsHtml = state.cart.map(function(item) {
                var p     = getItemActivePrice(item);
                var total = p * item.qty;
                var name  = item.name.length > 20 ? item.name.slice(0,20) : item.name;
                return '<div style="font-weight:500">' + name + '</div>'
                     + '<div style="display:flex;justify-content:space-between;padding-left:4px">'
                     + '<span>&nbsp;&nbsp;' + item.qty + ' x ' + formatRp(p) + '</span>'
                     + '<span>' + formatRp(total) + '</span></div>';
            }).join('');

            var subtotal = state.cart.reduce(function(s, i){ return s + getItemActivePrice(i) * i.qty; }, 0);
            var disc = state.discountType === 'Rp' ? state.discountValue : subtotal * (state.discountValue/100);
            var poinDisc = state.posPoinRedeem || 0;

            var html = buildStruHtml({
                namaT:       namaTokoStruk,
                alamatT:     alamatTokoStruk,
                telp:        noHpTokoStruk,
                noTrx:       noTrx,
                tgl:         tgl,
                jam:         jam,
                memberName:  state.posActiveMember ? state.posActiveMember.name : '',
                memberId:    state.posActiveMember ? state.posActiveMember.id   : '',
                itemsHtml:   itemsHtml,
                subtotal:    subtotal,
                subtotalFmt: formatRp(subtotal),
                disc:        disc,
                discFmt:     formatRp(disc),
                poinDisc:    poinDisc,
                poinDiscFmt: formatRp(poinDisc),
                poinRedeem:  state.posPoinRedeem,
                grandTotal:  grandTotal,
                totalFmt:    formatRp(grandTotal),
                method:      state.paymentMethod,
                received:    received,
                receivedFmt: formatRp(received),
                change:      change,
                changeFmt:   formatRp(change),
                footer:      footerStruk
            });

            var printWin = window.open('','_blank','width=300,height=600');
            printWin.document.write('<html><body style="margin:0">' + html + '</body></html>');
            printWin.document.close();
            printWin.focus();
            setTimeout(function(){ printWin.print(); printWin.close(); }, 300);
        }

        function renderPosGrid() {
            const grid = document.getElementById('pos-product-grid');
            if (!grid) return;
            if (state.products.length === 0) {
                grid.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">Belum ada data produk.</div>';
                return;
            }
            const query    = state.searchQuery;
            const filtered = state.products.filter(p =>
                (state.posCategory === 'Semua' || p.category === state.posCategory) &&
                (p.name.toLowerCase().includes(query) || (p.barcode && p.barcode.toLowerCase().includes(query)))
            );
            const perPage    = 10;
            const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.posPage > totalPages) state.posPage = totalPages;
            const pageItems  = filtered.slice((state.posPage-1)*perPage, state.posPage*perPage);
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">Produk tidak ditemukan.</div>';
                return;
            }
            function itemBtn(p) {
                const low = p.stock <= p.minStock;
                const isMobile = window.innerWidth <= 767;
                return `<button onclick="addToCart('${p.id}')"
                    style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:${isMobile?'9px 10px':'5px 8px'};background:#fff;border:none;border-bottom:1px solid #f0fdf4;cursor:pointer;text-align:left;box-sizing:border-box;"
                    onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">
                    <div style="min-width:0;flex:1;">
                        <div style="font-size:${isMobile?'12px':'11px'};font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${isMobile?'150px':'130px'};">${p.name}</div>
                        <div style="font-size:${isMobile?'12px':'11px'};font-weight:700;color:#16a34a;">${formatRp(p.price)}</div>
                    </div>
                    <span style="flex-shrink:0;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;margin-left:4px;background:${low?'#fee2e2':'#dcfce7'};color:${low?'#dc2626':'#16a34a'};">${p.stock}</span>
                </button>`;
            }
            const col1 = pageItems.slice(0,5).map(itemBtn).join('');
            const col2 = pageItems.slice(5,10).map(itemBtn).join('');
            const nav  = totalPages > 1 ? `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#f0fdf4;border-top:1px solid #bbf7d0;">
                    <button onclick="changePosPage(-1)" ${state.posPage===1?'disabled':''} style="padding:3px 10px;background:${state.posPage===1?'#e5e7eb':'#16a34a'};color:${state.posPage===1?'#9ca3af':'#fff'};border:none;border-radius:4px;cursor:${state.posPage===1?'not-allowed':'pointer'};font-size:11px;font-weight:700;">&#8249; Prev</button>
                    <span style="font-size:10px;color:#6b7280;">Hal ${state.posPage}/${totalPages} &bull; ${filtered.length} produk</span>
                    <button onclick="changePosPage(1)" ${state.posPage===totalPages?'disabled':''} style="padding:3px 10px;background:${state.posPage===totalPages?'#e5e7eb':'#16a34a'};color:${state.posPage===totalPages?'#9ca3af':'#fff'};border:none;border-radius:4px;cursor:${state.posPage===totalPages?'not-allowed':'pointer'};font-size:11px;font-weight:700;">Next &#8250;</button>
                </div>` : '';
            grid.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #e2e8f0;">
                <div style="border-right:1px solid #e2e8f0;">${col1}</div>
                <div>${col2}</div>
            </div>${nav}`;
        }
        function renderCart() {
            const tbody  = document.getElementById('pos-cart-tbody');
            const hdrTot = document.getElementById('pos-header-total');
            const hdrTotMobile = document.getElementById('pos-header-total-mobile');
            const itemCt = document.getElementById('pos-item-count');
            const qtyCt  = document.getElementById('pos-qty-count');
            const badge  = document.getElementById('pos-cart-badge');
            if (!tbody) return;
            if (itemCt) itemCt.innerText = state.cart.length;
            if (qtyCt)  qtyCt.innerText  = state.cart.reduce((s,i)=>s+i.qty,0);
            if (badge)  badge.innerText  = state.cart.length;
            if (state.cart.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="padding:40px;text-align:center;color:#9ca3af;">
                    <div style="font-size:32px;margin-bottom:6px;">&#128722;</div>
                    <div>Pilih produk dari daftar di bawah</div></td></tr>`;
                if (hdrTot) hdrTot.innerText = 'Rp 0';
                if (hdrTotMobile) hdrTotMobile.innerText = 'Rp 0';
            } else {
                let rows = '';
                state.cart.forEach((item, idx) => {
                    const p     = getItemActivePrice(item);
                    const total = p * item.qty;
                    const disc  = (item.discount||0) * item.qty;
                    let badges = '';
                    if (item.wholesaleMin>0 && item.qty>=item.wholesaleMin)
                        badges += `<span style="background:#fed7aa;color:#9a3412;font-size:9px;padding:1px 4px;border-radius:3px;margin-left:3px;">Grosir</span>`;
                    if (item.discount>0)
                        badges += `<span style="background:#fecaca;color:#991b1b;font-size:9px;padding:1px 4px;border-radius:3px;margin-left:3px;">Promo</span>`;
                    rows += `<tr style="border-bottom:1px solid #f0fdf4;background:${idx%2===0?'#fff':'#f9fffe'};">
                        <td style="padding:5px 8px;text-align:center;color:#6b7280;font-size:11px;">${idx+1}</td>
                        <td style="padding:5px 8px;font-size:10px;color:#6b7280;font-family:monospace;">${item.id||''}</td>
                        <td style="padding:5px 8px;font-size:12px;font-weight:500;">${item.name}${badges}</td>
                        <td style="padding:5px 8px;text-align:center;">
                            <div style="display:flex;align-items:center;justify-content:center;gap:3px;">
                                <button onclick="updateQty('${item.id}',-1)" style="width:22px;height:22px;background:#fee2e2;color:#dc2626;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                                    ${item.qty===1?'<i class="ph ph-trash" style="font-size:11px;"></i>':'<i class="ph ph-minus" style="font-size:11px;"></i>'}
                                </button>
                                <span style="min-width:24px;text-align:center;font-weight:700;font-size:13px;">${item.qty}</span>
                                <button onclick="updateQty('${item.id}',1)" style="width:22px;height:22px;background:#dcfce7;color:#16a34a;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;">
                                    <i class="ph ph-plus" style="font-size:11px;"></i>
                                </button>
                            </div>
                        </td>
                        <td style="padding:5px 8px;text-align:right;font-size:11px;color:#374151;">${formatRp(item.price)}</td>
                        <td style="padding:5px 8px;text-align:right;font-size:11px;color:${disc>0?'#dc2626':'#d1d5db'};">${disc>0?'-'+formatRp(disc):'—'}</td>
                        <td style="padding:5px 8px;text-align:right;font-size:12px;font-weight:700;color:#16a34a;">${formatRp(total)}</td>
                        <td style="padding:5px 8px;text-align:center;">
                            <button onclick="updateQty('${item.id}',${-(item.qty)})" style="background:none;border:none;cursor:pointer;color:#dc2626;padding:2px;">
                                <i class="ph ph-x-circle" style="font-size:14px;"></i>
                            </button>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = rows;
                const sub  = state.cart.reduce((s,i)=>s+getItemActivePrice(i)*i.qty,0);
                const disc = state.discountType==='Rp' ? state.discountValue : sub*(state.discountValue/100);
                const grand = Math.max(0, sub - disc - (state.posPoinRedeem||0));
                if (hdrTot) hdrTot.innerText = formatRp(grand);
                if (hdrTotMobile) hdrTotMobile.innerText = formatRp(grand);
            }
            renderCartFooter();
        }

        function renderCartFooter() {

            } else {

        // Cari member berdasarkan input ID angka atau no HP
        function lookupMember(val) {
            if (!val || !val.trim()) return;
            const q = val.trim().toLowerCase();
            // Coba cocokkan sebagai angka ID (tanpa prefix ZTR) atau no HP
            const found = state.customers.find(c =>
                c.id.toLowerCase().replace('ztr', '') === q ||
                c.phone.replace(/\D/g, '') === q.replace(/\D/g, '') ||
                c.id.toLowerCase() === q
            );
            if (!found) {
                showToast('Member tidak ditemukan.', 'error');
                return;
            }
            state.posActiveMember = { ...found };
            state.posPoinRedeem = 0;
            renderCartFooter();
            showToast(`Member ditemukan: ${found.name}`, 'success');
        }

        function removePosActiveMember() {
            state.posActiveMember = null;
            state.posPoinRedeem = 0;
            renderCartFooter();
        }

        function handlePoinRedeemChange(e) {
            let val = Number(e.target.value) || 0;
            const maxPoin = state.posActiveMember ? (state.posActiveMember.poin || 0) : 0;
            if (val > maxPoin) val = maxPoin;
            if (val < 0) val = 0;
            state.posPoinRedeem = val;
            e.target.value = val;
            renderCartFooter();
        }

        function useAllPoin() {
            if (!state.posActiveMember) return;
            state.posPoinRedeem = state.posActiveMember.poin || 0;
            renderCartFooter();
        }
