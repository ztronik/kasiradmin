<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-TRONIK POS System</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Library jsPDF untuk Export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Chart.js untuk grafik dashboard -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <!-- Library HTML5 QrCode untuk Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" type="text/javascript"></script>

    <style>
        #sidebar { transition: width 0.3s ease-in-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Desktop: scale keseluruhan 85% */
        @media (min-width: 1024px) {
            html { zoom: 0.85; }
        }
        /* Mobile: sidebar sebagai fixed overlay, defaultnya tersembunyi */
        @media (max-width: 1023px) {
            #sidebar {
                position: fixed !important;
                top: 0;
                left: 0;
                height: 100vh !important;
                overflow-y: auto !important;
                transform: translateX(-100%);
                transition: transform 0.3s ease-in-out !important;
                z-index: 30;
                width: 220px !important;
            }
            #sidebar.mobile-open {
                transform: translateX(0);
            }
        }
        /* Mobile: kurangi padding content-area agar POS lebih luas */
        @media (max-width: 767px) {
            #content-area { padding: 0.4rem !important; }
            html { font-size: 13px; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .toast-anim { animation: slideUp 0.3s ease forwards; }
        .modal-anim { animation: fadeIn 0.2s ease forwards; }
        /* Struk 58mm print styles */
        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; width: 58mm; font-family: monospace; font-size: 10px; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 0.8s linear infinite; }
        @media (max-width: 640px) {
            .hutang-cards-grid { grid-template-columns: repeat(2,1fr) !important; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex min-h-screen">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background:linear-gradient(135deg,#14532d 0%,#166534 40%,#15803d 70%,#16a34a 100%);">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <h1 id="login-toko-nama" class="text-5xl font-black text-white tracking-widest mb-2">Z-TRONIK</h1>
                <p class="text-green-200 text-sm italic mt-1" style="font-family:Georgia,serif;">Online Payment, Printing &amp; Document Creation Services</p>
            </div>
            <div class="bg-white rounded-2xl shadow-2xl p-7">
                <h2 class="text-center text-lg font-bold text-gray-700 mb-6 flex items-center justify-center gap-2">
                    <i class="ph ph-lock-key text-green-600 text-xl"></i> Masuk ke Sistem
                </h2>
                <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm text-center"></div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-600 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-600"><i class="ph ph-user-circle text-xl"></i></span>
                        <input type="text" id="login-username" placeholder="Masukkan username..."
                            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm bg-gray-50 focus:bg-white transition-colors"
                            onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()" />
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-600 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-green-600"><i class="ph ph-key text-xl"></i></span>
                        <input type="password" id="login-password" placeholder="Masukkan password..."
                            class="w-full pl-10 pr-11 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm bg-gray-50 focus:bg-white transition-colors"
                            onkeydown="if(event.key==='Enter')doLogin()" />
                        <button type="button" onclick="toggleLoginPwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                            <i id="login-eye-icon" class="ph ph-eye text-xl"></i>
                        </button>
                    </div>
                </div>
                <button onclick="doLogin()" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl transition-colors text-base flex items-center justify-center gap-2 shadow-md">
                    <i class="ph ph-sign-in text-xl"></i> Masuk
                </button>
                <p class="text-center text-xs text-gray-400 mt-5">Z-TRONIK POS &bull; Sistem Kasir Digital</p>
            </div>
        </div>
    </div>

    <!-- Login Loading Overlay -->
    <div id="login-loading-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:linear-gradient(135deg,#14532d 0%,#166534 40%,#15803d 70%,#16a34a 100%);flex-direction:column;align-items:center;justify-content:center;gap:20px;">
        <div style="width:64px;height:64px;border:5px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <div style="text-align:center;">
            <div id="login-loading-nama" style="color:#fff;font-size:22px;font-weight:900;letter-spacing:2px;margin-bottom:6px;">Z-TRONIK</div>
            <div style="color:rgba(255,255,255,0.75);font-size:13px;letter-spacing:0.5px;">Memuat sistem, harap tunggu...</div>
        </div>
    </div>

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebar-backdrop" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/50 z-[15]"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 flex flex-col z-20 shrink-0" style="background:linear-gradient(180deg,#14532d 0%,#166534 55%,#15803d 100%);position:sticky;top:0;height:auto;min-height:100vh;overflow-y:visible;">
        <div class="h-16 flex items-center justify-between px-4 shrink-0" style="border-bottom:1px solid rgba(255,255,255,0.15);">
            <div>
                <span id="sidebar-logo" class="font-bold text-xl" style="color:#fff;letter-spacing:1px;">Z-TRONIK</span>
                <div id="sidebar-role-badge" style="display:none;margin-top:1px;"></div>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden p-1 rounded-md" style="color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.12);">
                <i class="ph ph-x text-xl"></i>
            </button>
        </div>
        <nav class="py-4 flex flex-col">
            <ul id="menu-list" class="space-y-1 px-3">
                <!-- Menu items akan di-render di sini oleh JS -->
            </ul>
            <div class="px-3 pb-4 mt-2 shrink-0" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;">
                <button onclick="doLogout()"
                    class="w-full flex items-center p-3 rounded-lg transition-colors"
                    style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);font-weight:500;"
                    onmouseover="this.style.background='rgba(239,68,68,0.35)';this.style.color='#fff'"

                    <i class="ph ph-sign-out text-xl" style="color:rgba(255,200,200,0.9);"></i>
                    <span id="sidebar-logout-label" style="margin-left:10px;">Keluar</span>
                </button>

        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col w-full relative">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-4 lg:px-8 shrink-0 sticky top-0 z-10" style="background:linear-gradient(90deg,#14532d 0%,#16a34a 100%);box-shadow:0 2px 8px rgba(21,128,61,.35);">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="p-2 mr-3 rounded-md focus:outline-none" style="color:#fff;background:rgba(255,255,255,0.12);">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <h1 id="header-title" style="font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:0.4px;">Dashboard</h1>
            </div>

            <div class="flex items-center space-x-3">
                <button onclick="fetchData()" title="Refresh data dari spreadsheet" class="p-2 rounded-lg transition-colors flex items-center gap-1.5 text-sm font-medium" style="color:#fff;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);">
                    <i class="ph ph-arrows-clockwise text-lg" id="refresh-icon" style="color:#fff;"></i>
                    <span style="color:#fff;" class="hidden sm:inline">Refresh</span>
                </button>
                <div class="flex items-center gap-2 py-1.5 px-3 rounded-full" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);">
                    <div class="h-8 w-8 rounded-full flex items-center justify-center font-bold text-sm" style="background:rgba(255,255,255,0.25);color:#fff;">
                        <i class="ph ph-user text-sm"></i>
                    </div>
                    <div class="hidden sm:block">
                        <div id="header-admin-name" class="text-sm font-bold leading-tight" style="color:#fff;">-</div>
                        <div id="header-admin-role" class="text-xs opacity-75 leading-tight" style="color:#fff;">-</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-1 bg-gray-50 p-4 lg:p-6">
            <!-- Konten halaman akan di-render di sini -->
        </div>
    </main>

    <!-- Modal Form Produk -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <!-- Konten form di-inject via JS -->

    <!-- Modal Form Pelanggan -->
    <div id="customer-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">

    </div>

    <!-- Custom Notification Modal -->
    <div id="notif-overlay" class="hidden fixed inset-0 bg-black/40 z-[80] flex items-center justify-center p-4 modal-anim">
        <div id="notif-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 relative">
            <div id="notif-icon-wrap" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4"></div>
            <h3 id="notif-title" class="text-lg font-bold text-center text-gray-800 mb-2"></h3>

    <!-- Payment Modal (Tunai/QRIS/Kartu) -->

        <div id="payment-modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-md relative max-h-[90vh] overflow-y-auto hide-scrollbar"></div>
    </div>

    <!-- Struk Preview Modal -->
    <div id="struk-preview-modal" class="hidden fixed inset-0 bg-black/60 z-[75] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm relative">
            <div class="flex items-center justify-between p-4 border-b border-gray-100">
                <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-receipt text-green-600 text-xl"></i> Preview Struk</h3>
                <button onclick="document.getElementById('struk-preview-modal').classList.add('hidden')" class="p-1.5 text-gray-400 hover:bg-gray-100 rounded-lg"><i class="ph ph-x"></i></button>
            </div>
            <div class="p-4 overflow-y-auto max-h-[60vh]">
                <div id="struk-preview-content" style="display:flex;justify-content:center;background:#f9fafb;border-radius:12px;padding:12px;border:1px solid #e5e7eb;"></div>

            <div class="p-4 border-t border-gray-100 flex gap-3">

                <button id="struk-print-btn" class="flex-1 py-2.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 flex items-center justify-center gap-2">

    <!-- Hidden print area for struk 58mm -->

    <!-- Modal Barcode Scanner -->
    <div id="scanner-modal" class="hidden fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-xl p-4 w-full max-w-sm relative">
            <button onclick="closeScanner()" class="absolute top-2 right-2 p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200 z-10"><i class="ph ph-x text-xl"></i></button>
            <h3 class="font-bold text-center mb-3 text-gray-800 pr-8">Scan Barcode / QR Code</h3>
            <div style="position:relative;width:100%;background:#000;border-radius:10px;overflow:hidden;">
                <video id="scanner-video" autoplay playsinline muted style="width:100%;display:block;max-height:300px;object-fit:cover;"></video>
                <canvas id="scanner-canvas" style="display:none;"></canvas>
                <!-- garis bidik tengah -->
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #16a34a;border-radius:8px;pointer-events:none;">
                    <div style="position:absolute;top:-1px;left:-1px;width:20px;height:20px;border-top:3px solid #16a34a;border-left:3px solid #16a34a;border-radius:2px 0 0 0;"></div>
                    <div style="position:absolute;top:-1px;right:-1px;width:20px;height:20px;border-top:3px solid #16a34a;border-right:3px solid #16a34a;border-radius:0 2px 0 0;"></div>
                    <div style="position:absolute;bottom:-1px;left:-1px;width:20px;height:20px;border-bottom:3px solid #16a34a;border-left:3px solid #16a34a;border-radius:0 0 0 2px;"></div>
                    <div style="position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;border-bottom:3px solid #16a34a;border-right:3px solid #16a34a;border-radius:0 0 2px 0;"></div>
                </div>
            </div>
            <p id="scanner-status" class="text-xs text-center text-gray-500 mt-3">Memulai kamera...</p>
        </div>
    </div>

    <!-- App Logic -->
    <script>
        // --- KONFIGURASI APLIKASI ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyadIKSjcbvDYX2yS-gepUrv0X7_XYdfbsXiSnMJ2B5DNVsQm6Dqr7EdLxCSyzO-mVO/exec";

        // Menu lengkap admin
        const MENUS_ADMIN = [
            { name: 'Dashboard',         icon: 'ph-squares-four' },
            { name: 'Penjualan',         icon: 'ph-shopping-cart' },
            { name: 'Produk Saya',       icon: 'ph-package' },
            { name: 'Pelanggan',         icon: 'ph-users' },
            { name: 'Hutang Piutang',    icon: 'ph-handshake' },
            { name: 'Stock Opname',      icon: 'ph-clipboard-text' },
            { name: 'Poin & Reward',     icon: 'ph-star' },
            { name: 'Laporan',           icon: 'ph-file-text' },
            { name: 'Pengaturan',        icon: 'ph-gear' },
            { name: 'Karyawan',          icon: 'ph-user-circle-gear' },
            { name: 'Kas Awal & Clerek', icon: 'ph-user-check' },
            { name: 'FAQ',               icon: 'ph-question' },
        ];
        // Menu terbatas karyawan
        const MENUS_KARYAWAN = [
            { name: 'Dashboard',         icon: 'ph-squares-four' },
            { name: 'Penjualan',         icon: 'ph-shopping-cart' },
            { name: 'Pelanggan',         icon: 'ph-users' },
            { name: 'Hutang Piutang',    icon: 'ph-handshake' },
            { name: 'Poin & Reward',     icon: 'ph-star' },
            { name: 'Laporan',           icon: 'ph-file-text' },
            { name: 'Kas Awal & Clerek', icon: 'ph-user-check' },
            { name: 'FAQ',               icon: 'ph-question' },
        ];
        function getMenus() {
            if (!currentUser) return MENUS_ADMIN;
            return currentUser.role === 'admin' ? MENUS_ADMIN : MENUS_KARYAWAN;
        }

        // --- HUTANG PIUTANG DATA ---
        var hutangPiutangList = []; // array semua record hutang (pelanggan + supplier)
        var kategoriList      = []; // daftar kategori tersimpan (dari produk + tambahan manual)

        // ── KATEGORI LIST — disimpan di sheet Pengaturan (key: kategori_list) ──
        // loadKategoriList: gabungkan dari server (kategoriList sudah diisi
        //   saat fetchData) dengan kategori dari produk yang ada.
        function loadKategoriList() {
            var fromProducts = state.products
                .map(function(p){ return (p.category || '').trim(); })
                .filter(function(k){ return k !== ''; });
            // Gabungkan dengan yang sudah ada di kategoriList (dari server)
            var merged = Array.from(new Set(fromProducts.concat(kategoriList)))
                .filter(function(k){ return k.trim() !== ''; })
                .sort(function(a, b){ return a.localeCompare(b, 'id'); });
            kategoriList = merged;
            return kategoriList;
        }

        function saveKategoriToList(nama) {
            nama = nama.trim();
            if (!nama) return;
            loadKategoriList();
            if (kategoriList.indexOf(nama) < 0) {
                kategoriList.push(nama);
                kategoriList.sort(function(a, b){ return a.localeCompare(b, 'id'); });
            }
            // Simpan ke spreadsheet via GAS (key: kategori_list)
            if (GAS_URL) {
                gasPost({ action: 'savePengaturan', key: 'kategori_list', value: JSON.stringify(kategoriList) })
                    .catch(function(){});
            }
        }

        function deleteKategoriFromList(nama) {
            loadKategoriList();
            kategoriList = kategoriList.filter(function(k){ return k !== nama; });
            if (GAS_URL) {
                gasPost({ action: 'savePengaturan', key: 'kategori_list', value: JSON.stringify(kategoriList) })
                    .catch(function(){});
            }
        }

        // --- AUTH DATA (dimuat dari GAS saat fetchData) ---
        var authAdmin    = { username: 'user', password: 'user13' };
        var authKaryawan = [];
        var currentUser  = null;
        var adminAmbilAlih = false;  // true = admin ambil alih shift karyawan
        function setAdminAmbilAlih(val) {
            adminAmbilAlih = val;
            try { sessionStorage.setItem('ztronik_ambil_alih', val ? '1' : '0'); } catch(e) {}
        }
        // Password khusus untuk membatalkan transaksi (bisa diatur di Pengaturan)
        var cancelRefundPwd = 'batal123';

        function doLogin() {
            var uname = (document.getElementById('login-username').value || '').trim();
            var pwd   = (document.getElementById('login-password').value || '');
            var err   = document.getElementById('login-error');
            if (!uname || !pwd) { err.textContent='Username dan password wajib diisi.'; err.classList.remove('hidden'); return; }
            if (uname === authAdmin.username && pwd === authAdmin.password) {
                currentUser = { username: uname, role: 'admin', nama: 'Admin' };
                showLoginLoading(function(){ showApp(); });
                return;
            }
            var kar = authKaryawan.find(function(k){ return k.username===uname && k.password===pwd; });
            if (kar) {
                currentUser = { username: uname, role: 'karyawan', nama: kar.nama };
                showLoginLoading(function(){ showApp(); });
                return;
            }
            err.textContent = 'Username atau password salah.';
            err.classList.remove('hidden');
            document.getElementById('login-password').value = '';
        }

        function showLoginLoading(callback) {
            var overlay = document.getElementById('login-loading-overlay');
            var namaEl  = document.getElementById('login-loading-nama');
            if (namaEl) namaEl.textContent = namaTokoStruk || 'Z-TRONIK';
            if (overlay) overlay.style.display = 'flex';
            setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
                if (callback) callback();
            }, 2000);
        }

        function showApp(keepAmbilAlih) {
            if (!keepAmbilAlih) setAdminAmbilAlih(false);
            // Reset ke menu awal yang sesuai role
            state.activeMenu = 'Dashboard';
            document.getElementById('login-screen').style.display = 'none';
            // Update info user di header
            var nl = document.getElementById('header-admin-name');
            if (nl) nl.textContent = currentUser.nama;
            var rl = document.getElementById('header-admin-role');
            if (rl) rl.textContent = currentUser.role === 'admin' ? 'Admin' : 'Karyawan';
            var htEl = document.getElementById('header-title');
            if (htEl) htEl.innerText = 'Dashboard';
            sessionStorage.setItem('ztronik_session', JSON.stringify(currentUser));
            // Render ulang menu dan konten sesuai role secara realtime
            updateHeaderRole();
            renderSidebarMenu();
            renderContent();
        }

        function updateHeaderRole() {
            if (!currentUser) return;
            var nl = document.getElementById('header-admin-name');
            if (nl) nl.textContent = currentUser.nama;
            var rl = document.getElementById('header-admin-role');
            if (rl) {
                if (currentUser.role === 'admin') {
                    rl.textContent = adminAmbilAlih ? 'Admin (Ambil Alih)' : 'Admin';
                } else {
                    rl.textContent = 'Karyawan';
                }
            }
        }

        function doLogout() {
            showConfirm(
                'Keluar dari Sistem',
                'Apakah Anda yakin ingin keluar?\nSesi Anda akan diakhiri.',
                'warning',
                function() {
                    var overlay = document.getElementById('login-loading-overlay');
                    var namaEl  = document.getElementById('login-loading-nama');
                    if (namaEl) namaEl.textContent = 'Keluar...';
                    if (overlay) overlay.style.display = 'flex';
                    setTimeout(function() {
                        if (overlay) overlay.style.display = 'none';
                        currentUser = null;
                        adminAmbilAlih = false;
                        sessionStorage.removeItem('ztronik_session');
                        try { sessionStorage.removeItem('ztronik_ambil_alih'); } catch(e) {}
                        state.activeMenu = 'Dashboard';
                        document.getElementById('login-username').value = '';
                        document.getElementById('login-password').value = '';
                        document.getElementById('login-error').classList.add('hidden');
                        document.getElementById('login-screen').style.display = 'flex';

        // --- FETCH DATA — fetch() dengan fallback JSONP ---
        function fetchData() {
            if (!GAS_URL) return;
            state.fetchError = null;
            var icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');
            // Hanya tampilkan loading spinner jika belum ada data sama sekali
            var firstLoad = state.products.length === 0 && !state.isLoading;
            if (firstLoad) {
                state.isLoading = true;
                renderContent();
            }

            var fetchUrl = GAS_URL + '?t=' + Date.now();
            fetch(fetchUrl, {
                method: 'GET',
                redirect: 'follow',
                cache: 'no-store',
                headers: { 'Accept': 'application/json, text/javascript, */*' }
            })
                .then(function(res) {
                    // Cek apakah di-redirect ke Google login (artinya GAS belum public)
                    if (res.url && res.url.indexOf('accounts.google.com') >= 0) {
                        throw new Error('redirect-google');
                    }
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(function(text) {
                    // Cek redirect ke Google login di dalam response body
                    if (text.indexOf('accounts.google.com') >= 0 || text.indexOf('SignIn') >= 0) {
                        throw new Error('redirect-google');
                    }
                    var data;
                    try { data = JSON.parse(text); } catch(e) {
                        // Mungkin JSONP-wrapped (ada callback name di depan)
                        var m = text.match(/\{[\s\S]*\}/);
                        if (m) { try { data = JSON.parse(m[0]); } catch(e2) { throw new Error('Parse error'); } }
                        else throw new Error('Response tidak valid');
                    }
                    var ic = document.getElementById('refresh-icon');
                    if (ic) ic.classList.remove('animate-spin');
                    applyGasData(data);
                })
                .catch(function(err) {
                    // fetch gagal — fallback ke JSONP
                    console.log('fetch() gagal (' + err.message + '), fallback ke JSONP');
                    fetchDataJSONP();
                });
        }

        function fetchDataJSONP() {
            // Hapus script lama
            var old = document.getElementById('jsonp-loader');
            if (old) old.remove();

            var cbName = '__gasCallback_' + Date.now();

            var timer = setTimeout(function() {
                delete window[cbName];
                state.isLoading = false;
                state.fetchError = 'Timeout: GAS tidak merespons 15 detik. Pastikan sudah di-deploy ulang dengan Who has access: Anyone.';
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                showToast('Gagal memuat data dari GAS (timeout). Klik Refresh untuk coba lagi.', 'error');
                if (state.products.length === 0) renderContent();
            }, 15000);

            window[cbName] = function(data) {
                clearTimeout(timer);
                delete window[cbName];
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                applyGasData(data);
            };

            var script = document.createElement('script');
            script.id = 'jsonp-loader';
            script.src = GAS_URL + '?callback=' + cbName + '&t=' + Date.now();
            script.onerror = function() {
                clearTimeout(timer);
                delete window[cbName];
                state.isLoading = false;
                state.fetchError = 'URL GAS tidak valid atau GAS belum di-deploy. Pastikan URL berakhiran /exec dan Who has access: Anyone.';
                var ic = document.getElementById('refresh-icon');
                if (ic) ic.classList.remove('animate-spin');
                showToast('Gagal terhubung ke GAS. Cek URL dan coba Refresh.', 'error');
                if (state.products.length === 0) renderContent();
            };
            document.head.appendChild(script);
        }

        // GAS POST — tetap pakai fetch (POST tidak kena CORS di GAS)
        async function gasPost(payload) {
            if (!GAS_URL) return { status: 'error', message: 'GAS_URL kosong' };
            try {
                const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await r.json();
            } catch(e) {
                console.error('gasPost:', e);
                return { status: 'error', message: e.message };
            }
        }

        // --- BARCODE SCANNER ---
        // ── SCANNER ENGINE (getUserMedia + ZXing, works from file://) ──────
        var _scanStream    = null;
        var _scanRunning   = false;
        var _scanRafId     = null;
        var _scanCallback  = null;
        var _zxingReader   = null;

        function _initZxing() {
            if (_zxingReader) return;
            try {
                if (window.ZXing) {
                    var hints = new Map();
                    var formats = [
                        ZXing.BarcodeFormat.QR_CODE,
                        ZXing.BarcodeFormat.CODE_128,
                        ZXing.BarcodeFormat.CODE_39,
                        ZXing.BarcodeFormat.EAN_13,
                        ZXing.BarcodeFormat.EAN_8,
                        ZXing.BarcodeFormat.UPC_A,
                        ZXing.BarcodeFormat.UPC_E,
                        ZXing.BarcodeFormat.DATA_MATRIX,
                        ZXing.BarcodeFormat.ITF,
                        ZXing.BarcodeFormat.CODABAR
                    ];
                    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
                    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                    _zxingReader = new ZXing.BrowserMultiFormatReader(hints);
                }
            } catch(e) { _zxingReader = null; }
        }

        function closeScanner() {
            _scanRunning = false;
            if (_scanRafId) { cancelAnimationFrame(_scanRafId); _scanRafId = null; }
            if (_scanStream) {
                _scanStream.getTracks().forEach(function(t){ t.stop(); });
                _scanStream = null;
            }
            var vid = document.getElementById('scanner-video');
            if (vid) { vid.srcObject = null; }
            document.getElementById('scanner-modal').classList.add('hidden');
            var st = document.getElementById('scanner-status');
            if (st) st.textContent = 'Memulai kamera...';
        }

        function _openScanner(onSuccess) {
            if (_scanRunning) { closeScanner(); }
            _scanCallback = onSuccess;

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showAlert('Browser Tidak Didukung',
                    'Browser ini tidak mendukung akses kamera. Gunakan Chrome, Edge, atau Firefox terbaru.', 'error');
                return;
            }

            var modal  = document.getElementById('scanner-modal');
            var video  = document.getElementById('scanner-video');
            var status = document.getElementById('scanner-status');
            if (!modal || !video) return;

            modal.classList.remove('hidden');
            if (status) status.textContent = 'Meminta izin kamera...';

            // Coba kamera belakang dulu, fallback ke kamera manapun
            var constraints = [
                { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
                { video: { facingMode: 'environment' } },
                { video: true }
            ];

            function tryConstraint(idx) {
                if (idx >= constraints.length) {
                    closeScanner();
                    showAlert('Kamera Tidak Bisa Diakses',
                        'Tidak bisa membuka kamera.\n\nPastikan:\n1. Izin kamera sudah diberikan di browser\n2. Tidak ada app lain yang sedang pakai kamera\n3. Perangkat memiliki kamera', 'error');
                    return;
                }
                navigator.mediaDevices.getUserMedia(constraints[idx])
                    .then(function(stream) {
                        _scanStream  = stream;
                        _scanRunning = true;
                        video.srcObject = stream;
                        video.play();
                        if (status) status.textContent = 'Arahkan kamera ke barcode / QR Code';
                        _initZxing();
                        _scanLoop();
                    })
                    .catch(function(err) {
                        if (err.name === 'NotAllowedError') {
                            closeScanner();
                            showAlert('Izin Kamera Ditolak',
                                'Izin kamera ditolak.\n\nCara mengizinkan di Chrome:\n1. Klik ikon gembok di address bar\n2. Kamera → Izinkan\n3. Refresh halaman lalu coba lagi', 'error');
                        } else {
                            tryConstraint(idx + 1);
                        }
                    });
            }
            tryConstraint(0);
        }

        function _scanLoop() {
            if (!_scanRunning) return;
            var video  = document.getElementById('scanner-video');
            var canvas = document.getElementById('scanner-canvas');
            if (!video || !canvas || video.readyState < 2) {
                _scanRafId = requestAnimationFrame(_scanLoop);
                return;
            }
            var W = video.videoWidth, H = video.videoHeight;
            if (!W || !H) { _scanRafId = requestAnimationFrame(_scanLoop); return; }
            canvas.width  = W;
            canvas.height = H;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, W, H);

            // Coba ZXing dulu
            if (_zxingReader) {
                try {
                    var imgData = ctx.getImageData(0, 0, W, H);
                    var lum = new ZXing.RGBLuminanceSource(imgData.data, W, H);
                    var bmp = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
                    var result = _zxingReader.decodeBitmap(bmp);
                    if (result && result.getText()) {
                        var txt = result.getText();
                        closeScanner();
                        if (_scanCallback) _scanCallback(txt);
                        return;
                    }
                } catch(e) { /* not found in this frame */ }
            } else {
                // Fallback: BarcodeDetector API (Chrome 88+, Android)
                if (window.BarcodeDetector) {
                    new BarcodeDetector({ formats: ['qr_code','code_128','ean_13','ean_8','upc_a','upc_e','code_39','itf','codabar','data_matrix'] })
                        .detect(canvas)
                        .then(function(barcodes) {
                            if (barcodes && barcodes.length > 0 && _scanRunning) {
                                var txt = barcodes[0].rawValue;
                                closeScanner();
                                if (_scanCallback) _scanCallback(txt);
                            }
                        })
                        .catch(function(){});
                }
            }
            _scanRafId = requestAnimationFrame(_scanLoop);
        }

        function showToast(msg, type = 'success') {
            let toast = document.getElementById('pos-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'pos-toast';
                document.body.appendChild(toast);
            }
            const colors = {
                success: { bg: '#22c55e', icon: 'ph-check-circle' },
                error:   { bg: '#ef4444', icon: 'ph-x-circle' },
                warning: { bg: '#f59e0b', icon: 'ph-warning' },
                info:    { bg: '#3b82f6', icon: 'ph-info' }
            };
            const c = colors[type] || colors.success;
            toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-5 py-3 rounded-2xl text-white text-sm font-semibold shadow-2xl toast-anim';
            toast.style.background = c.bg;
            toast.style.minWidth = '220px';
            toast.innerHTML = `<i class="ph ${c.icon} text-xl shrink-0"></i><span>${msg}</span>`;
            toast.style.opacity = '1';
            toast.style.display = 'flex';
            clearTimeout(toast._timeout);
            clearTimeout(toast._hideTimeout);
            toast._timeout = setTimeout(() => { toast.style.transition = 'opacity 0.4s'; toast.style.opacity = '0'; }, 3000);
            toast._hideTimeout = setTimeout(() => { toast.style.display = 'none'; toast.style.transition = ''; }, 3400);
        }

        function renderDashboardChart() {
            var canvas = document.getElementById('dashboard-sales-chart');
            if (!canvas) return;
            var dayLabels = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
            var today = new Date().toDateString();
            var labels = [], totals = [], colors = [], borderColors = [];
            for (var i = 6; i >= 0; i--) {
                var d = new Date(); d.setDate(d.getDate() - i);
                var ds = d.toDateString();
                var total = state.salesHistory
                    .filter(function(s){ return new Date(s.date).toDateString() === ds; })
                    .reduce(function(sum, s){ return sum + s.total; }, 0);
                var isToday = ds === today;
                labels.push(dayLabels[d.getDay()] + (isToday ? ' ★' : ''));
                totals.push(total);
                colors.push(isToday ? 'rgba(22,163,74,0.85)' : 'rgba(134,239,172,0.7)');
                borderColors.push(isToday ? '#15803d' : '#86efac');
            }
            if (window._dashboardChart) { window._dashboardChart.destroy(); }
            window._dashboardChart = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Omzet (Rp)', data: totals, backgroundColor: colors, borderColor: borderColors, borderWidth: 2, borderRadius: 6, borderSkipped: false }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 800, easing: 'easeOutQuart' },
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx){ return ' ' + formatRp(ctx.parsed.y); } } } },
                    scales: {
                        x: { grid: { display: false }, ticks: { font: { size: 11, weight: '600' }, color: '#6b7280' } },
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 }, color: '#9ca3af', callback: function(val){ if(val===0)return '0'; if(val>=1000000)return (val/1000000).toFixed(1)+'Jt'; if(val>=1000)return (val/1000).toFixed(0)+'K'; return val; } } }
                    }
                }
            });
        }

        function navigateTo(menu) {
            setActiveMenu(menu);
        }

            <style>

                    .pos-title-desktop { font-size: 14px !important; }

        // Switch tab di mobile POS
        var _posActiveTab = 'produk';
        function switchPosTab(tab) {
            _posActiveTab = tab;
            var panelProduk    = document.getElementById('pos-panel-produk');
            var panelKeranjang = document.getElementById('pos-panel-keranjang');
            var tabProduk      = document.getElementById('pos-tab-produk');
            var tabKeranjang   = document.getElementById('pos-tab-keranjang');
            if (!panelProduk || !panelKeranjang) return;
            if (tab === 'produk') {
                panelProduk.className    = 'tab-active';
                panelKeranjang.className = 'tab-mode';
                tabProduk.style.background    = '#16a34a'; tabProduk.style.color    = '#fff';
                tabKeranjang.style.background = '#f0fdf4'; tabKeranjang.style.color = '#16a34a';
            } else {
                panelProduk.className    = 'tab-mode';
                panelKeranjang.className = 'tab-active';
                tabProduk.style.background    = '#f0fdf4'; tabProduk.style.color    = '#16a34a';
                tabKeranjang.style.background = '#16a34a'; tabKeranjang.style.color = '#fff';
            }
        }

        function initPosMobileLayout() {
            if (window.innerWidth <= 767) {
                var panelProduk    = document.getElementById('pos-panel-produk');
                var panelKeranjang = document.getElementById('pos-panel-keranjang');
                if (panelProduk)    panelProduk.className    = 'tab-active';
                if (panelKeranjang) panelKeranjang.className = 'tab-mode';
                _posActiveTab = 'produk';
            }
        }
        function handleSearch(e) {
            state.searchQuery = e.target.value.toLowerCase();
            state.posPage = 1;
            if (state.activeMenu === 'Produk Saya') {
                state.productPage = 1;
                renderProductTableOnly();
            } else {
                renderPosGrid();
            }
        }

        // Render hanya tabel produk tanpa me-render ulang seluruh halaman (agar input tidak kehilangan fokus)
        function renderProductTableOnly() {
            var container = document.getElementById('product-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'product-search-input') ? inp.selectionStart : null;

            var filteredList = state.products.filter(function(p) {
                return p.name.toLowerCase().includes(state.searchQuery) || (p.barcode && p.barcode.toLowerCase().includes(state.searchQuery));
            });
            if (state.productSort === 'cat') filteredList.sort(function(a,b){ return a.category.localeCompare(b.category); });
            else if (state.productSort === 'az') filteredList.sort(function(a,b){ return a.name.localeCompare(b.name); });
            else if (state.productSort === 'za') filteredList.sort(function(a,b){ return b.name.localeCompare(a.name); });
            else if (state.productSort === 'stock_high') filteredList.sort(function(a,b){ return b.stock - a.stock; });
            else if (state.productSort === 'stock_low') filteredList.sort(function(a,b){ return a.stock - b.stock; });

            var itemsPerPage = 10;
            var totalPages = Math.max(1, Math.ceil(filteredList.length / itemsPerPage));
            if (state.productPage > totalPages) state.productPage = totalPages;
            var startIdx = (state.productPage - 1) * itemsPerPage;
            var displayedList = filteredList.slice(startIdx, startIdx + itemsPerPage);

            var rows = displayedList.length === 0
                ? '<tr><td colspan="8" class="text-center py-6 text-gray-400 text-sm">Tidak ada produk ditemukan.</td></tr>'
                : displayedList.map(function(product) {
                    return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">'
                        + '<td class="py-3 px-5 text-sm font-mono text-gray-500"><div>' + product.id + '</div>' + (product.barcode ? '<div class="text-xs text-gray-400 mt-1">' + product.barcode + '</div>' : '') + '</td>'
                        + '<td class="py-3 px-5 font-medium text-gray-800">' + product.name + '</td>'
                        + '<td class="py-3 px-5 text-sm text-gray-600"><span class="px-2.5 py-1 bg-gray-100 rounded-full text-xs">' + product.category + '</span></td>'
                        + '<td class="py-3 px-5 text-sm text-gray-800"><div class="font-medium">' + formatRp(product.price) + '</div>' + (product.discount > 0 ? '<div class="text-xs text-red-500 font-bold mt-1">Promo: -' + formatRp(product.discount) + '</div>' : '') + '</td>'
                        + '<td class="py-3 px-5 text-center">' + (product.unlimited ? '<span class="text-sm font-bold text-purple-600">&#8734;</span>' : '<span class="text-sm font-bold ' + (product.stock <= product.minStock ? 'text-red-500' : 'text-green-500') + '">' + product.stock + '</span>') + '</td>'
                        + '<td class="py-3 px-5 text-center">' + (product.unlimited ? '<span class="text-xs px-2 py-0.5 bg-purple-100 text-purple-600 rounded-full font-semibold">Unlimited</span>' : '<span class="text-sm font-medium text-gray-500">' + product.minStock + '</span>') + '</td>'
                        + '<td class="py-3 px-5 text-center">' + ((product.poinPerUnit || 0) > 0 ? '<span class="text-sm font-bold text-green-600">+' + product.poinPerUnit + '</span>' : '<span class="text-sm text-gray-300">—</span>') + '</td>'
                        + '<td class="py-3 px-5 flex justify-end gap-2">'
                        + (currentUser && currentUser.role === 'admin' ? '<button onclick="quickStockUpdate(\'' + product.id + '\')" title="Ubah Stok Cepat" class="p-1.5 text-green-600 hover:bg-green-50 rounded transition-colors"><i class="ph ph-stack-plus text-lg"></i></button>' : '')
                        + '<button onclick="openProductModal(\'' + product.id + '\')" title="Edit" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded transition-colors"><i class="ph ph-pencil-simple text-lg"></i></button>'
                        + '<button onclick="deleteProduct(\'' + product.id + '\')" title="Hapus" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors"><i class="ph ph-trash text-lg"></i></button>'
                        + '</td></tr>';
                }).join('');

            var tableBody = container.querySelector('tbody');
            if (tableBody) tableBody.innerHTML = rows;

            var pagination = container.querySelector('.product-pagination');
            if (pagination) {
                if (totalPages > 1) {
                    pagination.innerHTML = '<button onclick="changeProductPage(-1)" ' + (state.productPage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded hover:bg-gray-50 disabled:opacity-50 transition-colors">< Prev</button>'
                        + '<span class="text-sm text-gray-500 font-medium">Hal ' + state.productPage + ' dari ' + totalPages + '</span>'
                        + '<button onclick="changeProductPage(1)" ' + (state.productPage===totalPages?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded hover:bg-gray-50 disabled:opacity-50 transition-colors">Next ></button>';
                    pagination.style.display = 'flex';
                } else {
                    pagination.innerHTML = '';
                    pagination.style.display = 'none';
                }
            }

            // Restore fokus ke input search
            var searchInput = document.getElementById('product-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
            }
        }

        function handlePosCategoryChange(e) {
            state.posCategory = e.target.value;
            state.posPage = 1;
            renderPosGrid();
        }

        function handleProductSortChange(e) {
            state.productSort = e.target.value;
            state.productPage = 1;
            renderContent();
        }

        function changePosPage(dir) {
            state.posPage += dir;
            renderPosGrid();
        }

        function handleDiscountChange(e) {
            state.discountValue = Number(e.target.value) || 0;
            // Hanya update tampilan total/grand total tanpa re-render seluruh footer
            // agar input tidak kehilangan fokus saat mengetik
            _updateDiscountDisplay();
        }

        function _updateDiscountDisplay() {
            // Update hanya nilai-nilai yang berubah akibat diskon, tanpa rebuild DOM
            var subtotal = state.cart.reduce(function(s, item) {
                return s + getItemActivePrice(item) * item.qty;
            }, 0);
            var poinDiscount = state.posPoinRedeem ? Math.floor(state.posPoinRedeem / 100) * 1000 : 0;
            var disc = state.discountType === 'Rp' ? state.discountValue : subtotal * (state.discountValue / 100);
            var grandTotal = Math.max(0, subtotal - disc - poinDiscount);

            var elSubtotal = document.getElementById('disc-subtotal');
            var elDisc     = document.getElementById('disc-amount');
            var elTotal    = document.getElementById('disc-grandtotal');
            if (elSubtotal) elSubtotal.textContent = formatRp(subtotal);
            if (elDisc && disc > 0) { elDisc.textContent = '-' + formatRp(disc); elDisc.closest('.disc-row') && (elDisc.closest('.disc-row').style.display = ''); }
            if (elDisc && disc === 0) { var r = elDisc.closest('.disc-row'); if(r) r.style.display='none'; }
            if (elTotal) elTotal.textContent = formatRp(grandTotal);
        }

        function toggleDiscountType() {
            state.discountType = state.discountType === 'Rp' ? '%' : 'Rp';
            state.discountValue = 0;
            renderCartFooter();
        }

        function addToCart(productId) {
            const product = state.products.find(p => p.id === productId);
            if(!product) return;

            const existingItem = state.cart.find(item => item.id === productId);
            if (existingItem) {
                if (product.unlimited || existingItem.qty < product.stock) {
                    existingItem.qty += 1;
                } else {
                    showAlert('Stok Tidak Cukup', 'Jumlah melebihi stok yang tersedia!', 'warning');
                }
            } else {
                if (product.unlimited || product.stock > 0) {
                    state.cart.push({ ...product, qty: 1 });
                } else {
                    showAlert('Stok Habis', 'Produk ini sedang tidak tersedia.', 'error');
                }
            }
            renderCart();
            // Mobile: auto-switch ke tab keranjang saat item pertama ditambah
            if (window.innerWidth <= 767 && state.cart.length === 1) {
                switchPosTab('keranjang');
            }
        }

        function updateQty(productId, change) {
            const index = state.cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                const product = state.products.find(p => p.id === productId);
                const newQty = state.cart[index].qty + change;

                if (!product.unlimited && newQty > product.stock) {
                    showAlert('Stok Tidak Cukup', 'Jumlah melebihi stok yang tersedia!', 'warning');
                    return;
                }

                state.cart[index].qty = newQty;
                if (state.cart[index].qty <= 0) {
                    state.cart.splice(index, 1);
                }
            }
            renderCart();
        }

        function setPaymentMethod(method) {
            state.paymentMethod = method;
            renderCartFooter();
        }

        // --- PAYMENT MODAL & STRUK ---
        // Simpan base64 foto QRIS (diupload via pengaturan)
        let qrisImageBase64 = '';
        let namaTokoStruk   = 'Z-TRONIK';
        let alamatTokoStruk = '';
        let noHpTokoStruk   = '';
        let footerStruk     = 'Terima kasih telah berbelanja!';

        // --- BLUETOOTH THERMAL PRINTER 58mm ---
        // Mendukung printer ESC/POS via Web Bluetooth (Chrome/Edge desktop & Android)
        var btDevice        = null;   // BluetoothDevice yang sedang terhubung
        var btCharacteristic = null;  // Karakteristik write untuk kirim data ESC/POS
        var btPrintMode     = false;  // true = cetak via BT, false = window.print() seperti biasa

        // UUID umum untuk printer Bluetooth SPP / BLE serial
        var BT_SERVICE_UUID      = '000018f0-0000-1000-8000-00805f9b34fb'; // SPP-like BLE
        var BT_CHAR_UUID         = '00002af1-0000-1000-8000-00805f9b34fb';
        // Fallback UUID untuk printer lain
        var BT_SERVICE_ALT       = '49535343-fe7d-4ae5-8fa9-9fafd205e455';
        var BT_CHAR_ALT          = '49535343-1e4d-4bd9-ba61-23c647249616';

        // Encode string ke Uint8Array (Latin-1 / Windows-1252 agar kompatibel ESC/POS)
        function encodeESC(str) {
            var arr = [];
            for (var i = 0; i < str.length; i++) {
                var c = str.charCodeAt(i);
                arr.push(c < 256 ? c : 63); // '?' untuk karakter di luar range
            }
            return new Uint8Array(arr);
        }

        // Kirim chunk kecil agar tidak overflow buffer printer
        async function btWrite(characteristic, data) {
            var chunkSize = 200;
            for (var i = 0; i < data.length; i += chunkSize) {
                await characteristic.writeValue(data.slice(i, i + chunkSize));
                await new Promise(function(r){ setTimeout(r, 30); });
            }
        }

        // Sambungkan ke printer Bluetooth
        async function btConnect() {
            if (!navigator.bluetooth) {
                showAlert('Tidak Didukung',
                    'Web Bluetooth tidak tersedia.\n\nGunakan Chrome atau Edge di:\n• Android (HP/Tablet)\n• Windows / macOS / Linux desktop\n\nSafari dan Firefox belum mendukung Web Bluetooth.',
                    'warning');
                return;
            }
            try {
                showToast('Mencari printer Bluetooth...', 'info');
                var device = await navigator.bluetooth.requestDevice({
                    filters: [
                        { services: [BT_SERVICE_UUID] },
                        { services: [BT_SERVICE_ALT] },
                        { namePrefix: 'POS' },
                        { namePrefix: 'Printer' },
                        { namePrefix: 'RPP' },
                        { namePrefix: 'MTP' },
                        { namePrefix: 'Gprinter' },
                        { namePrefix: 'GP' },
                        { namePrefix: 'Xprinter' },
                        { namePrefix: 'XP' },
                        { namePrefix: 'EPSON' },
                        { namePrefix: 'Star' },
                    ],
                    optionalServices: [BT_SERVICE_UUID, BT_SERVICE_ALT,
                        '000018f0-0000-1000-8000-00805f9b34fb',
                        '49535343-fe7d-4ae5-8fa9-9fafd205e455']
                });
                var server = await device.gatt.connect();
                var characteristic = null;
                // Coba service utama dulu
                try {
                    var service = await server.getPrimaryService(BT_SERVICE_UUID);
                    characteristic = await service.getCharacteristic(BT_CHAR_UUID);
                } catch(e) {
                    // Fallback ke service alternatif
                    try {
                        var svc2 = await server.getPrimaryService(BT_SERVICE_ALT);
                        characteristic = await svc2.getCharacteristic(BT_CHAR_ALT);
                    } catch(e2) {
                        // Coba ambil service pertama yang tersedia
                        var services = await server.getPrimaryServices();
                        for (var s of services) {
                            var chars = await s.getCharacteristics();
                            for (var ch of chars) {
                                if (ch.properties.write || ch.properties.writeWithoutResponse) {
                                    characteristic = ch; break;
                                }
                            }
                            if (characteristic) break;
                        }
                    }
                }
                if (!characteristic) {
                    showAlert('Printer Tidak Didukung',
                        'Printer ditemukan tapi karakteristik write tidak tersedia.\n\nPastikan printer mendukung BLE / SPP dan sudah dalam mode pairing.',
                        'error');
                    return;
                }
                btDevice = device;
                btCharacteristic = characteristic;
                btPrintMode = true;
                // Pantau disconnect
                device.addEventListener('gattserverdisconnected', function() {
                    btDevice = null; btCharacteristic = null; btPrintMode = false;
                    showToast('Printer Bluetooth terputus.', 'warning');
                    renderContent();
                });
                showToast('Terhubung ke printer: ' + device.name, 'success');
                renderContent();
            } catch(err) {
                if (err.name !== 'NotFoundError') {
                    showAlert('Gagal Konek', 'Error: ' + err.message, 'error');
                }
            }
        }

        // Putuskan koneksi Bluetooth
        function btDisconnect() {
            if (btDevice && btDevice.gatt.connected) btDevice.gatt.disconnect();
            btDevice = null; btCharacteristic = null; btPrintMode = false;
            showToast('Printer Bluetooth diputuskan.', 'info');
            renderContent();
        }

        // Cetak test page ke printer BT
        async function btTestPrint() {
            if (!btCharacteristic) { showAlert('Belum Terhubung', 'Sambungkan printer Bluetooth terlebih dahulu.', 'warning'); return; }
            try {
                var ESC = 0x1B, GS = 0x1D;
                var cmd = [];
                // Init printer
                cmd.push(ESC, 0x40);
                // Center
                cmd.push(ESC, 0x61, 0x01);
                // Bold on
                cmd.push(ESC, 0x45, 0x01);
                var nameLine = namaTokoStruk || 'Z-TRONIK';
                for (var c of encodeESC(nameLine)) cmd.push(c);
                cmd.push(0x0A);
                // Bold off
                cmd.push(ESC, 0x45, 0x00);
                for (var c of encodeESC('--- Test Print ---')) cmd.push(c);
                cmd.push(0x0A);
                for (var c of encodeESC('Printer terhubung!')) cmd.push(c);
                cmd.push(0x0A, 0x0A, 0x0A);
                // Cut
                cmd.push(GS, 0x56, 0x42, 0x00);
                await btWrite(btCharacteristic, new Uint8Array(cmd));
                showToast('Test print berhasil!', 'success');
            } catch(e) {
                showAlert('Gagal Cetak', 'Error: ' + e.message, 'error');
            }
        }

        // Bangun data ESC/POS dari opts struk — format 58mm (32 kolom)
        function buildESCPOS(opts) {
            var ESC = 0x1B, GS = 0x1D, LF = 0x0A;
            var W = 32; // lebar karakter 58mm
            var cmd = [];

            function push(arr) { for (var b of arr) cmd.push(b); }
            function pushStr(s) { push(encodeESC(s)); }
            function nl(n) { for (var i = 0; i < (n||1); i++) cmd.push(LF); }
            function center(s) {
                s = String(s||'').slice(0, W);
                var pad = Math.max(0, Math.floor((W - s.length) / 2));
                return ' '.repeat(pad) + s;
            }
            function leftRight(l, r) {
                l = String(l||''); r = String(r||'');
                var space = W - l.length - r.length;
                if (space < 1) { l = l.slice(0, W - r.length - 1); space = 1; }
                return l + ' '.repeat(space) + r;
            }
            function line() { return '-'.repeat(W); }
            function dline() { return '='.repeat(W); }

            // Init
            push([ESC, 0x40]);

            // Nama toko — bold, center, font besar
            push([ESC, 0x61, 0x01]);   // center
            push([GS, 0x21, 0x11]);    // double height+width
            push([ESC, 0x45, 0x01]);   // bold on
            pushStr((opts.namaT || 'TOKO').slice(0, 16));
            nl();
            push([GS, 0x21, 0x00]);    // normal size
            push([ESC, 0x45, 0x00]);   // bold off

            // Alamat & telp
            if (opts.alamatT) {
                var lines = opts.alamatT.split('\n');
                for (var l of lines) { pushStr(center(l.trim().slice(0, W))); nl(); }
            }
            if (opts.telp) { pushStr(center('Telp: ' + opts.telp)); nl(); }

            push([ESC, 0x61, 0x00]);   // left align
            pushStr(line()); nl();

            // Header transaksi
            push([ESC, 0x61, 0x00]);
            pushStr(leftRight('No. Trx', opts.noTrx || '')); nl();
            pushStr(leftRight('Tanggal', opts.tgl || '')); nl();
            pushStr(leftRight('Jam',     opts.jam || '')); nl();
            pushStr(leftRight('Kasir',   opts.kasir || (typeof currentUser !== 'undefined' && currentUser ? currentUser.nama : 'Admin'))); nl();
            if (opts.memberName) {
                pushStr(leftRight('Member',    opts.memberName.slice(0, 18))); nl();
                pushStr(leftRight('ID Member', maskMemberId(opts.memberId))); nl();
            }

            pushStr(line()); nl();

            // Item-item
            if (opts.cartItems && opts.cartItems.length > 0) {
                for (var item of opts.cartItems) {
                    var p = item.price, qty = item.qty, tot = item.total;
                    var name = item.name.length > W ? item.name.slice(0, W-1) : item.name;
                    pushStr(name); nl();
                    var qtyStr = '  ' + qty + ' x ' + formatRp(p);
                    pushStr(leftRight(qtyStr, formatRp(tot))); nl();
                }
            }

            pushStr(line()); nl();

            // Subtotal, diskon, total
            pushStr(leftRight('Subtotal', formatRp(opts.subtotal || 0))); nl();
            if (opts.disc > 0) { pushStr(leftRight('Diskon', '-' + formatRp(opts.disc))); nl(); }
            if (opts.poinDisc > 0) {
                pushStr(leftRight('Poin (' + opts.poinRedeem + ')', '-' + formatRp(opts.poinDisc))); nl();
            }
            pushStr(dline()); nl();
            push([ESC, 0x45, 0x01]);
            pushStr(leftRight('TOTAL', formatRp(opts.grandTotal || 0))); nl();
            push([ESC, 0x45, 0x00]);

            if (opts.method === 'Tunai') {
                pushStr(leftRight('Tunai',   formatRp(opts.received || 0))); nl();
                pushStr(leftRight('Kembali', formatRp(opts.change   || 0))); nl();
            }
            pushStr(leftRight('Metode', opts.method || '')); nl();
            pushStr(line()); nl();

            // Footer — center
            push([ESC, 0x61, 0x01]);
            var footerLines = (opts.footer || '').split('\n');
            for (var fl of footerLines) { if (fl.trim()) { pushStr(fl.trim().slice(0, W)); nl(); } }
            nl(2);

            // Paper cut
            push([GS, 0x56, 0x42, 0x00]);

            return new Uint8Array(cmd);
        }

        // Cetak struk via Bluetooth
        async function btPrintStruk(opts) {
            if (!btCharacteristic) {
                showAlert('Printer Belum Terhubung',
                    'Sambungkan printer Bluetooth 58mm terlebih dahulu di menu Pengaturan → Printer Bluetooth.',
                    'warning');
                return false;
            }
            try {
                var data = buildESCPOS(opts);
                await btWrite(btCharacteristic, data);
                showToast('Struk berhasil dicetak via Bluetooth!', 'success');
                return true;
            } catch(e) {
                showAlert('Gagal Cetak BT', 'Error: ' + e.message + '\n\nCoba putuskan dan sambungkan ulang printer.', 'error');
                return false;
            }
        }

        // --- HELPER: Normalisasi nomor HP → selalu awali dengan 0 ---
        // Menangani format: 08xxx, 8xxx (leading zero hilang di spreadsheet),
        // +628xxx, 628xxx, maupun format dengan tanda hubung/spasi
        function normalizePhoneNumber(hp) {
            if (!hp) return '';
            hp = String(hp).trim();
            // Hapus karakter selain digit dan +
            var digits = hp.replace(/[^\d+]/g, '');
            if (!digits) return hp; // kembalikan asli kalau bukan angka sama sekali
            if (digits.startsWith('+62')) return '0' + digits.slice(3);
            if (digits.startsWith('62') && digits.length >= 10) return '0' + digits.slice(2);
            // Leading zero hilang karena Google Sheets simpan sebagai angka: 8xxx → 08xxx
            if (/^[89]\d{7,}$/.test(digits)) return '0' + digits;
            // Sudah benar dimulai 0
            return digits;
        }

                const inp = document.getElementById('pay-cash-input');

        function calcChange(total) {
            const inp = document.getElementById('pay-cash-input');
            if (!inp) return;
            const received = Number(inp.value) || 0;
            const change   = Math.max(0, received - (total || 0));
            const rd = document.getElementById('pay-received-display');
            const cd = document.getElementById('pay-change-display');
            if (rd) rd.innerText = formatRp(received);
            if (cd) cd.innerText = formatRp(change);
        }

        function setNominal(total, val) {
            // Round up to nearest val
            const inp = document.getElementById('pay-cash-input');
            if (!inp) return;
            const rounded = Math.ceil(total / val) * val;
            inp.value = rounded;
            calcChange(total);
        }

        function verifyHutangPassword(grandTotal) {
            const pwd = (document.getElementById('hutang-pwd-input')?.value || '').trim();

            if (!pwd) {
                showAlert('Password Kosong', 'Masukkan password terlebih dahulu.', 'warning');
                return;
            }

            if (pwd !== cancelRefundPwd) {
                showAlert('Password Salah', 'Password yang Anda masukkan tidak sesuai.', 'error');
                document.getElementById('hutang-pwd-input').value = '';
                return;
            }

            // Password benar, lanjut proses pembayaran hutang
            closePaymentModal();
            processHutangPayment(grandTotal);
        }

        function processHutangPayment(grandTotal) {
            const cust = state.posActiveMember;
            if (!cust) { showAlert('Error', 'Member tidak ditemukan.', 'error'); return; }
            const now = new Date();
            const noTrx = 'TRX' + Date.now().toString().slice(-8);
            const hutangRecord = {
                id: 'HT-' + Date.now(), tipe: 'pelanggan', nama: cust.name,
                idPelanggan: cust.id, keterangan: 'Hutang dari transaksi ' + noTrx,
                jumlah: grandTotal, sudahDibayar: 0, tanggal: now.toISOString(),
                jatuhTempo: '', status: 'belum',
                kasir: currentUser ? currentUser.nama : '-',
                catatanTrx: 'Dari POS - Metode Hutang', riwayatBayar: []
            };
            hutangPiutangList.push(hutangRecord);
            if (GAS_URL) gasPost({ action: 'saveHutang', hutang: hutangRecord }).catch(function(){});
            const sc = state.customers.find(c => c.id === cust.id);
            if (sc) {
                sc.totalBelanja = (sc.totalBelanja || 0) + grandTotal;
                if (GAS_URL) gasPost({ action: 'updatePoinAfterCheckout', customerId: sc.id, poin: sc.poin, poinAkumulasi: sc.poinAkumulasi || 0, totalBelanja: sc.totalBelanja }).catch(function(){});
            }
            const saleRecord = {
                id: noTrx, date: now.toISOString(),
                items: state.cart.map(it => ({ name: it.name, qty: it.qty, price: getItemActivePrice(it), total: getItemActivePrice(it) * it.qty })),
                total: grandTotal, method: 'Hutang', member: cust.name, memberId: cust.id,
                discount: state.discountValue || 0, poinRedeem: state.posPoinRedeem || 0, poinDidapat: 0
            };
            state.salesHistory.unshift(saleRecord);
            if (GAS_URL) gasPost({ action: 'saveSale', sale: {
                id: noTrx, date: now.toISOString(), kasir: currentUser ? currentUser.nama : '-',
                items: saleRecord.items, total: grandTotal, paymentMethod: 'Hutang',
                bayar: 0, kembalian: 0, discount: state.discountValue || 0,
                customerId: cust.id, customerName: cust.name,
                poinDipakai: state.posPoinRedeem || 0, poinDidapat: 0
            }}).catch(function(){});
            printStruk(grandTotal, 0, 0, noTrx);
            closePaymentModal();
            state.cart = []; state.discountValue = 0; state.posActiveMember = null;
            state.posPoinRedeem = 0; state.paymentMethod = 'Tunai';
            renderCart();
            showToast('Transaksi hutang berhasil dicatat!', 'success');
        }

        function processPayment(grandTotal) {
            const received = Number(document.getElementById('pay-cash-input')?.value) || grandTotal;
            const change   = Math.max(0, received - grandTotal);

            // Finalize poin — hanya jika pelanggan tidak punya hutang belum lunas
            if (state.posActiveMember) {
                var earnedPoin = calculateEarnedPoin(grandTotal, state.cart);
                const cust = state.customers.find(c => c.id === state.posActiveMember.id);
                // Cek apakah pelanggan masih punya hutang aktif
                var adaHutangAktif = hutangPiutangList.some(function(h){
                    return h.tipe === 'pelanggan' &&
                           h.idPelanggan === state.posActiveMember.id &&
                           h.status !== 'lunas';
                });
                if (cust) {
                    cust.totalBelanja = (cust.totalBelanja || 0) + grandTotal;
                    if (!adaHutangAktif) {
                        // Poin hanya ditambah jika tidak ada hutang aktif
                        cust.poin = Math.max(0, (cust.poin || 0) - state.posPoinRedeem + earnedPoin);
                        cust.poinAkumulasi = (cust.poinAkumulasi || 0) + earnedPoin;
                    } else {
                        // Hanya kurangi poin yang diredeem, tidak tambah poin baru
                        cust.poin = Math.max(0, (cust.poin || 0) - state.posPoinRedeem);
                        earnedPoin = 0; // mark as 0 so struk shows hutang note
                    }
                    rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
                    if (GAS_URL) gasPost({ action:'updatePoinAfterCheckout', customerId:cust.id, poin:cust.poin, poinAkumulasi:cust.poinAkumulasi, totalBelanja:cust.totalBelanja }).catch(()=>{});
                }
            }

            // Simpan ke salesHistory
            const noTrx = 'TRX' + Date.now().toString().slice(-8);
            const saleRecord = {
                id: noTrx,
                date: new Date().toISOString(),
                items: state.cart.map(it => ({ name: it.name, qty: it.qty, price: getItemActivePrice(it), total: getItemActivePrice(it) * it.qty })),
                total: grandTotal,
                method: state.paymentMethod,
                member: state.posActiveMember ? state.posActiveMember.name : null,
                memberId: state.posActiveMember ? state.posActiveMember.id : null,
                discount: state.discountValue,
                poinRedeem: state.posPoinRedeem
            };
            state.salesHistory.unshift(saleRecord);
            // Simpan transaksi ke GAS Spreadsheet
            if (GAS_URL) {
                var salePayload = {
                    id: saleRecord.id, date: saleRecord.date,
                    kasir: currentUser ? currentUser.nama : '-',
                    items: saleRecord.items, total: saleRecord.total,
                    paymentMethod: state.paymentMethod,
                    bayar: received, kembalian: change,
                    discount: state.discountValue,
                    customerId: state.posActiveMember ? state.posActiveMember.id : '',
                    customerName: state.posActiveMember ? state.posActiveMember.name : '',
                    poinDipakai: state.posPoinRedeem||0, poinDidapat: saleRecord.poinDidapat||0
                };
                gasPost({ action: 'saveSale', sale: salePayload }).catch(function(){});
            }

            // Print struk
            printStruk(grandTotal, received, change, noTrx);
            closePaymentModal();

            state.cart = [];
            state.discountValue = 0;
            state.posActiveMember = null;
            state.posPoinRedeem = 0;
            renderCart();
            showToast('Transaksi berhasil!', 'success');
        }

        function formatDurasi(menit) {
            if (menit < 60) return menit + ' menit';
            var jam = Math.floor(menit / 60);
            var sisa = menit % 60;
            if (sisa === 0) return jam + ' jam';
            return jam + ' jam ' + sisa + ' menit';
        }

        function maskMemberId(mid) {
            if (!mid) return '';
            if (mid.length <= 3) return '***';
            return mid.slice(0, mid.length - 3) + '***';
        }

                + tunaiHtml
