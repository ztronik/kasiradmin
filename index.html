        function downloadTrxPDF(trxId) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) { showAlert('Tidak Ditemukan', 'Data transaksi tidak ditemukan.', 'error'); return; }
            var jsPDFLib = window.jspdf;
            if (!jsPDFLib) { showAlert('Error', 'Library PDF tidak tersedia.', 'error'); return; }

            // Ukuran kertas thermal 58mm, tinggi dinamis — mulai 220mm, tambah jika perlu
            var doc = new jsPDFLib.jsPDF({ format: [58, 220], unit: 'mm' });
            var d   = new Date(s.date);
            var tgl = d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'});
            var jam = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            var lm = 3, pw = 52, y = 6;

            // Helper: cetak teks dengan word-wrap, return y baru
            function printWrapped(txt, x, startY, maxW, align, lineH) {
                lineH = lineH || 3.8;
                var lines = doc.splitTextToSize(String(txt), maxW);
                lines.forEach(function(line) {
                    if (align === 'center') doc.text(line, x, startY, {align:'center'});
                    else if (align === 'right') doc.text(line, x, startY, {align:'right'});
                    else doc.text(line, x, startY);
                    startY += lineH;
                });
                return startY;
            }

            // Helper: baris label-nilai sejajar kanan
            function row(label, val, bold) {
                doc.setFont(undefined, 'normal'); doc.setFontSize(7);
                doc.text(String(label), lm, y);
                doc.setFont(undefined, bold ? 'bold' : 'normal');
                doc.text(String(val), lm + pw, y, {align:'right'});
                y += 4;
            }

            // Helper: garis separator
            function line(dashed) {
                doc.setLineWidth(dashed ? 0.15 : 0.3);
                doc.setLineDash(dashed ? [1, 1] : []);
                doc.line(lm, y, lm + pw, y);
                y += 2.5;
            }

            // ── HEADER TOKO ──────────────────────────────────
            doc.setFontSize(11); doc.setFont(undefined, 'bold');
            y = printWrapped(namaTokoStruk, lm + pw/2, y, pw, 'center', 5.5);
            doc.setFontSize(7); doc.setFont(undefined, 'normal');
            if (alamatTokoStruk) {
                y = printWrapped(alamatTokoStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            if (noHpTokoStruk) {
                y = printWrapped('Telp: ' + noHpTokoStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            y += 1;
            line(false);

            // ── INFO TRANSAKSI ────────────────────────────────
            doc.setFontSize(7);
            row('No. Trx', s.id);
            row('Tanggal', tgl);
            row('Jam', jam);
            row('Kasir', s.kasir || 'Admin');
            if (s.member || s.customerName) {
                var nm = s.member || s.customerName;
                row('Member', nm.length > 18 ? nm.slice(0,17)+'…' : nm);
                row('ID Member', maskMemberId(s.memberId || s.customerId || ''));
            }
            line(true);

            // ── ITEM PRODUK ───────────────────────────────────
            s.items.forEach(function(it) {
                var nama = it.name.length > 28 ? it.name.slice(0,27)+'…' : it.name;
                doc.setFontSize(7.5); doc.setFont(undefined, 'bold');
                doc.text(nama, lm, y); y += 4;
                doc.setFontSize(7); doc.setFont(undefined, 'normal');
                var qtyHarga = '  ' + it.qty + ' x ' + formatRp(it.price);
                doc.text(qtyHarga, lm, y);
                doc.text(formatRp(it.total), lm + pw, y, {align:'right'});
                y += 4.2;
            });
            line(true);

            // ── RINGKASAN ─────────────────────────────────────
            var subtotalVal = s.items.reduce(function(a,b){ return a+b.total; }, 0);
            doc.setFontSize(7);
            row('Subtotal', formatRp(subtotalVal));
            if ((s.discount||0) > 0)   row('Diskon', '-' + formatRp(s.discount));
            if ((s.poinRedeem||0) > 0) row('Poin (' + (s.poinRedeem||0) + ')', '-' + formatRp(s.poinRedeem));

            // Garis solid sebelum TOTAL
            doc.setLineDash([]); doc.setLineWidth(0.3); doc.line(lm, y, lm+pw, y); y += 2.5;
            doc.setFontSize(9); doc.setFont(undefined, 'bold');
            doc.text('TOTAL', lm, y);
            doc.text(formatRp(s.total), lm+pw, y, {align:'right'});
            y += 5;

            doc.setFontSize(7); doc.setFont(undefined, 'normal');
            var metode = s.method || s.paymentMethod || 'Tunai';
            row('Metode', metode);
            if (metode === 'Tunai' && s.bayar) {
                row('Tunai', formatRp(s.bayar));
                row('Kembali', formatRp(s.kembalian || 0));
            }

            // ── CATATAN HUTANG ────────────────────────────────
            var custId = s.memberId || s.customerId || '';
            if (custId) {
                var hList = hutangPiutangList.filter(function(h){
                    return h.tipe === 'pelanggan' && h.idPelanggan === custId && h.status !== 'lunas';
                });
                if (hList.length > 0) {
                    var totalSisaHutang = hList.reduce(function(acc,h){ return acc+(h.jumlah-h.sudahDibayar); }, 0);
                    line(true);
                    // Kotak hutang — border merah
                    var boxX = lm, boxW = pw, boxStartY = y;
                    doc.setFontSize(7.5); doc.setFont(undefined, 'bold');
                    doc.setTextColor(220, 38, 38);
                    doc.text('!! CATATAN HUTANG !!', lm + pw/2, y, {align:'center'}); y += 4.5;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(7);
                    hList.slice(0, 3).forEach(function(h) {
                        var sisa = h.jumlah - h.sudahDibayar;
                        var ket  = h.keterangan.length > 20 ? h.keterangan.slice(0,19)+'…' : h.keterangan;
                        doc.text(ket, lm, y);
                        doc.setFont(undefined, 'bold');
                        doc.text(formatRp(sisa), lm+pw, y, {align:'right'});
                        doc.setFont(undefined, 'normal');
                        y += 4;
                    });
                    if (hList.length > 3) {
                        doc.text('(+' + (hList.length-3) + ' lainnya)', lm+pw/2, y, {align:'center'}); y += 4;
                    }
                    // Garis dashed sebelum total hutang
                    doc.setLineWidth(0.15); doc.setLineDash([1,1]);
                    doc.line(lm, y, lm+pw, y); y += 2.5;
                    doc.setFont(undefined, 'bold'); doc.setFontSize(7.5);
                    doc.text('Total Sisa Hutang', lm, y);
                    doc.text(formatRp(totalSisaHutang), lm+pw, y, {align:'right'});
                    y += 2.5;
                    // Gambar kotak merah di sekitar blok hutang
                    doc.setLineDash([]); doc.setLineWidth(0.4); doc.setDrawColor(220, 38, 38);
                    doc.rect(boxX - 1, boxStartY - 3.5, boxW + 2, y - boxStartY + 4.5);
                    doc.setDrawColor(0); doc.setTextColor(0);
                    y += 3;
                }
            }

            // ── FOOTER ───────────────────────────────────────
            line(true);
            doc.setFontSize(7); doc.setFont(undefined, 'italic'); doc.setTextColor(80);
            if (footerStruk) {
                y = printWrapped(footerStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            doc.setTextColor(0);

            doc.save('Struk_' + s.id + '.pdf');
        }

                function downloadLaporanPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape' });
            const now = new Date();
            const filtered = getFilteredSales();
            const totalOmzet = filtered.reduce((s,x) => s+x.total, 0);
            const periodLabel = getPeriodLabel(state.laporanFilter);

            doc.setFontSize(16); doc.text(`${namaTokoStruk} - Laporan Penjualan`, 14, 15);
            doc.setFontSize(10); doc.text(`Periode: ${periodLabel} | Dicetak: ${now.toLocaleDateString('id-ID')} ${now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}`, 14, 22);
            doc.text(`Total Transaksi: ${filtered.length} | Total Omzet: ${formatRp(totalOmzet)}`, 14, 28);

            const rows = filtered.map(s => {
                const d = new Date(s.date);
                return [
                    s.id,
                    d.toLocaleDateString('id-ID') + ' ' + d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
                    s.items.map(it=>`${it.name}(${it.qty})`).join(', ').slice(0,50),
                    s.member || '-',
                    s.method,
                    formatRp(s.total)
                ];
            });

            doc.autoTable({
                head: [['No. Transaksi','Waktu','Item','Member','Metode','Total']],
                body: rows,
                startY: 33,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [22, 163, 74] }
            });

            doc.save(`Laporan_${periodLabel.replace(/ /g,'_')}_${now.toLocaleDateString('id-ID').replace(/\//g,'-')}.pdf`);
        }

        function downloadLaporanCSV() {
            const now = new Date();
            const filtered = getFilteredSales();

            const headers = ['No Transaksi','Tanggal','Waktu','Item','Member','Metode','Total'];
            const csvRows = [headers.join(',')];
            filtered.forEach(s => {
                const d = new Date(s.date);
                csvRows.push([
                    s.id,
                    d.toLocaleDateString('id-ID'),
                    d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
                    '"' + s.items.map(it=>`${it.name}(${it.qty})`).join('; ') + '"',
                    s.member || '-',
                    s.method,
                    s.total
                ].join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Laporan_${getPeriodLabel(state.laporanFilter).replace(/ /g,'_')}_${now.toLocaleDateString('id-ID').replace(/\//g,'-')}.csv`;
            a.click();
        }

        async function saveCustomer(e, action) {
            e.preventDefault();
            const isEdit = action === 'edit';
            const existingCust = isEdit ? state.customers.find(c => c.id === document.getElementById('c-id').value) : null;

            const customerData = {
                id: document.getElementById('c-id').value,
                name: document.getElementById('c-name').value,
                phone: normalizePhoneNumber(document.getElementById('c-phone').value),
                address: document.getElementById('c-address').value,
                email: existingCust ? existingCust.email : '',
                poin: isEdit ? (Number(document.getElementById('c-poin').value) || 0) : 0,
                poinAkumulasi: isEdit ? (Number(document.getElementById('c-poin-akum').value) || 0) : 0,
                totalBelanja: existingCust ? existingCust.totalBelanja : 0
            };

            if (action === 'add') {
                state.customers.unshift(customerData);
            } else {
                const idx = state.customers.findIndex(c => c.id === customerData.id);
                if (idx !== -1) state.customers[idx] = { ...state.customers[idx], ...customerData };
            }
            rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
            closeCustomerModal();
            renderContent();
            showToast(action === 'add' ? 'Pelanggan ditambahkan!' : 'Data pelanggan diperbarui!', 'success');

            if (GAS_URL) {
                try {
                    if (action === 'add') {
                        await gasPost({ action: 'addCustomer', customer: customerData });
                    } else {
                        await gasPost({ action: 'editCustomer', customer: customerData });
                        // Sync poin jika diedit
                        await gasPost({ action: 'updatePoinAfterCheckout', customerId: customerData.id, poin: customerData.poin, poinAkumulasi: customerData.poinAkumulasi, totalBelanja: customerData.totalBelanja });
                    }
                } catch (err) { console.error("Gagal sinkron pelanggan:", err); }
            }
        }

        // Reset akumulasi satu pelanggan
        function resetAkumulasiSatu(id) {
            const c = state.customers.find(x => x.id === id);
            if (!c) return;
            showConfirm(
                'Reset Akumulasi ' + c.name,
                'Reset poin akumulasi ' + c.name + ' ke 0? (Poin aktif tidak berubah)\nLakukan setelah THR untuk member ini sudah diberikan.',
                'warning',
                async () => {
                    c.poinAkumulasi = 0;
                    const rc = rewardData.customers.find(x => x.id === id);
                    if (rc) rc.poinAkumulasi = 0;
                    renderContent();
                    showToast('Akumulasi ' + c.name + ' direset ke 0.', 'success');
                    if (GAS_URL) gasPost({ action: 'updatePoinAfterCheckout', customerId: id, poin: c.poin, poinAkumulasi: 0, totalBelanja: c.totalBelanja }).catch(() => {});
                }
            );
        }

        async function deleteCustomer(id) {
            showConfirm('Hapus Pelanggan', 'Yakin ingin menghapus pelanggan ini? Data poin juga akan hilang.', 'error', async () => {
                state.customers = state.customers.filter(c => c.id !== id);
                rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
                const itemsPerPage = 10;
                const totalPages = Math.max(1, Math.ceil(state.customers.length / itemsPerPage));
                if (state.customerPage > totalPages) state.customerPage = totalPages;
                renderContent();
                showToast('Pelanggan berhasil dihapus.', 'success');
                if (GAS_URL) {
                    try { await gasPost({ action: 'deleteCustomer', customer: { id } }); }
                    catch (err) { console.error("Gagal hapus pelanggan:", err); }
                }
            });
        }

        // Render hanya tabel pelanggan tanpa full re-render (agar input tidak kehilangan fokus)
        function renderCustomerTableOnly() {
            var container = document.getElementById('customer-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'customer-search-input') ? inp.selectionStart : null;

            var q = state.customerSearch;
            var list = state.customers.filter(function(c) {
                return c.name.toLowerCase().includes(q) || (c.phone && c.phone.toLowerCase().includes(q)) || (c.id && c.id.toLowerCase().includes(q));
            });
            if (state.customerSort === 'az') list.sort(function(a,b){ return a.name.localeCompare(b.name); });
            else if (state.customerSort === 'za') list.sort(function(a,b){ return b.name.localeCompare(a.name); });
            else if (state.customerSort === 'addr') list.sort(function(a,b){ return (a.address||'').localeCompare(b.address||''); });
            else if (state.customerSort === 'poin_high') list.sort(function(a,b){ return (b.poin||0)-(a.poin||0); });
            else if (state.customerSort === 'akum_high') list.sort(function(a,b){ return (b.poinAkumulasi||0)-(a.poinAkumulasi||0); });
            else list.sort(function(a,b){ return (a.id||'').localeCompare(b.id||'', 'id', {numeric:true}); });

            var itemsPerPage = 10;
            var totalPages = Math.max(1, Math.ceil(list.length / itemsPerPage));
            if (state.customerPage > totalPages) state.customerPage = totalPages;
            var pageItems = list.slice((state.customerPage - 1) * itemsPerPage, state.customerPage * itemsPerPage);

            var tbody = container.querySelector('#customer-tbody');
            if (tbody) {
                if (pageItems.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-6 text-gray-400 text-sm">Tidak ada pelanggan ditemukan.</td></tr>';
                } else {
                    tbody.innerHTML = pageItems.map(function(c) {

                        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">'
                            + '<td class="py-3 px-4 text-sm font-mono text-gray-500">' + c.id + '</td>'
                            + '<td class="py-3 px-4"><div class="font-medium text-sm text-gray-800">' + c.name + '</div>'
                            + '<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:999px;background:' + tierColor + '20;color:' + tierColor + ';">' + (c.tier||'Bronze') + '</span></td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600">' + (c.phone||'-') + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600">' + (c.address||'-') + '</td>'
                            + '<td class="py-3 px-4 text-center"><span class="text-sm font-bold text-green-600">' + (c.poin||0).toLocaleString('id-ID') + '</span></td>'
                            + '<td class="py-3 px-4 text-center"><span class="text-sm font-semibold text-purple-600">' + (c.poinAkumulasi||0).toLocaleString('id-ID') + '</span></td>'
                            + '<td class="py-3 px-4 flex justify-end gap-1.5">'
                            + (currentUser && currentUser.role !== 'admin' ? '' : '<button onclick="openCustomerModal(\'' + c.id + '\')" title="Edit" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded transition-colors"><i class="ph ph-pencil-simple text-lg"></i></button>')
                            + (currentUser && currentUser.role !== 'admin' ? '' : '<button onclick="resetAkumulasiSatu(\'' + c.id + '\')" title="Reset Akumulasi" class="p-1.5 text-purple-500 hover:bg-purple-50 rounded transition-colors"><i class="ph ph-arrow-counter-clockwise text-lg"></i></button>')
                            + (currentUser && currentUser.role !== 'admin' ? '' : '<button onclick="deleteCustomer(\'' + c.id + '\')" title="Hapus" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors"><i class="ph ph-trash text-lg"></i></button>')
                            + '</td></tr>';

                if (totalPages > 1) {
                    pagination.innerHTML = '<button onclick="changeCustomerPage(-1)" ' + (state.customerPage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded hover:bg-gray-50 disabled:opacity-50 transition-colors">< Prev</button>'

                } else {
                    pagination.innerHTML = '';
                    pagination.style.display = 'none';
                }
            }

            var searchInput = document.getElementById('customer-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
            }

        // Render hanya tabel stock opname tanpa full re-render (agar input tidak kehilangan fokus)
        function renderOpnameTableOnly() {
            var container = document.getElementById('opname-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'opname-search-input') ? inp.selectionStart : null;

            var q = state.opnameSearch;
            var displayData = stockOpnameData.filter(function(x) {
                return !q || x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q) || x.category.toLowerCase().includes(q);
            });
            if (state.opnameSort === 'az') displayData.sort(function(a,b){ return a.name.localeCompare(b.name); });
            else if (state.opnameSort === 'za') displayData.sort(function(a,b){ return b.name.localeCompare(a.name); });
            else if (state.opnameSort === 'cat') displayData.sort(function(a,b){ return a.category.localeCompare(b.category); });
            else if (state.opnameSort === 'diff_minus') displayData.sort(function(a,b){ return a.diff - b.diff; });
            else if (state.opnameSort === 'diff_plus') displayData.sort(function(a,b){ return b.diff - a.diff; });

            var opnamePP = 25;
            var totalPages = Math.max(1, Math.ceil(displayData.length / opnamePP));
            if (state.opnamePage > totalPages) state.opnamePage = totalPages;
            var pagedData = displayData.slice((state.opnamePage - 1) * opnamePP, state.opnamePage * opnamePP);

            var tbody = container.querySelector('#opname-tbody');
            if (tbody) {
                tbody.innerHTML = pagedData.length === 0
                    ? '<tr><td colspan="6" class="text-center py-6 text-gray-400 text-sm">Produk tidak ditemukan.</td></tr>'
                    : pagedData.map(function(item) {
                        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">'
                            + '<td class="py-3 px-4 text-sm font-mono text-gray-500">' + item.id + '</td>'
                            + '<td class="py-3 px-4 text-sm font-medium text-gray-800">' + item.name + '</td>'
                            + '<td class="py-3 px-4 text-sm text-center"><span class="px-2 py-1 bg-gray-100 rounded text-xs">' + item.category + '</span></td>'
                            + '<td class="py-3 px-4 text-sm font-bold text-center text-gray-700">' + item.systemStock + '</td>'
                            + '<td class="py-3 px-4 text-center"><input type="number" min="0" value="' + item.actualStock + '" onchange="handleOpnameInput(\'' + item.id + '\', this.value)" onkeyup="handleOpnameInput(\'' + item.id + '\', this.value)" class="w-20 px-2 py-1.5 border border-gray-300 rounded-md text-sm text-center focus:ring-1 focus:ring-green-500 focus:outline-none" /></td>'
                            + '<td id="diff-' + item.id + '" class="text-sm font-bold text-center ' + (item.diff < 0 ? 'text-red-500' : item.diff > 0 ? 'text-blue-500' : 'text-gray-400') + '">'
                            + (item.diff > 0 ? '+' + item.diff : item.diff) + '</td></tr>';
                    }).join('');
            }

            var pagination = container.querySelector('.opname-pagination');
            if (pagination) {
                if (totalPages > 1) {
                    pagination.innerHTML = '<div class="p-4 border-t border-gray-100 flex justify-between items-center">'
                        + '<button onclick="state.opnamePage--; renderOpnameTableOnly()" ' + (state.opnamePage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>'
                        + '<span class="text-sm text-gray-500">Hal ' + state.opnamePage + ' dari ' + totalPages + ' &bull; ' + displayData.length + ' produk</span>'
                        + '<button onclick="state.opnamePage++; renderOpnameTableOnly()" ' + (state.opnamePage===totalPages?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>'
                        + '</div>';
                } else {
                    pagination.innerHTML = '<div class="p-3 text-center text-xs text-gray-400">' + displayData.length + ' produk</div>';
                }
            }

            var searchInput = document.getElementById('opname-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
            }
        }

        function saveKaryawan(idx) {
            var isEdit   = idx >= 0;
            var nama     = (document.getElementById('kar-nama').value     ||'').trim();
            var username = (document.getElementById('kar-username').value ||'').trim();
            var password = (document.getElementById('kar-password').value ||'').trim();
            var nohp     = normalizePhoneNumber((document.getElementById('kar-nohp').value ||'').trim());
            var email    = (document.getElementById('kar-email').value    ||'').trim();
            var alamat   = (document.getElementById('kar-alamat').value   ||'').trim();
            if (!nama)     { showAlert('Wajib','Nama lengkap karyawan wajib diisi.','warning'); return; }
            if (!username) { showAlert('Wajib','Username wajib diisi.','warning'); return; }
            if (!isEdit && !password) { showAlert('Wajib','Password wajib diisi untuk karyawan baru.','warning'); return; }
            var conflict = authKaryawan.findIndex(function(k){ return k.username===username; });
            if (conflict >= 0 && conflict !== idx) { showAlert('Duplikat','Username "'+username+'" sudah digunakan.','error'); return; }
            if (username === authAdmin.username)    { showAlert('Duplikat','Username tersebut sudah dipakai admin.','error'); return; }
            var oldUname = isEdit ? authKaryawan[idx].username : null;
            if (isEdit) {
                authKaryawan[idx].nama=nama; authKaryawan[idx].username=username;
                if (password) authKaryawan[idx].password=password;
                authKaryawan[idx].nohp=nohp; authKaryawan[idx].email=email; authKaryawan[idx].alamat=alamat;
                saveKaryawanAuth(authKaryawan[idx], oldUname, false);
            } else {
                var nk={nama:nama,username:username,password:password,nohp:nohp,email:email,alamat:alamat};
                authKaryawan.push(nk);
                saveKaryawanAuth(nk, null, false);
            }
            document.getElementById('product-modal').classList.add('hidden');
            renderContent();
            showToast(isEdit?'Data karyawan diperbarui!':'Karyawan berhasil ditambahkan!','success');
        }

        function hapusKaryawan(idx) {

        }

            Object.keys(clerekIntegrations).forEach(function(key) {

                payload[key] = {
                    provider:   cfg.provider,
                    apiKey:     cfg.apiKey,
                    webhookUrl: cfg.webhookUrl,
                    enabled:    cfg.enabled,
                };
            });
            return gasPost({ action: 'savePengaturan', key: 'integrasi_non_tunai', value: JSON.stringify(payload) });
        }

                console.warn('[Integrasi ' + metode + '] Gagal fetch:', e.message);
                return null;
            }
        }

        // ── Coba auto-verifikasi semua metode yang aktif (dipanggil opsional) ──
        async function clerekAutoVerifikasi() {
            if (!clerekState.shiftMulai) return;
            var mulai   = clerekState.shiftMulai;
            var selesai = clerekState.shiftSelesai || Date.now();
            var adaPerubahan = false;

            var metodeList = ['Kartu', 'QRIS', 'E-Wallet'];
            for (var i = 0; i < metodeList.length; i++) {
                var m = metodeList[i];
                var cfg = clerekIntegrations[m];
                if (!cfg || !cfg.enabled) continue;

                var result = await fetchVerifikasiEksternal(m, mulai, selesai);
                if (result !== null) {
                    // Tandai terverifikasi otomatis jika total cocok (toleransi ±100 perak)
                    var breakdown = clerekState.shiftMulai
                        ? hitungOmzetPerMetode(mulai, selesai)
                        : { Kartu:0, QRIS:0, 'E-Wallet':0, Hutang:0, Tunai:0, total:0 };
                    var nilaIPOS = breakdown[m] || 0;
                    if (Math.abs(result.total - nilaIPOS) <= 100) {
                        clerekState.verifikasiNonTunai[m] = true;
                        adaPerubahan = true;
                    }
                }
            }

            if (adaPerubahan) {
                var bod = document.getElementById('clerek-body');
                if (bod && clerekState.tab === 'shift') bod.innerHTML = getClerekShiftHTML();
                showToast('Verifikasi otomatis berhasil untuk metode yang sudah terhubung.', 'success');
            }
        }

        // ── Simpan konfigurasi satu integrasi dari form Settings ──
        function saveIntegrasiFitur(metode) {
            var cfg = clerekIntegrations[metode];
            if (!cfg) return;
            var keyPfx = 'intg-' + metode.toLowerCase().replace(/\s/g,'-').replace(/\//g,'');
            var provEl = document.getElementById(keyPfx + '-provider');
            var keyEl  = document.getElementById(keyPfx + '-apikey');
            var urlEl  = document.getElementById(keyPfx + '-url');
            var enaEl  = document.getElementById(keyPfx + '-enabled');
            if (provEl) cfg.provider   = provEl.value.trim() || null;
            if (keyEl)  cfg.apiKey     = keyEl.value.trim()  || null;
            if (urlEl)  cfg.webhookUrl = urlEl.value.trim()  || null;
            if (enaEl)  cfg.enabled    = enaEl.checked && !!(cfg.apiKey || cfg.webhookUrl);
            saveIntegrasiToGAS()
                .then(function(){ showToast('Konfigurasi integrasi ' + cfg.nama + ' disimpan.', 'success'); })
                .catch(function(){ showToast('Tersimpan secara lokal (GAS tidak tersambung).', 'info'); });
            renderContent(); // refresh agar badge status ikut update
        }

        // ── HELPER: Breakdown omzet per metode bayar dalam shift ────────
        function hitungOmzetPerMetode(mulai, selesai) {
            var end = selesai || Date.now();
            var result = { Tunai: 0, Kartu: 0, QRIS: 0, 'E-Wallet': 0, Hutang: 0, total: 0 };
            state.salesHistory.filter(function(s) {
                var t = new Date(s.date).getTime();
                return t >= mulai && t <= end;
            }).forEach(function(s) {
                var m = s.method || s.paymentMethod || 'Tunai';
                if (result[m] !== undefined) result[m] += s.total;
                else result['Tunai'] += s.total; // fallback
                result.total += s.total;
            });
            return result;
        }
        function hitungOmzetMasukLaci(breakdown) {
            // Hanya Tunai yang masuk laci kas fisik.
            return breakdown.Tunai || 0;
        }
        function hitungMutasiKasShift(shiftId) {
            return clerekMutasiKas.filter(function(m){ return m.idShift === shiftId; })
                .reduce(function(s,m){ return m.tipe==='masuk' ? s+m.jumlah : s-m.jumlah; }, 0);
        }

            }

            // Panel kas akhir (hanya saat shift aktif)

                } else if (kasAkhirKonfirm) {
                    var selisihTxt = clerekState.kasAkhir >= kasAkhirEstimasi

                    panelKasAkhir = '<div class="rounded-xl border border-red-200 bg-red-50 p-4"><div class="flex items-center justify-between mb-1"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Akhir (Aktual)</label><span class="text-xs font-bold text-red-600 flex items-center gap-1"><i class="ph ph-check-circle"></i> Terkonfirmasi</span></div><div class="text-2xl font-black text-red-700">' + formatRp(clerekState.kasAkhir) + '</div>' + selisihTxt + '</div>';
                } else {
                    panelKasAkhir = '<div class="rounded-xl border border-gray-200 bg-gray-50 p-4">'
                        + '<div class="flex items-center justify-between mb-2"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Akhir (Aktual)</label><span class="text-xs text-gray-400">Hitung uang di laci</span></div>'
                        + '<div class="relative mb-3"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">Rp</span>'
                        + '<input type="number" id="clerek-kas-akhir" value="' + (clerekState.kasAkhirInput !== undefined ? clerekState.kasAkhirInput : 0) + '" placeholder="0" min="0" oninput="clerekState.kasAkhirInput=Number(this.value)" class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none bg-white" /></div>'
                        + '<div class="flex gap-2">'
                        + '<button onclick="clerekKonfirmasiKasAkhir(true)" class="flex-1 py-2 bg-red-500 text-white font-bold rounded-lg text-sm hover:bg-red-600 flex items-center justify-center gap-1"><i class="ph ph-check text-base"></i> Ya, Konfirmasi</button>'
                        + '<button onclick="clerekKonfirmasiKasAkhir(false)" class="flex-1 py-2 bg-gray-200 text-gray-600 font-semibold rounded-lg text-sm hover:bg-gray-300 flex items-center justify-center gap-1"><i class="ph ph-x text-base"></i> Reset</button>'

            var statusPanel = '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">'
                + '<h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ph ph-clock-clockwise text-green-600 text-lg"></i> Status Shift</h3>'
                + '<div class="space-y-3">'
                + '<div class="flex justify-between items-center p-3 rounded-lg ' + (aktif ? 'bg-green-50 border border-green-200' : 'bg-gray-50') + '">'
                + '<span class="text-sm font-medium text-gray-700">Status</span>'
                + '<span class="text-sm font-bold ' + (aktif ? 'text-green-600' : selesai ? 'text-blue-600' : 'text-gray-400') + '">' + (aktif ? '🟢 Shift Aktif' : selesai ? '🔵 Shift Selesai' : '⭕ Belum Mulai') + '</span>'
                + '</div>' + infoWaktu + '</div>'
                + (btnBukaShift  ? '<div class="mt-4">' + btnBukaShift  + '</div>' : '')
                + (btnAkhiriShift? '<div class="mt-4">' + btnAkhiriShift + '</div>' : '')
                + (btnShiftBaru  ? '<div class="mt-4">' + btnShiftBaru  + '</div>' : '')
                + (btnAmbilAlih  ? btnAmbilAlih : '')
                + '</div>';

            var kasPanel = '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">'
                + '<h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ph ph-money text-green-600 text-lg"></i> Kas Shift</h3>'
                + '<div class="space-y-4">'

            return '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">' + statusPanel + kasPanel + '</div>'
                + (panelVerifikasi ? '<div class="mt-4">' + panelVerifikasi + '</div>' : '');
        }

                function clerekRefreshKas() {
            var bod = document.getElementById('clerek-body');
            if (bod && clerekState.tab === 'shift') bod.innerHTML = getClerekShiftHTML();
        }

        function clerekKonfirmasiKasAwal(konfirm) {
            if (konfirm) {
                var inp = document.getElementById('clerek-kas-awal');
                var val = inp ? Number(inp.value) : (clerekState.kasAwalInput || 0);
                // Simpan sementara lalu minta konfirmasi popup
                clerekState.kasAwalInput = val;
                showConfirm(
                    'Konfirmasi Kas Awal',
                    'Kas awal shift sebesar ' + formatRp(val) + '\n\nYakin jumlah ini sudah benar?',
                    'info',
                    function() {
                        clerekState.kasAwal           = val;
                        clerekState.kasAwalInput      = val;
                        clerekState.kasAwalKonfirmasi = true;
                        var bod = document.getElementById('clerek-body');
                        if (bod) bod.innerHTML = getClerekShiftHTML();
                    }
                );
            } else {
                // Tombol Reset — batal konfirmasi
                clerekState.kasAwalKonfirmasi   = false;
                clerekState.kasAwalInput        = 0;
                clerekState.kasAwal             = 0;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
            }
        }

        function clerekKonfirmasiKasAkhir(konfirm) {
            if (konfirm) {
                var inp = document.getElementById('clerek-kas-akhir');
                var val = inp ? Number(inp.value) : (clerekState.kasAkhirInput || 0);
                clerekState.kasAkhirInput = val;
                var bd  = hitungOmzetPerMetode(clerekState.shiftMulai, null);
                var mutasi = hitungMutasiKasShift(clerekState.shiftId);
                var omzetLaci = hitungOmzetMasukLaci(bd);
                var kasAkhirEstimasi = clerekState.kasAwal + omzetLaci + mutasi;
                var selisih = val - kasAkhirEstimasi;
                var selisihTxt = selisih === 0 ? ''
                    : (selisih > 0 ? '\nLebih: +' + formatRp(selisih) : '\nKurang: ' + formatRp(Math.abs(selisih)));
                showConfirm(
                    'Konfirmasi Kas Akhir',
                    'Kas akhir aktual (di laci): ' + formatRp(val) +
                    '\n\nEstimasi kas akhir: ' + formatRp(kasAkhirEstimasi) +
                    '\n  Kas awal        : ' + formatRp(clerekState.kasAwal) +
                    '\n  + Tunai         : ' + formatRp(bd.Tunai || 0) +
                    (mutasi !== 0 ? '\n  + Mutasi kas    : ' + formatRp(mutasi) : '') +
                    selisihTxt +
                    '\n\nYakin jumlah ini sudah benar?',
                    selisih < 0 ? 'error' : 'info',
                    function() {
                        clerekState.kasAkhir           = val;
                        clerekState.kasAkhirInput      = val;
                        clerekState.kasAkhirKonfirmasi = true;
                        var bod = document.getElementById('clerek-body');
                        if (bod) bod.innerHTML = getClerekShiftHTML();
                    }
                );
            } else {
                clerekState.kasAkhirKonfirmasi = false;
                clerekState.kasAkhirInput      = 0;
                clerekState.kasAkhir           = 0;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
            }
        }

        function clerekMulaiShift() {
            showConfirm('Mulai Shift','Konfirmasi mulai shift sekarang?','info', function(){
                var overlay = document.getElementById('login-loading-overlay');
                var namaEl  = document.getElementById('login-loading-nama');
                if (namaEl) namaEl.textContent = 'Membuka Shift...';
                if (overlay) overlay.style.display = 'flex';
                setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
                var idShift = 'SHF' + Date.now();
                var mulai   = Date.now();
                var kasAwal = clerekState.kasAwal || 0;
                if (GAS_URL) {
                    gasPost({ action: 'mulaiShift', shift: {
                        id: idShift, kasir: currentUser ? currentUser.nama : '-',
                        mulai: mulai, kasAwal: kasAwal
                    }}).then(function(res){
                        if (res && res.status === 'success') {
                            clerekState.shiftId      = idShift;
                            clerekState.shiftMulai   = mulai;
                            clerekState.shiftSelesai = null;
                            clerekState.kasirShift   = currentUser ? currentUser.nama : '-';
                            var bod = document.getElementById('clerek-body');
                            if (bod) bod.innerHTML = getClerekShiftHTML();
                            renderSidebarMenu();
                            showToast('Shift dimulai! Selamat bekerja.','success');
                        } else {
                            showAlert('Gagal','Gagal menyimpan shift: ' + (res&&res.message||'error'),'error');
                        }
                    }).catch(function(){ showAlert('Gagal','Tidak dapat terhubung ke server.','error'); });
                } else {
                    clerekState.shiftId      = idShift;
                    clerekState.shiftMulai   = mulai;
                    clerekState.shiftSelesai = null;
                    var bod = document.getElementById('clerek-body');
                    if (bod) bod.innerHTML = getClerekShiftHTML();
                    renderSidebarMenu();
                    showToast('Shift dimulai! Selamat bekerja.','success');
                }
                }, 2000); // end setTimeout loading
            });
        }

        function clerekSelesaiShift() {
            showConfirm('Akhiri Shift','Yakin ingin mengakhiri shift sekarang?','warning', function(){
                var overlay = document.getElementById('login-loading-overlay');
                var namaEl  = document.getElementById('login-loading-nama');
                if (namaEl) namaEl.textContent = 'Menutup Shift...';
                if (overlay) overlay.style.display = 'flex';
                setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
                var selesai = Date.now();
                // Hitung breakdown omzet per metode untuk shift ini
                var bdShift      = hitungOmzetPerMetode(clerekState.shiftMulai, selesai);
                var omzetTunai   = hitungOmzetMasukLaci(bdShift);   // hanya tunai (masuk laci)
                var omzetTotal   = bdShift.total;                    // total semua metode (untuk laporan)
                var mutasiShiftVal = hitungMutasiKasShift(clerekState.shiftId); // net mutasi kas manual
                var kasAkhir     = clerekState.kasAkhir || 0;
                var kasAkhirEstimasi = clerekState.kasAwal + omzetTunai + mutasiShiftVal;
                var selisihKas   = kasAkhir - kasAkhirEstimasi;
                // Snapshot status verifikasi non-tunai saat tutup shift
                var snapshotVerif = Object.assign({}, clerekState.verifikasiNonTunai);
                if (GAS_URL && clerekState.shiftId) {
                    gasPost({ action: 'akhiriShift',
                        idShift: clerekState.shiftId,
                        kasAkhir: kasAkhir,
                        omzet: omzetTotal,
                        omzetTunai: omzetTunai,
                        mutasiKas: mutasiShiftVal
                    }).then(function(res){
                        var rec = {
                            id: clerekState.shiftId,
                            kasir: currentUser ? currentUser.nama : '-',
                            mulai: clerekState.shiftMulai, selesai: selesai,
                            kasAwal: clerekState.kasAwal, kasAkhir: kasAkhir,
                            omzet: omzetTotal,        // total semua metode (untuk info)
                            omzetTunai: omzetTunai,   // tunai saja (untuk perhitungan selisih)
                            mutasiKas: mutasiShiftVal, // net mutasi kas manual shift ini
                            omzetBreakdown: bdShift,   // breakdown per metode
                            verifikasiNonTunai: snapshotVerif, // status checklist non-tunai
                            status: 'selesai'
                        };
                        clerekState.riwayatShift.unshift(rec);
                        clerekState.shiftSelesai = selesai;
                        // Reset checklist verifikasi untuk shift berikutnya
                        clerekState.verifikasiNonTunai = { Kartu: false, QRIS: false, 'E-Wallet': false, Hutang: false };
                        // Jika admin yang menutup shift, otomatis lepas ambil alih
                        if (adminAmbilAlih) {
                            setAdminAmbilAlih(false);
                            showToast('Shift selesai. Admin kembali ke mode normal.', 'success');
                        } else {
                            showToast('Shift selesai. Data tersimpan ke Spreadsheet.','success');
                        }
                        renderSidebarMenu();
                        renderContent();
                    }).catch(function(){ showAlert('Gagal','Tidak dapat terhubung ke server.','error'); });
                } else {
                    var rec = {
                        id: clerekState.shiftId,
                        kasir: currentUser ? currentUser.nama : '-',
                        mulai: clerekState.shiftMulai, selesai: selesai,
                        kasAwal: clerekState.kasAwal, kasAkhir: kasAkhir,
                        omzet: omzetTotal,
                        omzetTunai: omzetTunai,
                        mutasiKas: mutasiShiftVal,
                        omzetBreakdown: bdShift,
                        verifikasiNonTunai: snapshotVerif, // status checklist non-tunai
                        status: 'selesai'
                    };
                    clerekState.riwayatShift.unshift(rec);
                    clerekState.shiftSelesai = selesai;
                    // Reset checklist verifikasi untuk shift berikutnya
                    clerekState.verifikasiNonTunai = { Kartu: false, QRIS: false, 'E-Wallet': false, Hutang: false };
                    if (adminAmbilAlih) { setAdminAmbilAlih(false); }
                    renderSidebarMenu();
                    renderContent();
                    showToast('Shift selesai.','success');
                }
                }, 2000); // end setTimeout loading
            });
        }

        function clerekResetShift() {
            showConfirm('Shift Baru','Mulai shift baru? Data shift sebelumnya sudah tersimpan di Spreadsheet.','info', function(){
                clerekState.shiftId              = null;
                clerekState.shiftMulai           = null;
                clerekState.shiftSelesai         = null;
                clerekState.kasirShift           = null;
                clerekState.kasAwal              = 0;
                clerekState.kasAkhir             = 0;
                clerekState.kasAwalInput         = 0;
                clerekState.kasAkhirInput        = 0;
                clerekState.kasAwalKonfirmasi    = false;
                clerekState.kasAkhirKonfirmasi   = false;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
                showToast('Siap untuk shift baru.','success');
            });
        }

        function clerekAmbilAlihShift() {
            if (!clerekState.shiftMulai || clerekState.shiftSelesai) {
                showAlert('Tidak Ada Shift', 'Tidak ada shift aktif untuk diambil alih.', 'warning');
                return;
            }
            var namaKasir = clerekState.kasirShift || 'karyawan';
            showConfirm(
                'Ambil Alih Shift',
                'Anda akan mengambil alih shift milik ' + namaKasir + '.\n\nSetelah ambil alih, Anda bisa melakukan penjualan sebagai admin.\n\nLanjutkan?',
                'info',
                function() {
                    setAdminAmbilAlih(true);
                    updateHeaderRole();
                    renderSidebarMenu();
                    renderContent();
                    showToast('Shift ' + namaKasir + ' berhasil diambil alih! Anda kini bisa berjualan.', 'success');
                }
            );
        }

        function clerekLepasAlih() {
            showConfirm(
                'Lepas Ambil Alih',
                'Kembalikan shift ke mode karyawan?\n\nAnda tidak akan bisa berjualan lagi sebelum ambil alih kembali.',
                'warning',
                function() {
                    setAdminAmbilAlih(false);
                    updateHeaderRole();
                    renderSidebarMenu();
                    renderContent();
                    showToast('Ambil alih dilepas. Kembali ke mode admin.', 'info');
                }
            );
        }

        // ── TAB MUTASI KAS ────────────────────────────────
        var clerekMutasiKas = [];

        function getClerekKasHTML() {
            var shiftAktifId = clerekState.shiftId || null;

            // Hitung saldo: tampilkan per shift aktif jika ada, fallback ke semua
            var listTampil = shiftAktifId
                ? clerekMutasiKas.filter(function(m){ return m.idShift === shiftAktifId; })
                : clerekMutasiKas;

            var totalMasuk  = listTampil.filter(function(m){return m.tipe==='masuk';}).reduce(function(s,m){return s+m.jumlah;},0);
            var totalKeluar = listTampil.filter(function(m){return m.tipe==='keluar';}).reduce(function(s,m){return s+m.jumlah;},0);
            var saldo = totalMasuk - totalKeluar;

            var shiftLabel = shiftAktifId
                ? '<p class="text-xs text-green-600 font-semibold mb-2"><i class="ph ph-funnel mr-1"></i>Menampilkan mutasi shift aktif saja</p>'
                : '<p class="text-xs text-gray-400 mb-2">Tidak ada shift aktif — menampilkan semua mutasi</p>';

            var listHTML = listTampil.length === 0
                ? `<tr><td colspan="5" class="text-center py-8 text-gray-400 text-sm">Belum ada mutasi kas pada shift ini.</td></tr>`
                : listTampil.slice(0,30).map(function(m, i) {
                    // Kunci hapus mutasi shift yang sudah selesai (idShift berbeda dari shift aktif)
                    var isCurrentShift = !m.idShift || m.idShift === shiftAktifId;
                    var hapusBtn = isCurrentShift
                        ? `<button onclick="clerekHapusMutasi('${m.id}')" class="text-red-400 hover:text-red-600 text-xs"><i class="ph ph-trash"></i></button>`
                        : `<span class="text-gray-300 text-xs" title="Mutasi shift lama terkunci"><i class="ph ph-lock"></i></span>`;
                    return `<tr class="border-b border-gray-50 hover:bg-gray-50">
                        <td class="py-2.5 px-3 text-xs text-gray-500">${new Date(m.waktu).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                        <td class="py-2.5 px-3"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ${m.tipe==='masuk'?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}">${m.tipe==='masuk'?'Masuk':'Keluar'}</span></td>
                        <td class="py-2.5 px-3 text-sm font-semibold ${m.tipe==='masuk'?'text-green-700':'text-red-600'}">${formatRp(m.jumlah)}</td>
                        <td class="py-2.5 px-3 text-sm text-gray-700">${m.keterangan||'-'}</td>
                        <td class="py-2.5 px-3 text-center">${hapusBtn}</td>
                    </tr>`;
                }).join('');

            return `<div class="space-y-4">
                ${shiftLabel}
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-green-600 font-semibold uppercase tracking-wide mb-1">Total Masuk</p>
                        <p class="text-lg font-black text-green-700">${formatRp(totalMasuk)}</p>
                    </div>
                    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-red-500 font-semibold uppercase tracking-wide mb-1">Total Keluar</p>
                        <p class="text-lg font-black text-red-600">${formatRp(totalKeluar)}</p>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wide mb-1">Saldo</p>
                        <p class="text-lg font-black ${saldo>=0?'text-blue-700':'text-red-600'}">${formatRp(saldo)}</p>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2"><i class="ph ph-plus-circle text-green-600"></i> Tambah Mutasi Kas</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <select id="mutasi-tipe" class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
                            <option value="masuk">💚 Kas Masuk</option>
                            <option value="keluar">❤️ Kas Keluar</option>
                        </select>
                        <input type="number" id="mutasi-jumlah" placeholder="Jumlah (Rp)" min="0"
                            class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
                        <input type="text" id="mutasi-ket" placeholder="Keterangan..."
                            class="sm:col-span-1 px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
                        <button onclick="clerekTambahMutasi()" class="px-4 py-2.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 text-sm flex items-center justify-center gap-2">
                            <i class="ph ph-plus text-base"></i> Tambah
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="font-bold text-gray-800">Riwayat Mutasi Kas</h3>
                        ${clerekMutasiKas.length > 0 ? `<button onclick="clerekHapusSemuaMutasi()" class="text-xs text-red-500 hover:underline flex items-center gap-1"><i class="ph ph-trash"></i> Hapus Semua</button>` : ''}
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Waktu</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Tipe</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Jumlah</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Keterangan</th>
                                    <th class="py-2.5 px-3 text-center text-xs font-semibold text-gray-500">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>${listHTML}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function clerekTambahMutasi() {
            var tipe = document.getElementById('mutasi-tipe').value;
            var jml  = Number(document.getElementById('mutasi-jumlah').value);
            var ket  = (document.getElementById('mutasi-ket').value||'').trim();
            if (!jml || jml <= 0) { showAlert('Perhatian','Jumlah kas wajib diisi dan lebih dari 0.','warning'); return; }
            var mutasi = { id: 'MUT'+Date.now(), tipe: tipe, jumlah: jml,
                           keterangan: ket, waktu: Date.now(),
                           idShift: clerekState.shiftId||'' };
            clerekMutasiKas.unshift(mutasi);
            if (GAS_URL) gasPost({ action: 'saveMutasiKas', mutasi: mutasi }).catch(function(){});
            var bod = document.getElementById('clerek-body');
            if (bod) bod.innerHTML = getClerekKasHTML();
            showToast('Mutasi kas ditambahkan.', 'success');
        }

        function clerekHapusMutasi(idOrIdx) {
            showConfirm('Hapus Mutasi','Hapus data mutasi ini?','error', function(){
                var del;
                // Support both id string (baru) dan index number (lama)
                if (typeof idOrIdx === 'string') {
                    var pos = clerekMutasiKas.findIndex(function(m){ return m.id === idOrIdx; });
                    if (pos >= 0) del = clerekMutasiKas.splice(pos, 1)[0];
                } else {
                    del = clerekMutasiKas.splice(idOrIdx, 1)[0];
                }
                if (GAS_URL && del && del.id) gasPost({ action: 'deleteMutasiKas', id: del.id }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekKasHTML();
                showToast('Mutasi dihapus.','success');
            });
        }

        function clerekHapusSemuaMutasi() {
            showConfirm('Hapus Semua Mutasi','Hapus seluruh riwayat mutasi kas?','error', function(){
                clerekMutasiKas = [];
                if (GAS_URL) gasPost({ action: 'deleteAllMutasi' }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekKasHTML();
                showToast('Semua mutasi dihapus.','success');
            });
        }

        // ── TAB RIWAYAT CLEREK ────────────────────────────
        var _clerekRiwayatPage = 0;
        var _clerekPerPage = 5;

        function getClerekRiwayatHTML() {
            var total = clerekState.riwayatShift.length;
            var totalPages = Math.max(1, Math.ceil(total / _clerekPerPage));
            if (_clerekRiwayatPage >= totalPages) _clerekRiwayatPage = totalPages - 1;
            if (_clerekRiwayatPage < 0) _clerekRiwayatPage = 0;

            var start = _clerekRiwayatPage * _clerekPerPage;
            var pageItems = clerekState.riwayatShift.slice(start, start + _clerekPerPage);

            var listHTML = total === 0
                ? '<div class="text-center py-10 text-gray-400 text-sm">Belum ada riwayat clerek.</div>'
                : pageItems.map(function(r, i) {
                    var globalIdx  = start + i;
                    var dur        = Math.floor((r.selesai - r.mulai) / 60000);
                    // Gunakan omzetTunai jika tersedia (data baru), fallback ke omzet lama
                    var omzetTunai  = (r.omzetTunai !== undefined) ? r.omzetTunai : r.omzet;
                    var mutasiKas   = r.mutasiKas || 0;
                    var kasAkhirEstimasi = r.kasAwal + omzetTunai + mutasiKas;
                    var selisih     = (r.kasAkhir || 0) - kasAkhirEstimasi;
                    var tgl        = new Date(r.mulai).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
                    var jamMulai   = new Date(r.mulai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                    var jamSelesai = new Date(r.selesai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

                    // Baris mutasi kas (tampilkan jika ada)
                    var mutasiBaris = mutasiKas !== 0
                        ? '<div class="bg-yellow-50 rounded-lg p-2"><p class="text-yellow-600 mb-0.5">Mutasi Kas</p><p class="font-semibold ' + (mutasiKas>=0?'text-yellow-700':'text-red-600') + '">' + (mutasiKas>=0?'+':'') + formatRp(mutasiKas) + '</p></div>'
                        : '';

                    // Baris breakdown non-tunai (jika ada data breakdown)
                    var bdInfo = '';
                    if (r.omzetBreakdown) {
                        var bd = r.omzetBreakdown;
                        var nonTunai = (bd.Kartu||0) + (bd.QRIS||0) + (bd['E-Wallet']||0) + (bd.Hutang||0);
                        if (nonTunai > 0) {
                            bdInfo = '<div class="col-span-3 mt-1 p-2 bg-gray-50 rounded-lg text-xs text-gray-500">'
                                + '<span class="font-semibold text-gray-600">Omzet non-tunai (tidak masuk laci): </span>'
                                + (bd.Kartu ? 'Kartu '+formatRp(bd.Kartu)+' ' : '')
                                + (bd.QRIS  ? 'QRIS '+formatRp(bd.QRIS)+' ' : '')
                                + (bd['E-Wallet'] ? 'E-Wallet '+formatRp(bd['E-Wallet'])+' ' : '')
                                + (bd.Hutang ? 'Hutang '+formatRp(bd.Hutang) : '')
                                + '</div>';
                        }
                    }

                    // Baris status verifikasi non-tunai (jika ada breakdown & data verif)
                    var verifInfo = '';
                    if (r.omzetBreakdown && r.verifikasiNonTunai) {
                        var vbd = r.omzetBreakdown;
                        var nonTunaiKeys = ['Kartu', 'QRIS', 'E-Wallet', 'Hutang'];
                        var adaNonTunai = nonTunaiKeys.some(function(k){ return (vbd[k] || 0) > 0; });
                        if (adaNonTunai) {
                            var vItems = nonTunaiKeys.filter(function(k){ return (vbd[k]||0) > 0; }).map(function(k){
                                var ok = r.verifikasiNonTunai[k];
                                return '<span style="font-size:10px;padding:1px 7px;border-radius:999px;font-weight:600;background:' + (ok?'#dcfce7':'#fef3c7') + ';color:' + (ok?'#15803d':'#92400e') + ';">'
                                    + (ok ? '✓' : '○') + ' ' + k + '</span>';
                            }).join('');
                            verifInfo = '<div class="col-span-3 mt-1 p-2 bg-gray-50 rounded-lg">'
                                + '<p style="font-size:10px;font-weight:600;color:#6b7280;margin-bottom:4px;">Verifikasi Non-Tunai:</p>'
                                + '<div style="display:flex;flex-wrap:wrap;gap:4px;">' + vItems + '</div>'
                                + '</div>';
                        }
                    }

                    return '<div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">'
                        + '<div class="flex justify-between items-start mb-3">'
                        +   '<div>'
                        +     '<p class="font-bold text-gray-800">' + r.kasir + '</p>'
                        +     '<p class="text-xs text-gray-400">' + tgl + ' &bull; ' + jamMulai + '–' + jamSelesai + '</p>'
                        +   '</div>'
                        +   '<div class="flex items-center gap-2">'
                        +     '<span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-semibold">' + formatDurasi(dur) + '</span>'
                        +     '<button onclick="downloadSatuRiwayatClerekPDF(' + globalIdx + ')" title="Unduh PDF" '
                        +       'class="flex items-center gap-1 px-2.5 py-1 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">'
                        +       '<i class="ph ph-file-pdf text-sm"></i> PDF'
                        +     '</button>'
                        +   '</div>'
                        + '</div>'
                        + '<div class="grid grid-cols-3 gap-2 text-center text-xs">'
                        +   '<div class="bg-gray-50 rounded-lg p-2"><p class="text-gray-400 mb-0.5">Kas Awal</p><p class="font-semibold text-gray-700">' + formatRp(r.kasAwal) + '</p></div>'
                        +   '<div class="bg-gray-50 rounded-lg p-2"><p class="text-gray-400 mb-0.5">Kas Akhir</p><p class="font-semibold text-gray-700">' + formatRp(r.kasAkhir||0) + '</p></div>'
                        +   '<div class="bg-green-50 rounded-lg p-2"><p class="text-green-500 mb-0.5">Tunai Masuk</p><p class="font-bold text-green-700">' + formatRp(omzetTunai) + '</p></div>'
                        +   mutasiBaris
                        +   '<div class="' + (selisih>=0?'bg-green-50':'bg-red-50') + ' rounded-lg p-2 ' + (mutasiKas!==0?'col-span-2':'col-span-3') + '">'
                        +     '<p class="' + (selisih>=0?'text-green-500':'text-red-400') + ' mb-0.5">Selisih Kas</p>'
                        +     '<p class="font-bold ' + (selisih>=0?'text-green-700':'text-red-600') + '">' + (selisih>=0?'+':'') + formatRp(selisih) + '</p>'
                        +     '<p class="text-gray-400 mt-0.5" style="font-size:10px;">Estimasi: ' + formatRp(kasAkhirEstimasi) + '</p>'
                        +   '</div>'
                        +   bdInfo
                        +   verifInfo
                        + '</div>'
                        + '</div>';
                }).join('');

            var prevDis = _clerekRiwayatPage === 0;
            var nextDis = _clerekRiwayatPage >= totalPages - 1;
            var navHTML = total > _clerekPerPage
                ? '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">'
                +   '<button onclick="changeClerekRiwayatPage(-1)" ' + (prevDis?'disabled':'') + ' '
                +     'style="padding:7px 14px;border-radius:8px;border:1px solid ' + (prevDis?'#e5e7eb':'#16a34a') + ';background:' + (prevDis?'#f9fafb':'#fff') + ';color:' + (prevDis?'#d1d5db':'#16a34a') + ';font-size:12px;font-weight:600;cursor:' + (prevDis?'not-allowed':'pointer') + ';display:flex;align-items:center;gap:4px;">'
                +     '<i class="ph ph-caret-left"></i> Prev</button>'
                +   '<span style="font-size:11px;color:#6b7280;">Hal ' + (_clerekRiwayatPage+1) + '/' + totalPages + ' &bull; ' + total + ' riwayat</span>'
                +   '<button onclick="changeClerekRiwayatPage(1)" ' + (nextDis?'disabled':'') + ' '
                +     'style="padding:7px 14px;border-radius:8px;border:1px solid ' + (nextDis?'#e5e7eb':'#16a34a') + ';background:' + (nextDis?'#f9fafb':'#16a34a') + ';color:' + (nextDis?'#d1d5db':'#fff') + ';font-size:12px;font-weight:600;cursor:' + (nextDis?'not-allowed':'pointer') + ';display:flex;align-items:center;gap:4px;">'
                +     'Next <i class="ph ph-caret-right"></i></button>'
                + '</div>'
                : '';

            return '<div class="space-y-3">'
                + '<div class="flex items-center justify-between flex-wrap gap-2">'
                +   '<h3 class="font-bold text-gray-700 text-sm uppercase tracking-wide">Riwayat Clerek (' + total + ')</h3>'
                +   (total > 0 ? '<button onclick="clerekHapusRiwayat()" class="text-xs text-red-400 hover:text-red-600 flex items-center gap-1"><i class="ph ph-trash"></i> Hapus Semua</button>' : '')
                + '</div>'
                + listHTML
                + navHTML
                + '</div>';
        }

        function changeClerekRiwayatPage(dir) {
            _clerekRiwayatPage += dir;
            var bod = document.getElementById('clerek-body');
            if (bod) bod.innerHTML = getClerekRiwayatHTML();
        }

        function clerekHapusRiwayat() {
            showConfirm('Hapus Riwayat','Hapus semua riwayat clerek dari Spreadsheet?','error', function(){
                clerekState.riwayatShift = [];
                if (GAS_URL) gasPost({ action: 'deleteShiftHistory' }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekRiwayatHTML();
                showToast('Riwayat clerek dihapus.','success');
            });
        }

        function downloadSatuRiwayatClerekPDF(idx) {
            var r = clerekState.riwayatShift[idx];
            if (!r) { showAlert('Error', 'Data riwayat tidak ditemukan.', 'error'); return; }
            var jsPDFLib = window.jspdf;
            if (!jsPDFLib) { showAlert('Error', 'Library PDF tidak tersedia.', 'error'); return; }

            var doc  = new jsPDFLib.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var pageW = 210, lm = 14, rm = 14, cw = pageW - lm - rm;
            var y = 16;

            var dur       = Math.floor((r.selesai - r.mulai) / 60000);
            var tglMulai  = new Date(r.mulai).toLocaleDateString('id-ID', {day:'2-digit',month:'long',year:'numeric'});
            var jamMulai  = new Date(r.mulai).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
            var jamSelesai = new Date(r.selesai).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
            // Gunakan omzetTunai (tunai masuk laci) untuk hitung selisih kas fisik
            var omzetTunaiPdf    = (r.omzetTunai !== undefined) ? r.omzetTunai : r.omzet;
            var mutasiKasPdf     = r.mutasiKas || 0;
            var kasAkhirEstimasi = r.kasAwal + omzetTunaiPdf + mutasiKasPdf;
            var selisih          = (r.kasAkhir || 0) - kasAkhirEstimasi;

            // Header toko
            doc.setFontSize(13); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text(namaTokoStruk || 'Z-TRONIK', pageW / 2, y, { align: 'center' });
            y += 5;
            doc.setFontSize(9); doc.setFont(undefined, 'normal'); doc.setTextColor(80);
            doc.text('Laporan Shift Kasir', pageW / 2, y, { align: 'center' });
            y += 5;
            doc.setDrawColor(22, 163, 74); doc.setLineWidth(0.6);
            doc.line(lm, y, pageW - rm, y);
            y += 7;

            // Info shift
            function row2(label, val, bold) {
                doc.setFontSize(9); doc.setTextColor(80);
                doc.setFont(undefined, 'normal'); doc.text(label, lm, y);
                doc.setFont(undefined, bold ? 'bold' : 'normal'); doc.setTextColor(20);
                doc.text(String(val), pageW - rm, y, { align: 'right' });
                y += 5;
            }

            row2('Kasir', r.kasir, true);
            row2('Tanggal', tglMulai, false);
            row2('Jam Mulai', jamMulai, false);
            row2('Jam Selesai', jamSelesai, false);
            row2('Durasi', formatDurasi(dur), false);
            y += 2;

            // Garis tipis
            doc.setDrawColor(200); doc.setLineWidth(0.2);
            doc.line(lm, y, pageW - rm, y);
            y += 6;

            // Kas & Omzet
            doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text('Rekapitulasi Kas', lm, y);
            y += 6;

            var kasRows = [
                ['Kas Awal (Modal)', formatRp(r.kasAwal)],
                ['+ Tunai Masuk Laci', formatRp(omzetTunaiPdf)],
            ];
            if (mutasiKasPdf !== 0) {
                kasRows.push([(mutasiKasPdf >= 0 ? '+ Mutasi Kas Masuk' : '- Mutasi Kas Keluar'), formatRp(Math.abs(mutasiKasPdf))]);
            }

            doc.setDrawColor(22, 163, 74); doc.setLineWidth(0.4);

            doc.setFontSize(10); doc.setFont(undefined, 'bold');
            doc.setTextColor(selisih >= 0 ? 22 : 180, selisih >= 0 ? 163 : 30, selisih >= 0 ? 74 : 30);

            doc.text((selisih >= 0 ? '+' : '') + formatRp(selisih), pageW - rm, y, { align: 'right' });
            y += 10;

            // ── SECTION: Omzet per Metode Bayar ──────────────────
            doc.setDrawColor(200); doc.setLineWidth(0.2);
            doc.line(lm, y, pageW - rm, y);
            y += 6;

            doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text('Omzet per Metode Bayar', lm, y);
            y += 2;
            doc.setFontSize(8); doc.setFont(undefined, 'normal'); doc.setTextColor(120);
            doc.text('Rincian penerimaan berdasarkan metode pembayaran selama shift', lm, y + 4);

            var omzetTotalPdf = r.omzet || 0;

                bd = { Tunai: 0, Kartu: 0, QRIS: 0, 'E-Wallet': 0, Hutang: 0, total: 0 };
                state.salesHistory.filter(function(s) {
                    var t = new Date(s.date).getTime();
                    return t >= r.mulai && t <= r.selesai;
                }).forEach(function(s) {
                    var m = s.method || s.paymentMethod || 'Tunai';
                    if (bd[m] !== undefined) bd[m] += s.total; else bd['Tunai'] += s.total;
                    bd.total += s.total;

            // Daftar semua metode — selalu tampilkan semua (nilai 0 tetap muncul sebagai Rp 0)
            var metodePdfList = [
