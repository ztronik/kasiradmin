        function printStruk(grandTotal, received, change, noTrx) {
            var now  = new Date();
            var tgl  = now.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
            var jam  = now.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            noTrx = noTrx || ('TRX' + Date.now().toString().slice(-8));

            var itemsHtml = state.cart.map(function(item) {
                var p     = getItemActivePrice(item);
                var total = p * item.qty;
                var name  = item.name.length > 24 ? item.name.slice(0,23) + '…' : item.name;
                return '<div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + name + '</div>'
                     + '<div style="display:flex;justify-content:space-between;align-items:baseline;padding-left:4px">'
                     + '<span style="white-space:nowrap">&nbsp;' + item.qty + ' x ' + formatRp(p) + '</span>'
                     + '<span style="flex-shrink:0;white-space:nowrap;padding-left:2px">' + total.toLocaleString('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}) + '</span></div>';
            }).join('');

            var subtotal = state.cart.reduce(function(s, i){ return s + getItemActivePrice(i) * i.qty; }, 0);
            var disc = state.discountType === 'Rp' ? state.discountValue : subtotal * (state.discountValue/100);
            var poinDisc = state.posPoinRedeem || 0;

            var opts = {
                namaT:       namaTokoStruk,
                alamatT:     alamatTokoStruk,
                telp:        noHpTokoStruk,
                noTrx:       noTrx,
                tgl:         tgl,
                jam:         jam,
                memberName:  state.posActiveMember ? state.posActiveMember.name : '',
                memberId:    state.posActiveMember ? state.posActiveMember.id   : '',
                itemsHtml:   itemsHtml,
                cartItems:   state.cart.map(function(item){
                    return { name: item.name, qty: item.qty, price: getItemActivePrice(item), total: getItemActivePrice(item)*item.qty };
                }),
                subtotal:    subtotal,
                subtotalFmt: formatRp(subtotal),
                disc:        disc,
                discFmt:     formatRp(disc),
                poinDisc:    poinDisc,
                poinDiscFmt: formatRp(poinDisc),
                poinRedeem:  state.posPoinRedeem,
                grandTotal:  grandTotal,
                totalFmt:    formatRp(grandTotal),
                method:      state.paymentMethod,
                received:    received,
                receivedFmt: formatRp(received),
                change:      change,
                changeFmt:   formatRp(change),
                footer:      footerStruk,
                hutangHtml:  (function(){
                    if (!state.posActiveMember) return '';
                    var hList = hutangPiutangList.filter(function(h){
                        return h.tipe === 'pelanggan' &&
                               h.idPelanggan === state.posActiveMember.id &&
                               h.status !== 'lunas';
                    });
                    if (!hList.length) return '';
                    var totalSisa = hList.reduce(function(s,h){ return s+(h.jumlah-h.sudahDibayar); },0);
                    var html = '<div style="border:1px solid #dc2626;border-radius:3px;margin:2px 0 0 0;padding:4px 5px;background:#fff5f5;">';
                    html += '<div style="font-weight:bold;font-size:9px;color:#dc2626;text-align:center;">⚠ CATATAN HUTANG</div>';
                    hList.slice(0,3).forEach(function(h){
                        var sisa = h.jumlah - h.sudahDibayar;
                        html += '<div style="font-size:8px;width:100%;display:table;"><span style="display:table-cell;overflow:hidden;max-width:80px;">' + (h.keterangan.length>16?h.keterangan.slice(0,15)+'…':h.keterangan) + '</span><span style="display:table-cell;text-align:right;color:#dc2626;font-weight:bold;white-space:nowrap;">' + formatRp(sisa) + '</span></div>';
                    });
                    if (hList.length > 3) html += '<div style="font-size:8px;text-align:center;color:#6b7280;">+' + (hList.length-3) + ' lainnya</div>';
                    html += '<div style="font-size:9px;font-weight:bold;width:100%;display:table;border-top:1px dashed #dc2626;margin-top:2px;padding-top:2px;"><span style="display:table-cell;">Total Sisa Hutang</span><span style="display:table-cell;text-align:right;color:#dc2626;">' + formatRp(totalSisa) + '</span></div>';
                    html += '</div>';
                    return html;
                })()
            };

            // Jika printer Bluetooth terhubung → cetak ESC/POS via BT
            if (btPrintMode && btCharacteristic) {
                btPrintStruk(opts);
                return;
            }

            // Fallback: cetak via browser (window.print)
            var html = buildStruHtml(opts);
            var printWin = window.open('','_blank','width=300,height=600');
            if (!printWin) { showToast('Popup diblokir browser. Izinkan popup untuk mencetak.', 'warning'); return; }
            printWin.document.write('<html><body style="margin:0">' + html + '</body></html>');
            printWin.document.close();
            printWin.focus();
            setTimeout(function(){ printWin.print(); printWin.close(); }, 300);
        }

        function renderPosGrid() {
            const grid = document.getElementById('pos-product-grid');
            if (!grid) return;
            if (state.products.length === 0) {
                grid.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">Belum ada data produk.</div>';
                return;
            }
            const query    = state.searchQuery;
            const filtered = state.products.filter(p =>
                (state.posCategory === 'Semua' || p.category === state.posCategory) &&
                (p.name.toLowerCase().includes(query) || (p.barcode && p.barcode.toLowerCase().includes(query)))
            );
            const perPage    = 10;
            const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.posPage > totalPages) state.posPage = totalPages;
            const pageItems  = filtered.slice((state.posPage-1)*perPage, state.posPage*perPage);
            if (filtered.length === 0) {
                grid.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">Produk tidak ditemukan.</div>';
                return;
            }
            function itemBtn(p) {
                const low = p.stock <= p.minStock;
                const isMobile = window.innerWidth <= 767;
                return `<button onclick="addToCart('${p.id}')"
                    style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:${isMobile?'9px 10px':'7px 8px'};background:#fff;border:none;border-bottom:1px solid #f0fdf4;cursor:pointer;text-align:left;box-sizing:border-box;min-height:${isMobile?'auto':'42px'};"
                    onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='#fff'">
                    <div style="min-width:0;flex:1;">
                        <div style="font-size:${isMobile?'12px':'11px'};font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:${isMobile?'150px':'130px'};">${p.name}</div>
                        <div style="font-size:${isMobile?'12px':'11px'};font-weight:700;color:#16a34a;">${formatRp(p.price)}</div>
                    </div>
                    <span style="flex-shrink:0;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:600;margin-left:4px;background:${p.unlimited?'#ede9fe':low?'#fee2e2':'#dcfce7'};color:${p.unlimited?'#7c3aed':low?'#dc2626':'#16a34a'};">${p.unlimited?'∞':p.stock}</span>
                </button>`;
            }
            const col1 = pageItems.slice(0,5).map(itemBtn).join('');
            const col2 = pageItems.slice(5,10).map(itemBtn).join('');
            const nav  = totalPages > 1 ? `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#f0fdf4;border-top:1px solid #bbf7d0;">
                    <button onclick="changePosPage(-1)" ${state.posPage===1?'disabled':''} style="padding:3px 10px;background:${state.posPage===1?'#e5e7eb':'#16a34a'};color:${state.posPage===1?'#9ca3af':'#fff'};border:none;border-radius:4px;cursor:${state.posPage===1?'not-allowed':'pointer'};font-size:11px;font-weight:700;">&#8249; Prev</button>
                    <span style="font-size:10px;color:#6b7280;">Hal ${state.posPage}/${totalPages} &bull; ${filtered.length} produk</span>
                    <button onclick="changePosPage(1)" ${state.posPage===totalPages?'disabled':''} style="padding:3px 10px;background:${state.posPage===totalPages?'#e5e7eb':'#16a34a'};color:${state.posPage===totalPages?'#9ca3af':'#fff'};border:none;border-radius:4px;cursor:${state.posPage===totalPages?'not-allowed':'pointer'};font-size:11px;font-weight:700;">Next &#8250;</button>
                </div>` : '';
            grid.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #e2e8f0;">
                <div style="border-right:1px solid #e2e8f0;">${col1}</div>
                <div>${col2}</div>
            </div>${nav}`;
        }

                });
                tbody.innerHTML = rows;
                const sub  = state.cart.reduce((s,i)=>s+getItemActivePrice(i)*i.qty,0);
                const disc = state.discountType==='Rp' ? state.discountValue : sub*(state.discountValue/100);
                const grand = Math.max(0, sub - disc - (state.posPoinRedeem||0));
                if (hdrTot) hdrTot.innerText = formatRp(grand);
                if (hdrTotMobile) hdrTotMobile.innerText = formatRp(grand);
            }
            renderCartFooter();
        }

        function renderCartFooter() {
            const footer = document.getElementById('pos-cart-footer');
            if (!footer) return;
            const subtotal     = state.cart.reduce((s,i)=>s+getItemActivePrice(i)*i.qty,0);

            const poinDiscount = state.posPoinRedeem || 0;
            const grandTotal   = Math.max(0, subtotal - finalDisc - poinDiscount);
            const hasItems     = state.cart.length > 0;

            let memberHtml = '';

                        <div style="display:flex;align-items:center;gap:7px;">
                            <div style="width:32px;height:32px;background:#16a34a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;">${state.posActiveMember.name.charAt(0).toUpperCase()}</div>
                            <div>
                                <div style="font-size:13px;font-weight:700;color:#14532d;">${state.posActiveMember.name}</div>

                        <span>Poin Aktif: <strong>${(state.posActiveMember.poin||0).toLocaleString('id-ID')}</strong></span>
                        ${earnedPoin>0?`<span style="background:#bbf7d0;padding:2px 7px;border-radius:10px;font-size:10px;">+${earnedPoin} poin</span>`:''}
                    </div>
                    <div style="border-top:1px solid #bbf7d0;padding-top:7px;">
                        <div style="font-size:11px;color:#16a34a;font-weight:600;margin-bottom:4px;">Tukar poin jadi potongan:</div>
                        <div style="display:flex;align-items:center;gap:5px;">
                            <input type="number" min="0" max="${state.posActiveMember.poin||0}" step="100" value="${state.posPoinRedeem}"
                                onchange="handlePoinRedeemChange(event)" onkeyup="handlePoinRedeemChange(event)"
                                style="flex:1;padding:5px 7px;border:1px solid #86efac;border-radius:6px;font-size:12px;text-align:center;font-weight:700;outline:none;min-width:0;" />
                            <span style="font-size:11px;color:#16a34a;white-space:nowrap;">= ${formatRp(state.posPoinRedeem)}</span>
                        </div>
                        ${(state.posActiveMember.poin||0)>0?`<button onclick="useAllPoin()" style="font-size:11px;color:#16a34a;text-decoration:underline;background:none;border:none;cursor:pointer;margin-top:3px;padding:0;">Gunakan semua (${state.posActiveMember.poin} poin)</button>`:''}
                    </div>
                </div>`;
            } else {
                memberHtml = `<div style="flex-shrink:0;">
                    <div style="font-size:12px;font-weight:600;color:#6b7280;margin-bottom:5px;display:flex;align-items:center;gap:4px;"><i class="ph ph-user-circle" style="color:#16a34a;font-size:15px;"></i> Member (opsional)</div>
                    <div style="display:flex;gap:4px;">
                        <input type="text" id="pos-member-input" placeholder="ID angka atau No. HP..."
                            onkeydown="if(event.key==='Enter'){lookupMember(document.getElementById('pos-member-input').value)}"
                            style="flex:1;padding:7px 9px;border:1px solid #e2e8f0;border-radius:7px;font-size:12px;outline:none;min-width:0;" />
                        <button onclick="lookupMember(document.getElementById('pos-member-input').value)"
                            style="padding:7px 11px;background:#16a34a;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:15px;" title="Cari Member">
                            <i class="ph ph-magnifying-glass"></i>
                        </button>
                        <button onclick="openMemberScanner()"
                            style="padding:7px 11px;background:#0284c7;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:15px;" title="Scan QR/Barcode Member">
                            <i class="ph ph-camera"></i>
                        </button>
                    </div>
                    <div style="font-size:10px;color:#9ca3af;margin-top:3px;">Ketik ID / No. HP lalu Enter, atau scan QR member</div>
                </div>`;
            }

            const summaryHtml = `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;flex-shrink:0;">
                <div style="background:#dcfce7;padding:6px 12px;font-size:12px;font-weight:700;color:#166534;border-bottom:1px solid #bbf7d0;">RINGKASAN BELANJA</div>
                <div style="padding:10px 12px;font-size:12px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="color:#6b7280;">Subtotal</span><span id="disc-subtotal" style="font-weight:600;">${formatRp(subtotal)}</span></div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <span style="color:#6b7280;">Diskon Tambahan</span>
                        <div style="display:flex;align-items:center;gap:3px;border:1px solid #e2e8f0;border-radius:5px;padding:2px 6px;background:#f9fafb;">
                            <button onclick="toggleDiscountType()" style="font-size:10px;font-weight:700;color:#374151;background:#fff;border:1px solid #e2e8f0;border-radius:3px;padding:1px 5px;cursor:pointer;white-space:nowrap;">${state.discountType}</button>
                            <input type="number" min="0" value="${state.discountValue||''}" oninput="handleDiscountChange(event)" onblur="renderCartFooter()" placeholder="0"
                                style="width:55px;text-align:right;border:none;outline:none;font-size:12px;font-weight:600;background:transparent;" />
                        </div>
                    </div>
                    ${poinDiscount>0?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;color:#16a34a;font-size:11px;"><span>Poin (${state.posPoinRedeem})</span><span>- ${formatRp(poinDiscount)}</span></div>`:''}
                    <div style="display:flex;justify-content:space-between;border-top:2px dashed #bbf7d0;margin-top:4px;padding-top:8px;">
                        <span style="font-size:14px;font-weight:700;color:#111827;">TOTAL</span>
                        <span id="disc-grandtotal" style="font-size:16px;font-weight:900;color:#16a34a;">${formatRp(grandTotal)}</span>
                    </div>
                </div>
            </div>`;

            const methods = [
                {id:'Tunai',    icon:'ph-money',        color:'#16a34a'},
                {id:'Kartu',    icon:'ph-credit-card',  color:'#2563eb'},
                {id:'QRIS',     icon:'ph-qr-code',      color:'#7c3aed'},
                {id:'E-Wallet', icon:'ph-device-mobile-camera', color:'#ea580c'},
                {id:'Hutang',   icon:'ph-hand-coins',   color:'#dc2626'}
            ];

            const methodHtml = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;flex-shrink:0;">
                ${methods.map(m=>`<button onclick="setPaymentMethod('${m.id}')"
                    style="padding:9px 4px;border:2px solid ${state.paymentMethod===m.id?m.color:'#e2e8f0'};background:${state.paymentMethod===m.id?m.color+'18':'#fff'};border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:${state.paymentMethod===m.id?m.color:'#6b7280'};">
                    <i class="ph ${m.icon}" style="font-size:18px;"></i>${m.id}</button>`).join('')}
            </div>`;

            const checkoutHtml = `<button onclick="checkout()" ${!hasItems?'disabled':''}
                style="width:100%;padding:15px 8px;background:${hasItems?'#16a34a':'#d1d5db'};color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:900;cursor:${hasItems?'pointer':'not-allowed'};display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;letter-spacing:0.3px;">
                <i class="ph ph-check-circle" style="font-size:20px;"></i>
                ${hasItems?'PROSES PEMBAYARAN':'Pilih produk terlebih dahulu'}
            </button>`;

            const clearHtml = hasItems ? `<button onclick="state.cart=[];state.discountValue=0;state.posPoinRedeem=0;renderCart();"
                style="width:100%;padding:7px;background:#fff;color:#dc2626;border:1px solid #fca5a5;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0;">
                <i class="ph ph-trash" style="font-size:14px;"></i> Kosongkan Keranjang
            </button>` : '';

            const mobileBackBtn = window.innerWidth <= 767 ? `<button onclick="switchPosTab('produk')"
                style="width:100%;padding:10px;background:#f0fdf4;color:#16a34a;border:2px solid #16a34a;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;">
                <i class="ph ph-arrow-left" style="font-size:16px;"></i> Tambah Produk Lagi
            </button>` : '';

            footer.innerHTML = mobileBackBtn + memberHtml + summaryHtml + methodHtml + checkoutHtml + clearHtml;
        }
        // Cari member berdasarkan input ID angka atau no HP
        function lookupMember(val) {
            if (!val || !val.trim()) return;
            const q = val.trim().toLowerCase();
            // Coba cocokkan sebagai angka ID (tanpa prefix ZTR) atau no HP
            const found = state.customers.find(c =>
                c.id.toLowerCase().replace('ztr', '') === q ||
                c.phone.replace(/\D/g, '') === q.replace(/\D/g, '') ||
                c.id.toLowerCase() === q
            );
            if (!found) {
                showToast('Member tidak ditemukan.', 'error');
                return;
            }
            state.posActiveMember = { ...found };
            state.posPoinRedeem = 0;
            renderCartFooter();
            showToast(`Member ditemukan: ${found.name}`, 'success');
        }

        function removePosActiveMember() {
            state.posActiveMember = null;
            state.posPoinRedeem = 0;
            renderCartFooter();
        }

        function handlePoinRedeemChange(e) {
            let val = Number(e.target.value) || 0;
            const maxPoin = state.posActiveMember ? (state.posActiveMember.poin || 0) : 0;
            if (val > maxPoin) val = maxPoin;
            if (val < 0) val = 0;
            state.posPoinRedeem = val;
            e.target.value = val;
            renderCartFooter();
        }

        function useAllPoin() {
            if (!state.posActiveMember) return;
            state.posPoinRedeem = state.posActiveMember.poin || 0;
            renderCartFooter();
        }

        // --- CRUD MODULE UNTUK PRODUK SAYA ---
        function changeProductPage(dir) {
            state.productPage += dir;
            renderContent();
        }


        // ── KATEGORI DROPDOWN HELPER ──────────────────────────────────
        // Membangun HTML combo-box kategori: dropdown + input tambah baru
        function buildKategoriField(currentVal) {
            loadKategoriList();
            var opts = '<option value="">-- Pilih Kategori --</option>';
            var matched = false;
            kategoriList.forEach(function(k) {
                var sel = (k === currentVal) ? ' selected' : '';
                if (sel) matched = true;
                opts += '<option value="' + k.replace(/"/g, '&quot;') + '"' + sel + '>' + k + '</option>';
            });
            // Opsi "Tambah baru"
            opts += '<option value="__new__">+ Tambah kategori baru...</option>';

            var showNew = (!matched && currentVal && currentVal !== '__new__');

            return '<select id="p-category-select" onchange="onKategoriSelectChange(this)"'
                + ' style="width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;background:#fff;margin-bottom:' + (showNew ? '6px' : '0') + ';">'
                + opts
                + '</select>'
                + '<div id="p-category-new-row" style="display:' + (showNew ? 'flex' : 'none') + ';gap:6px;margin-top:4px;">'
                + '<input type="text" id="p-category-new-input" placeholder="Nama kategori baru..."'
                + ' value="' + (showNew ? currentVal.replace(/"/g,'&quot;') : '') + '"'
                + ' style="flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;"/>'
                + '<button type="button" onclick="simpanKategoriBaru()" title="Simpan ke daftar"'
                + ' style="padding:7px 10px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap;font-weight:600;">'
                + '<i class="ph ph-floppy-disk"></i>'
                + '</button>'
                + '</div>'
                // Hidden input yg dipakai saveProduct untuk baca nilai final
                + '<input type="hidden" id="p-category" value="' + (currentVal || '').replace(/"/g,'&quot;') + '" required />';
        }

        // Saat select berubah
        function onKategoriSelectChange(sel) {
            var newRow = document.getElementById('p-category-new-row');
            var hidden = document.getElementById('p-category');
            if (sel.value === '__new__') {
                if (newRow) { newRow.style.display = 'flex'; sel.style.marginBottom = '6px'; }
                if (hidden) hidden.value = '';
                setTimeout(function(){ var inp = document.getElementById('p-category-new-input'); if(inp) inp.focus(); }, 50);
            } else {
                if (newRow) { newRow.style.display = 'none'; sel.style.marginBottom = '0'; }
                if (hidden) hidden.value = sel.value;
            }
        }

        // Simpan nama kategori baru ke daftar & pilih otomatis di dropdown
        function simpanKategoriBaru() {
            var inp    = document.getElementById('p-category-new-input');
            var sel    = document.getElementById('p-category-select');
            var hidden = document.getElementById('p-category');
            if (!inp || !inp.value.trim()) {
                inp && inp.focus();
                return;
            }
            var nama = inp.value.trim();
            saveKategoriToList(nama);

            // Tambah ke dropdown jika belum ada
            var existing = Array.from(sel.options).find(function(o){ return o.value === nama; });
            if (!existing) {
                var newOpt = document.createElement('option');
                newOpt.value = nama; newOpt.text = nama;
                // Sisipkan sebelum opsi "+ Tambah kategori baru..."
                var lastOpt = sel.querySelector('option[value="__new__"]');
                sel.insertBefore(newOpt, lastOpt);
            }
            sel.value = nama;
            if (hidden) hidden.value = nama;
            // Sembunyikan baris input baru
            var newRow = document.getElementById('p-category-new-row');
            if (newRow) { newRow.style.display = 'none'; sel.style.marginBottom = '0'; }
            showToast('Kategori "' + nama + '" disimpan.', 'success');
        }

        // Fungsi kelola kategori — tampil list kategori tersimpan dengan tombol hapus
        function showKategoriManager() {
            loadKategoriList();
            var rows = kategoriList.length === 0
                ? '<p style="color:#9ca3af;font-size:13px;text-align:center;padding:12px 0;">Belum ada kategori tersimpan.</p>'
                : kategoriList.map(function(k) {
                    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:5px;">'
                        + '<span style="font-size:13px;color:#374151;font-weight:500;">' + k + '</span>'
                        + '<button type="button" onclick="hapusKategori(\'' + k.replace(/'/g,"\'") + '\')" style="padding:3px 8px;background:#fee2e2;color:#dc2626;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;" title="Hapus kategori ini">'
                        + '<i class="ph ph-trash"></i></button>'
                        + '</div>';
                }).join('');

            showConfirm(
                'Kelola Kategori',
                '<div style="max-height:260px;overflow-y:auto;">' + rows + '</div>',
                'info',
                null, 'Tutup', null, true
            );
        }

        function hapusKategori(nama) {
            deleteKategoriFromList(nama);
            showToast('Kategori "' + nama + '" dihapus.', 'warning');
            // Refresh manager jika terbuka
            setTimeout(function(){
                var overlay = document.getElementById('notif-overlay');
                if (overlay && !overlay.classList.contains('hidden')) showKategoriManager();

        function toggleUnlimitedFields(isUnlimited) {
            var fields = document.getElementById('p-stock-fields');
            if (fields) fields.style.display = isUnlimited ? 'none' : 'block';
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        async function saveProduct(e, action) {
            e.preventDefault();
            const productData = {
                id: document.getElementById('p-id').value,
                barcode: document.getElementById('p-barcode').value,
                name: document.getElementById('p-name').value,
                category: (function(){
                    var h = document.getElementById('p-category');
                    var s = document.getElementById('p-category-select');
                    var n = document.getElementById('p-category-new-input');
                    var v = (h && h.value.trim()) ? h.value.trim()
                          : (s && s.value !== '__new__' && s.value ? s.value.trim()
                          : (n ? n.value.trim() : ''));
                    if (v) saveKategoriToList(v);
                    return v;
                })(),
                modal: Number(document.getElementById('p-modal').value),
                price: Number(document.getElementById('p-price').value),
                wholesalePrice: Number(document.getElementById('p-wholesalePrice').value),
                wholesaleMin: Number(document.getElementById('p-wholesaleMin').value),
                discount: Number(document.getElementById('p-discount').value),
                unlimited: document.getElementById('p-unlimited') ? document.getElementById('p-unlimited').checked : false,
                stock: (document.getElementById('p-unlimited') && document.getElementById('p-unlimited').checked) ? 999999 : Number(document.getElementById('p-stock') ? document.getElementById('p-stock').value : 0),
                minStock: (document.getElementById('p-unlimited') && document.getElementById('p-unlimited').checked) ? 0 : (Number(document.getElementById('p-minStock') ? document.getElementById('p-minStock').value : 0) || 10),
                poinPerUnit: Number(document.getElementById('p-poinPerUnit').value) || 0
            };

            if (action === 'add') {
                state.products.unshift(productData);
            } else {
                const idx = state.products.findIndex(p => p.id === productData.id);
                if (idx !== -1) state.products[idx] = { ...state.products[idx], ...productData };
            }

            closeProductModal();
            renderContent();
            showToast(action === 'add' ? 'Produk berhasil ditambahkan!' : 'Produk berhasil diperbarui!', 'success');

            if (GAS_URL) {
                try {
                    const json = await gasPost({ action: action, product: productData });
                    if (json.status !== 'success') console.warn('GAS response:', json);
                } catch (err) {
                    console.error("Gagal sinkron ke database: ", err);
                    showToast('Produk tersimpan lokal, tapi gagal sinkron ke spreadsheet.', 'warning');
                }
            }
        }

        async function deleteProduct(id) {
            showConfirm('Hapus Produk', 'Yakin ingin menghapus produk ini? Tindakan tidak bisa dibatalkan.', 'error', async () => {
                state.products = state.products.filter(p => p.id !== id);
                const itemsPerPage = 10;
                const totalPages = Math.max(1, Math.ceil(state.products.length / itemsPerPage));
                if (state.productPage > totalPages) state.productPage = totalPages;
                renderContent();
                showToast('Produk berhasil dihapus.', 'success');
                if (GAS_URL) {
                    try {
                        await gasPost({ action: 'delete', product: { id } });
                    } catch (err) { console.error("Gagal menghapus dari database: ", err); }
                }
            });
        }

        function quickStockUpdate(productId) {
            if (!currentUser || currentUser.role !== 'admin') {
                showAlert('Akses Ditolak', 'Fitur ini hanya tersedia untuk admin.', 'warning');
                return;
            }
            var prod = state.products.find(function(p){ return p.id === productId; });
            if (!prod) return;

            var overlay  = document.getElementById('notif-overlay');
            var iconWrap = document.getElementById('notif-icon-wrap');
            var titleEl  = document.getElementById('notif-title');
            var msgEl    = document.getElementById('notif-msg');
            var btns     = document.getElementById('notif-buttons');

            iconWrap.className = 'w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 bg-green-100';
            iconWrap.innerHTML = '<i class="ph ph-stack-plus text-3xl text-green-600"></i>';
            titleEl.innerText  = 'Ubah Stok Cepat';

            msgEl.innerHTML =
                '<p style="font-size:13px;font-weight:600;color:#1f2937;margin-bottom:2px;">' + prod.name + '</p>'
                + (prod.unlimited ? '<p style="font-size:12px;color:#7c3aed;margin-bottom:16px;font-weight:600;">&#8734; Produk ini Unlimited — tidak perlu ubah stok.</p>' : '<p style="font-size:12px;color:#6b7280;margin-bottom:16px;">Stok saat ini: <strong style="color:' + (prod.stock <= prod.minStock ? '#dc2626' : '#16a34a') + ';">' + prod.stock + ' unit</strong></p>')
                + '<div style="display:flex;align-items:center;gap:10px;justify-content:center;">'
                + '<button onclick="qsStep(-1)" style="width:44px;height:44px;background:#fee2e2;color:#dc2626;border:none;border-radius:10px;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">−</button>'
                + '<input type="number" id="quick-stock-input" value="' + prod.stock + '" min="0" '
                + 'style="width:90px;padding:8px 4px;border:2px solid #d1d5db;border-radius:10px;font-size:22px;font-weight:800;text-align:center;outline:none;" />'
                + '<button onclick="qsStep(+1)" style="width:44px;height:44px;background:#dcfce7;color:#16a34a;border:none;border-radius:10px;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>'
                + '</div>';

            btns.innerHTML =
                '<button onclick="closeNotif()" style="padding:9px 20px;border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:600;border-radius:10px;cursor:pointer;">Batal</button>'
                + '<button onclick="applyQuickStockManual(\'' + productId + '\')" style="padding:9px 28px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;">OK</button>';

            overlay.classList.remove('hidden');
            setTimeout(function(){ var el = document.getElementById('quick-stock-input'); if(el){ el.focus(); el.select(); } }, 100);
        }

        function qsStep(delta) {
            var inp = document.getElementById('quick-stock-input');
            if (!inp) return;
            inp.value = Math.max(0, (parseInt(inp.value) || 0) + delta);
        }

        function applyQuickStock(productId, delta) {
            var prod = state.products.find(function(p){ return p.id === productId; });
            if (!prod) return;
            var newStock = Math.max(0, prod.stock + delta);
            prod.stock = newStock;
            if (GAS_URL) gasPost({ action: 'stockOpname', updates: [{ id: prod.id, stock: newStock }] }).catch(function(){});
            showToast('Stok ' + prod.name + ' → ' + newStock + ' unit', 'success');
        }

        function applyQuickStockManual(productId) {
            var inp = document.getElementById('quick-stock-input');
            if (!inp) return;
            var newStock = Math.max(0, parseInt(inp.value) || 0);
            var prod = state.products.find(function(p){ return p.id === productId; });
            if (!prod) return;
            prod.stock = newStock;
            if (GAS_URL) gasPost({ action: 'stockOpname', updates: [{ id: prod.id, stock: newStock }] }).catch(function(){});
            closeNotif();
            renderContent();
            showToast('Stok ' + prod.name + ' → ' + newStock + ' unit', 'success');
        }

            if (p1.length < 4) { showAlert('Terlalu Pendek', 'Password minimal 4 karakter.', 'warning'); return; }
            cancelRefundPwd = p1;
            if (GAS_URL) gasPost({ action: 'savePengaturan', key: 'cancel_pwd', value: p1 }).catch(function(){});
            renderContent();

        function uploadQrisFromCamera() {
            // Buat input file sementara dengan capture=environment (buka kamera langsung di mobile)
            var tmp = document.createElement('input');
            tmp.type = 'file';
            tmp.accept = 'image/*';
            tmp.capture = 'environment';
            tmp.onchange = function(e) { uploadQrisImage(e); };
            tmp.click();
        }

        function uploadQrisImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            // Validasi ukuran maks 5MB
            if (file.size > 5 * 1024 * 1024) {
                showAlert('File Terlalu Besar', 'Ukuran foto QRIS maksimal 5MB. Kompres foto terlebih dahulu.', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                qrisImageBase64 = ev.target.result;
                if (GAS_URL) gasPost({ action: 'saveQris', imageBase64: qrisImageBase64 }).catch(function(){});
                renderContent();
                showToast('Foto QRIS berhasil diupload!', 'success');
            };
            reader.onerror = function() {
                showAlert('Gagal Membaca File', 'Tidak bisa membaca file foto. Coba foto lain.', 'error');
            };
            reader.readAsDataURL(file);
        }

        function deleteQrisImage() {
            qrisImageBase64 = '';
            if (GAS_URL) gasPost({ action: 'saveQris', imageBase64: '' }).catch(function(){});
            renderContent();
            showToast('Foto QRIS dihapus.', 'info');
        }

        async function jalankanCleanupManual() {
            var hariEl = document.getElementById('set-hari-bersih');
            var hari   = hariEl ? Math.max(7, Number(hariEl.value) || 30) : 30;
            var resEl  = document.getElementById('cleanup-result');

            showConfirm(
                'Konfirmasi Pembersihan',
                'Hapus semua transaksi yang lebih dari ' + hari + ' hari?\n\nPoin pelanggan tidak akan berubah.\nProses ini tidak bisa dibatalkan.',
                'warning',
                async function() {
                    if (resEl) {
                        resEl.className = 'mt-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-700 flex items-center gap-2';
                        resEl.innerHTML = '<i class="ph ph-circle-notch animate-spin"></i> Sedang membersihkan...';
                        resEl.classList.remove('hidden');
                    }
                    try {
                        var res = await gasPost({ action: 'bersihkanTransaksiLama', hariMaksimal: hari });
                        // Update salesHistory di memori agar laporan juga ikut bersih
                        if (res && res.status === 'success') {
                            var batas = new Date();
                            batas.setDate(batas.getDate() - hari);
                            state.salesHistory = state.salesHistory.filter(function(s) {
                                return new Date(s.date) >= batas;
                            });
                            if (resEl) {
                                resEl.className = 'mt-3 p-3 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700 flex items-center gap-2';
                                resEl.innerHTML = '<i class="ph ph-check-circle text-base"></i> ' + (res.pesan || 'Pembersihan selesai.');
                            }
                            showToast('Pembersihan selesai: ' + (res.dihapus || 0) + ' transaksi dihapus.', 'success');
                        } else {
                            if (resEl) {
                                resEl.className = 'mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 flex items-center gap-2';
                                resEl.innerHTML = '<i class="ph ph-x-circle text-base"></i> Gagal: ' + (res && res.message ? res.message : 'Error tidak diketahui');
                            }
                        }
                    } catch(e) {
                        if (resEl) {
                            resEl.className = 'mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600 flex items-center gap-2';
                            resEl.innerHTML = '<i class="ph ph-x-circle text-base"></i> Gagal terhubung ke server.';
                        }
                    }
                }
            );
        }

        let stockOpnameData = [];
        let soStatus = 'idle';
        let soStartTime = null;
        let soEndTime   = null;

        function saveSoState() {
            try {

        function initStockOpname() {
            stockOpnameData = state.products.map(p => ({
                id: p.id, name: p.name, category: p.category,
                price: p.price,
                systemStock: p.stock, actualStock: p.stock, diff: 0
            }));

        function mulaiSO() {
            if (state.products.length === 0) { showAlert('Tidak Ada Produk', 'Muat data produk terlebih dahulu.', 'warning'); return; }
            showConfirm('Mulai Stock Opname?', 'Semua stok aktual akan diset sama dengan stok sistem sebagai titik awal. Isi kolom Stok Aktual sesuai hitungan fisik Anda.', 'info', () => {
                initStockOpname();
                soStatus = 'running';
                soStartTime = new Date();
                soEndTime = null;
                state.opnameSearch = '';
                state.opnameSort = 'none';
                state.opnamePage = 1;
                saveSoState();
                renderContent();
                showToast('Stock Opname dimulai!', 'success');
            });
        }

        function akhiriSO() {
            const changed = stockOpnameData.filter(x => x.diff !== 0);
            showConfirm('Akhiri Stock Opname?',
                `Ditemukan ${changed.length} produk dengan selisih.\nData stok akan diperbarui dan laporan akan ditampilkan.`,
                'warning', async () => {
                soStatus = 'done';
                soEndTime = new Date();
                // Update state.products
                stockOpnameData.forEach(item => {
                    const prod = state.products.find(p => p.id === item.id);
                    if (prod) prod.stock = item.actualStock;
                });
                // Sync ke GAS
                if (GAS_URL && changed.length > 0) {
                    try { await gasPost({ action: 'stockOpname', updates: changed.map(x => ({ id: x.id, stock: x.actualStock })) }); }
                    catch(e) { console.error(e); }
                }
                saveSoState();
                renderContent();
                showToast(`SO selesai. ${changed.length} produk diperbarui.`, 'success');
            });
        }

        function handleOpnameInput(id, val) {
            const item = stockOpnameData.find(x => x.id === id);
            if (!item) return;
            item.actualStock = Number(val) || 0;
            item.diff = item.actualStock - item.systemStock;
            const diffEl = document.getElementById('diff-' + id);
            if (diffEl) {
                diffEl.innerText = item.diff > 0 ? '+' + item.diff : item.diff;
                diffEl.className = 'text-sm font-bold text-center ' + (item.diff < 0 ? 'text-red-500' : item.diff > 0 ? 'text-blue-500' : 'text-gray-400');
            }
            saveSoState();
        }

        function downloadSoPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const tglMulai = soStartTime ? soStartTime.toLocaleString('id-ID') : '-';
            const tglSelesai = soEndTime ? soEndTime.toLocaleString('id-ID') : '-';
            const changed = stockOpnameData.filter(x => x.diff !== 0);
            const totalNilaiSelisih = stockOpnameData.reduce((s, x) => s + (x.diff * x.price), 0);

            doc.setFontSize(16); doc.setFont(undefined,'bold');
            doc.text('Laporan Stock Opname — ' + namaTokoStruk, 14, 15);
            doc.setFontSize(9); doc.setFont(undefined,'normal');
            doc.text('Mulai: ' + tglMulai + '   Selesai: ' + tglSelesai, 14, 22);
            doc.text('Total produk: ' + stockOpnameData.length + '   Produk selisih: ' + changed.length, 14, 27);
            const nilaiLabel = totalNilaiSelisih >= 0 ? '+' + formatRp(totalNilaiSelisih) : formatRp(totalNilaiSelisih);
            doc.text('Nilai total selisih: ' + nilaiLabel, 14, 32);

            const rows = stockOpnameData.map((x, i) => {
                const nilai = x.diff * x.price;
                return [
                    i + 1, x.id, x.name.slice(0, 30), x.category,
                    x.systemStock, x.actualStock,
                    (x.diff > 0 ? '+' : '') + x.diff,
                    (nilai > 0 ? '+' : '') + formatRp(nilai)
                ];
            });
            doc.autoTable({
                head: [['No','ID','Nama Barang','Kategori','Stok Sistem','Stok Aktual','Selisih','Nilai Selisih']],
                body: rows, startY: 36,
                styles: { fontSize: 8 },
                headStyles: { fillColor: [34, 197, 94] },
                didParseCell: function(data) {
                    if (data.section === 'body' && data.column.index === 6) {
                        const v = parseFloat(data.cell.raw);
                        if (v < 0) data.cell.styles.textColor = [239, 68, 68];
                        else if (v > 0) data.cell.styles.textColor = [59, 130, 246];
                    }
                }
            });
            doc.save('Laporan_SO_' + (soEndTime ? soEndTime.toLocaleDateString('id-ID').replace(/\//g,'-') : 'draft') + '.pdf');
        }

                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center py-20 gap-6">
                    <div class="w-20 h-20 rounded-full bg-green-50 flex items-center justify-center">
                        <i class="ph ph-clipboard-text text-5xl text-green-500"></i>
                    </div>
                    <div class="text-center">
                        <h2 class="text-xl font-bold text-gray-800 mb-2">Stock Opname</h2>
                        <p class="text-sm text-gray-500 max-w-sm">Klik tombol di bawah untuk memulai penghitungan stok fisik. Anda bisa mengisi kolom satu per satu sesuai kondisi gudang.</p>
                    </div>
                    <button onclick="mulaiSO()" class="px-8 py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 transition-colors shadow-sm flex items-center gap-3 text-base">
                        <i class="ph ph-play-circle text-2xl"></i> Mulai Stock Opname
                    </button>
                    <p class="text-xs text-gray-400">${state.products.length} produk akan dicek</p>
                </div>`;
            }

            // DONE — tampilkan laporan ringkas
            if (soStatus === 'done') {
                const changed   = stockOpnameData.filter(x => x.diff !== 0);
                const minus     = stockOpnameData.filter(x => x.diff < 0);
                const plus      = stockOpnameData.filter(x => x.diff > 0);
                const nilaiMin  = minus.reduce((s, x) => s + (x.diff * x.price), 0);
                const nilaiPlus = plus.reduce((s, x) => s + (x.diff * x.price), 0);
                const nilaiTotal = stockOpnameData.reduce((s, x) => s + (x.diff * x.price), 0);

                const reportRows = stockOpnameData.filter(x => x.diff !== 0).map(x => {
                    const nilai = x.diff * x.price;
                    return `<tr class="border-b border-gray-100">
                        <td class="py-2 px-4 text-xs font-mono text-gray-500">${x.id}</td>
                        <td class="py-2 px-4 text-sm text-gray-800">${x.name}</td>
                        <td class="py-2 px-4 text-sm text-center text-gray-500">${x.systemStock}</td>
                        <td class="py-2 px-4 text-sm text-center text-gray-500">${x.actualStock}</td>
                        <td class="py-2 px-4 text-sm font-bold text-center ${x.diff < 0 ? 'text-red-500' : 'text-blue-500'}">${x.diff > 0 ? '+' : ''}${x.diff}</td>
                        <td class="py-2 px-4 text-sm font-bold text-right ${nilai < 0 ? 'text-red-500' : 'text-blue-500'}">${nilai > 0 ? '+' : ''}${formatRp(nilai)}</td>
                    </tr>`;
                }).join('');

                return `
                <div class="space-y-4">
                    ${tabBar}
                    <!-- Summary cards -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
                            <p class="text-xs text-gray-500 mb-1">Total Produk Dicek</p>
                            <p class="text-2xl font-bold text-gray-800">${stockOpnameData.length}</p>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
                            <p class="text-xs text-gray-500 mb-1">Produk Selisih</p>
                            <p class="text-2xl font-bold ${changed.length > 0 ? 'text-orange-500' : 'text-green-600'}">${changed.length}</p>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-red-100 text-center">
                            <p class="text-xs text-gray-500 mb-1">Nilai Kekurangan</p>
                            <p class="text-xl font-bold text-red-500">${formatRp(nilaiMin)}</p>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-blue-100 text-center">
                            <p class="text-xs text-gray-500 mb-1">Nilai Kelebihan</p>
                            <p class="text-xl font-bold text-blue-500">+${formatRp(nilaiPlus)}</p>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                        <div class="p-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                            <div>
                                <h2 class="font-semibold text-gray-800">Laporan Stock Opname</h2>
                                <p class="text-xs text-gray-500">
                                    Mulai: ${soStartTime ? soStartTime.toLocaleString('id-ID') : '-'} &bull;
                                    Selesai: ${soEndTime ? soEndTime.toLocaleString('id-ID') : '-'}
                                </p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="downloadSoPDF()" class="px-4 py-2 bg-green-50 text-green-700 font-semibold text-sm rounded-xl hover:bg-green-100 border border-green-200 flex items-center gap-2">
                                    <i class="ph ph-download-simple"></i> Unduh PDF
                                </button>
                                <button onclick="soStatus='idle'; stockOpnameData=[]; soStartTime=null; soEndTime=null; clearSoState(); renderContent();" class="px-4 py-2 bg-gray-100 text-gray-600 font-semibold text-sm rounded-xl hover:bg-gray-200 flex items-center gap-2">
                                    <i class="ph ph-arrow-counter-clockwise"></i> SO Baru
                                </button>
                            </div>
                        </div>

                        ${changed.length === 0
                            ? `<div class="py-12 text-center text-green-600">
                                <i class="ph ph-check-circle text-5xl block mb-2"></i>
                                <p class="font-semibold">Semua stok sesuai! Tidak ada selisih.</p>
                               </div>`
                            : `<div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-gray-50 text-gray-500 text-xs border-b border-gray-200">
                                            <th class="py-3 px-4 font-medium">ID</th>
                                            <th class="py-3 px-4 font-medium">Nama Barang</th>
                                            <th class="py-3 px-4 font-medium text-center">Stok Sistem</th>
                                            <th class="py-3 px-4 font-medium text-center">Stok Aktual</th>
                                            <th class="py-3 px-4 font-medium text-center">Selisih (Unit)</th>
                                            <th class="py-3 px-4 font-medium text-right">Nilai Selisih</th>
                                        </tr>
                                    </thead>
                                    <tbody>${reportRows}</tbody>
                                    <tfoot>
                                        <tr class="bg-gray-50 border-t-2 border-gray-200">
                                            <td colspan="5" class="py-3 px-4 font-bold text-gray-700 text-sm text-right">Total Nilai Selisih:</td>
                                            <td class="py-3 px-4 font-bold text-right text-base ${nilaiTotal < 0 ? 'text-red-600' : nilaiTotal > 0 ? 'text-blue-600' : 'text-gray-600'}">${nilaiTotal > 0 ? '+' : ''}${formatRp(nilaiTotal)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                               </div>`
                        }
                    </div>
                </div>`;
            }

            // RUNNING — proses pengisian
            if (stockOpnameData.length !== state.products.length) initStockOpname();
            let displayData = [...stockOpnameData];
            const q = state.opnameSearch;
            if (q) displayData = displayData.filter(x => x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q) || x.category.toLowerCase().includes(q));
            if (state.opnameSort === 'az') displayData.sort((a,b) => a.name.localeCompare(b.name));
            else if (state.opnameSort === 'za') displayData.sort((a,b) => b.name.localeCompare(a.name));
            else if (state.opnameSort === 'cat') displayData.sort((a,b) => a.category.localeCompare(b.category));
            else if (state.opnameSort === 'diff_minus') displayData.sort((a,b) => a.diff - b.diff);
            else if (state.opnameSort === 'diff_plus') displayData.sort((a,b) => b.diff - a.diff);

            // Pagination 25 per halaman
            const opnamePP = 25;
            const opnameTotalPages = Math.max(1, Math.ceil(displayData.length / opnamePP));
            if (state.opnamePage > opnameTotalPages) state.opnamePage = opnameTotalPages;
            const opnameStart = (state.opnamePage - 1) * opnamePP;
            const pagedData   = displayData.slice(opnameStart, opnameStart + opnamePP);

            const changed = stockOpnameData.filter(x => x.diff !== 0).length;
            const rows = pagedData.map(item => `
                <tr class="border-b border-gray-100 hover:bg-gray-50/50">
                    <td class="py-3 px-4 text-sm font-mono text-gray-500">${item.id}</td>
                    <td class="py-3 px-4 text-sm font-medium text-gray-800">${item.name}</td>
                    <td class="py-3 px-4 text-sm text-center"><span class="px-2 py-1 bg-gray-100 rounded text-xs">${item.category}</span></td>
                    <td class="py-3 px-4 text-sm font-bold text-center text-gray-700">${item.systemStock}</td>
                    <td class="py-3 px-4 text-center">
                        <input type="number" min="0" value="${item.actualStock}"
                            onchange="handleOpnameInput('${item.id}', this.value)"
                            onkeyup="handleOpnameInput('${item.id}', this.value)"
                            class="w-20 px-2 py-1.5 border border-gray-300 rounded-md text-sm text-center focus:ring-1 focus:ring-green-500 focus:outline-none" />
                    </td>
                    <td id="diff-${item.id}" class="text-sm font-bold text-center ${item.diff < 0 ? 'text-red-500' : item.diff > 0 ? 'text-blue-500' : 'text-gray-400'}">
                        ${item.diff > 0 ? '+' + item.diff : item.diff}
                    </td>
                </tr>`).join('');

            const opnamePagination = opnameTotalPages > 1 ? `
                <div class="p-4 border-t border-gray-100 flex justify-between items-center">
                    <button onclick="state.opnamePage--; renderContent()" ${state.opnamePage===1?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>
                    <span class="text-sm text-gray-500">Hal ${state.opnamePage} dari ${opnameTotalPages} &bull; ${displayData.length} produk</span>
                    <button onclick="state.opnamePage++; renderContent()" ${state.opnamePage===opnameTotalPages?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>
                </div>` : `<div class="p-3 text-center text-xs text-gray-400">${displayData.length} produk</div>`;

            return `
                <div class="space-y-4">
                    <!-- Header bar -->
                    <div class="bg-green-600 rounded-xl p-4 text-white flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-white animate-pulse"></div>
                            <div>
                                <p class="font-bold">Stock Opname Sedang Berjalan</p>
                                <p class="text-green-200 text-xs">Mulai: ${soStartTime ? soStartTime.toLocaleString('id-ID') : '-'} &bull; ${changed} produk sudah berselisih</p>
                            </div>
                        </div>
                        <button onclick="akhiriSO()" class="px-5 py-2 bg-white text-green-700 font-bold rounded-xl hover:bg-green-50 flex items-center gap-2 shrink-0">
                            <i class="ph ph-stop-circle text-xl"></i> Akhiri SO & Lihat Laporan
                        </button>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                        <div class="p-4 border-b border-gray-100 flex flex-col sm:flex-row gap-3 justify-between bg-gray-50/50">
                            <div class="flex gap-2 flex-1">
                                <div class="relative flex-1 max-w-sm">
                                    <input type="text" id="opname-search-input" placeholder="Cari nama, ID, atau kategori..." value="${state.opnameSearch}"
                                        oninput="handleOpnameSearch(event)"
                                        class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-md focus:ring-1 focus:ring-green-500 focus:outline-none text-sm" />
                                    <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                                </div>
                                <button onclick="openOpnameScanner()" title="Scan Barcode" class="px-3 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors flex items-center gap-1 text-sm font-medium">
                                    <i class="ph ph-barcode text-lg"></i>
                                </button>
                            </div>
                            <select onchange="handleOpnameSortChange(event)" class="px-4 py-2 border border-gray-200 rounded-md text-sm bg-white min-w-[160px] focus:outline-none">
                                <option value="none" ${state.opnameSort==='none'?'selected':''}>Urutkan...</option>
                                <option value="cat"  ${state.opnameSort==='cat' ?'selected':''}>Kategori</option>
                                <option value="az"   ${state.opnameSort==='az'  ?'selected':''}>Nama A-Z</option>
                                <option value="za"   ${state.opnameSort==='za'  ?'selected':''}>Nama Z-A</option>
                                <option value="diff_minus" ${state.opnameSort==='diff_minus'?'selected':''}>Selisih Terkecil</option>
                                <option value="diff_plus"  ${state.opnameSort==='diff_plus' ?'selected':''}>Selisih Terbesar</option>
                            </select>
                        </div>
                        <div id="opname-table-container">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 text-gray-500 text-sm border-b border-gray-200">
                                        <th class="py-3 px-4 font-medium">ID Produk</th>
                                        <th class="py-3 px-4 font-medium">Nama Barang</th>
                                        <th class="py-3 px-4 font-medium text-center">Kategori</th>
                                        <th class="py-3 px-4 font-medium text-center">Stok Sistem</th>
                                        <th class="py-3 px-4 font-medium text-center">Stok Aktual</th>
                                        <th class="py-3 px-4 font-medium text-center">Selisih</th>
                                    </tr>
                                </thead>
                                <tbody id="opname-tbody">${rows || '<tr><td colspan="6" class="text-center py-6 text-gray-400 text-sm">Produk tidak ditemukan.</td></tr>'}</tbody>
                            </table>
                        </div>
                        <div class="opname-pagination">
                        ${opnamePagination}
                        </div>
                        </div>
                        <div class="px-4 pb-3 text-xs text-gray-400 text-center">
                            Isi "Stok Aktual" sesuai jumlah fisik. <span class="text-blue-500 font-bold">Biru = kelebihan</span>, <span class="text-red-500 font-bold">Merah = kekurangan</span>.
                        </div>
                    </div>
                </div>`;
        }

        // --- POIN & REWARD MODULE ---
        let rewardData = {
            pointsPerRupiah: 0,
            redeemRate: 100,
            // Sistem poin kelipatan: setiap kelipatan belanjaPoinMin dapat belanjaPoinDapat poin
            belanjaPoinMin   : 10000,  // default Rp 10.000
            belanjaPoinDapat : 100,    // default 100 poin, berlaku kelipatan
            tiers: [
                { name: 'Bronze', min: 0,    color: 'bg-orange-100 text-orange-700', icon: 'ph-medal' },
                { name: 'Silver', min: 500,  color: 'bg-gray-200 text-gray-700',     icon: 'ph-medal' },
                { name: 'Gold',   min: 2000, color: 'bg-yellow-100 text-yellow-700', icon: 'ph-crown' },
            ],
            belanjaPoinRules: [],
            produkPoinRules:  [],
            rewardList:       [],
            penukaranPoin:    [],
            customers: []
        };

        function getTierInfo(poin) {
            const tiers = [...rewardData.tiers].reverse();
            return tiers.find(t => poin >= t.min) || rewardData.tiers[0];
        }

        // Hitung poin yang didapat dari satu transaksi
        // ATURAN: Produk yang sudah punya Poin_Per_Unit → pakai poin produk saja,
        //         harganya TIDAK ikut dihitung kelipatan (cegah double point).
        function calculateEarnedPoin(grandTotal, cart) {
            let poin = 0;
            let totalProdukPoinPerUnit = 0;
            if (cart && cart.length > 0) {
                cart.forEach(item => {
                    const prod = state.products.find(p => p.id === item.id);
                    const ppu = (prod && prod.poinPerUnit) ? prod.poinPerUnit : 0;
                    if (ppu > 0) {
                        poin += ppu * item.qty;
                        totalProdukPoinPerUnit += (item.price || 0) * item.qty;
                    }
                });
            }
            const totalKelipatan = Math.max(0, grandTotal - totalProdukPoinPerUnit);
            if (rewardData.belanjaPoinMin > 0 && rewardData.belanjaPoinDapat > 0 && totalKelipatan > 0) {
                poin += Math.floor(totalKelipatan / rewardData.belanjaPoinMin) * rewardData.belanjaPoinDapat;
            }
            if (rewardData.pointsPerRupiah > 0 && totalKelipatan > 0) {
                poin += Math.floor(totalKelipatan / rewardData.pointsPerRupiah);
            }
            rewardData.belanjaPoinRules.forEach(rule => {
                if (grandTotal >= rule.minBelanja) poin += rule.poinBonus;
            });
            return poin;
        }

        // Redeem poin ke diskon harga (dari tabel pelanggan di menu Poin & Reward)
        // ── BOTTOM SHEET / MODAL TUKAR POIN ──────────────────────────
        function openTukarPoinDropdown(custId) {
            closeTukarPoinDropdown();
            var cust = rewardData.customers.find(function(c){ return c.id === custId; });
            if (!cust) return;
            var isMobile = window.innerWidth < 768;
            var canDiskon = (cust.poin||0) >= 100;
            var items = '<button type="button" onclick="closeTukarPoinDropdown(); redeemPoints(\'' + custId + '\')" '
                + (canDiskon ? '' : 'disabled ')
                + 'style="width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid '
                + (canDiskon ? '#bbf7d0' : '#f3f4f6') + ';margin-bottom:8px;'
                + 'background:' + (canDiskon ? '#f0fdf4' : '#f9fafb') + ';'
                + 'color:' + (canDiskon ? '#15803d' : '#9ca3af') + ';'
                + 'font-size:13px;font-weight:600;border-radius:10px;'
                + 'cursor:' + (canDiskon ? 'pointer' : 'not-allowed') + ';text-align:left;">'
                + '<span style="width:32px;height:32px;border-radius:50%;background:' + (canDiskon ? '#dcfce7' : '#f3f4f6') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
                + '<i class="ph ph-currency-circle-dollar" style="font-size:16px;color:' + (canDiskon ? '#16a34a' : '#d1d5db') + ';"></i></span>'
                + '<span style="flex:1;"><span style="display:block;">Tukar ke Diskon Tunai</span>'
                + '<span style="font-size:11px;font-weight:400;color:' + (canDiskon ? '#4ade80' : '#d1d5db') + ';">min. 100 poin</span></span>'
                + (canDiskon ? '<i class="ph ph-arrow-right" style="font-size:14px;opacity:0.5;"></i>' : '')
                + '</button>';
            if (rewardData.rewardList.length > 0) {
                items += '<div style="font-size:10px;color:#9ca3af;font-weight:700;padding:6px 2px 6px;letter-spacing:0.6px;text-transform:uppercase;border-top:1px solid #f3f4f6;margin-bottom:4px;">Tukar Reward</div>';
                rewardData.rewardList.forEach(function(r) {
                    var can = (cust.poin||0) >= r.poinDibutuhkan;
                    items += '<button type="button" onclick="closeTukarPoinDropdown(); redeemRewardItem(\'' + custId + '\',\'' + r.id + '\')" '
                        + (can ? '' : 'disabled ')
                        + 'style="width:100%;display:flex;align-items:center;gap:10px;padding:13px 14px;border:1.5px solid '
                        + (can ? '#e9d5ff' : '#f3f4f6') + ';margin-bottom:8px;'
                        + 'background:' + (can ? '#faf5ff' : '#f9fafb') + ';'
                        + 'color:' + (can ? '#7e22ce' : '#9ca3af') + ';'
                        + 'font-size:13px;font-weight:600;border-radius:10px;'
                        + 'cursor:' + (can ? 'pointer' : 'not-allowed') + ';text-align:left;">'
                        + '<span style="width:32px;height:32px;border-radius:50%;background:' + (can ? '#f3e8ff' : '#f3f4f6') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
                        + '<i class="ph ph-gift" style="font-size:16px;color:' + (can ? '#7c3aed' : '#d1d5db') + ';"></i></span>'
                        + '<span style="flex:1;"><span style="display:block;">' + r.name + '</span>'
                        + '<span style="font-size:11px;font-weight:400;color:' + (can ? '#a855f7' : '#d1d5db') + ';">' + r.poinDibutuhkan.toLocaleString('id-ID') + ' poin</span></span>'
                        + (can ? '<i class="ph ph-arrow-right" style="font-size:14px;opacity:0.5;"></i>' : '')
                        + '</button>';
                });
            } else {
                items += '<div style="text-align:center;padding:16px 0 8px;border-top:1px solid #f3f4f6;margin-top:4px;">'
                    + '<i class="ph ph-gift" style="font-size:28px;color:#e5e7eb;display:block;margin-bottom:6px;"></i>'
                    + '<p style="font-size:12px;color:#9ca3af;margin:0;">Belum ada reward tersedia.</p></div>';
            }
            var overlay = document.createElement('div');
            overlay.id = 'tukar-poin-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.45);transition:opacity 0.2s;opacity:0;';
            overlay.onclick = closeTukarPoinDropdown;
            document.body.appendChild(overlay);
            requestAnimationFrame(function(){ overlay.style.opacity = '1'; });
            var panel = document.createElement('div');
            panel.id = 'tukar-poin-dropdown';
            panel.dataset.custId = custId;
            if (isMobile) {
                panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:20px 20px 0 0;padding:0 16px 32px;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.28s cubic-bezier(.32,.72,0,1);';
            } else {
                panel.style.cssText = 'position:fixed;top:50%;left:50%;z-index:9999;transform:translate(-50%,-60%);opacity:0;background:#fff;border-radius:16px;padding:0 20px 20px;width:340px;max-width:calc(100vw - 32px);max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18);transition:transform 0.22s cubic-bezier(.32,.72,0,1), opacity 0.22s;';
            }
            panel.innerHTML =
                (isMobile ? '<div style="width:40px;height:4px;background:#e5e7eb;border-radius:4px;margin:12px auto 16px;"></div>' : '<div style="height:20px;"></div>')
                + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">'
                + '<div><p style="font-size:15px;font-weight:700;color:#111827;margin:0;">' + cust.name + '</p>'
                + '<p style="font-size:12px;color:#6b7280;margin:0;"><i class="ph ph-star" style="color:#f59e0b;"></i> '
                + '<span style="font-weight:600;color:#16a34a;">' + (cust.poin||0).toLocaleString('id-ID') + ' poin</span> aktif tersedia</p></div>'
                + '<button onclick="closeTukarPoinDropdown()" style="width:32px;height:32px;border-radius:50%;border:1px solid #e5e7eb;background:#f9fafb;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
                + '<i class="ph ph-x" style="font-size:14px;color:#6b7280;"></i></button></div>'
                + items;
            document.body.appendChild(panel);
            requestAnimationFrame(function(){
                requestAnimationFrame(function(){
                    if (isMobile) { panel.style.transform = 'translateY(0)'; }
                    else { panel.style.transform = 'translate(-50%,-50%)'; panel.style.opacity = '1'; }
                });
            });
        }
        function closeTukarPoinDropdown() {
            var panel   = document.getElementById('tukar-poin-dropdown');
            var overlay = document.getElementById('tukar-poin-overlay');

        function redeemPoints(custId) {
            const cust = rewardData.customers.find(c => c.id === custId);
            if (!cust || (cust.poin||0) < 100) {
                showAlert('Poin Tidak Cukup', `Poin minimal untuk ditukar adalah 100 poin.${cust ? ' ' + cust.name + ' hanya punya ' + (cust.poin||0) + ' poin.' : ''}`, 'warning');
                return;
            }
            showPromptModal(
                'Tukar Poin ke Diskon',
                cust.name + ' memiliki ' + (cust.poin||0).toLocaleString('id-ID') + ' poin aktif.\n100 poin = Rp 100\nMasukkan jumlah poin yang ingin ditukar:',
                100,
                (val) => {
                    const amt = Number(val);
                    if (isNaN(amt) || amt < 100 || amt > cust.poin) {
                        showAlert('Jumlah Tidak Valid', 'Masukkan antara 100 dan ' + cust.poin + ' poin.', 'error');
                        return;
                    }
                    const rupiah = amt;
                    // ── Konfirmasi sebelum proses ──
                    showConfirm(
                        'Konfirmasi Penukaran Poin',
                        '⚠️ Tindakan ini tidak dapat dibatalkan.\n\nMember: ' + cust.name +
                        '\nPoin ditukar: ' + amt.toLocaleString('id-ID') + ' poin' +
                        '\nNilai diskon: ' + formatRp(rupiah) +
                        '\nSisa poin: ' + (cust.poin - amt).toLocaleString('id-ID') + ' poin' +
                        '\n\nLanjutkan penukaran?',
                        'warning',
                        () => {
                            cust.poin -= amt;
                            cust.tier = getTierInfo(cust.poin).name;
                            const sc = state.customers.find(c => c.id === custId);
                            if (sc) { sc.poin = cust.poin; }
                            if (GAS_URL) {
                                gasPost({
                                    action: 'savePenukaranMember',
                                    customerId:  custId,
                                    namaMember:  cust.name,
                                    jenis:       'diskon',
                                    rewardNama:  'Diskon Tunai ' + formatRp(rupiah),
                                    poinDipakai: amt,
                                    sumber:      'kasir'
                                }).catch(()=>{});
                            }
                            renderContent();
                            showAlert('Penukaran Berhasil!', amt.toLocaleString('id-ID') + ' poin ditukar = ' + formatRp(rupiah) + ' diskon untuk ' + cust.name + '.\n\nPoin akumulasi tidak berkurang.', 'success');
                        }
                    );
                }
            );
        }

        // Redeem reward item — hanya poin aktif berkurang, poin akumulasi TIDAK berubah
        function redeemRewardItem(custId, rewardId) {
            const cust   = rewardData.customers.find(c => c.id === custId);
            const reward = rewardData.rewardList.find(r => r.id === rewardId);
            if (!cust || !reward) return;
            if ((cust.poin||0) < reward.poinDibutuhkan) {
                showAlert('Poin Tidak Cukup', 'Butuh ' + reward.poinDibutuhkan + ' poin. ' + cust.name + ' hanya punya ' + (cust.poin||0) + ' poin aktif.', 'warning');
                return;
            }
            showConfirm(
                'Konfirmasi Tukar Reward',
                '⚠️ Tindakan ini tidak dapat dibatalkan.\n\nMember: ' + cust.name +
                '\nReward: ' + reward.name + (reward.deskripsi ? '\n(' + reward.deskripsi + ')' : '') +
                '\nPoin dipakai: ' + reward.poinDibutuhkan.toLocaleString('id-ID') + ' poin' +
                '\nSisa poin: ' + (cust.poin - reward.poinDibutuhkan).toLocaleString('id-ID') + ' poin' +
                '\n\nPoin akumulasi tidak berkurang. Lanjutkan?',
                'info',
                () => {
                    cust.poin -= reward.poinDibutuhkan;
                    cust.tier  = getTierInfo(cust.poin).name;
                    const sc = state.customers.find(c => c.id === custId);
                    if (sc) sc.poin = cust.poin;
                    if (GAS_URL) {
                        gasPost({
                            action: 'savePenukaranMember',
                            customerId:  custId,
                            namaMember:  cust.name,
                            jenis:       'reward',
                            rewardNama:  reward.name,
                            poinDipakai: reward.poinDibutuhkan,
                            sumber:      'kasir'
                        }).catch(()=>{});
                    }
                    renderContent();
                    showAlert('Reward Berhasil Ditukar!', '"' + reward.name + '" berhasil didapatkan oleh ' + cust.name + '.\nSisa poin aktif: ' + cust.poin.toLocaleString('id-ID') + ' poin.', 'success');
                }
            );
