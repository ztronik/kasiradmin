                        +'<td class="py-3 px-4 text-sm font-mono text-gray-600">'+k.username+'</td>'
                        +'<td class="py-3 px-4 text-sm text-gray-500">'+(k.nohp||'-')+'</td>'
                        +'<td class="py-3 px-4 text-sm text-gray-500">'+(k.email||'-')+'</td>'
                        +'<td class="py-3 px-4"><div class="flex justify-end gap-1.5">'
                        +'<button onclick="openKaryawanModal('+i+')" title="Edit" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded"><i class="ph ph-pencil-simple text-lg"></i></button>'
                        +'<button onclick="hapusKaryawan('+i+')" title="Hapus" class="p-1.5 text-red-500 hover:bg-red-50 rounded"><i class="ph ph-trash text-lg"></i></button>'
                        +'</div></td></tr>';
                  }).join('');
            return '<div class="space-y-4">'
                +'<div class="bg-white rounded-xl shadow-sm border border-gray-100">'
                +'<div class="p-5 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">'
                +'<div><h2 class="font-semibold text-lg text-gray-800">Manajemen Karyawan</h2>'
                +'<p class="text-sm text-gray-500">'+list.length+' karyawan terdaftar.</p></div>'
                +'<button onclick="openKaryawanModal(-1)" class="px-4 py-2 bg-green-600 text-white font-medium text-sm rounded-lg hover:bg-green-700 flex items-center gap-2 shadow-sm">'
                +'<i class="ph ph-plus"></i> Tambah Karyawan</button></div>'
                +'<div class="overflow-x-auto"><table class="w-full text-left border-collapse">'
                +'<thead><tr class="bg-gray-50 text-gray-500 text-xs border-b border-gray-200">'
                +'<th class="py-3 px-4 font-medium w-10">No</th><th class="py-3 px-4 font-medium">Nama</th>'
                +'<th class="py-3 px-4 font-medium">Username</th><th class="py-3 px-4 font-medium">No. HP</th>'
                +'<th class="py-3 px-4 font-medium">Email</th><th class="py-3 px-4 font-medium text-right">Aksi</th>'
                +'</tr></thead><tbody>'+rows+'</tbody></table></div></div></div>';
        }

        function openKaryawanModal(idx) {
            var isEdit = idx >= 0;
            var k = isEdit ? authKaryawan[idx] : {nama:'',username:'',password:'',nohp:'',email:'',alamat:''};
            var modal = document.getElementById('product-modal');
            modal.innerHTML = '<div class="bg-white rounded-xl shadow-lg w-full max-w-md p-6 relative">'
                +'<div class="flex justify-between items-center mb-5"><h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">'
                +'<i class="ph ph-user-circle-gear text-green-600 text-xl"></i> '+(isEdit?'Edit Karyawan':'Tambah Karyawan')+'</h3>'
                +'<button onclick="document.getElementById(\'product-modal\').classList.add(\'hidden\')" class="text-gray-400 hover:bg-gray-100 p-1 rounded-md"><i class="ph ph-x text-lg"></i></button></div>'
                +'<div class="space-y-4">'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>'
                +'<div class="relative"><i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-green-600 text-base pointer-events-none"></i>'
                +'<input type="text" id="kar-nama" value="'+(k.nama||'')+'" placeholder="Nama lengkap..." class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" /></div></div>'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">Username <span class="text-red-500">*</span></label>'
                +'<div class="relative"><i class="ph ph-user-circle absolute left-3 top-1/2 -translate-y-1/2 text-green-600 text-base pointer-events-none"></i>'
                +'<input type="text" id="kar-username" value="'+(k.username||'')+'" placeholder="Username login..." class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" /></div></div>'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span>'+(isEdit?' <span class="text-gray-400 text-xs">(kosongkan jika tidak diubah)</span>':'')+'</label>'
                +'<div class="relative"><i class="ph ph-key absolute left-3 top-1/2 -translate-y-1/2 text-green-600 text-base pointer-events-none"></i>'
                +'<input type="password" id="kar-password" placeholder="'+(isEdit?'Kosongkan jika tidak diubah...':'Password login...')+'" class="w-full pl-9 pr-9 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" />'
                +'<button type="button" onclick="togglePwdField(\'kar-password\',\'kar-eye\')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><i id="kar-eye" class="ph ph-eye text-base"></i></button></div></div>'
                +'<div class="border-t border-gray-100 pt-3"><p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Informasi Tambahan (Opsional)</p>'
                +'<div class="space-y-3">'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">No. HP</label>'
                +'<input type="text" id="kar-nohp" value="'+(k.nohp||'')+'" placeholder="0812-xxxx-xxxx" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" /></div>'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label>'
                +'<input type="text" id="kar-email" value="'+(k.email||'')+'" placeholder="email@contoh.com" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" /></div>'
                +'<div><label class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>'
                +'<input type="text" id="kar-alamat" value="'+(k.alamat||'')+'" placeholder="Alamat tinggal..." class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 text-sm" /></div>'
                +'</div></div></div>'
                +'<div class="mt-6 flex justify-end gap-3 pt-4 border-t border-gray-100">'
                +'<button type="button" onclick="document.getElementById(\'product-modal\').classList.add(\'hidden\')" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg text-sm">Batal</button>'
                +'<button onclick="saveKaryawan('+idx+')" class="px-4 py-2 bg-green-600 text-white font-medium rounded-lg hover:bg-green-700 flex items-center gap-2 text-sm"><i class="ph ph-floppy-disk"></i> Simpan</button>'
                +'</div></div>';
            modal.classList.remove('hidden');
        }

        function saveKaryawan(idx) {
            var isEdit   = idx >= 0;
            var nama     = (document.getElementById('kar-nama').value     ||'').trim();
            var username = (document.getElementById('kar-username').value ||'').trim();
            var password = (document.getElementById('kar-password').value ||'').trim();
            var nohp     = normalizePhoneNumber((document.getElementById('kar-nohp').value ||'').trim());
            var email    = (document.getElementById('kar-email').value    ||'').trim();
            var alamat   = (document.getElementById('kar-alamat').value   ||'').trim();
            if (!nama)     { showAlert('Wajib','Nama lengkap karyawan wajib diisi.','warning'); return; }
            if (!username) { showAlert('Wajib','Username wajib diisi.','warning'); return; }
            if (!isEdit && !password) { showAlert('Wajib','Password wajib diisi untuk karyawan baru.','warning'); return; }
            var conflict = authKaryawan.findIndex(function(k){ return k.username===username; });
            if (conflict >= 0 && conflict !== idx) { showAlert('Duplikat','Username "'+username+'" sudah digunakan.','error'); return; }
            if (username === authAdmin.username)    { showAlert('Duplikat','Username tersebut sudah dipakai admin.','error'); return; }
            var oldUname = isEdit ? authKaryawan[idx].username : null;
            if (isEdit) {
                authKaryawan[idx].nama=nama; authKaryawan[idx].username=username;
                if (password) authKaryawan[idx].password=password;
                authKaryawan[idx].nohp=nohp; authKaryawan[idx].email=email; authKaryawan[idx].alamat=alamat;
                saveKaryawanAuth(authKaryawan[idx], oldUname, false);
            } else {
                var nk={nama:nama,username:username,password:password,nohp:nohp,email:email,alamat:alamat};
                authKaryawan.push(nk);
                saveKaryawanAuth(nk, null, false);
            }
            document.getElementById('product-modal').classList.add('hidden');
            renderContent();
            showToast(isEdit?'Data karyawan diperbarui!':'Karyawan berhasil ditambahkan!','success');
        }

        function hapusKaryawan(idx) {
            var k = authKaryawan[idx];
            if (!k) return;
            showConfirm('Hapus Karyawan','Hapus karyawan "'+k.nama+'"? Login mereka akan dinonaktifkan.','error',function(){
                var del = authKaryawan.splice(idx,1)[0];
                saveKaryawanAuth(del, null, true);
                renderContent();
                showToast('Karyawan berhasil dihapus.','success');
            });
        }

        // =====================================================
        // MODUL CLEREK KASIR
        // =====================================================
        var clerekState = {
            tab: 'shift',
            shiftId: null,
            shiftMulai: null,
            shiftSelesai: null,
            kasirShift: null,
            kasAwal: 0,
            kasAkhir: 0,
            kasAwalInput: 0,
            kasAkhirInput: 0,
            kasAwalKonfirmasi: false,
            kasAkhirKonfirmasi: false,
            riwayatShift: [],
        };

        function getClerekHTML() {
            var tabs = [
                { id: 'shift',   label: 'Shift & Kas',      icon: 'ph-clock-clockwise' },
                { id: 'kas',     label: 'Mutasi Kas',        icon: 'ph-money' },
                { id: 'riwayat', label: 'Riwayat Clerek',    icon: 'ph-list-bullets' },
            ];
            var tabHTML = tabs.map(function(t) {
                var active = clerekState.tab === t.id;
                return `<button onclick="clerekSetTab('${t.id}')"
                    class="flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors"
                    style="background:${active ? '#16a34a' : 'transparent'};color:${active ? '#fff' : '#374151'};">
                    <i class="ph ${t.icon} text-base"></i>${t.label}
                </button>`;
            }).join('');

            var bodyHTML = '';
            if (clerekState.tab === 'shift') {
                bodyHTML = getClerekShiftHTML();
            } else if (clerekState.tab === 'kas') {
                bodyHTML = getClerekKasHTML();
            } else if (clerekState.tab === 'riwayat') {
                bodyHTML = getClerekRiwayatHTML();
            }

            return `<div class="space-y-4">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                    <div class="flex items-center gap-2 mb-1">
                        <i class="ph ph-clipboard-text text-green-600 text-xl"></i>
                        <h2 class="text-lg font-bold text-gray-800">Kas Awal & Clerek</h2>
                        <span class="ml-auto text-xs text-gray-400">
                            ${(clerekState.kasirShift && clerekState.shiftMulai && !clerekState.shiftSelesai)
                                ? 'Shift: <strong class=\"text-green-600\">' + clerekState.kasirShift + '</strong>'
                                  + (adminAmbilAlih ? ' <span class=\"text-purple-600 font-bold\">(Admin mengambil alih)</span>' : '')
                                : 'Login: <strong>' + (currentUser ? currentUser.nama : '-') + '</strong>'}
                        </span>
                    </div>
                    <p class="text-xs text-gray-400 ml-7">Manajemen shift, kas awal, dan riwayat kasir harian.</p>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                    <div class="clerek-tabs flex flex-wrap gap-2">${tabHTML}</div>
                </div>
                <div id="clerek-body">${bodyHTML}</div>
            </div>`;
        }

        function clerekSetTab(tab) {
            clerekState.tab = tab;
            var bod = document.getElementById('clerek-body');
            if (!bod) { renderContent(); return; }
            if (tab === 'shift')        bod.innerHTML = getClerekShiftHTML();
            else if (tab === 'kas')     bod.innerHTML = getClerekKasHTML();
            else if (tab === 'riwayat') bod.innerHTML = getClerekRiwayatHTML();
            renderClerekTabs();
        }

        function renderClerekTabs() {
            var tabs = [
                { id: 'shift',   label: 'Shift & Kas',    icon: 'ph-clock-clockwise' },
                { id: 'kas',     label: 'Mutasi Kas',      icon: 'ph-money' },
                { id: 'riwayat', label: 'Riwayat Clerek',  icon: 'ph-list-bullets' },
            ];
            var wrap = document.querySelector('.clerek-tabs');
            if (!wrap) return;
            wrap.innerHTML = tabs.map(function(t) {
                var active = clerekState.tab === t.id;
                return `<button onclick="clerekSetTab('${t.id}')"
                    class="flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors"
                    style="background:${active ? '#16a34a' : 'transparent'};color:${active ? '#fff' : '#374151'};">
                    <i class="ph ${t.icon} text-base"></i>${t.label}
                </button>`;
            }).join('');
        }

        // ── TAB SHIFT & KAS ───────────────────────────────
        function getClerekShiftHTML() {
            var aktif   = clerekState.shiftMulai && !clerekState.shiftSelesai;
            var selesai = clerekState.shiftMulai && clerekState.shiftSelesai;
            var durasi  = '';
            if (aktif) {
                var mnt = Math.floor((Date.now() - clerekState.shiftMulai) / 60000);
                durasi = formatDurasi(mnt) + ' berjalan';
            } else if (selesai) {
                var mnt2 = Math.floor((clerekState.shiftSelesai - clerekState.shiftMulai) / 60000);
                durasi = formatDurasi(mnt2) + ' total';
            }
            var omzetShift = 0;
            if (clerekState.shiftMulai) {
                omzetShift = state.salesHistory.filter(function(s) {
                    var t = new Date(s.date).getTime();
                    var end = clerekState.shiftSelesai || Date.now();
                    return t >= clerekState.shiftMulai && t <= end;
                }).reduce(function(sum, s) { return sum + s.total; }, 0);
            }
            var kasAkhirEstimasi = clerekState.kasAwal + omzetShift;
            var kasAwalKonfirm   = clerekState.kasAwalKonfirmasi;
            var kasAkhirKonfirm  = clerekState.kasAkhirKonfirmasi;

            // Tombol buka shift — hanya karyawan yang bisa buka shift
            var isAdminRole = currentUser && currentUser.role === 'admin';
            var btnBukaShift = '';
            if (!clerekState.shiftMulai) {
                if (isAdminRole) {
                    // Admin tidak bisa membuka shift
                    btnBukaShift = '<div class="w-full py-2.5 rounded-xl text-center text-xs font-semibold" style="background:#f3f4f6;color:#9ca3af;"><i class="ph ph-info"></i> Hanya karyawan yang bisa membuka shift</div>';
                } else if (kasAwalKonfirm) {
                    btnBukaShift = '<button onclick="clerekMulaiShift()" class="w-full py-2.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 flex items-center justify-center gap-2 text-sm"><i class="ph ph-play text-base"></i> Mulai Shift</button>';
                } else {
                    btnBukaShift = '<button disabled class="w-full py-2.5 font-bold rounded-xl flex items-center justify-center gap-2 text-sm cursor-not-allowed" style="background:#d1fae5;color:#6ee7b7;"><i class="ph ph-lock text-base"></i> Konfirmasi kas awal dulu</button>';
                }
            }

            // Tombol akhiri shift
            var btnAkhiriShift = '';
            if (aktif) {
                if (isAdminRole && !adminAmbilAlih) {
                    // Admin belum ambil alih — tidak tampilkan tombol akhiri
                    btnAkhiriShift = '';
                } else if (kasAkhirKonfirm) {
                    btnAkhiriShift = '<button onclick="clerekSelesaiShift()" class="w-full py-2.5 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 flex items-center justify-center gap-2 text-sm"><i class="ph ph-stop text-base"></i> Akhiri Shift</button>';
                } else {
                    btnAkhiriShift = '<button disabled class="w-full py-2.5 font-bold rounded-xl flex items-center justify-center gap-2 text-sm cursor-not-allowed" style="background:#fee2e2;color:#fca5a5;"><i class="ph ph-lock text-base"></i> Konfirmasi kas akhir dulu</button>';
                }
            }

            // Tombol shift baru
            var btnShiftBaru = selesai
                ? '<button onclick="clerekResetShift()" class="w-full py-2.5 bg-gray-500 text-white font-bold rounded-xl hover:bg-gray-600 flex items-center justify-center gap-2 text-sm"><i class="ph ph-arrow-counter-clockwise text-base"></i> Shift Baru</button>'
                : '';

            // Tombol Ambil Alih / Lepas Alih (hanya untuk admin, saat shift aktif)
            var isAdminUser = currentUser && currentUser.role === 'admin';
            var btnAmbilAlih = '';
            if (isAdminUser && aktif) {
                if (adminAmbilAlih) {
                    btnAmbilAlih = '<button onclick="clerekLepasAlih()" class="mt-2 w-full py-2.5 bg-gray-600 text-white font-bold rounded-xl hover:bg-gray-700 flex items-center justify-center gap-2 text-sm"><i class="ph ph-arrow-u-up-left text-base"></i> Lepas Ambil Alih</button>';
                } else {
                    btnAmbilAlih = '<button onclick="clerekAmbilAlihShift()" class="mt-2 w-full py-2.5 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 flex items-center justify-center gap-2 text-sm"><i class="ph ph-crown text-base"></i> Ambil Alih Shift</button>';
                }
            }

            // Info waktu shift
            var infoWaktu = '';
            if (clerekState.shiftMulai) {
                // Nama kasir pembuka shift
                if (clerekState.kasirShift) {
                    infoWaktu += '<div class="flex justify-between items-center p-3 rounded-lg bg-blue-50 border border-blue-100"><span class="text-sm font-medium text-gray-700"><i class="ph ph-user-circle mr-1"></i>Kasir</span><span class="text-sm font-bold text-blue-700">' + clerekState.kasirShift + '</span></div>';
                }
                if (adminAmbilAlih) {
                    infoWaktu += '<div class="flex justify-between items-center p-3 rounded-lg bg-purple-50 border border-purple-200"><span class="text-sm font-medium text-gray-700"><i class="ph ph-crown mr-1"></i>Diambil Alih</span><span class="text-sm font-bold text-purple-700">' + (currentUser ? currentUser.nama : 'Admin') + '</span></div>';
                }
                infoWaktu += '<div class="flex justify-between items-center p-3 rounded-lg bg-gray-50"><span class="text-sm font-medium text-gray-700">Mulai Shift</span><span class="text-sm font-semibold text-gray-800">' + new Date(clerekState.shiftMulai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) + '</span></div>';
            }
            if (clerekState.shiftSelesai) {
                infoWaktu += '<div class="flex justify-between items-center p-3 rounded-lg bg-gray-50"><span class="text-sm font-medium text-gray-700">Selesai Shift</span><span class="text-sm font-semibold text-gray-800">' + new Date(clerekState.shiftSelesai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) + '</span></div>';
            }
            if (durasi) {
                infoWaktu += '<div class="flex justify-between items-center p-3 rounded-lg bg-gray-50"><span class="text-sm font-medium text-gray-700">Durasi</span><span class="text-sm font-semibold text-gray-800">' + durasi + '</span></div>';
            }

            // Panel kas awal — hanya untuk karyawan, admin cukup lihat nilai
            var panelKasAwal = '';
            if (isAdminRole) {
                // Admin hanya lihat nilai kas awal (jika sudah ada shift)
                if (clerekState.shiftMulai) {
                    panelKasAwal = '<div class="rounded-xl border border-gray-200 bg-gray-50 p-4"><div class="flex items-center justify-between mb-1"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Awal (Modal)</label><span class="text-xs text-gray-400">Dibuka oleh karyawan</span></div><div class="text-2xl font-black text-gray-700">' + formatRp(clerekState.kasAwal) + '</div></div>';
                }
            } else if (kasAwalKonfirm) {
                panelKasAwal = '<div class="rounded-xl border border-green-200 bg-green-50 p-4"><div class="flex items-center justify-between mb-1"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Awal (Modal)</label><span class="text-xs font-bold text-green-600 flex items-center gap-1"><i class="ph ph-check-circle"></i> Terkonfirmasi</span></div><div class="text-2xl font-black text-green-700">' + formatRp(clerekState.kasAwal) + '</div></div>';
            } else {
                panelKasAwal = '<div class="rounded-xl border border-gray-200 bg-gray-50 p-4">'
                    + '<div class="flex items-center justify-between mb-2"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Awal (Modal)</label><span class="text-xs text-gray-400">Belum dikonfirmasi</span></div>'
                    + '<div class="relative mb-3"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">Rp</span>'
                    + '<input type="number" id="clerek-kas-awal" value="' + (clerekState.kasAwalInput !== undefined ? clerekState.kasAwalInput : 0) + '" placeholder="0" min="0" oninput="clerekState.kasAwalInput=Number(this.value)" class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none bg-white" /></div>'
                    + '<div class="flex gap-2">'
                    + '<button onclick="clerekKonfirmasiKasAwal(true)" class="flex-1 py-2 bg-green-600 text-white font-bold rounded-lg text-sm hover:bg-green-700 flex items-center justify-center gap-1"><i class="ph ph-check text-base"></i> Ya, Konfirmasi</button>'
                    + '<button onclick="clerekKonfirmasiKasAwal(false)" class="flex-1 py-2 bg-gray-200 text-gray-600 font-semibold rounded-lg text-sm hover:bg-gray-300 flex items-center justify-center gap-1"><i class="ph ph-x text-base"></i> Reset</button>'
                    + '</div></div>';
            }

            // Info omzet & estimasi
            var infoOmzet = '';
            if (clerekState.shiftMulai) {
                infoOmzet = '<div class="flex justify-between items-center p-3 rounded-lg bg-green-50 border border-green-100"><span class="text-sm font-medium text-gray-700">Omzet Shift Ini</span><span class="text-sm font-bold text-green-700">' + formatRp(omzetShift) + '</span></div>'
                          + '<div class="flex justify-between items-center p-3 rounded-lg bg-blue-50 border border-blue-100"><span class="text-sm font-medium text-gray-700">Estimasi Kas Akhir</span><span class="text-sm font-bold text-blue-700">' + formatRp(kasAkhirEstimasi) + '</span></div>';
            }

            // Panel kas akhir (hanya saat shift aktif)
            // Admin non-ambil-alih: hanya lihat info, tidak bisa isi
            var panelKasAkhir = '';
            if (aktif) {
                if (isAdminRole && !adminAmbilAlih) {
                    // Admin yang belum/tidak ambil alih: tampilkan info saja
                    panelKasAkhir = '<div class="rounded-xl border border-gray-200 bg-gray-50 p-4 text-center text-xs text-gray-400"><i class="ph ph-info mr-1"></i>Kas akhir diisi oleh karyawan atau admin yang mengambil alih shift.</div>';
                } else if (kasAkhirKonfirm) {
                    var selisihTxt = clerekState.kasAkhir >= kasAkhirEstimasi
                        ? '<div class="mt-2 text-xs font-semibold text-green-600">✅ Kas sesuai atau lebih</div>'
                        : '<div class="mt-2 text-xs font-semibold text-red-500">⚠️ Selisih kurang: ' + formatRp(kasAkhirEstimasi - clerekState.kasAkhir) + '</div>';
                    panelKasAkhir = '<div class="rounded-xl border border-red-200 bg-red-50 p-4"><div class="flex items-center justify-between mb-1"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Akhir (Aktual)</label><span class="text-xs font-bold text-red-600 flex items-center gap-1"><i class="ph ph-check-circle"></i> Terkonfirmasi</span></div><div class="text-2xl font-black text-red-700">' + formatRp(clerekState.kasAkhir) + '</div>' + selisihTxt + '</div>';
                } else {
                    panelKasAkhir = '<div class="rounded-xl border border-gray-200 bg-gray-50 p-4">'
                        + '<div class="flex items-center justify-between mb-2"><label class="text-xs font-bold text-gray-600 uppercase tracking-wide">Kas Akhir (Aktual)</label><span class="text-xs text-gray-400">Hitung uang di laci</span></div>'
                        + '<div class="relative mb-3"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">Rp</span>'
                        + '<input type="number" id="clerek-kas-akhir" value="' + (clerekState.kasAkhirInput !== undefined ? clerekState.kasAkhirInput : 0) + '" placeholder="0" min="0" oninput="clerekState.kasAkhirInput=Number(this.value)" class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none bg-white" /></div>'
                        + '<div class="flex gap-2">'
                        + '<button onclick="clerekKonfirmasiKasAkhir(true)" class="flex-1 py-2 bg-red-500 text-white font-bold rounded-lg text-sm hover:bg-red-600 flex items-center justify-center gap-1"><i class="ph ph-check text-base"></i> Ya, Konfirmasi</button>'
                        + '<button onclick="clerekKonfirmasiKasAkhir(false)" class="flex-1 py-2 bg-gray-200 text-gray-600 font-semibold rounded-lg text-sm hover:bg-gray-300 flex items-center justify-center gap-1"><i class="ph ph-x text-base"></i> Reset</button>'
                        + '</div></div>';
                }
            }

            var statusPanel = '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">'
                + '<h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ph ph-clock-clockwise text-green-600 text-lg"></i> Status Shift</h3>'
                + '<div class="space-y-3">'
                + '<div class="flex justify-between items-center p-3 rounded-lg ' + (aktif ? 'bg-green-50 border border-green-200' : 'bg-gray-50') + '">'
                + '<span class="text-sm font-medium text-gray-700">Status</span>'
                + '<span class="text-sm font-bold ' + (aktif ? 'text-green-600' : selesai ? 'text-blue-600' : 'text-gray-400') + '">' + (aktif ? '🟢 Shift Aktif' : selesai ? '🔵 Shift Selesai' : '⭕ Belum Mulai') + '</span>'
                + '</div>' + infoWaktu + '</div>'
                + (btnBukaShift  ? '<div class="mt-4">' + btnBukaShift  + '</div>' : '')
                + (btnAkhiriShift? '<div class="mt-4">' + btnAkhiriShift + '</div>' : '')
                + (btnShiftBaru  ? '<div class="mt-4">' + btnShiftBaru  + '</div>' : '')
                + (btnAmbilAlih  ? btnAmbilAlih : '')
                + '</div>';

            var kasPanel = '<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">'
                + '<h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="ph ph-money text-green-600 text-lg"></i> Kas Shift</h3>'
                + '<div class="space-y-4">'
                + panelKasAwal
                + infoOmzet
                + panelKasAkhir
                + '</div></div>';

            return '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">' + statusPanel + kasPanel + '</div>';
        }

                function clerekRefreshKas() {
            var bod = document.getElementById('clerek-body');
            if (bod && clerekState.tab === 'shift') bod.innerHTML = getClerekShiftHTML();
        }

        function clerekKonfirmasiKasAwal(konfirm) {
            if (konfirm) {
                var inp = document.getElementById('clerek-kas-awal');
                var val = inp ? Number(inp.value) : (clerekState.kasAwalInput || 0);
                // Simpan sementara lalu minta konfirmasi popup
                clerekState.kasAwalInput = val;
                showConfirm(
                    'Konfirmasi Kas Awal',
                    'Kas awal shift sebesar ' + formatRp(val) + '\n\nYakin jumlah ini sudah benar?',
                    'info',
                    function() {
                        clerekState.kasAwal           = val;
                        clerekState.kasAwalInput      = val;
                        clerekState.kasAwalKonfirmasi = true;
                        var bod = document.getElementById('clerek-body');
                        if (bod) bod.innerHTML = getClerekShiftHTML();
                    }
                );
            } else {
                // Tombol Reset — batal konfirmasi
                clerekState.kasAwalKonfirmasi   = false;
                clerekState.kasAwalInput        = 0;
                clerekState.kasAwal             = 0;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
            }
        }

        function clerekKonfirmasiKasAkhir(konfirm) {
            if (konfirm) {
                var inp = document.getElementById('clerek-kas-akhir');
                var val = inp ? Number(inp.value) : (clerekState.kasAkhirInput || 0);
                // Simpan sementara lalu minta konfirmasi popup
                clerekState.kasAkhirInput = val;
                var kasAkhirEstimasi = clerekState.kasAwal + (function(){
                    var shiftId = clerekState.shiftId;
                    return clerekMutasiKas.filter(function(m){ return m.idShift === shiftId; })
                        .reduce(function(s,m){ return m.tipe==='masuk'? s+m.jumlah : s-m.jumlah; }, 0);
                })();
                var selisih = val - kasAkhirEstimasi;
                var selisihTxt = selisih === 0
                    ? ''
                    : (selisih > 0
                        ? '\nLebih: +' + formatRp(selisih)
                        : '\nKurang: ' + formatRp(Math.abs(selisih)));
                showConfirm(
                    'Konfirmasi Kas Akhir',
                    'Kas akhir aktual: ' + formatRp(val) +
                    '\nEstimasi kas akhir: ' + formatRp(kasAkhirEstimasi) +
                    selisihTxt +
                    '\n\nYakin jumlah ini sudah benar?',
                    selisih < 0 ? 'error' : 'info',
                    function() {
                        clerekState.kasAkhir           = val;
                        clerekState.kasAkhirInput      = val;
                        clerekState.kasAkhirKonfirmasi = true;
                        var bod = document.getElementById('clerek-body');
                        if (bod) bod.innerHTML = getClerekShiftHTML();
                    }
                );
            } else {
                clerekState.kasAkhirKonfirmasi  = false;
                clerekState.kasAkhirInput       = 0;
                clerekState.kasAkhir            = 0;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
            }
        }

        function clerekMulaiShift() {
            showConfirm('Mulai Shift','Konfirmasi mulai shift sekarang?','info', function(){
                var overlay = document.getElementById('login-loading-overlay');
                var namaEl  = document.getElementById('login-loading-nama');
                if (namaEl) namaEl.textContent = 'Membuka Shift...';
                if (overlay) overlay.style.display = 'flex';
                setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
                var idShift = 'SHF' + Date.now();
                var mulai   = Date.now();
                var kasAwal = clerekState.kasAwal || 0;
                if (GAS_URL) {
                    gasPost({ action: 'mulaiShift', shift: {
                        id: idShift, kasir: currentUser ? currentUser.nama : '-',
                        mulai: mulai, kasAwal: kasAwal
                    }}).then(function(res){
                        if (res && res.status === 'success') {
                            clerekState.shiftId      = idShift;
                            clerekState.shiftMulai   = mulai;
                            clerekState.shiftSelesai = null;
                            clerekState.kasirShift   = currentUser ? currentUser.nama : '-';
                            var bod = document.getElementById('clerek-body');
                            if (bod) bod.innerHTML = getClerekShiftHTML();
                            renderSidebarMenu();
                            showToast('Shift dimulai! Selamat bekerja.','success');
                        } else {
                            showAlert('Gagal','Gagal menyimpan shift: ' + (res&&res.message||'error'),'error');
                        }
                    }).catch(function(){ showAlert('Gagal','Tidak dapat terhubung ke server.','error'); });
                } else {
                    clerekState.shiftId      = idShift;
                    clerekState.shiftMulai   = mulai;
                    clerekState.shiftSelesai = null;
                    var bod = document.getElementById('clerek-body');
                    if (bod) bod.innerHTML = getClerekShiftHTML();
                    renderSidebarMenu();
                    showToast('Shift dimulai! Selamat bekerja.','success');
                }
                }, 2000); // end setTimeout loading
            });
        }

        function clerekSelesaiShift() {
            showConfirm('Akhiri Shift','Yakin ingin mengakhiri shift sekarang?','warning', function(){
                var overlay = document.getElementById('login-loading-overlay');
                var namaEl  = document.getElementById('login-loading-nama');
                if (namaEl) namaEl.textContent = 'Menutup Shift...';
                if (overlay) overlay.style.display = 'flex';
                setTimeout(function() {
                if (overlay) overlay.style.display = 'none';
                var selesai = Date.now();
                var omzetShift = state.salesHistory.filter(function(s) {
                    var t = new Date(s.date).getTime();
                    return t >= clerekState.shiftMulai && t <= selesai;
                }).reduce(function(sum, s) { return sum + s.total; }, 0);
                var kasAkhir = clerekState.kasAkhir || 0;
                if (GAS_URL && clerekState.shiftId) {
                    gasPost({ action: 'akhiriShift',
                        idShift: clerekState.shiftId,
                        kasAkhir: kasAkhir, omzet: omzetShift
                    }).then(function(res){
                        var rec = {
                            id: clerekState.shiftId,
                            kasir: currentUser ? currentUser.nama : '-',
                            mulai: clerekState.shiftMulai, selesai: selesai,
                            kasAwal: clerekState.kasAwal, kasAkhir: kasAkhir,
                            omzet: omzetShift, status: 'selesai'
                        };
                        clerekState.riwayatShift.unshift(rec);
                        clerekState.shiftSelesai = selesai;
                        // Jika admin yang menutup shift, otomatis lepas ambil alih
                        if (adminAmbilAlih) {
                            setAdminAmbilAlih(false);
                            showToast('Shift selesai. Admin kembali ke mode normal.', 'success');
                        } else {
                            showToast('Shift selesai. Data tersimpan ke Spreadsheet.','success');
                        }
                        renderSidebarMenu();
                        renderContent();
                    }).catch(function(){ showAlert('Gagal','Tidak dapat terhubung ke server.','error'); });
                } else {
                    clerekState.shiftSelesai = selesai;
                    if (adminAmbilAlih) { setAdminAmbilAlih(false); }
                    renderSidebarMenu();
                    renderContent();
                    showToast('Shift selesai.','success');
                }
                }, 2000); // end setTimeout loading
            });
        }

        function clerekResetShift() {
            showConfirm('Shift Baru','Mulai shift baru? Data shift sebelumnya sudah tersimpan di Spreadsheet.','info', function(){
                clerekState.shiftId              = null;
                clerekState.shiftMulai           = null;
                clerekState.shiftSelesai         = null;
                clerekState.kasirShift           = null;
                clerekState.kasAwal              = 0;
                clerekState.kasAkhir             = 0;
                clerekState.kasAwalInput         = 0;
                clerekState.kasAkhirInput        = 0;
                clerekState.kasAwalKonfirmasi    = false;
                clerekState.kasAkhirKonfirmasi   = false;
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekShiftHTML();
                showToast('Siap untuk shift baru.','success');
            });
        }

        function clerekAmbilAlihShift() {
            if (!clerekState.shiftMulai || clerekState.shiftSelesai) {
                showAlert('Tidak Ada Shift', 'Tidak ada shift aktif untuk diambil alih.', 'warning');
                return;
            }
            var namaKasir = clerekState.kasirShift || 'karyawan';
            showConfirm(
                'Ambil Alih Shift',
                'Anda akan mengambil alih shift milik ' + namaKasir + '.\n\nSetelah ambil alih, Anda bisa melakukan penjualan sebagai admin.\n\nLanjutkan?',
                'info',
                function() {
                    setAdminAmbilAlih(true);
                    updateHeaderRole();
                    renderSidebarMenu();
                    renderContent();
                    showToast('Shift ' + namaKasir + ' berhasil diambil alih! Anda kini bisa berjualan.', 'success');
                }
            );
        }

        function clerekLepasAlih() {
            showConfirm(
                'Lepas Ambil Alih',
                'Kembalikan shift ke mode karyawan?\n\nAnda tidak akan bisa berjualan lagi sebelum ambil alih kembali.',
                'warning',
                function() {
                    setAdminAmbilAlih(false);
                    updateHeaderRole();
                    renderSidebarMenu();
                    renderContent();
                    showToast('Ambil alih dilepas. Kembali ke mode admin.', 'info');
                }
            );
        }

        // ── TAB MUTASI KAS ────────────────────────────────
        var clerekMutasiKas = [];

        function getClerekKasHTML() {
            var totalMasuk  = clerekMutasiKas.filter(function(m){return m.tipe==='masuk';}).reduce(function(s,m){return s+m.jumlah;},0);
            var totalKeluar = clerekMutasiKas.filter(function(m){return m.tipe==='keluar';}).reduce(function(s,m){return s+m.jumlah;},0);
            var saldo = totalMasuk - totalKeluar;

            var listHTML = clerekMutasiKas.length === 0
                ? `<tr><td colspan="5" class="text-center py-8 text-gray-400 text-sm">Belum ada mutasi kas.</td></tr>`
                : clerekMutasiKas.slice(0,30).map(function(m, i) {
                    return `<tr class="border-b border-gray-50 hover:bg-gray-50">
                        <td class="py-2.5 px-3 text-xs text-gray-500">${new Date(m.waktu).toLocaleString('id-ID',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
                        <td class="py-2.5 px-3"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ${m.tipe==='masuk'?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}">${m.tipe==='masuk'?'Masuk':'Keluar'}</span></td>
                        <td class="py-2.5 px-3 text-sm font-semibold ${m.tipe==='masuk'?'text-green-700':'text-red-600'}">${formatRp(m.jumlah)}</td>
                        <td class="py-2.5 px-3 text-sm text-gray-700">${m.keterangan||'-'}</td>
                        <td class="py-2.5 px-3 text-center">
                            <button onclick="clerekHapusMutasi(${i})" class="text-red-400 hover:text-red-600 text-xs"><i class="ph ph-trash"></i></button>
                        </td>
                    </tr>`;
                }).join('');

            return `<div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-green-600 font-semibold uppercase tracking-wide mb-1">Total Masuk</p>
                        <p class="text-lg font-black text-green-700">${formatRp(totalMasuk)}</p>
                    </div>
                    <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-red-500 font-semibold uppercase tracking-wide mb-1">Total Keluar</p>
                        <p class="text-lg font-black text-red-600">${formatRp(totalKeluar)}</p>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                        <p class="text-xs text-blue-600 font-semibold uppercase tracking-wide mb-1">Saldo</p>
                        <p class="text-lg font-black ${saldo>=0?'text-blue-700':'text-red-600'}">${formatRp(saldo)}</p>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
                    <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2"><i class="ph ph-plus-circle text-green-600"></i> Tambah Mutasi Kas</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <select id="mutasi-tipe" class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none">
                            <option value="masuk">💚 Kas Masuk</option>
                            <option value="keluar">❤️ Kas Keluar</option>
                        </select>
                        <input type="number" id="mutasi-jumlah" placeholder="Jumlah (Rp)" min="0"
                            class="px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
                        <input type="text" id="mutasi-ket" placeholder="Keterangan..."
                            class="sm:col-span-1 px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />
                        <button onclick="clerekTambahMutasi()" class="px-4 py-2.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 text-sm flex items-center justify-center gap-2">
                            <i class="ph ph-plus text-base"></i> Tambah
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                        <h3 class="font-bold text-gray-800">Riwayat Mutasi Kas</h3>
                        ${clerekMutasiKas.length > 0 ? `<button onclick="clerekHapusSemuaMutasi()" class="text-xs text-red-500 hover:underline flex items-center gap-1"><i class="ph ph-trash"></i> Hapus Semua</button>` : ''}
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Waktu</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Tipe</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Jumlah</th>
                                    <th class="py-2.5 px-3 text-left text-xs font-semibold text-gray-500">Keterangan</th>
                                    <th class="py-2.5 px-3 text-center text-xs font-semibold text-gray-500">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>${listHTML}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function clerekTambahMutasi() {
            var tipe = document.getElementById('mutasi-tipe').value;
            var jml  = Number(document.getElementById('mutasi-jumlah').value);
            var ket  = (document.getElementById('mutasi-ket').value||'').trim();
            if (!jml || jml <= 0) { showAlert('Perhatian','Jumlah kas wajib diisi dan lebih dari 0.','warning'); return; }
            var mutasi = { id: 'MUT'+Date.now(), tipe: tipe, jumlah: jml,
                           keterangan: ket, waktu: Date.now(),
                           idShift: clerekState.shiftId||'' };
            clerekMutasiKas.unshift(mutasi);
            if (GAS_URL) gasPost({ action: 'saveMutasiKas', mutasi: mutasi }).catch(function(){});
            var bod = document.getElementById('clerek-body');
            if (bod) bod.innerHTML = getClerekKasHTML();
            showToast('Mutasi kas ditambahkan.', 'success');
        }

        function clerekHapusMutasi(idx) {
            showConfirm('Hapus Mutasi','Hapus data mutasi ini?','error', function(){
                var del = clerekMutasiKas.splice(idx, 1)[0];
                if (GAS_URL && del && del.id) gasPost({ action: 'deleteMutasiKas', id: del.id }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekKasHTML();
                showToast('Mutasi dihapus.','success');
            });
        }

        function clerekHapusSemuaMutasi() {
            showConfirm('Hapus Semua Mutasi','Hapus seluruh riwayat mutasi kas?','error', function(){
                clerekMutasiKas = [];
                if (GAS_URL) gasPost({ action: 'deleteAllMutasi' }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekKasHTML();
                showToast('Semua mutasi dihapus.','success');
            });
        }

        // ── TAB RIWAYAT CLEREK ────────────────────────────
        var _clerekRiwayatPage = 0;
        var _clerekPerPage = 5;

        function getClerekRiwayatHTML() {
            var total = clerekState.riwayatShift.length;
            var totalPages = Math.max(1, Math.ceil(total / _clerekPerPage));
            if (_clerekRiwayatPage >= totalPages) _clerekRiwayatPage = totalPages - 1;
            if (_clerekRiwayatPage < 0) _clerekRiwayatPage = 0;

            var start = _clerekRiwayatPage * _clerekPerPage;
            var pageItems = clerekState.riwayatShift.slice(start, start + _clerekPerPage);

            var listHTML = total === 0
                ? '<div class="text-center py-10 text-gray-400 text-sm">Belum ada riwayat clerek.</div>'
                : pageItems.map(function(r, i) {
                    var globalIdx = start + i;
                    var dur = Math.floor((r.selesai - r.mulai) / 60000);
                    var selisih = r.kasAkhir - (r.kasAwal + r.omzet);
                    var tgl = new Date(r.mulai).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
                    var jamMulai   = new Date(r.mulai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                    var jamSelesai = new Date(r.selesai).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                    return '<div class="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">'
                        + '<div class="flex justify-between items-start mb-3">'
                        +   '<div>'
                        +     '<p class="font-bold text-gray-800">' + r.kasir + '</p>'
                        +     '<p class="text-xs text-gray-400">' + tgl + ' &bull; ' + jamMulai + '–' + jamSelesai + '</p>'
                        +   '</div>'
                        +   '<div class="flex items-center gap-2">'
                        +     '<span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-semibold">' + formatDurasi(dur) + '</span>'
                        +     '<button onclick="downloadSatuRiwayatClerekPDF(' + globalIdx + ')" title="Unduh PDF" '
                        +       'class="flex items-center gap-1 px-2.5 py-1 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">'
                        +       '<i class="ph ph-file-pdf text-sm"></i> PDF'
                        +     '</button>'
                        +   '</div>'
                        + '</div>'
                        + '<div class="grid grid-cols-3 gap-2 text-center text-xs">'
                        +   '<div class="bg-gray-50 rounded-lg p-2"><p class="text-gray-400 mb-0.5">Kas Awal</p><p class="font-semibold text-gray-700">' + formatRp(r.kasAwal) + '</p></div>'
                        +   '<div class="bg-gray-50 rounded-lg p-2"><p class="text-gray-400 mb-0.5">Kas Akhir</p><p class="font-semibold text-gray-700">' + formatRp(r.kasAkhir||0) + '</p></div>'
                        +   '<div class="bg-green-50 rounded-lg p-2"><p class="text-green-500 mb-0.5">Omzet</p><p class="font-bold text-green-700">' + formatRp(r.omzet) + '</p></div>'
                        +   '<div class="' + (selisih>=0?'bg-green-50':'bg-red-50') + ' rounded-lg p-2 col-span-3">'
                        +     '<p class="' + (selisih>=0?'text-green-500':'text-red-400') + ' mb-0.5">Selisih Kas</p>'
                        +     '<p class="font-bold ' + (selisih>=0?'text-green-700':'text-red-600') + '">' + (selisih>=0?'+':'') + formatRp(selisih) + '</p>'
                        +   '</div>'
                        + '</div>'
                        + '</div>';
                }).join('');

            var prevDis = _clerekRiwayatPage === 0;
            var nextDis = _clerekRiwayatPage >= totalPages - 1;
            var navHTML = total > _clerekPerPage
                ? '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">'
                +   '<button onclick="changeClerekRiwayatPage(-1)" ' + (prevDis?'disabled':'') + ' '
                +     'style="padding:7px 14px;border-radius:8px;border:1px solid ' + (prevDis?'#e5e7eb':'#16a34a') + ';background:' + (prevDis?'#f9fafb':'#fff') + ';color:' + (prevDis?'#d1d5db':'#16a34a') + ';font-size:12px;font-weight:600;cursor:' + (prevDis?'not-allowed':'pointer') + ';display:flex;align-items:center;gap:4px;">'
                +     '<i class="ph ph-caret-left"></i> Prev</button>'
                +   '<span style="font-size:11px;color:#6b7280;">Hal ' + (_clerekRiwayatPage+1) + '/' + totalPages + ' &bull; ' + total + ' riwayat</span>'
                +   '<button onclick="changeClerekRiwayatPage(1)" ' + (nextDis?'disabled':'') + ' '
                +     'style="padding:7px 14px;border-radius:8px;border:1px solid ' + (nextDis?'#e5e7eb':'#16a34a') + ';background:' + (nextDis?'#f9fafb':'#16a34a') + ';color:' + (nextDis?'#d1d5db':'#fff') + ';font-size:12px;font-weight:600;cursor:' + (nextDis?'not-allowed':'pointer') + ';display:flex;align-items:center;gap:4px;">'
                +     'Next <i class="ph ph-caret-right"></i></button>'
                + '</div>'
                : '';

            return '<div class="space-y-3">'
                + '<div class="flex items-center justify-between flex-wrap gap-2">'
                +   '<h3 class="font-bold text-gray-700 text-sm uppercase tracking-wide">Riwayat Clerek (' + total + ')</h3>'
                +   (total > 0 ? '<button onclick="clerekHapusRiwayat()" class="text-xs text-red-400 hover:text-red-600 flex items-center gap-1"><i class="ph ph-trash"></i> Hapus Semua</button>' : '')
                + '</div>'
                + listHTML
                + navHTML
                + '</div>';
        }

        function changeClerekRiwayatPage(dir) {
            _clerekRiwayatPage += dir;
            var bod = document.getElementById('clerek-body');
            if (bod) bod.innerHTML = getClerekRiwayatHTML();
        }

        function clerekHapusRiwayat() {
            showConfirm('Hapus Riwayat','Hapus semua riwayat clerek dari Spreadsheet?','error', function(){
                clerekState.riwayatShift = [];
                if (GAS_URL) gasPost({ action: 'deleteShiftHistory' }).catch(function(){});
                var bod = document.getElementById('clerek-body');
                if (bod) bod.innerHTML = getClerekRiwayatHTML();
                showToast('Riwayat clerek dihapus.','success');
            });
        }

        function downloadSatuRiwayatClerekPDF(idx) {
            var r = clerekState.riwayatShift[idx];
            if (!r) { showAlert('Error', 'Data riwayat tidak ditemukan.', 'error'); return; }
            var jsPDFLib = window.jspdf;
            if (!jsPDFLib) { showAlert('Error', 'Library PDF tidak tersedia.', 'error'); return; }

            var doc  = new jsPDFLib.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            var pageW = 210, lm = 14, rm = 14, cw = pageW - lm - rm;
            var y = 16;

            var dur       = Math.floor((r.selesai - r.mulai) / 60000);
            var tglMulai  = new Date(r.mulai).toLocaleDateString('id-ID', {day:'2-digit',month:'long',year:'numeric'});
            var jamMulai  = new Date(r.mulai).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
            var jamSelesai = new Date(r.selesai).toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
            var selisih   = r.kasAkhir - (r.kasAwal + r.omzet);

            // Header toko
            doc.setFontSize(13); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text(namaTokoStruk || 'Z-TRONIK', pageW / 2, y, { align: 'center' });
            y += 5;
            doc.setFontSize(9); doc.setFont(undefined, 'normal'); doc.setTextColor(80);
            doc.text('Laporan Shift Kasir', pageW / 2, y, { align: 'center' });
            y += 5;
            doc.setDrawColor(22, 163, 74); doc.setLineWidth(0.6);
            doc.line(lm, y, pageW - rm, y);
            y += 7;

            // Info shift
            function row2(label, val, bold) {
                doc.setFontSize(9); doc.setTextColor(80);
                doc.setFont(undefined, 'normal'); doc.text(label, lm, y);
                doc.setFont(undefined, bold ? 'bold' : 'normal'); doc.setTextColor(20);
                doc.text(String(val), pageW - rm, y, { align: 'right' });
                y += 5;
            }

            row2('Kasir', r.kasir, true);
            row2('Tanggal', tglMulai, false);
            row2('Jam Mulai', jamMulai, false);
            row2('Jam Selesai', jamSelesai, false);
            row2('Durasi', formatDurasi(dur), false);
            y += 2;

            // Garis tipis
            doc.setDrawColor(200); doc.setLineWidth(0.2);
            doc.line(lm, y, pageW - rm, y);
            y += 6;

            // Kas & Omzet
            doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(20);
            doc.text('Rekapitulasi Kas', lm, y);
            y += 6;

            var kasRows = [
                ['Kas Awal', formatRp(r.kasAwal)],
                ['Omzet Shift', formatRp(r.omzet)],
                ['Kas Akhir (Aktual)', formatRp(r.kasAkhir || 0)],
            ];
            kasRows.forEach(function(kr) {
                doc.setFontSize(9); doc.setFont(undefined, 'normal'); doc.setTextColor(80);
                doc.text(kr[0], lm + 4, y);
                doc.setFont(undefined, 'bold'); doc.setTextColor(20);
                doc.text(kr[1], pageW - rm, y, { align: 'right' });
                y += 5;
            });

            // Garis tebal + Selisih
            y += 1;
            doc.setDrawColor(22, 163, 74); doc.setLineWidth(0.4);
            doc.line(lm, y, pageW - rm, y);
            y += 5;
            doc.setFontSize(10); doc.setFont(undefined, 'bold');
            doc.setTextColor(selisih >= 0 ? 22 : 180, selisih >= 0 ? 163 : 30, selisih >= 0 ? 74 : 30);
            doc.text('Selisih Kas', lm, y);
            doc.text((selisih >= 0 ? '+' : '') + formatRp(selisih), pageW - rm, y, { align: 'right' });
            y += 10;

            // Footer
            doc.setDrawColor(200); doc.setLineWidth(0.2);
            doc.line(lm, y, pageW - rm, y);
            y += 5;
            doc.setFontSize(8); doc.setFont(undefined, 'normal'); doc.setTextColor(150);
            doc.text('Dicetak: ' + new Date().toLocaleDateString('id-ID') + '  ' + new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}), pageW / 2, y, { align: 'center' });

            var fileName = 'Shift_' + r.kasir.replace(/\s/g,'_') + '_' + tglMulai.replace(/\s/g,'_') + '.pdf';
            doc.save(fileName);
            showToast('PDF shift ' + r.kasir + ' berhasil diunduh!', 'success');
        }

        // MODUL HUTANG PIUTANG
        // =====================================================

        function renderHutangNotifBadge() {
            // Tampilkan badge di sidebar jika ada hutang jatuh tempo hari ini / lewat
            var today = new Date(); today.setHours(0,0,0,0);
            var overdue = hutangPiutangList.filter(function(h){
                if (h.status === 'lunas') return false;
                if (!h.jatuhTempo) return false;
                var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                return jt <= today;
            });
            var badge = document.getElementById('hutang-notif-badge');
            if (badge) {
                if (overdue.length > 0) {
                    badge.textContent = overdue.length;
                    badge.style.display = 'inline-flex';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function getHutangPiutangHTML() {
            var isKaryawan = currentUser && currentUser.role === 'karyawan';
            var tab = state.hutangTab || 'pelanggan';
            var q   = (state.hutangSearch || '').toLowerCase().trim();
            var filterStatus = state.hutangFilterStatus || 'semua';
            var today = new Date(); today.setHours(0,0,0,0);

            // Filter list berdasarkan tab
            var list = hutangPiutangList.filter(function(h){ return h.tipe === tab; });

            // Filter status
            if (filterStatus !== 'semua') {
                list = list.filter(function(h){
                    if (filterStatus === 'belum')    return h.status === 'belum';
                    if (filterStatus === 'cicilan')  return h.status === 'cicilan';
                    if (filterStatus === 'lunas')    return h.status === 'lunas';
                    if (filterStatus === 'jatuh') {
                        if (h.status === 'lunas' || !h.jatuhTempo) return false;
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        return jt <= today;
                    }
                    return true;
                });
            }

            // Filter search
            if (q) list = list.filter(function(h){
                return h.nama.toLowerCase().includes(q) || h.keterangan.toLowerCase().includes(q);
            });

            // Sort: belum & cicilan dulu, lalu lunas; dalam grup sort by jatuh tempo
            list.sort(function(a,b){
                var order = {belum:0, cicilan:1, lunas:2};
                var ao = order[a.status]||0, bo = order[b.status]||0;
                if (ao !== bo) return ao - bo;
                if (a.jatuhTempo && b.jatuhTempo) return new Date(a.jatuhTempo) - new Date(b.jatuhTempo);
                return 0;
            });

            // Pagination
            var perPage = 10;
            var totalPages = Math.max(1, Math.ceil(list.length / perPage));
            if (state.hutangPage > totalPages) state.hutangPage = totalPages;
            var shown = list.slice((state.hutangPage-1)*perPage, state.hutangPage*perPage);

            // Summary
            var allTab = hutangPiutangList.filter(function(h){ return h.tipe === tab; });
            var totalHutang  = allTab.reduce(function(s,h){ return s+h.jumlah; },0);
            var totalLunas   = allTab.reduce(function(s,h){ return s+h.sudahDibayar; },0);
            var totalSisa    = totalHutang - totalLunas;
            var jumlahAktif  = allTab.filter(function(h){ return h.status !== 'lunas'; }).length;
            var jumlahJatuh  = allTab.filter(function(h){
                if (h.status === 'lunas' || !h.jatuhTempo) return false;
                var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                return jt <= today;
            }).length;

            // Tab buttons
            var tabs = [
                { id:'pelanggan', label:'Hutang Pelanggan', icon:'ph-user', color:'#dc2626' },
                { id:'supplier',  label:'Hutang Supplier',  icon:'ph-storefront', color:'#2563eb' }
            ];
            var tabHtml = tabs.map(function(t){
                var active = tab === t.id;
                return '<button onclick="state.hutangTab=\''+t.id+'\';state.hutangPage=1;renderContent();" '
                    + 'style="display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:'+(active?'700':'500')+';'
                    + 'background:'+(active?t.color:'#f9fafb')+';color:'+(active?'#fff':'#6b7280')+';border:none;cursor:pointer;transition:all 0.15s;">'
                    + '<i class="ph '+t.icon+' text-base"></i>' + t.label + '</button>';
            }).join('');

            // Status filter
            var statusFilters = [
                {k:'semua',   label:'Semua'},
                {k:'belum',   label:'Belum Lunas'},
                {k:'cicilan', label:'Cicilan'},
                {k:'lunas',   label:'Lunas'},
                {k:'jatuh',   label:'Jatuh Tempo'},
            ];
            var filterHtml = statusFilters.map(function(f){
                var active = filterStatus === f.k;
                var color = f.k==='jatuh' ? (active?'#dc2626':'#fecaca') : (active?'#16a34a':'#f3f4f6');
                var textColor = f.k==='jatuh' ? (active?'#fff':'#dc2626') : (active?'#fff':'#6b7280');
                return '<button onclick="state.hutangFilterStatus=\''+f.k+'\';state.hutangPage=1;renderContent();" '
                    + 'style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:'+color+';color:'+textColor+';border:none;cursor:pointer;">'
                    + f.label + (f.k==='jatuh' && jumlahJatuh>0 ? ' ('+jumlahJatuh+')' : '') + '</button>';
            }).join('');

            // Rows
            var rowsHtml = '';
            if (shown.length === 0) {
                rowsHtml = '<tr><td colspan="8" style="padding:48px;text-align:center;color:#9ca3af;">'
                    + '<i class="ph ph-handshake" style="font-size:40px;display:block;margin-bottom:8px;"></i>'
                    + 'Tidak ada data hutang piutang.</td></tr>';
            } else {
                shown.forEach(function(h, idx){
                    var sisa = h.jumlah - h.sudahDibayar;
                    var pct  = h.jumlah > 0 ? Math.round((h.sudahDibayar/h.jumlah)*100) : 0;
                    var isOverdue = false;
                    if (h.status !== 'lunas' && h.jatuhTempo) {
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        isOverdue = jt <= today;
                    }
                    var statusBadge = '';
                    if (h.status === 'lunas') {
                        statusBadge = '<span style="background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">✓ Lunas</span>';
                    } else if (h.status === 'cicilan') {
                        statusBadge = '<span style="background:#fef3c7;color:#d97706;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">Cicilan</span>';
                    } else if (isOverdue) {
                        statusBadge = '<span style="background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">⚠ Jatuh Tempo</span>';
                    } else {
                        statusBadge = '<span style="background:#fce7f3;color:#9333ea;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">Belum</span>';
                    }
                    var rowBg = isOverdue && h.status !== 'lunas' ? '#fff5f5' : (idx%2===0?'#fff':'#fafafa');
                    rowsHtml += '<tr style="border-bottom:1px solid #f0f0f0;background:'+rowBg+';">'
                        + '<td style="padding:10px 12px;font-size:12px;"><div style="font-weight:600;color:#1f2937;">'+h.nama+'</div>'
                        + (h.idPelanggan ? '<div style="font-size:10px;color:#6b7280;font-family:monospace;">'+h.idPelanggan+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;font-size:11px;color:#6b7280;max-width:150px;"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+h.keterangan+'">'+h.keterangan+'</div>'
                        + (h.catatanTrx ? '<div style="font-size:10px;color:#9ca3af;font-family:monospace;">'+h.catatanTrx+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;font-weight:600;">'+formatRp(h.jumlah)+'</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;color:#16a34a;font-weight:600;">'+formatRp(h.sudahDibayar)+'</td>'
                        + '<td style="padding:10px 12px;text-align:right;font-size:12px;font-weight:700;color:'+(sisa>0?'#dc2626':'#16a34a')+';">'+formatRp(sisa)+'</td>'
                        + '<td style="padding:10px 12px;min-width:100px;">'
                        + '<div style="background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden;"><div style="background:'+(h.status==='lunas'?'#16a34a':'#f59e0b')+';height:100%;width:'+pct+'%;"></div></div>'
                        + '<div style="font-size:10px;color:#6b7280;margin-top:2px;text-align:center;">'+pct+'%</div>'
                        + '</td>'
                        + '<td style="padding:10px 12px;font-size:11px;color:'+(isOverdue&&h.status!=='lunas'?'#dc2626':'#6b7280')+';">'
                        + '<div>'+statusBadge+'</div>'
                        + (h.jatuhTempo ? '<div style="font-size:10px;margin-top:2px;">'+h.jatuhTempo+'</div>' : '')
                        + '</td>'
                        + '<td style="padding:10px 12px;">'
                        + '<div style="display:flex;gap:4px;flex-wrap:wrap;">'
                        + (h.status !== 'lunas' && !isKaryawan ? '<button onclick="openCicilanModal(\''+h.id+'\')" style="padding:4px 8px;background:#fef3c7;color:#d97706;border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;" title="Bayar/Cicil"><i class="ph ph-currency-circle-dollar"></i></button>' : '')
                        + (!isKaryawan ? '<button onclick="openDetailHutang(\''+h.id+'\')" style="padding:4px 8px;background:#eff6ff;color:#2563eb;border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;" title="Detail"><i class="ph ph-eye"></i></button>' : '')
                        + (!isKaryawan ? '<button onclick="hapusHutang(\''+h.id+'\')" style="padding:4px 8px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;" title="Hapus"><i class="ph ph-trash"></i></button>' : '')
                        + (isKaryawan ? '<button onclick="openDetailHutang(\''+h.id+'\')" style="padding:4px 8px;background:#eff6ff;color:#2563eb;border:none;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;" title="Lihat Detail"><i class="ph ph-eye"></i></button>' : '')
                        + '</div>'
                        + '</td>'
                        + '</tr>';
                });
            }

            // Pagination
            var paginationHtml = '';
            if (totalPages > 1) {
                paginationHtml = '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid #f0f0f0;">'
                    + '<button onclick="state.hutangPage--;renderContent();" '+(state.hutangPage<=1?'disabled':'')+' style="padding:6px 14px;border:1px solid #e5e7eb;border-radius:7px;background:'+(state.hutangPage<=1?'#f9fafb':'#fff')+';color:'+(state.hutangPage<=1?'#d1d5db':'#374151')+';font-size:12px;font-weight:600;cursor:'+(state.hutangPage<=1?'not-allowed':'pointer')+';">‹ Prev</button>'
                    + '<span style="font-size:12px;color:#6b7280;">Hal '+state.hutangPage+' dari '+totalPages+' · '+list.length+' data</span>'
                    + '<button onclick="state.hutangPage++;renderContent();" '+(state.hutangPage>=totalPages?'disabled':'')+' style="padding:6px 14px;border:1px solid #e5e7eb;border-radius:7px;background:'+(state.hutangPage>=totalPages?'#f9fafb':'#16a34a')+';color:'+(state.hutangPage>=totalPages?'#d1d5db':'#fff')+';font-size:12px;font-weight:600;cursor:'+(state.hutangPage>=totalPages?'not-allowed':'pointer')+';">Next ›</button>'
                    + '</div>';
            }

            return '<div class="space-y-4">'

                + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">'

        function simpanTambahHutang(tipe) {
            var jumlah = Number(document.getElementById('hp-jumlah').value) || 0;
            var ket    = (document.getElementById('hp-keterangan').value||'').trim();
            var tgl    = document.getElementById('hp-tanggal').value || new Date().toISOString().split('T')[0];
            var jt     = document.getElementById('hp-jatuh-tempo').value || '';
            var nama   = '', idPel = '';

            if (tipe === 'pelanggan') {
                var selVal = document.getElementById('hp-pelanggan').value;
                if (!selVal) { showAlert('Wajib','Pilih pelanggan terlebih dahulu.','warning'); return; }
                var parts = selVal.split('|');
                idPel = parts[0]; nama = parts[1] || idPel;
            } else {
                nama = (document.getElementById('hp-nama-supplier').value||'').trim();
                if (!nama) { showAlert('Wajib','Nama supplier wajib diisi.','warning'); return; }
            }

            if (!jumlah || jumlah <= 0) { showAlert('Wajib','Jumlah hutang harus lebih dari 0.','warning'); return; }
            if (!ket) { showAlert('Wajib','Keterangan wajib diisi.','warning'); return; }

            var newId = 'HTP' + Date.now().toString().slice(-8);
            var newHutang = {
                id: newId, tipe: tipe, nama: nama, idPelanggan: idPel,
                keterangan: ket, jumlah: jumlah, sudahDibayar: 0,
                tanggal: tgl, jatuhTempo: jt, status: 'belum',
                kasir: currentUser ? currentUser.nama : '-',
                catatanTrx: '', riwayatBayar: []
            };
            hutangPiutangList.push(newHutang);
            closeNotif();

            // Catat sebagai mutasi kas jika hutang supplier (kas keluar)
            if (tipe === 'supplier') {
                var mutasi = { id:'MUT'+Date.now(), tipe:'keluar', jumlah:jumlah,
                    keterangan:'Hutang Supplier: '+ket, waktu:Date.now(), idShift:clerekState.shiftId||'' };
                clerekMutasiKas.unshift(mutasi);
                if (GAS_URL) gasPost({ action:'saveMutasiKas', mutasi:mutasi }).catch(function(){});
            }

            if (GAS_URL) {
                gasPost({ action:'saveHutang', hutang: Object.assign({}, newHutang, { riwayatBayar: JSON.stringify(newHutang.riwayatBayar) }) })
                    .catch(function(){});
            }
            renderContent();
            showToast('Hutang berhasil ditambahkan!','success');
        }

        function prosesHutangBayar(id) {
            var h = hutangPiutangList.find(function(x){ return x.id === id; });
            if (!h) { closeNotif(); return; }
            var bayar = Number(document.getElementById('cicilan-jumlah').value) || 0;
            var ket   = (document.getElementById('cicilan-ket').value||'').trim() || 'Pembayaran';
            var sisa  = h.jumlah - h.sudahDibayar;
            if (bayar <= 0 || bayar > sisa) {
                showAlert('Tidak Valid','Jumlah bayar harus antara 1 dan '+formatRp(sisa)+'.','warning');
                return;
            }
            h.sudahDibayar += bayar;
            var tglBayar = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
            h.riwayatBayar.push({ tgl: tglBayar, jumlah: bayar, ket: ket });
            h.status = h.sudahDibayar >= h.jumlah ? 'lunas' : 'cicilan';
            closeNotif();

            // Catat ke mutasi kas
            var mutasiTipe = h.tipe === 'pelanggan' ? 'masuk' : 'keluar';
            var mutasiKet  = (h.tipe==='pelanggan'?'Pembayaran Piutang: ':'Bayar Hutang Supplier: ') + h.nama + ' — ' + ket;
            var mutasi = { id:'MUT'+Date.now(), tipe:mutasiTipe, jumlah:bayar,
                keterangan:mutasiKet, waktu:Date.now(), idShift:clerekState.shiftId||'' };
            clerekMutasiKas.unshift(mutasi);
            if (GAS_URL) gasPost({ action:'saveMutasiKas', mutasi:mutasi }).catch(function(){});

            // Jika pelanggan hutang sekarang lunas → tambah poin yang tertunda
            if (h.tipe === 'pelanggan' && h.status === 'lunas' && h.idPelanggan) {
                var masihAdaHutang = hutangPiutangList.some(function(hx){
                    return hx.id !== h.id && hx.tipe==='pelanggan' && hx.idPelanggan===h.idPelanggan && hx.status!=='lunas';
                });
                if (!masihAdaHutang) {
                    showToast('Semua hutang '+h.nama+' lunas. Poin pelanggan akan aktif di transaksi berikutnya.','info');
                }
            }

            // Sync ke GAS
            if (GAS_URL) {
                gasPost({ action:'updateHutang', hutang: Object.assign({}, h, { riwayatBayar: JSON.stringify(h.riwayatBayar) }) })
                    .catch(function(){});
            }

            renderContent();
            showToast('Pembayaran '+formatRp(bayar)+' berhasil dicatat!','success');
        }

                + riwHtml

                    desc: 'Di menu Laporan tersedia 7 filter periode: (1) Semua — seluruh riwayat yang tersimpan di sistem. (2) Hari Ini — transaksi hari ini saja. (3) 7 Hari — tujuh hari terakhir. (4) Bulan Ini — bulan kalender berjalan. (5) 2 Bulan — 60 hari terakhir. (6) 3 Bulan — 90 hari terakhir. (7) Pilih Tanggal — tentukan rentang dari-sampai secara manual (maks 3 bulan ke belakang). Ringkasan otomatis tampil di atas tabel: Total Omzet, Jumlah Transaksi, Rata-rata per Transaksi, dan Total Dibatalkan. Klik tombol PDF atau CSV untuk mengunduh laporan sesuai filter yang sedang aktif.'

                // ═══════════════════════════════════════════════
                //  HUTANG PIUTANG
                // ═══════════════════════════════════════════════
                {

                    desc: 'Menu Hutang Piutang adalah fitur pencatatan dan pemantauan hutang secara terpusat. Ada dua jenis hutang yang dikelola: (1) Hutang Pelanggan (Piutang) — pelanggan berhutang ke toko, misalnya mengambil barang belum bayar. (2) Hutang Supplier — toko berhutang ke supplier/vendor, misalnya stok barang yang belum dilunasi. Akses: Admin bisa lihat, tambah, bayar/cicil, dan hapus. Karyawan hanya bisa lihat dan melihat detail — tidak bisa tambah, bayar, atau hapus. Menu ini muncul di sidebar untuk Admin dan Karyawan (dengan batasan). Data hutang tersimpan di server dan selalu sinkron saat Refresh.'

                },
                {
                    icon: 'ph-list-checks', color: '#2563eb',
                    title: '📋 Status & Filter Hutang',
                    desc: 'Setiap hutang memiliki status yang berubah otomatis: (1) Belum — belum ada pembayaran sama sekali, sisa hutang = total hutang. (2) Cicilan — sudah dibayar sebagian, sisa > 0. (3) Lunas — sudah dibayar penuh (sisa = 0). (4) Jatuh Tempo — hutang yang belum/cicilan dan tanggal jatuh temponya sudah lewat hari ini (tampil badge merah + baris tabel berwarna merah muda). Filter tersedia di atas tabel: klik "Semua", "Belum Lunas", "Cicilan", "Lunas", atau "Jatuh Tempo". Filter jatuh tempo menampilkan jumlah hutang yang sudah lewat tanggal. Kolom "Progres" menampilkan progress bar berapa persen hutang sudah dilunasi. Sorting otomatis: hutang aktif (belum + cicilan) tampil di atas, lunas di bawah.'
                },
                {
                    icon: 'ph-bell-ringing', color: '#dc2626',
                    title: '⚠️ Notifikasi Jatuh Tempo Hutang',

                },
                {
