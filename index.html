        // Simpan pengaturan aturan poin belanja
        function saveBelanjaPoinRule(e) {
            e.preventDefault();
            const minB = Number(document.getElementById('bpr-min').value) || 0;
            const bonus = Number(document.getElementById('bpr-bonus').value) || 0;
            if (minB <= 0 || bonus <= 0) { showAlert('Input Tidak Valid', 'Isi semua kolom dengan angka lebih dari 0.', 'warning'); return; }
            rewardData.belanjaPoinRules.push({ minBelanja: minB, poinBonus: bonus });
            renderContent();
            showToast('Aturan poin belanja ditambahkan!', 'success');
        }

        function deleteBelanjaPoinRule(idx) {
            rewardData.belanjaPoinRules.splice(idx, 1);
            renderContent();
        }

        // Simpan aturan poin per produk
        function saveProdukPoinRule(e) {
            e.preventDefault();
            const pid = document.getElementById('ppr-id').value.trim();
            const ppu = Number(document.getElementById('ppr-poin').value) || 0;
            if (!pid || ppu <= 0) { showAlert('Input Tidak Valid', 'Isi ID produk dan poin per unit.', 'warning'); return; }
            const prod = state.products.find(p => p.id === pid);
            if (!prod) { showAlert('Produk Tidak Ditemukan', `Produk dengan ID "${pid}" tidak ada.`, 'error'); return; }
            const existing = rewardData.produkPoinRules.findIndex(r => r.productId === pid);
            if (existing >= 0) rewardData.produkPoinRules[existing].poinPerUnit = ppu;
            else rewardData.produkPoinRules.push({ productId: pid, productName: prod.name, poinPerUnit: ppu });
            renderContent();
            showToast('Aturan poin produk disimpan!', 'success');
        }

        function deleteProdukPoinRule(idx) {
            rewardData.produkPoinRules.splice(idx, 1);
            renderContent();
        }

        // Simpan pengaturan dasar poin
        function saveRewardSettings(e) {
            e.preventDefault();
            const minBelanja = Number(document.getElementById('rs-min-belanja').value) || 10000;
            const poinDapat  = Number(document.getElementById('rs-poin-dapat').value)  || 100;
            const tierB = Number(document.getElementById('rs-bronze').value) || 0;
            const tierS = Number(document.getElementById('rs-silver').value) || 0;
            const tierG = Number(document.getElementById('rs-gold').value)   || 0;
            rewardData.belanjaPoinMin    = minBelanja;
            rewardData.belanjaPoinDapat  = poinDapat;
            rewardData.tiers[0].min = tierB;
            rewardData.tiers[1].min = tierS;
            rewardData.tiers[2].min = tierG;
            rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
            syncRewardDataToGAS();
            renderContent();
            showToast('Pengaturan poin disimpan ke spreadsheet!', 'success');
        }

        function getPoinRewardHTML() {
            var isKaryawan = currentUser && currentUser.role === 'karyawan';
            var totalPoin = rewardData.customers.reduce(function(s,c){ return s+(c.poin||0); }, 0);
            var goldCount = rewardData.customers.filter(function(c){ return c.tier==="Gold"; }).length;

            var rwdPP = 5;
            var rewardFiltered = rewardData.rewardList.filter(function(r) {
                var q = (state.rewardSearch || '').toLowerCase().trim();
                return !q || r.name.toLowerCase().includes(q) || (r.deskripsi && r.deskripsi.toLowerCase().includes(q));
            });
            var sortKey = state.rewardSort || 'default';
            rewardFiltered = rewardFiltered.slice().sort(function(a, b) {
                if (sortKey === 'name_desc') return b.name.localeCompare(a.name, 'id');
                if (sortKey === 'poin_asc')  return (a.poinDibutuhkan||0) - (b.poinDibutuhkan||0);
                if (sortKey === 'poin_desc') return (b.poinDibutuhkan||0) - (a.poinDibutuhkan||0);
                return a.name.localeCompare(b.name, 'id'); // default & name_asc
            });
            var rwdTotal = Math.max(1, Math.ceil(rewardFiltered.length / rwdPP));
            if (state.rewardListPage > rwdTotal) state.rewardListPage = rwdTotal;
            var rwdStart = (state.rewardListPage-1)*rwdPP;

        // ── PENCARIAN & PARTIAL RENDER: DAFTAR REWARD ────────────────
        function handleRewardSearch(e) {
            state.rewardSearch = e.target.value;
            state.rewardListPage = 1;
            renderRewardListOnly();
        }

        function renderRewardListOnly() {
            var container = document.getElementById('reward-list-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'reward-search-input') ? inp.selectionStart : null;

            var q = (state.rewardSearch || '').toLowerCase().trim();
            var filtered = rewardData.rewardList.filter(function(r) {
                return !q || r.name.toLowerCase().includes(q) || (r.deskripsi && r.deskripsi.toLowerCase().includes(q));
            });
            var sortKey = state.rewardSort || 'default';
            filtered = filtered.slice().sort(function(a, b) {
                if (sortKey === 'name_desc') return b.name.localeCompare(a.name, 'id');
                if (sortKey === 'poin_asc')  return (a.poinDibutuhkan||0) - (b.poinDibutuhkan||0);
                if (sortKey === 'poin_desc') return (b.poinDibutuhkan||0) - (a.poinDibutuhkan||0);
                return a.name.localeCompare(b.name, 'id'); // default & name_asc
            });

            var rwdPP = 5;
            var rwdTotal = Math.max(1, Math.ceil(filtered.length / rwdPP));
            if (state.rewardListPage > rwdTotal) state.rewardListPage = rwdTotal;
            var rwdStart = (state.rewardListPage - 1) * rwdPP;
            var rwdShown = filtered.slice(rwdStart, rwdStart + rwdPP);

            // Rebuild reward rows
            var html = '';
            if (rwdShown.length === 0) {
                html = '<p class="text-xs text-gray-400 italic py-1">' + (q ? 'Tidak ada reward cocok dengan pencarian.' : 'Belum ada reward.') + '</p>';
            } else {
                rwdShown.forEach(function(r) {
                    // Cari index asli di rewardData.rewardList (bukan index filtered)
                    var realIdx = rewardData.rewardList.indexOf(r);
                    html += '<div class="flex items-center justify-between bg-purple-50 border border-purple-100 rounded-lg px-3 py-2 text-sm">'
                        + '<div class="min-w-0"><span class="font-semibold text-purple-800 block truncate">' + r.name + '</span>'
                        + '<span class="text-xs text-purple-600">' + r.poinDibutuhkan + ' poin' + (r.deskripsi ? ' &middot; ' + r.deskripsi : '') + '</span></div>'
                        + '<div class="flex items-center gap-1 ml-2 shrink-0">'
                        + '<button onclick="openEditRewardItem(' + realIdx + ')" title="Edit" class="p-1 text-purple-500 hover:text-purple-700 hover:bg-purple-100 rounded transition-colors"><i class="ph ph-pencil-simple text-sm"></i></button>'
                        + '<button onclick="deleteRewardItem(' + realIdx + ')" title="Hapus" class="p-1 text-red-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors"><i class="ph ph-trash text-sm"></i></button>'
                        + '</div></div>';
                });

            container.innerHTML = html;

            // Update pagination di bawah container
            var paginationEl = container.nextElementSibling;
            if (paginationEl && paginationEl.tagName !== 'FORM') {
                // Cari elemen pagination reward (div setelah container)
                var parent = container.parentNode;
                var existingPag = parent.querySelector('.reward-pagination');
                if (!existingPag) {
                    existingPag = document.createElement('div');
                    existingPag.className = 'reward-pagination';
                    container.insertAdjacentElement('afterend', existingPag);

                if (rwdTotal > 1) {
                    existingPag.innerHTML = '<div class="flex justify-between items-center mt-2">'

                    existingPag.innerHTML = '';

                        : '';

            // Restore fokus
            var searchInput = document.getElementById('cust-poin-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(ex) {}
            }
        }

        function getFilteredSales(filterOverride) {
            var filter = filterOverride || state.laporanFilter;
            var now = new Date();
            var result = [...state.salesHistory];
            if (filter === 'hari') {
                var t = now.toDateString();
                result = result.filter(function(s){ return new Date(s.date).toDateString() === t; });
            } else if (filter === 'minggu') {
                var wa = new Date(now); wa.setDate(now.getDate() - 7);
                result = result.filter(function(s){ return new Date(s.date) >= wa; });
            } else if (filter === 'bulan') {
                result = result.filter(function(s){
                    var d = new Date(s.date);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });
            } else if (filter === 'bulan2') {
                var b2 = new Date(now); b2.setDate(b2.getDate() - 60);
                result = result.filter(function(s){ return new Date(s.date) >= b2; });
            } else if (filter === 'bulan3') {
                var b3 = new Date(now); b3.setDate(b3.getDate() - 90);
                result = result.filter(function(s){ return new Date(s.date) >= b3; });
            } else if (filter === 'custom') {
                var from = state.laporanCustomFrom ? new Date(state.laporanCustomFrom) : null;
                var to   = state.laporanCustomTo   ? new Date(state.laporanCustomTo)   : null;
                if (to) { to.setHours(23,59,59,999); }
                if (from) result = result.filter(function(s){ return new Date(s.date) >= from; });
                if (to)   result = result.filter(function(s){ return new Date(s.date) <= to; });
            }
            return result;
        }

        function getPeriodLabel(filter) {
            var labels = {
                semua: 'Semua Waktu', hari: 'Hari Ini', minggu: '7 Hari Terakhir',
                bulan: 'Bulan Ini', bulan2: '2 Bulan Terakhir', bulan3: '3 Bulan Terakhir'
            };
            if (filter === 'custom') {
                var f = state.laporanCustomFrom || '?';
                var t = state.laporanCustomTo   || '?';
                return f + ' s/d ' + t;
            }
            return labels[filter] || 'Semua Waktu';
        }

        function getLaporanHTML() {
            var isAdmin = currentUser && currentUser.role === 'admin';

            // Tab bar — Neraca Modal & Keuntungan hanya untuk admin
            var tabTrxActive   = state.laporanTab !== 'neraca' && state.laporanTab !== 'hutang' && state.laporanTab !== 'keuntungan';
            var tabNrcActive   = state.laporanTab === 'neraca';
            var tabHtgActive   = state.laporanTab === 'hutang';
            var tabKntActive   = state.laporanTab === 'keuntungan';
            var tabBar = '<div class="flex gap-2 mb-4" style="flex-wrap:wrap;">'
                + '<button onclick="state.laporanTab=\'transaksi\'; state.laporanPage=1; renderContent()" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid ' + (tabTrxActive ? '#16a34a' : '#e5e7eb') + ';background:' + (tabTrxActive ? '#16a34a' : '#fff') + ';color:' + (tabTrxActive ? '#fff' : '#4b5563') + ';cursor:pointer;">'
                + '<i class="ph ph-receipt" style="margin-right:6px;"></i>Riwayat Transaksi'
                + '</button>';

            // Tab Hutang/Piutang untuk semua user
            tabBar += '<button onclick="state.laporanTab=\'hutang\'; state.laporanPage=1; renderContent()" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid ' + (tabHtgActive ? '#dc2626' : '#e5e7eb') + ';background:' + (tabHtgActive ? '#dc2626' : '#fff') + ';color:' + (tabHtgActive ? '#fff' : '#4b5563') + ';cursor:pointer;">'
                + '<i class="ph ph-hand-coins" style="margin-right:6px;"></i>Hutang/Piutang'
                + '</button>';

            if (isAdmin) {
                tabBar += '<button onclick="state.laporanTab=\'neraca\'; renderContent()" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid ' + (tabNrcActive ? '#4f46e5' : '#e5e7eb') + ';background:' + (tabNrcActive ? '#4f46e5' : '#fff') + ';color:' + (tabNrcActive ? '#fff' : '#4b5563') + ';cursor:pointer;">'
                    + '<i class="ph ph-scales" style="margin-right:6px;"></i>Neraca Modal'
                    + '</button>';
                tabBar += '<button onclick="state.laporanTab=\'keuntungan\'; renderContent()" style="padding:8px 16px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid ' + (tabKntActive ? '#b45309' : '#e5e7eb') + ';background:' + (tabKntActive ? '#b45309' : '#fff') + ';color:' + (tabKntActive ? '#fff' : '#4b5563') + ';cursor:pointer;">'
                    + '<i class="ph ph-trend-up" style="margin-right:6px;"></i>Keuntungan'
                    + '</button>';
            }
            tabBar += '</div>';

            // Route ke tab
            if (tabHtgActive) {
                return '<div class="space-y-4">' + tabBar + getLaporanHutangHTML() + '</div>';
            }

            // Route ke neraca tab
            if (isAdmin && tabNrcActive) {
                return '<div class="space-y-4">' + tabBar + getNeracaModalHTML() + '</div>';
            }

            // Route ke keuntungan tab (admin only)
            if (isAdmin && tabKntActive) {
                return '<div class="space-y-4">' + tabBar + getKeuntunganHTML() + '</div>';
            }

            const now = new Date();
            const filter = state.laporanFilter;
            const q = (state.laporanSearch || '').toLowerCase().trim();

            // Filter by period
            let filtered = getFilteredSales(filter);

            // Filter by search query
            if (q) {
                filtered = filtered.filter(s =>
                    s.id.toLowerCase().includes(q) ||
                    (s.member && s.member.toLowerCase().includes(q)) ||
                    s.method.toLowerCase().includes(q) ||
                    s.items.some(it => it.name.toLowerCase().includes(q)) ||
                    String(s.total).includes(q)
                );
            }

            const totalOmzet = filtered.filter(x => !x.refunded).reduce((s, x) => s + x.total, 0);
            const totalTrx   = filtered.filter(x => !x.refunded).length;
            const totalRefund = filtered.filter(x => x.refunded).length;
            const avgTrx     = totalTrx > 0 ? Math.round(totalOmzet / totalTrx) : 0;

            // Pagination
            const perPage    = 10;
            const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.laporanPage > totalPages) state.laporanPage = totalPages;
            const start = (state.laporanPage - 1) * perPage;
            const shown = filtered.slice(start, start + perPage);

            const methodColors = { Tunai: 'bg-green-100 text-green-700', QRIS: 'bg-blue-100 text-blue-700', Kartu: 'bg-purple-100 text-purple-700' };

            const rows = shown.length === 0
                ? `<tr><td colspan="7" class="text-center py-12 text-gray-400">
                        <i class="ph ph-magnifying-glass text-3xl mb-2 block opacity-40"></i>
                        ${q ? 'Tidak ada transaksi yang cocok dengan pencarian "'+q+'".' : 'Belum ada transaksi untuk periode ini.'}
                   </td></tr>`
                : shown.map(s => {
                    const d = new Date(s.date);
                    const tgl = d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
                    const jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                    const itemStr = s.items.map(it => it.name + ' (' + it.qty + ')').join(', ');
                    const rowClass = s.refunded ? 'border-b border-gray-100 bg-red-50/40 opacity-70' : 'border-b border-gray-100 hover:bg-gray-50/50';
                    return `<tr class="${rowClass}">
                        <td class="py-3 px-4 text-xs font-mono text-gray-500">${s.id}</td>
                        <td class="py-3 px-4 text-sm text-gray-700 whitespace-nowrap">${tgl} ${jam}</td>
                        <td class="py-3 px-4 text-sm text-gray-600 max-w-[180px] truncate" title="${itemStr}">${itemStr}</td>
                        <td class="py-3 px-4 text-sm text-gray-600">${s.member || '-'}</td>
                        <td class="py-3 px-4 text-center"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ${methodColors[s.method] || 'bg-gray-100 text-gray-600'}">${s.method}</span></td>
                        <td class="py-3 px-4 text-right font-bold text-gray-800">${formatRp(s.total)}</td>
                        <td class="py-3 px-4 text-center">
                            <div class="flex items-center justify-center gap-1.5 flex-wrap">
                                <button onclick="previewStrukLaporan('${s.id}')" class="px-2 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-lg hover:bg-green-100 border border-green-200 flex items-center gap-1">
                                    <i class="ph ph-receipt text-sm"></i> Struk
                                </button>
                                <button onclick="downloadTrxPDF('${s.id}')" title="Unduh PDF" class="px-2 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-lg hover:bg-blue-100 border border-blue-200 flex items-center gap-1">
                                    <i class="ph ph-download-simple text-sm"></i> PDF
                                </button>
                                ${s.refunded ? '<span class="px-2 py-1 bg-gray-100 text-gray-400 text-xs font-semibold rounded-lg border border-gray-200">Dibatalkan</span>'
                                    : '<button onclick="batalkanTransaksi(\''+s.id+'\')" class="px-2 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded-lg hover:bg-red-100 border border-red-200 flex items-center gap-1"><i class="ph ph-arrow-u-up-left text-sm"></i> Batalkan</button>'}
                            </div>
                        </td>
                    </tr>`;
                }).join('');

            const pagination = totalPages > 1 ? `
                <div class="p-4 border-t border-gray-100 flex justify-between items-center">
                    <button onclick="state.laporanPage--; renderContent()" ${state.laporanPage===1?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>
                    <span class="text-sm text-gray-500">Hal ${state.laporanPage} dari ${totalPages} &bull; ${filtered.length} transaksi</span>
                    <button onclick="state.laporanPage++; renderContent()" ${state.laporanPage===totalPages?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>
                </div>` : (filtered.length > 0 ? `<div class="p-3 text-center text-xs text-gray-400">${filtered.length} transaksi</div>` : '');

            const filterDefs = [
                {k:'semua', label:'Semua'},
                {k:'hari',  label:'Hari Ini'},
                {k:'minggu',label:'7 Hari'},
                {k:'bulan', label:'Bulan Ini'},
                {k:'bulan2',label:'2 Bulan'},
                {k:'bulan3',label:'3 Bulan'},
            ];
            const filterBtns = filterDefs.map(f =>
                `<button onclick="state.laporanFilter='${f.k}'; state.laporanPage=1; renderContent()"
                    class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-colors ${state.laporanFilter===f.k ? 'bg-green-600 text-white border-green-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                    ${f.label}
                </button>`
            ).join('');
            // Custom date range
            const today = new Date();
            const maxDate = today.toISOString().split('T')[0];
            const minDate = new Date(today.getFullYear(), today.getMonth()-2, today.getDate()).toISOString().split('T')[0];
            const customActive = state.laporanFilter === 'custom';
            const customRow = `<div class="flex items-center gap-2 flex-wrap mt-1">
                <button onclick="state.laporanFilter='custom'; state.laporanPage=1; renderContent()"
                    class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-colors ${customActive ? 'bg-green-600 text-white border-green-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                    <i class="ph ph-calendar"></i> Pilih Tanggal
                </button>
                ${customActive ? `<input type="date" value="${state.laporanCustomFrom}" max="${maxDate}"
                    onchange="state.laporanCustomFrom=this.value; state.laporanPage=1; renderContent()"
                    class="px-2 py-1 text-xs border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-400 focus:outline-none" />
                <span class="text-xs text-gray-400">s/d</span>
                <input type="date" value="${state.laporanCustomTo}" max="${maxDate}"
                    onchange="state.laporanCustomTo=this.value; state.laporanPage=1; renderContent()"
                    class="px-2 py-1 text-xs border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-400 focus:outline-none" />` : ''}
            </div>`;

            return `
                <div class="space-y-4">
                    ${tabBar}
                    <!-- Summary cards -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
                            <div class="p-2.5 rounded-lg bg-green-500 text-white shrink-0"><i class="ph ph-bank text-xl"></i></div>
                            <div><p class="text-xs text-gray-500">Total Omzet</p><p class="text-lg font-bold text-gray-800">${formatRp(totalOmzet)}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
                            <div class="p-2.5 rounded-lg bg-emerald-500 text-white shrink-0"><i class="ph ph-receipt text-xl"></i></div>
                            <div><p class="text-xs text-gray-500">Jumlah Transaksi</p><p class="text-lg font-bold text-gray-800">${totalTrx}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center gap-3">
                            <div class="p-2.5 rounded-lg bg-teal-500 text-white shrink-0"><i class="ph ph-trending-up text-xl"></i></div>
                            <div><p class="text-xs text-gray-500">Rata-rata/Transaksi</p><p class="text-lg font-bold text-gray-800">${formatRp(avgTrx)}</p></div>
                        </div>
                        <div class="bg-white rounded-xl p-4 shadow-sm border border-red-100 flex items-center gap-3">
                            <div class="p-2.5 rounded-lg bg-red-400 text-white shrink-0"><i class="ph ph-arrow-u-up-left text-xl"></i></div>
                            <div><p class="text-xs text-gray-500">Dibatalkan</p><p class="text-lg font-bold text-red-600">${totalRefund}</p></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
                        <!-- Toolbar -->
                        <div class="p-4 border-b border-gray-100 flex flex-col sm:flex-row gap-3 justify-between items-start sm:items-center">
                            <div>
                                <h2 class="font-semibold text-gray-800">Riwayat Transaksi</h2>
                                <p class="text-xs text-gray-500">${currentUser && currentUser.role === 'karyawan' ? '⚠️ Pembatalan transaksi memerlukan verifikasi password admin.' : 'Admin dapat membatalkan transaksi langsung.'}</p>
                            </div>
                            <div class="flex flex-col gap-1.5">
                                <div class="flex gap-2 flex-wrap">
                                    ${filterBtns}
                                    <button onclick="downloadLaporanPDF()" class="px-3 py-1.5 text-xs font-semibold rounded-lg border border-green-200 text-green-700 bg-green-50 hover:bg-green-100 flex items-center gap-1">
                                        <i class="ph ph-download-simple"></i> PDF
                                    </button>
                                    <button onclick="downloadLaporanCSV()" class="px-3 py-1.5 text-xs font-semibold rounded-lg border border-blue-200 text-blue-700 bg-blue-50 hover:bg-blue-100 flex items-center gap-1">
                                        <i class="ph ph-file-csv"></i> CSV
                                    </button>
                                </div>
                                ${customRow}
                            </div>
                        </div>

                        <!-- Search bar -->
                        <div class="px-4 py-3 border-b border-gray-100 bg-gray-50/50">
                            <div class="relative max-w-sm">
                                <input type="text"
                                    id="laporan-search-input"
                                    placeholder="Cari no. transaksi, nama item, member, metode..."
                                    value="${state.laporanSearch}"
                                    oninput="handleLaporanSearch(event)"
                                    class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-green-400 focus:outline-none bg-white" />
                                <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                                ${q ? `<button onclick="state.laporanSearch=''; state.laporanPage=1; renderLaporanTableOnly()" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600"><i class="ph ph-x text-sm"></i></button>` : ''}
                            </div>
                            <p id="laporan-search-info" class="text-xs text-gray-400 mt-1.5" style="display:${q ? 'block' : 'none'};">Menampilkan ${filtered.length} hasil untuk "<strong>${q}</strong>"</p>
                        </div>

                        <!-- Table -->
                        <div id="laporan-table-container">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr class="bg-gray-50 text-gray-500 text-xs border-b border-gray-200">
                                        <th class="py-3 px-4 font-medium">No. Transaksi</th>
                                        <th class="py-3 px-4 font-medium">Waktu</th>
                                        <th class="py-3 px-4 font-medium">Item</th>
                                        <th class="py-3 px-4 font-medium">Member</th>
                                        <th class="py-3 px-4 font-medium text-center">Metode</th>
                                        <th class="py-3 px-4 font-medium text-right">Total</th>
                                        <th class="py-3 px-4 font-medium text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="laporan-tbody">${rows}</tbody>
                            </table>
                        </div>
                        <div class="laporan-pagination">${pagination}</div>
                        </div>
                    </div>
                </div>
            `;
        }


        // ── NERACA MODAL (admin only) ─────────────────────────────────
        // ══════════════════════════════════════════════════════════════════════════════
        // LAPORAN HUTANG/PIUTANG
        // ══════════════════════════════════════════════════════════════════════════════

        function getLaporanHutangHTML() {
            var tab = state.laporanHutangTab || 'pelanggan';
            var q = (state.laporanHutangSearch || '').toLowerCase().trim();
            var filterStatus = state.laporanHutangFilter || 'semua';
            var today = new Date(); today.setHours(0,0,0,0);

            // Filter list berdasarkan tab
            var list = hutangPiutangList.filter(function(h){ return h.tipe === tab; });

            // Filter status
            if (filterStatus !== 'semua') {
                list = list.filter(function(h){
                    if (filterStatus === 'belum')    return h.status === 'belum';
                    if (filterStatus === 'cicilan')  return h.status === 'cicilan';
                    if (filterStatus === 'lunas')    return h.status === 'lunas';
                    if (filterStatus === 'jatuh') {
                        if (h.status === 'lunas' || !h.jatuhTempo) return false;
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        return jt <= today;
                    }
                    return true;
                });
            }

            // Filter search
            if (q) list = list.filter(function(h){
                return h.nama.toLowerCase().includes(q) || h.keterangan.toLowerCase().includes(q);
            });

            // Sort
            list.sort(function(a,b){
                var order = {belum:0, cicilan:1, lunas:2};
                var ao = order[a.status]||0, bo = order[b.status]||0;
                if (ao !== bo) return ao - bo;
                if (a.jatuhTempo && b.jatuhTempo) return new Date(a.jatuhTempo) - new Date(b.jatuhTempo);
                return 0;
            });

            // Pagination
            var perPage = 15;
            var totalPages = Math.max(1, Math.ceil(list.length / perPage));
            if (!state.laporanHutangPage) state.laporanHutangPage = 1;
            if (state.laporanHutangPage > totalPages) state.laporanHutangPage = totalPages;
            var shown = list.slice((state.laporanHutangPage-1)*perPage, state.laporanHutangPage*perPage);

            // Summary
            var allTab = hutangPiutangList.filter(function(h){ return h.tipe === tab; });
            var totalHutang  = allTab.reduce(function(s,h){ return s+h.jumlah; },0);
            var totalLunas   = allTab.reduce(function(s,h){ return s+h.sudahDibayar; },0);
            var totalSisa    = totalHutang - totalLunas;
            var jumlahAktif  = allTab.filter(function(h){ return h.status !== 'lunas'; }).length;

            // Tab buttons
            var tabs = [
                { id:'pelanggan', label:'Hutang Pelanggan', icon:'ph-user', color:'#dc2626' },
                { id:'supplier',  label:'Hutang Supplier',  icon:'ph-storefront', color:'#2563eb' }
            ];
            var tabHtml = tabs.map(function(t){
                var active = tab === t.id;
                return '<button onclick="state.laporanHutangTab=\''+t.id+'\';state.laporanHutangPage=1;renderContent();" '
                    + 'style="display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:'+(active?'700':'500')+';'
                    + 'background:'+(active?t.color:'#f9fafb')+';color:'+(active?'#fff':'#6b7280')+';border:none;cursor:pointer;transition:all 0.15s;">'
                    + '<i class="ph '+t.icon+' text-base"></i>' + t.label + '</button>';
            }).join('');

            // Status filter
            var statusFilters = [
                {k:'semua',   label:'Semua'},
                {k:'belum',   label:'Belum Lunas'},
                {k:'cicilan', label:'Cicilan'},
                {k:'lunas',   label:'Lunas'},
                {k:'jatuh',   label:'Jatuh Tempo'},
            ];
            var filterHtml = statusFilters.map(function(f){
                var active = filterStatus === f.k;
                var color = f.k==='jatuh' ? (active?'#dc2626':'#fecaca') : (active?'#16a34a':'#f3f4f6');
                var textColor = f.k==='jatuh' ? (active?'#fff':'#dc2626') : (active?'#fff':'#6b7280');
                return '<button onclick="state.laporanHutangFilter=\''+f.k+'\';state.laporanHutangPage=1;renderContent();" '
                    + 'style="padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:'+color+';color:'+textColor+';border:none;cursor:pointer;">'
                    + f.label + '</button>';
            }).join('');

            // Rows
            var rowsHtml = '';
            if (shown.length === 0) {
                rowsHtml = '<tr><td colspan="7" style="padding:48px;text-align:center;color:#9ca3af;">'
                    + '<i class="ph ph-handshake" style="font-size:40px;display:block;margin-bottom:8px;"></i>'
                    + 'Tidak ada data hutang piutang.</td></tr>';
            } else {
                shown.forEach(function(h, idx){
                    var sisa = h.jumlah - h.sudahDibayar;
                    var pct = h.jumlah > 0 ? Math.round((h.sudahDibayar/h.jumlah)*100) : 0;
                    var isOverdue = false;
                    if (h.status !== 'lunas' && h.jatuhTempo) {
                        var jt = new Date(h.jatuhTempo); jt.setHours(0,0,0,0);
                        isOverdue = jt <= today;
                    }
                    var statusBadge = '';
                    if (h.status === 'lunas') {
                        statusBadge = '<span style="background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">✓ Lunas</span>';
                    } else if (h.status === 'cicilan') {

        function getNeracaModalHTML() {
            var now = new Date();
            var tglStr = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });

            // ── 1. TOTAL NILAI MODAL STOK ──────────────────────────────
            // Modal per produk = harga modal × stok (produk unlimited tidak dihitung stok fisik)
            var totalModalStok = 0;
            var totalNilaiJual = 0;
            var totalProduk    = 0;
            var kategoriMap    = {};  // { nama_kategori: { modal, jual, qty } }

            state.products.forEach(function(p) {
                var stok = p.unlimited ? 0 : (p.stock || 0);
                var modal = (p.modal || 0) * stok;
                var jual  = (p.price || 0) * stok;
                totalModalStok += modal;
                totalNilaiJual += jual;
                totalProduk++;
                var kat = p.category || 'Tanpa Kategori';
                if (!kategoriMap[kat]) kategoriMap[kat] = { modal: 0, jual: 0, qty: 0, items: 0 };
                kategoriMap[kat].modal += modal;
                kategoriMap[kat].jual  += jual;
                kategoriMap[kat].qty   += stok;
                kategoriMap[kat].items++;
            });

            // ── 2. HUTANG PIUTANG ──────────────────────────────────────
            // Hutang ke supplier  = tipe 'supplier' & belum lunas → mengurangi kekayaan
            // Piutang ke pelanggan = tipe 'pelanggan' & belum lunas → menambah kekayaan
            var hutangSupplier  = 0;  // kita yang berhutang ke supplier
            var piutangPelanggan = 0; // pelanggan yang berhutang ke kita
            var jmlHutangSupplier   = 0;

        // ── DOWNLOAD NERACA PDF ────────────────────────────────────────
        function downloadNeracaPDF() {
            var now = new Date();
            var tglStr = now.toLocaleDateString('id-ID', { day:'2-digit', month:'long', year:'numeric' });

            // Recalculate
            var totalModalStok = 0, totalNilaiJual = 0;
            var kategoriMap = {};
            state.products.forEach(function(p) {
                var stok = p.unlimited ? 0 : (p.stock || 0);
                totalModalStok += (p.modal || 0) * stok;
                totalNilaiJual += (p.price || 0) * stok;
                var kat = p.category || 'Tanpa Kategori';
                if (!kategoriMap[kat]) kategoriMap[kat] = { modal: 0, qty: 0 };
                kategoriMap[kat].modal += (p.modal || 0) * stok;
                kategoriMap[kat].qty   += stok;
            });

            var hutangSupplier = 0, piutangPelanggan = 0;
            hutangPiutangList.forEach(function(h) {
                if (h.status === 'lunas') return;
                var sisa = (h.jumlah || 0) - (h.sudahDibayar || 0);
                if (sisa <= 0) return;
                if (h.tipe === 'supplier') hutangSupplier += sisa;
                else piutangPelanggan += sisa;
            });
            var kekayaanBersih = totalModalStok + piutangPelanggan - hutangSupplier;

            var { jsPDF } = window.jspdf;
            var doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

            // Header
            doc.setFillColor(49, 46, 129);
            doc.rect(0, 0, 210, 32, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16); doc.setFont(undefined, 'bold');
            doc.text('NERACA MODAL', 14, 13);
            doc.setFontSize(9); doc.setFont(undefined, 'normal');
            doc.text(namaTokoStruk + '  |  Per ' + tglStr + '  |  Admin Only', 14, 21);
            doc.text('Dicetak: ' + now.toLocaleString('id-ID'), 14, 27);

            doc.setTextColor(30, 30, 30);
            var y = 40;

            // Ringkasan
            doc.setFontSize(11); doc.setFont(undefined, 'bold');
            doc.text('RINGKASAN KEKAYAAN', 14, y); y += 6;
            doc.setFontSize(9); doc.setFont(undefined, 'normal');
            var ringkasan = [
                ['Total Modal Stok',    formatRp(totalModalStok)],
                ['Total Nilai Jual Stok', formatRp(totalNilaiJual)],
                ['Piutang Pelanggan (+)', formatRp(piutangPelanggan)],
                ['Hutang Supplier (−)',   formatRp(hutangSupplier)],
                ['KEKAYAAN BERSIH',       formatRp(kekayaanBersih)],
            ];
            doc.autoTable({
                startY: y, head: [['Keterangan', 'Nilai']], body: ringkasan,
                theme: 'grid', headStyles: { fillColor: [79, 70, 229], fontSize: 9 },
                bodyStyles: { fontSize: 9 },
                didParseCell: function(data) {
                    if (data.row.index === 4) {
                        data.cell.styles.fontStyle = 'bold';
                        data.cell.styles.fillColor = kekayaanBersih >= 0 ? [240, 253, 244] : [254, 242, 242];
                        data.cell.styles.textColor = kekayaanBersih >= 0 ? [22, 101, 52] : [153, 27, 27];
                    }
                },
                margin: { left: 14, right: 14 }
            });
            y = doc.lastAutoTable.finalY + 8;

            // Modal per Kategori
            doc.setFontSize(11); doc.setFont(undefined, 'bold');
            doc.text('MODAL PER KATEGORI PRODUK', 14, y); y += 4;
            var katBody = Object.keys(kategoriMap).sort(function(a,b){ return kategoriMap[b].modal - kategoriMap[a].modal; }).map(function(k) {
                var pct = totalModalStok > 0 ? Math.round((kategoriMap[k].modal / totalModalStok) * 100) : 0;
                return [k, kategoriMap[k].qty + ' unit', formatRp(kategoriMap[k].modal), pct + '%'];
            });
            katBody.push(['TOTAL', '', formatRp(totalModalStok), '100%']);
            doc.autoTable({
                startY: y, head: [['Kategori', 'Stok', 'Nilai Modal', 'Porsi']],
                body: katBody, theme: 'striped',
                headStyles: { fillColor: [79, 70, 229], fontSize: 9 },
                bodyStyles: { fontSize: 9 },
                didParseCell: function(data) {
                    if (data.row.index === katBody.length - 1) {
                        data.cell.styles.fontStyle = 'bold';
                        data.cell.styles.fillColor = [237, 233, 254];
                    }
                },
                margin: { left: 14, right: 14 }
            });
            y = doc.lastAutoTable.finalY + 8;

            // Hutang Piutang
            var hpAktif = hutangPiutangList.filter(function(h){ return h.status !== 'lunas'; });
            if (hpAktif.length > 0) {
                if (y > 220) { doc.addPage(); y = 20; }
                doc.setFontSize(11); doc.setFont(undefined, 'bold');
                doc.text('HUTANG & PIUTANG AKTIF', 14, y); y += 4;
                var hpBody = hpAktif.map(function(h) {
                    var sisa = (h.jumlah || 0) - (h.sudahDibayar || 0);
                    return [h.nama, h.tipe === 'supplier' ? 'Hutang Supplier' : 'Piutang Pelanggan',
                        (h.tipe === 'supplier' ? '−' : '+') + formatRp(sisa).replace('Rp\u00a0','Rp '),
                        h.jatuhTempo || '—'];
                });
                doc.autoTable({
                    startY: y, head: [['Nama', 'Tipe', 'Sisa', 'Jatuh Tempo']],
                    body: hpBody, theme: 'striped',
                    headStyles: { fillColor: [79, 70, 229], fontSize: 9 },
                    bodyStyles: { fontSize: 9 },
                    margin: { left: 14, right: 14 }
                });
            }

            // Footer
            var pageCount = doc.internal.getNumberOfPages();
            for (var i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8); doc.setTextColor(150);
                doc.text(namaTokoStruk + ' | Neraca Modal | Hal ' + i + '/' + pageCount, 14, 290);
            }
            doc.save('Neraca_Modal_' + namaTokoStruk.replace(/\s/g,'_') + '_' + now.toLocaleDateString('id-ID').replace(/\//g,'-') + '.pdf');
        }


        // ── MENU KEUNTUNGAN BERSIH (admin only) ─────────────────────────────
        function getKeuntunganHTML() {
            var filterKnt = state.keuntunganFilter || '7hari';

            var now    = new Date();
            var cutoff = new Date(now);
            if (filterKnt === '7hari') {
                cutoff.setDate(now.getDate() - 7);
            } else {
                cutoff.setMonth(now.getMonth() - 1);
            }
            cutoff.setHours(0,0,0,0);

            // Batasi maksimal 3 bulan ke belakang
            var maxCutoff = new Date(now);
            maxCutoff.setMonth(now.getMonth() - 3);
            maxCutoff.setHours(0,0,0,0);

            var effectiveCutoff = cutoff > maxCutoff ? cutoff : maxCutoff;

            // ── Hitung keuntungan dari salesHistory (data live) ──
            var perHari = {};
            (state.salesHistory || []).forEach(function(s) {
                if (s.refunded) return;
                var tgl = new Date(s.date);
                if (isNaN(tgl)) return;
                tgl.setHours(0,0,0,0);
                if (tgl < effectiveCutoff) return;

                var key = tgl.toISOString().slice(0,10);
                if (!perHari[key]) perHari[key] = { omzet:0, modal:0, keuntungan:0, jumlahTrx:0 };

                var omzet = (s.total || 0);
                var modal = 0;
                if (s.items && s.items.length) {
                    s.items.forEach(function(it) {
                        var produk = (state.products || []).find(function(p){ return p.id === it.id; });
                        var hModal = produk ? (produk.Modal || produk.modal || 0) : 0;
                        modal += hModal * (it.qty || 1);
                    });
                }
                perHari[key].omzet      += omzet;
                perHari[key].modal      += modal;
                perHari[key].keuntungan += (omzet - modal);
                perHari[key].jumlahTrx  += 1;
            });

            // Tambahkan data dari keuntunganList (GAS) untuk hari yang tidak ada di salesHistory
            (state.keuntunganList || []).forEach(function(k) {
                var tgl = new Date(k.tanggal);
                if (isNaN(tgl)) return;
                tgl.setHours(0,0,0,0);
                if (tgl < effectiveCutoff) return;
                var key = tgl.toISOString().slice(0,10);
                if (!perHari[key]) {
                    perHari[key] = {
                        omzet:      k.omzet      || 0,
                        modal:      k.modal      || 0,
                        keuntungan: k.keuntungan || 0,
                        jumlahTrx:  k.jumlahTrx  || 0
                    };
                }
            });

            // Sort descending
            var keys = Object.keys(perHari).sort(function(a,b){ return b > a ? 1 : -1; });

            var totalOmzet = 0, totalModal = 0, totalKeuntungan = 0, totalTrx = 0;
            keys.forEach(function(k){
                totalOmzet      += perHari[k].omzet;
                totalModal      += perHari[k].modal;
                totalKeuntungan += perHari[k].keuntungan;
                totalTrx        += perHari[k].jumlahTrx;
            });

            var filterLabel = filterKnt === '7hari' ? '7 Hari Terakhir' : '1 Bulan Terakhir';

            var html = ''
                + '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#92400e;">'
                + '<i class="ph ph-info" style="margin-right:6px;"></i>'
                + 'Riwayat keuntungan tersimpan maksimal <b>3 bulan</b>. Data lebih dari 3 bulan dihapus otomatis setiap hari. Menu ini hanya dapat dilihat oleh <b>Admin</b>.'
                + '</div>'

                // Filter tombol
                + '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">'
                + '<button onclick="state.keuntunganFilter=\'7hari\'; renderContent()" style="padding:7px 18px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid '+(filterKnt==='7hari'?'#b45309':'#e5e7eb')+';background:'+(filterKnt==='7hari'?'#b45309':'#fff')+';color:'+(filterKnt==='7hari'?'#fff':'#4b5563')+';cursor:pointer;">'
                + '<i class="ph ph-calendar-blank" style="margin-right:5px;"></i>7 Hari Terakhir</button>'
                + '<button onclick="state.keuntunganFilter=\'1bulan\'; renderContent()" style="padding:7px 18px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid '+(filterKnt==='1bulan'?'#b45309':'#e5e7eb')+';background:'+(filterKnt==='1bulan'?'#b45309':'#fff')+';color:'+(filterKnt==='1bulan'?'#fff':'#4b5563')+';cursor:pointer;">'
                + '<i class="ph ph-calendar" style="margin-right:5px;"></i>1 Bulan Terakhir</button>'
                + '</div>'

                // Summary cards
                + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;">'
                + _kntCard('Keuntungan Bersih', formatRp(totalKeuntungan), 'ph-trend-up', '#b45309', '#fffbeb', '#fde68a')
                + _kntCard('Total Omzet', formatRp(totalOmzet), 'ph-money', '#16a34a', '#f0fdf4', '#bbf7d0')
                + _kntCard('Total Modal', formatRp(totalModal), 'ph-package', '#6b7280', '#f9fafb', '#e5e7eb')
                + _kntCard('Transaksi', totalTrx + ' trx', 'ph-receipt', '#2563eb', '#eff6ff', '#bfdbfe')
                + '</div>'

                // Tabel harian
                + '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;">'
                + '<div style="background:#fef3c7;padding:10px 14px;font-size:13px;font-weight:700;color:#92400e;border-bottom:1px solid #fde68a;">'
                + '<i class="ph ph-chart-bar" style="margin-right:6px;"></i>Keuntungan Bersih Harian — ' + filterLabel
                + '</div>';

            if (keys.length === 0) {
                html += '<div style="text-align:center;padding:40px;color:#9ca3af;font-size:13px;">'
                    + '<i class="ph ph-chart-line-down" style="font-size:40px;display:block;margin:0 auto 10px;"></i>'
                    + 'Belum ada data transaksi dalam periode ini.'
                    + '</div>';
            } else {
                html += '<div style="overflow-x:auto;">'
                    + '<table style="width:100%;border-collapse:collapse;font-size:13px;">'
                    + '<thead><tr style="background:#fffbeb;">'
                    + '<th style="padding:9px 12px;text-align:left;border-bottom:1px solid #fde68a;font-weight:700;color:#92400e;">Tanggal</th>'
                    + '<th style="padding:9px 12px;text-align:right;border-bottom:1px solid #fde68a;font-weight:700;color:#92400e;">Omzet</th>'
                    + '<th style="padding:9px 12px;text-align:right;border-bottom:1px solid #fde68a;font-weight:700;color:#92400e;">Modal</th>'
                    + '<th style="padding:9px 12px;text-align:right;border-bottom:1px solid #fde68a;font-weight:700;color:#92400e;">Keuntungan</th>'
                    + '<th style="padding:9px 12px;text-align:center;border-bottom:1px solid #fde68a;font-weight:700;color:#92400e;">Trx</th>'
                    + '</tr></thead><tbody>';

                keys.forEach(function(k, idx) {
                    var d      = perHari[k];
                    var tgl    = new Date(k);
                    var label  = tgl.toLocaleDateString('id-ID', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
                    var isToday = k === new Date().toISOString().slice(0,10);
                    var rowBg   = isToday ? '#fffde7' : (idx % 2 === 0 ? '#fff' : '#fafafa');
                    var kntColor = d.keuntungan >= 0 ? '#16a34a' : '#dc2626';

                    html += '<tr style="background:'+rowBg+';border-bottom:1px solid #f3f4f6;">'
                        + '<td style="padding:9px 12px;">'+(isToday?'<span style="font-weight:700;color:#b45309;">★ </span>':'')+label+'</td>'
                        + '<td style="padding:9px 12px;text-align:right;color:#374151;">'+formatRp(d.omzet)+'</td>'
                        + '<td style="padding:9px 12px;text-align:right;color:#6b7280;">'+formatRp(d.modal)+'</td>'
                        + '<td style="padding:9px 12px;text-align:right;font-weight:700;color:'+kntColor+';">'+formatRp(d.keuntungan)+'</td>'
                        + '<td style="padding:9px 12px;text-align:center;color:#6b7280;">'+d.jumlahTrx+'</td>'
                        + '</tr>';
                });

                // Baris total
                html += '<tr style="background:#fef3c7;border-top:2px solid #fde68a;font-weight:700;">'
                    + '<td style="padding:9px 12px;color:#92400e;">TOTAL '+filterLabel.toUpperCase()+'</td>'
                    + '<td style="padding:9px 12px;text-align:right;color:#16a34a;">'+formatRp(totalOmzet)+'</td>'
                    + '<td style="padding:9px 12px;text-align:right;color:#6b7280;">'+formatRp(totalModal)+'</td>'
                    + '<td style="padding:9px 12px;text-align:right;color:#b45309;">'+formatRp(totalKeuntungan)+'</td>'
                    + '<td style="padding:9px 12px;text-align:center;color:#92400e;">'+totalTrx+'</td>'
                    + '</tr>';

                html += '</tbody></table></div>';
            }

            html += '</div>';
            return html;
        }

        function _kntCard(label, value, icon, color, bg, border) {
            return '<div style="background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:14px 16px;">'
                + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">'
                + '<div style="width:32px;height:32px;border-radius:50%;background:'+border+';display:flex;align-items:center;justify-content:center;">'
                + '<i class="ph '+icon+'" style="font-size:16px;color:'+color+';"></i></div>'
                + '<span style="font-size:12px;color:#6b7280;font-weight:600;">'+label+'</span>'
                + '</div>'
                + '<div style="font-size:18px;font-weight:900;color:'+color+';">'+value+'</div>'
                + '</div>';
        }

        function handleLaporanSearch(e) {
            state.laporanSearch = e.target.value;
            state.laporanPage   = 1;
            renderLaporanTableOnly();
        }

        function renderLaporanTableOnly() {
            var container = document.getElementById('laporan-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'laporan-search-input') ? inp.selectionStart : null;

            var filter  = state.laporanFilter;
            var q = (state.laporanSearch || '').toLowerCase().trim();
            var filtered = getFilteredSales(filter);
            if (q) {
                filtered = filtered.filter(function(s) {
                    return s.id.toLowerCase().includes(q)
                        || (s.member && s.member.toLowerCase().includes(q))
                        || (s.method && s.method.toLowerCase().includes(q))
                        || s.items.some(function(it){ return it.name.toLowerCase().includes(q); })
                        || String(s.total).includes(q);
                });
            }

            var perPage    = 10;
            var totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.laporanPage > totalPages) state.laporanPage = totalPages;
            var start = (state.laporanPage - 1) * perPage;
            var shown = filtered.slice(start, start + perPage);

            var methodColors = { Tunai: 'bg-green-100 text-green-700', QRIS: 'bg-blue-100 text-blue-700', Kartu: 'bg-purple-100 text-purple-700' };
            var tbody = container.querySelector('#laporan-tbody');
            if (tbody) {
                if (shown.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-gray-400">'
                        + '<i class="ph ph-magnifying-glass text-3xl mb-2 block opacity-40"></i>'
                        + (q ? 'Tidak ada transaksi yang cocok dengan pencarian "' + q + '".' : 'Belum ada transaksi untuk periode ini.')
                        + '</td></tr>';
                } else {
                    tbody.innerHTML = shown.map(function(s) {
                        var d = new Date(s.date);
                        var tgl = d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
                        var jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                        var itemStr = s.items.map(function(it){ return it.name + ' (' + it.qty + ')'; }).join(', ');
                        var rowClass = s.refunded ? 'border-b border-gray-100 bg-red-50/40 opacity-70' : 'border-b border-gray-100 hover:bg-gray-50/50';
                        var methColor = methodColors[s.method] || 'bg-gray-100 text-gray-600';
                        return '<tr class="' + rowClass + '">'
                            + '<td class="py-3 px-4 text-xs font-mono text-gray-500">' + s.id + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-700 whitespace-nowrap">' + tgl + ' ' + jam + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600 max-w-[180px] truncate" title="' + itemStr + '">' + itemStr + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600">' + (s.member || '-') + '</td>'
                            + '<td class="py-3 px-4 text-center"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ' + methColor + '">' + s.method + '</span></td>'
                            + '<td class="py-3 px-4 text-right font-bold text-gray-800">' + formatRp(s.total) + '</td>'
                            + '<td class="py-3 px-4 text-center"><div class="flex items-center justify-center gap-1.5 flex-wrap">'
                            + '<button onclick="previewStrukLaporan(\'' + s.id + '\')" class="px-2 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-lg hover:bg-green-100 border border-green-200 flex items-center gap-1"><i class="ph ph-receipt text-sm"></i> Struk</button>'
                            + '<button onclick="downloadTrxPDF(\'' + s.id + '\')" title="Unduh PDF" class="px-2 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-lg hover:bg-blue-100 border border-blue-200 flex items-center gap-1"><i class="ph ph-download-simple text-sm"></i> PDF</button>'
                            + (s.refunded ? '<span class="px-2 py-1 bg-gray-100 text-gray-400 text-xs font-semibold rounded-lg border border-gray-200">Dibatalkan</span>'
                                : '<button onclick="batalkanTransaksi(\'' + s.id + '\')" class="px-2 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded-lg hover:bg-red-100 border border-red-200 flex items-center gap-1"><i class="ph ph-arrow-u-up-left text-sm"></i> Batalkan</button>')
                            + '</div></td></tr>';
                    }).join('');
                }
            }

            // Update info text
            var infoEl = document.getElementById('laporan-search-info');
            if (infoEl) {
                if (q) {
                    infoEl.innerHTML = 'Menampilkan ' + filtered.length + ' hasil untuk "<strong>' + q + '</strong>"';
                    infoEl.style.display = 'block';
                } else {
                    infoEl.style.display = 'none';
                }
            }

            // Update clear button
            var searchInput = document.getElementById('laporan-search-input');
            if (searchInput) {
                var clearBtn = searchInput.parentNode.querySelector('button');
                if (q && !clearBtn) {
                    var btn = document.createElement('button');
                    btn.onclick = function(){ state.laporanSearch=''; state.laporanPage=1; renderLaporanTableOnly(); };
                    btn.className = 'absolute right-3 top-2.5 text-gray-400 hover:text-gray-600';
                    btn.innerHTML = '<i class="ph ph-x text-sm"></i>';
                    searchInput.parentNode.appendChild(btn);
                } else if (!q && clearBtn) {
                    clearBtn.remove();
                }
            }

            // Update pagination
            var paginationEl = container.querySelector('.laporan-pagination');
            if (paginationEl) {
                if (totalPages > 1) {
                    paginationEl.innerHTML = '<div class="p-4 border-t border-gray-100 flex justify-between items-center">'
                        + '<button onclick="state.laporanPage--; renderLaporanTableOnly()" ' + (state.laporanPage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>'
                        + '<span class="text-sm text-gray-500">Hal ' + state.laporanPage + ' dari ' + totalPages + ' &bull; ' + filtered.length + ' transaksi</span>'
                        + '<button onclick="state.laporanPage++; renderLaporanTableOnly()" ' + (state.laporanPage===totalPages?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>'
                        + '</div>';
                } else if (filtered.length > 0) {
                    paginationEl.innerHTML = '<div class="p-3 text-center text-xs text-gray-400">' + filtered.length + ' transaksi</div>';
                } else {
                    paginationEl.innerHTML = '';
                }
            }

            // Restore fokus
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(ex) {}
            }
        }

        // ── FUNGSI BATALKAN TRANSAKSI (REFUND) ───────────
        function batalkanTransaksi(trxId) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) { showAlert('Tidak Ditemukan', 'Data transaksi tidak ditemukan.', 'error'); return; }
            if (s.refunded) { showAlert('Sudah Dibatalkan', 'Transaksi ini sudah pernah dibatalkan.', 'warning'); return; }

            // Tampilkan modal pilih item yang ingin dibatalkan
            tampilPilihItemRefund(trxId, s);
        }

        function tampilPilihItemRefund(trxId, s) {
            var overlay = document.getElementById('notif-overlay');
            var iconWrap = document.getElementById('notif-icon-wrap');
            var titleEl  = document.getElementById('notif-title');
            var msgEl    = document.getElementById('notif-msg');
            var btns     = document.getElementById('notif-buttons');

            iconWrap.className = 'w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 bg-red-100';
            iconWrap.innerHTML = '<i class="ph ph-arrow-u-up-left text-3xl text-red-600"></i>';
            titleEl.innerText  = 'Batalkan Transaksi ' + trxId;

            var itemsHtml = s.items.map(function(it, i) {
                return '<label style="display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;margin-bottom:5px;background:#fafafa;">'
                    + '<input type="checkbox" id="refund-item-' + i + '" value="' + i + '" checked style="width:16px;height:16px;accent-color:#dc2626;flex-shrink:0;">'
                    + '<span style="flex:1;font-size:12px;font-weight:600;color:#1f2937;">' + it.name + '</span>'
                    + '<span style="font-size:11px;color:#6b7280;white-space:nowrap;">x' + it.qty + ' &bull; ' + formatRp(it.total) + '</span>'
                    + '</label>';
            }).join('');

            msgEl.innerHTML = '<div style="text-align:left;">'
                + '<p style="font-size:12px;color:#6b7280;margin-bottom:8px;">Pilih produk yang ingin dibatalkan:</p>'
                + '<div style="max-height:200px;overflow-y:auto;margin-bottom:10px;">' + itemsHtml + '</div>'
                + '<div style="display:flex;gap:6px;margin-bottom:10px;">'
                + '<button onclick="(function(){var cbs=document.querySelectorAll(\'[id^=refund-item-]\');cbs.forEach(function(c){c.checked=true;});})()" style="font-size:11px;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:3px 8px;cursor:pointer;">Pilih Semua</button>'
                + '<button onclick="(function(){var cbs=document.querySelectorAll(\'[id^=refund-item-]\');cbs.forEach(function(c){c.checked=false;});})()" style="font-size:11px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:3px 8px;cursor:pointer;">Batal Semua</button>'
                + '</div>'
                + '<div style="border-top:1px solid #e5e7eb;padding-top:10px;">'
                + '<label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;"><i class="ph ph-lock-key" style="color:#dc2626;"></i> Password Pembatalan</label>'
                + '<input type="password" id="refund-pwd-input" placeholder="Masukkan password pembatalan..." '
                + 'style="width:100%;box-sizing:border-box;padding:7px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;" '
                + 'onkeydown="if(event.key===\'Enter\') refundSubmitWithItems(\'' + trxId + '\')" />'
                + '<div id="refund-pwd-err" class="hidden" style="color:#dc2626;font-size:11px;margin-top:3px;">Password salah!</div>'

        async function prosesRefundItems(trxId, selectedIndexes, isFullRefund) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) return;

            var stockUpdates = [];
            var selectedItems = selectedIndexes.map(function(i){ return s.items[i]; });

            // 1. Kembalikan stok produk yang dipilih
            selectedItems.forEach(function(it) {
                var prod = state.products.find(function(p){ return p.name === it.name; });
                if (prod) {
                    if (!prod.unlimited) {
                        prod.stock += it.qty;
                        stockUpdates.push({ id: prod.id, stock: prod.stock });
                    }
                }
            });

            if (isFullRefund) {
                // 2. Kurangi poin pelanggan jika full refund
                if (s.poinDidapat && s.poinDidapat > 0 && s.memberId) {
                    var cust = state.customers.find(function(c){ return c.id === s.memberId; });
                    if (cust) {
                        cust.poin = Math.max(0, cust.poin - s.poinDidapat);
                        cust.poinAkumulasi = Math.max(0, (cust.poinAkumulasi||0) - s.poinDidapat);
                        cust.totalBelanja  = Math.max(0, (cust.totalBelanja||0) - s.total);
                        if (GAS_URL) gasPost({ action: 'updatePoinAfterCheckout', customerId: cust.id, poin: cust.poin, poinAkumulasi: cust.poinAkumulasi, totalBelanja: cust.totalBelanja }).catch(function(){});
                    }
                }
                // 3. Tandai seluruh transaksi sebagai refunded
                s.refunded = true;
                s.refundDate = new Date().toISOString();
                s.refundBy = currentUser ? currentUser.nama : '-';
                if (GAS_URL) {
                    if (stockUpdates.length > 0) gasPost({ action: 'stockOpname', updates: stockUpdates }).catch(function(){});
                    gasPost({ action: 'refundSale', id: trxId, refundBy: s.refundBy, refundDate: s.refundDate }).catch(function(){});
                }
                showToast('Transaksi ' + trxId + ' dibatalkan. Stok ' + selectedItems.length + ' produk dikembalikan.', 'success');
            } else {
                // Partial refund: hapus item dari transaksi, recalculate total
                var removedTotal = selectedItems.reduce(function(sum, it){ return sum + (it.total || 0); }, 0);
                // Hapus item yang dipilih dari transaksi
                var remainingIndexes = [];
                s.items.forEach(function(it, i){ if (selectedIndexes.indexOf(i) < 0) remainingIndexes.push(i); });
                s.items = remainingIndexes.map(function(i){ return s.items[i]; });
                // Recalculate setelah item dihapus
                var remaining = [];
                var allItems  = state.salesHistory.find(function(x){ return x.id === trxId; }).items;
                // items sudah diubah di atas, recalc total
                s.total = Math.max(0, s.total - removedTotal);
                if (GAS_URL) {
                    if (stockUpdates.length > 0) gasPost({ action: 'stockOpname', updates: stockUpdates }).catch(function(){});
                }
                showToast(selectedItems.length + ' produk dibatalkan dari transaksi ' + trxId + '. Stok dikembalikan.', 'success');
            }

            renderContent();
        }

        async function prosesRefund(trxId) {
            // Legacy: full refund (dipanggil dari tempat lain jika ada)
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) return;
            var allIndexes = s.items.map(function(_, i){ return i; });
            prosesRefundItems(trxId, allIndexes, true);
        }
