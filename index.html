                + "<input id=\"rwd-name\" type=\"text\" placeholder=\"Cth: Diskon 10%, Gratis Print 5 lbr, Voucher Rp 5.000...\" class=\"w-full px-2 py-1.5 border border-gray-200 rounded-lg text-sm\" /></div>"
                + "<div class=\"grid grid-cols-2 gap-2\">"
                + "<div><label class=\"text-[10px] font-medium text-gray-500 block mb-1\">Min. Poin untuk Tukar</label>"
                + "<input id=\"rwd-poin\" type=\"number\" min=\"1\" placeholder=\"500\" class=\"w-full px-2 py-1.5 border border-gray-200 rounded-lg text-sm\" /></div>"
                + "<div><label class=\"text-[10px] font-medium text-gray-500 block mb-1\">Keterangan (opsional)</label>"
                + "<input id=\"rwd-desk\" type=\"text\" placeholder=\"Syarat & ketentuan...\" class=\"w-full px-2 py-1.5 border border-gray-200 rounded-lg text-sm\" /></div></div>"
                + "<button type=\"submit\" class=\"w-full py-1.5 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 flex items-center justify-center gap-1\"><i class=\"ph ph-plus text-sm\"></i> Tambah Reward</button>"
                + "</form></div></div>";

            }
            html += "<div class=\"xl:col-span-3\">"
                + "<div class=\"bg-white rounded-xl shadow-sm border border-gray-100\">"
                + "<div class=\"p-4 border-b border-gray-100\">"
                + "<div class=\"flex flex-col sm:flex-row sm:items-center gap-3 justify-between\">"
                + "<div><h3 class=\"font-semibold text-gray-800\">Poin Aktif Pelanggan</h3>"
                + "<p class=\"text-xs text-gray-500\">Tukar poin aktif member menjadi diskon tunai atau reward. Poin akumulasi tidak berkurang saat penukaran.</p></div>"
                + "<div class=\"relative min-w-[200px]\"><input type=\"text\" id=\"cust-poin-search-input\" placeholder=\"Cari nama atau ID member...\" value=\"" + (state.custPoinSearch||'') + "\" oninput=\"handleCustPoinSearch(event)\" class=\"w-full pl-8 pr-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-1 focus:ring-green-500 focus:outline-none\" /><i class=\"ph ph-magnifying-glass absolute left-2.5 top-2.5 text-gray-400 text-sm\"></i></div>"
                + "</div></div>"
                + "<div id=\"cust-poin-table-container\">"
                + "<div class=\"overflow-x-auto\"><table class=\"w-full text-left border-collapse text-sm\"><thead>"
                + "<tr class=\"bg-gray-50 text-gray-500 text-xs border-b border-gray-200\">"
                + "<th class=\"py-3 px-4 font-medium\">Pelanggan</th>"
                + "<th class=\"py-3 px-4 font-medium text-center\">Tier</th>"
                + "<th class=\"py-3 px-4 font-medium text-center text-green-600\">Poin Aktif</th>"
                + "<th class=\"py-3 px-4 font-medium text-center\">Total Belanja</th>"
                + "<th class=\"py-3 px-4 font-medium\">Tukar Poin</th>"
                + "</tr></thead><tbody id=\"cust-poin-tbody\">" + custRows + "</tbody></table></div>"
                + "<div class=\"cust-poin-pagination\">" + custPagination + "</div>"
                + "</div>"
                + "</div></div>";
            html += "</div></div>";
            return html;
        }

        // ── PENCARIAN & PARTIAL RENDER: DAFTAR REWARD ────────────────
        function handleRewardSearch(e) {
            state.rewardSearch = e.target.value;
            state.rewardListPage = 1;
            renderRewardListOnly();
        }

        function renderRewardListOnly() {
            var container = document.getElementById('reward-list-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'reward-search-input') ? inp.selectionStart : null;

            var q = (state.rewardSearch || '').toLowerCase().trim();
            var filtered = rewardData.rewardList.filter(function(r) {
                return !q || r.name.toLowerCase().includes(q) || (r.deskripsi && r.deskripsi.toLowerCase().includes(q));
            });

            var rwdPP = 5;
            var rwdTotal = Math.max(1, Math.ceil(filtered.length / rwdPP));
            if (state.rewardListPage > rwdTotal) state.rewardListPage = rwdTotal;
            var rwdStart = (state.rewardListPage - 1) * rwdPP;
            var rwdShown = filtered.slice(rwdStart, rwdStart + rwdPP);

            // Rebuild reward rows
            var html = '';
            if (rwdShown.length === 0) {
                html = '<p class="text-xs text-gray-400 italic py-1">' + (q ? 'Tidak ada reward cocok dengan pencarian.' : 'Belum ada reward.') + '</p>';
            } else {
                rwdShown.forEach(function(r) {
                    // Cari index asli di rewardData.rewardList (bukan index filtered)
                    var realIdx = rewardData.rewardList.indexOf(r);
                    html += '<div class="flex items-center justify-between bg-purple-50 border border-purple-100 rounded-lg px-3 py-2 text-sm">'
                        + '<div class="min-w-0"><span class="font-semibold text-purple-800 block truncate">' + r.name + '</span>'
                        + '<span class="text-xs text-purple-600">' + r.poinDibutuhkan + ' poin' + (r.deskripsi ? ' &middot; ' + r.deskripsi : '') + '</span></div>'
                        + '<div class="flex items-center gap-1 ml-2 shrink-0">'
                        + '<button onclick="openEditRewardItem(' + realIdx + ')" title="Edit" class="p-1 text-purple-500 hover:text-purple-700 hover:bg-purple-100 rounded transition-colors"><i class="ph ph-pencil-simple text-sm"></i></button>'
                        + '<button onclick="deleteRewardItem(' + realIdx + ')" title="Hapus" class="p-1 text-red-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors"><i class="ph ph-trash text-sm"></i></button>'
                        + '</div></div>';
                });
            }
            container.innerHTML = html;

            // Update pagination di bawah container
            var paginationEl = container.nextElementSibling;
            if (paginationEl && paginationEl.tagName !== 'FORM') {
                // Cari elemen pagination reward (div setelah container)
                var parent = container.parentNode;
                var existingPag = parent.querySelector('.reward-pagination');
                if (!existingPag) {
                    existingPag = document.createElement('div');
                    existingPag.className = 'reward-pagination';
                    container.insertAdjacentElement('afterend', existingPag);
                }
                if (rwdTotal > 1) {
                    existingPag.innerHTML = '<div class="flex justify-between items-center mt-2">'
                        + '<button onclick="state.rewardListPage--; renderRewardListOnly()" ' + (state.rewardListPage===1?'disabled':'') + ' class="text-xs px-2 py-1 border rounded hover:bg-gray-50 disabled:opacity-40">Prev</button>'
                        + '<span class="text-xs text-gray-400">' + state.rewardListPage + '/' + rwdTotal + '</span>'
                        + '<button onclick="state.rewardListPage++; renderRewardListOnly()" ' + (state.rewardListPage===rwdTotal?'disabled':'') + ' class="text-xs px-2 py-1 border rounded hover:bg-gray-50 disabled:opacity-40">Next</button>'
                        + '</div>';
                } else {
                    existingPag.innerHTML = '';
                }
            }

            // Restore fokus
            var searchInput = document.getElementById('reward-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(ex) {}
            }
        }

        // ── PENCARIAN & PARTIAL RENDER: TABEL POIN AKTIF PELANGGAN ───
        function handleCustPoinSearch(e) {
            state.custPoinSearch = e.target.value;
            state.custPoinPage = 1;
            renderCustPoinTableOnly();
        }

        function renderCustPoinTableOnly() {
            var container = document.getElementById('cust-poin-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'cust-poin-search-input') ? inp.selectionStart : null;

            var q = (state.custPoinSearch || '').toLowerCase().trim();
            var filtered = rewardData.customers.filter(function(c) {
                return !q || c.name.toLowerCase().includes(q) || (c.id && c.id.toLowerCase().includes(q));
            });

            var custPP = 5;
            var custTotal = Math.max(1, Math.ceil(filtered.length / custPP));
            if (state.custPoinPage > custTotal) state.custPoinPage = custTotal;
            var custShown = filtered.slice((state.custPoinPage - 1) * custPP, state.custPoinPage * custPP);

            var tbody = container.querySelector('#cust-poin-tbody');
            if (tbody) {
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-400">'
                        + (q ? 'Tidak ada pelanggan cocok dengan pencarian.' : 'Belum ada pelanggan terdaftar.')
                        + '</td></tr>';
                } else {
                    tbody.innerHTML = custShown.map(function(c) {
                        var tier = getTierInfo(c.poin||0);
                        var tierIdx = rewardData.tiers.findIndex(function(t){ return t.name===tier.name; });
                        var nextTier = rewardData.tiers[tierIdx+1];
                        var pct = (nextTier && nextTier.min>0) ? Math.min(100, Math.round(((c.poin||0)/nextTier.min)*100)) : 100;
                        var progText = nextTier
                            ? '<p class="text-[10px] text-gray-400">' + (nextTier.min-(c.poin||0)) + ' lagi ke ' + nextTier.name + '</p>'
                            : '<p class="text-[10px] text-yellow-600 font-bold">Tier Tertinggi!</p>';
                        var rewardBtns = '';
                        if (rewardData.rewardList.length > 0) {
                            rewardBtns = '<div class="flex flex-wrap gap-1 mt-1">';
                            rewardData.rewardList.forEach(function(r) {
                                var canRedeem = (c.poin||0) >= r.poinDibutuhkan;
                                rewardBtns += '<button onclick="redeemRewardItem(\'' + c.id + '\',\'' + r.id + '\')" '
                                    + (!canRedeem ? 'disabled ' : '')
                                    + 'class="px-2 py-1 text-xs font-semibold rounded-lg border transition-colors '
                                    + (canRedeem ? 'bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100">' : 'bg-gray-50 text-gray-400 border-gray-200 cursor-not-allowed">')
                                    + '<i class="ph ph-gift text-xs"></i> ' + r.name + ' (' + r.poinDibutuhkan + ')'
                                    + '</button>';
                            });
                            rewardBtns += '</div>';
                        }
                        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">'
                            + '<td class="py-3 px-4"><p class="font-medium text-sm text-gray-800">' + c.name + '</p><p class="text-xs text-gray-400 font-mono">' + c.id + '</p></td>'
                            + '<td class="py-3 px-4 text-center"><span class="px-2.5 py-1 rounded-full text-xs font-bold ' + tier.color + '">' + tier.name + '</span></td>'
                            + '<td class="py-3 px-4 text-center"><span class="text-base font-bold text-green-600">' + ((c.poin||0).toLocaleString('id-ID')) + '</span>'
                            + '<div class="w-full bg-gray-200 rounded-full h-1.5 mt-1"><div class="bg-green-500 h-1.5 rounded-full" style="width:' + pct + '%"></div></div>' + progText + '</td>'
                            + '<td class="py-3 px-4 text-center text-sm text-gray-600">' + formatRp(c.totalBelanja||0) + '</td>'
                            + '<td class="py-3 px-4">'
                            + '<button onclick="redeemPoints(\'' + c.id + '\')" class="px-2.5 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-lg hover:bg-green-100 border border-green-200 flex items-center gap-1 mb-1"><i class="ph ph-currency-circle-dollar text-sm"></i> Tukar Diskon</button>'
                            + rewardBtns
                            + '</td></tr>';
                    }).join('');
                }
            }

            // Update pagination
            var paginationEl = container.querySelector('.cust-poin-pagination');
            if (paginationEl) {
                if (custTotal > 1) {
                    paginationEl.innerHTML = '<div class="flex justify-between items-center px-4 py-3 border-t border-gray-100 bg-gray-50/50">'
                        + '<button onclick="state.custPoinPage--; renderCustPoinTableOnly()" ' + (state.custPoinPage===1?'disabled':'') + ' class="px-3 py-1.5 border border-gray-200 text-gray-600 text-xs font-medium rounded-lg hover:bg-gray-100 disabled:opacity-50">&lsaquo; Prev</button>'
                        + '<span class="text-xs text-gray-500">Hal ' + state.custPoinPage + ' dari ' + custTotal + ' &bull; ' + filtered.length + ' member</span>'
                        + '<button onclick="state.custPoinPage++; renderCustPoinTableOnly()" ' + (state.custPoinPage===custTotal?'disabled':'') + ' class="px-3 py-1.5 border border-gray-200 text-gray-600 text-xs font-medium rounded-lg hover:bg-gray-100 disabled:opacity-50">Next &rsaquo;</button>'
                        + '</div>';
                } else {
                    paginationEl.innerHTML = filtered.length > 0
                        ? '<div class="px-4 py-2 text-xs text-gray-400 text-center">' + filtered.length + ' member</div>'
                        : '';
                }
            }

            // Restore fokus
            var searchInput = document.getElementById('cust-poin-search-input');
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(ex) {}
            }
        }

        function getFilteredSales(filterOverride) {
            var filter = filterOverride || state.laporanFilter;
            var now = new Date();
            var result = [...state.salesHistory];
            if (filter === 'hari') {
                var t = now.toDateString();
                result = result.filter(function(s){ return new Date(s.date).toDateString() === t; });
            } else if (filter === 'minggu') {
                var wa = new Date(now); wa.setDate(now.getDate() - 7);
                result = result.filter(function(s){ return new Date(s.date) >= wa; });
            } else if (filter === 'bulan') {
                result = result.filter(function(s){
                    var d = new Date(s.date);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                });
            } else if (filter === 'bulan2') {
                var b2 = new Date(now); b2.setDate(b2.getDate() - 60);
                result = result.filter(function(s){ return new Date(s.date) >= b2; });
            } else if (filter === 'bulan3') {
                var b3 = new Date(now); b3.setDate(b3.getDate() - 90);
                result = result.filter(function(s){ return new Date(s.date) >= b3; });
            } else if (filter === 'custom') {
                var from = state.laporanCustomFrom ? new Date(state.laporanCustomFrom) : null;
                var to   = state.laporanCustomTo   ? new Date(state.laporanCustomTo)   : null;
                if (to) { to.setHours(23,59,59,999); }
                if (from) result = result.filter(function(s){ return new Date(s.date) >= from; });
                if (to)   result = result.filter(function(s){ return new Date(s.date) <= to; });
            }
            return result;
        }

        function getPeriodLabel(filter) {
            var labels = {
                semua: 'Semua Waktu', hari: 'Hari Ini', minggu: '7 Hari Terakhir',
                bulan: 'Bulan Ini', bulan2: '2 Bulan Terakhir', bulan3: '3 Bulan Terakhir'
            };
            if (filter === 'custom') {
                var f = state.laporanCustomFrom || '?';
                var t = state.laporanCustomTo   || '?';
                return f + ' s/d ' + t;
            }
            return labels[filter] || 'Semua Waktu';
        }

        function getLaporanHTML() {
            const now = new Date();
            const filter = state.laporanFilter;
            const q = (state.laporanSearch || '').toLowerCase().trim();

            // Filter by period
            let filtered = getFilteredSales(filter);

            // Filter by search query
            if (q) {
                filtered = filtered.filter(s =>
                    s.id.toLowerCase().includes(q) ||
                    (s.member && s.member.toLowerCase().includes(q)) ||
                    s.method.toLowerCase().includes(q) ||
                    s.items.some(it => it.name.toLowerCase().includes(q)) ||
                    String(s.total).includes(q)
                );
            }

            const totalOmzet = filtered.filter(x => !x.refunded).reduce((s, x) => s + x.total, 0);
            const totalTrx   = filtered.filter(x => !x.refunded).length;
            const totalRefund = filtered.filter(x => x.refunded).length;
            const avgTrx     = totalTrx > 0 ? Math.round(totalOmzet / totalTrx) : 0;

            // Pagination
            const perPage    = 10;
            const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.laporanPage > totalPages) state.laporanPage = totalPages;
            const start = (state.laporanPage - 1) * perPage;
            const shown = filtered.slice(start, start + perPage);

            const methodColors = { Tunai: 'bg-green-100 text-green-700', QRIS: 'bg-blue-100 text-blue-700', Kartu: 'bg-purple-100 text-purple-700' };

            const rows = shown.length === 0
                ? `<tr><td colspan="7" class="text-center py-12 text-gray-400">
                        <i class="ph ph-magnifying-glass text-3xl mb-2 block opacity-40"></i>
                        ${q ? 'Tidak ada transaksi yang cocok dengan pencarian "'+q+'".' : 'Belum ada transaksi untuk periode ini.'}
                   </td></tr>`
                : shown.map(s => {
                    const d = new Date(s.date);
                    const tgl = d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
                    const jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                    const itemStr = s.items.map(it => it.name + ' (' + it.qty + ')').join(', ');
                    const rowClass = s.refunded ? 'border-b border-gray-100 bg-red-50/40 opacity-70' : 'border-b border-gray-100 hover:bg-gray-50/50';
                    return `<tr class="${rowClass}">
                        <td class="py-3 px-4 text-xs font-mono text-gray-500">${s.id}</td>
                        <td class="py-3 px-4 text-sm text-gray-700 whitespace-nowrap">${tgl} ${jam}</td>
                        <td class="py-3 px-4 text-sm text-gray-600 max-w-[180px] truncate" title="${itemStr}">${itemStr}</td>
                        <td class="py-3 px-4 text-sm text-gray-600">${s.member || '-'}</td>
                        <td class="py-3 px-4 text-center"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ${methodColors[s.method] || 'bg-gray-100 text-gray-600'}">${s.method}</span></td>
                        <td class="py-3 px-4 text-right font-bold text-gray-800">${formatRp(s.total)}</td>
                        <td class="py-3 px-4 text-center">
                            <div class="flex items-center justify-center gap-1.5 flex-wrap">
                                <button onclick="previewStrukLaporan('${s.id}')" class="px-2 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-lg hover:bg-green-100 border border-green-200 flex items-center gap-1">
                                    <i class="ph ph-receipt text-sm"></i> Struk
                                </button>
                                <button onclick="downloadTrxPDF('${s.id}')" title="Unduh PDF" class="px-2 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-lg hover:bg-blue-100 border border-blue-200 flex items-center gap-1">
                                    <i class="ph ph-download-simple text-sm"></i> PDF
                                </button>
                                ${s.refunded ? '<span class="px-2 py-1 bg-gray-100 text-gray-400 text-xs font-semibold rounded-lg border border-gray-200">Dibatalkan</span>'
                                    : '<button onclick="batalkanTransaksi(\''+s.id+'\')" class="px-2 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded-lg hover:bg-red-100 border border-red-200 flex items-center gap-1"><i class="ph ph-arrow-u-up-left text-sm"></i> Batalkan</button>'}
                            </div>
                        </td>
                    </tr>`;
                }).join('');

            const pagination = totalPages > 1 ? `
                <div class="p-4 border-t border-gray-100 flex justify-between items-center">
                    <button onclick="state.laporanPage--; renderContent()" ${state.laporanPage===1?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>
                    <span class="text-sm text-gray-500">Hal ${state.laporanPage} dari ${totalPages} &bull; ${filtered.length} transaksi</span>
                    <button onclick="state.laporanPage++; renderContent()" ${state.laporanPage===totalPages?'disabled':''} class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>
                </div>` : (filtered.length > 0 ? `<div class="p-3 text-center text-xs text-gray-400">${filtered.length} transaksi</div>` : '');

            const filterDefs = [
                {k:'semua', label:'Semua'},
                {k:'hari',  label:'Hari Ini'},
                {k:'minggu',label:'7 Hari'},
                {k:'bulan', label:'Bulan Ini'},
                {k:'bulan2',label:'2 Bulan'},
                {k:'bulan3',label:'3 Bulan'},
            ];
            const filterBtns = filterDefs.map(f =>
                `<button onclick="state.laporanFilter='${f.k}'; state.laporanPage=1; renderContent()"
                    class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-colors ${state.laporanFilter===f.k ? 'bg-green-600 text-white border-green-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                    ${f.label}
                </button>`
            ).join('');
            // Custom date range
            const today = new Date();
            const maxDate = today.toISOString().split('T')[0];
            const minDate = new Date(today.getFullYear(), today.getMonth()-2, today.getDate()).toISOString().split('T')[0];
            const customActive = state.laporanFilter === 'custom';
            const customRow = `<div class="flex items-center gap-2 flex-wrap mt-1">
                <button onclick="state.laporanFilter='custom'; state.laporanPage=1; renderContent()"
                    class="px-3 py-1.5 text-xs font-semibold rounded-lg border transition-colors ${customActive ? 'bg-green-600 text-white border-green-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                    <i class="ph ph-calendar"></i> Pilih Tanggal
                </button>
                ${customActive ? `<input type="date" value="${state.laporanCustomFrom}" max="${maxDate}"
                    onchange="state.laporanCustomFrom=this.value; state.laporanPage=1; renderContent()"
                    class="px-2 py-1 text-xs border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-400 focus:outline-none" />
                <span class="text-xs text-gray-400">s/d</span>
                <input type="date" value="${state.laporanCustomTo}" max="${maxDate}"
                    onchange="state.laporanCustomTo=this.value; state.laporanPage=1; renderContent()"
                    class="px-2 py-1 text-xs border border-gray-200 rounded-lg focus:ring-1 focus:ring-green-400 focus:outline-none" />` : ''}
            </div>`;

            return `
                <div class="space-y-4">
                    <!-- Summary cards -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">

        function handleLaporanSearch(e) {
            state.laporanSearch = e.target.value;
            state.laporanPage   = 1;
            renderLaporanTableOnly();
        }

        function renderLaporanTableOnly() {
            var container = document.getElementById('laporan-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'laporan-search-input') ? inp.selectionStart : null;

            var filter  = state.laporanFilter;
            var q = (state.laporanSearch || '').toLowerCase().trim();
            var filtered = getFilteredSales(filter);
            if (q) {
                filtered = filtered.filter(function(s) {
                    return s.id.toLowerCase().includes(q)
                        || (s.member && s.member.toLowerCase().includes(q))
                        || (s.method && s.method.toLowerCase().includes(q))
                        || s.items.some(function(it){ return it.name.toLowerCase().includes(q); })
                        || String(s.total).includes(q);
                });
            }

            var perPage    = 10;
            var totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
            if (state.laporanPage > totalPages) state.laporanPage = totalPages;
            var start = (state.laporanPage - 1) * perPage;
            var shown = filtered.slice(start, start + perPage);

            var methodColors = { Tunai: 'bg-green-100 text-green-700', QRIS: 'bg-blue-100 text-blue-700', Kartu: 'bg-purple-100 text-purple-700' };
            var tbody = container.querySelector('#laporan-tbody');
            if (tbody) {
                if (shown.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-12 text-gray-400">'
                        + '<i class="ph ph-magnifying-glass text-3xl mb-2 block opacity-40"></i>'
                        + (q ? 'Tidak ada transaksi yang cocok dengan pencarian "' + q + '".' : 'Belum ada transaksi untuk periode ini.')
                        + '</td></tr>';
                } else {
                    tbody.innerHTML = shown.map(function(s) {
                        var d = new Date(s.date);
                        var tgl = d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric'});
                        var jam = d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
                        var itemStr = s.items.map(function(it){ return it.name + ' (' + it.qty + ')'; }).join(', ');
                        var rowClass = s.refunded ? 'border-b border-gray-100 bg-red-50/40 opacity-70' : 'border-b border-gray-100 hover:bg-gray-50/50';
                        var methColor = methodColors[s.method] || 'bg-gray-100 text-gray-600';
                        return '<tr class="' + rowClass + '">'
                            + '<td class="py-3 px-4 text-xs font-mono text-gray-500">' + s.id + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-700 whitespace-nowrap">' + tgl + ' ' + jam + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600 max-w-[180px] truncate" title="' + itemStr + '">' + itemStr + '</td>'
                            + '<td class="py-3 px-4 text-sm text-gray-600">' + (s.member || '-') + '</td>'
                            + '<td class="py-3 px-4 text-center"><span class="text-xs px-2 py-0.5 rounded-full font-semibold ' + methColor + '">' + s.method + '</span></td>'
                            + '<td class="py-3 px-4 text-right font-bold text-gray-800">' + formatRp(s.total) + '</td>'
                            + '<td class="py-3 px-4 text-center"><div class="flex items-center justify-center gap-1.5 flex-wrap">'
                            + '<button onclick="previewStrukLaporan(\'' + s.id + '\')" class="px-2 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-lg hover:bg-green-100 border border-green-200 flex items-center gap-1"><i class="ph ph-receipt text-sm"></i> Struk</button>'
                            + '<button onclick="downloadTrxPDF(\'' + s.id + '\')" title="Unduh PDF" class="px-2 py-1 bg-blue-50 text-blue-700 text-xs font-semibold rounded-lg hover:bg-blue-100 border border-blue-200 flex items-center gap-1"><i class="ph ph-download-simple text-sm"></i> PDF</button>'
                            + (s.refunded ? '<span class="px-2 py-1 bg-gray-100 text-gray-400 text-xs font-semibold rounded-lg border border-gray-200">Dibatalkan</span>'
                                : '<button onclick="batalkanTransaksi(\'' + s.id + '\')" class="px-2 py-1 bg-red-50 text-red-600 text-xs font-semibold rounded-lg hover:bg-red-100 border border-red-200 flex items-center gap-1"><i class="ph ph-arrow-u-up-left text-sm"></i> Batalkan</button>')
                            + '</div></td></tr>';
                    }).join('');
                }
            }

            // Update info text
            var infoEl = document.getElementById('laporan-search-info');
            if (infoEl) {
                if (q) {
                    infoEl.innerHTML = 'Menampilkan ' + filtered.length + ' hasil untuk "<strong>' + q + '</strong>"';
                    infoEl.style.display = 'block';
                } else {
                    infoEl.style.display = 'none';
                }
            }

            // Update clear button
            var searchInput = document.getElementById('laporan-search-input');
            if (searchInput) {
                var clearBtn = searchInput.parentNode.querySelector('button');
                if (q && !clearBtn) {
                    var btn = document.createElement('button');
                    btn.onclick = function(){ state.laporanSearch=''; state.laporanPage=1; renderLaporanTableOnly(); };
                    btn.className = 'absolute right-3 top-2.5 text-gray-400 hover:text-gray-600';
                    btn.innerHTML = '<i class="ph ph-x text-sm"></i>';
                    searchInput.parentNode.appendChild(btn);
                } else if (!q && clearBtn) {
                    clearBtn.remove();
                }
            }

            // Update pagination
            var paginationEl = container.querySelector('.laporan-pagination');
            if (paginationEl) {
                if (totalPages > 1) {
                    paginationEl.innerHTML = '<div class="p-4 border-t border-gray-100 flex justify-between items-center">'
                        + '<button onclick="state.laporanPage--; renderLaporanTableOnly()" ' + (state.laporanPage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>'
                        + '<span class="text-sm text-gray-500">Hal ' + state.laporanPage + ' dari ' + totalPages + ' &bull; ' + filtered.length + ' transaksi</span>'
                        + '<button onclick="state.laporanPage++; renderLaporanTableOnly()" ' + (state.laporanPage===totalPages?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">Next &rsaquo;</button>'
                        + '</div>';
                } else if (filtered.length > 0) {
                    paginationEl.innerHTML = '<div class="p-3 text-center text-xs text-gray-400">' + filtered.length + ' transaksi</div>';
                } else {
                    paginationEl.innerHTML = '';
                }
            }

            // Restore fokus
            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(ex) {}
            }
        }

        function refundSubmitWithItems(trxId) {
            var pwd = (document.getElementById('refund-pwd-input') ? document.getElementById('refund-pwd-input').value : '');
            var errEl = document.getElementById('refund-pwd-err');
            if (pwd !== cancelRefundPwd) {
                if (errEl) errEl.classList.remove('hidden');
                return;
            }
            // Kumpulkan item yang dipilih
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) { closeNotif(); return; }
            var selectedItems = [];
            s.items.forEach(function(it, i) {
                var cb = document.getElementById('refund-item-' + i);
                if (cb && cb.checked) selectedItems.push(i);
            });
            if (selectedItems.length === 0) {
                if (errEl) { errEl.textContent = 'Pilih minimal 1 produk!'; errEl.classList.remove('hidden'); }
                return;
            }
            var isFullRefund = selectedItems.length === s.items.length;
            closeNotif();
            prosesRefundItems(trxId, selectedItems, isFullRefund);
        }

        async function prosesRefundItems(trxId, selectedIndexes, isFullRefund) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) return;

            var stockUpdates = [];
            var selectedItems = selectedIndexes.map(function(i){ return s.items[i]; });

            // 1. Kembalikan stok produk yang dipilih
            selectedItems.forEach(function(it) {
                var prod = state.products.find(function(p){ return p.name === it.name; });
                if (prod) {
                    if (!prod.unlimited) {
                        prod.stock += it.qty;
                        stockUpdates.push({ id: prod.id, stock: prod.stock });
                    }
                }
            });

            if (isFullRefund) {
                // 2. Kurangi poin pelanggan jika full refund
                if (s.poinDidapat && s.poinDidapat > 0 && s.memberId) {
                    var cust = state.customers.find(function(c){ return c.id === s.memberId; });
                    if (cust) {
                        cust.poin = Math.max(0, cust.poin - s.poinDidapat);
                        cust.poinAkumulasi = Math.max(0, (cust.poinAkumulasi||0) - s.poinDidapat);
                        cust.totalBelanja  = Math.max(0, (cust.totalBelanja||0) - s.total);
                        if (GAS_URL) gasPost({ action: 'updatePoinAfterCheckout', customerId: cust.id, poin: cust.poin, poinAkumulasi: cust.poinAkumulasi, totalBelanja: cust.totalBelanja }).catch(function(){});
                    }
                }
                // 3. Tandai seluruh transaksi sebagai refunded
                s.refunded = true;
                s.refundDate = new Date().toISOString();
                s.refundBy = currentUser ? currentUser.nama : '-';
                if (GAS_URL) {
                    if (stockUpdates.length > 0) gasPost({ action: 'stockOpname', updates: stockUpdates }).catch(function(){});
                    gasPost({ action: 'refundSale', id: trxId, refundBy: s.refundBy, refundDate: s.refundDate }).catch(function(){});
                }
                showToast('Transaksi ' + trxId + ' dibatalkan. Stok ' + selectedItems.length + ' produk dikembalikan.', 'success');
            } else {
                // Partial refund: hapus item dari transaksi, recalculate total
                var removedTotal = selectedItems.reduce(function(sum, it){ return sum + (it.total || 0); }, 0);
                // Hapus item yang dipilih dari transaksi
                var remainingIndexes = [];
                s.items.forEach(function(it, i){ if (selectedIndexes.indexOf(i) < 0) remainingIndexes.push(i); });
                s.items = remainingIndexes.map(function(i){ return s.items[i]; }); 
                // Recalculate setelah item dihapus
                var remaining = [];
                var allItems  = state.salesHistory.find(function(x){ return x.id === trxId; }).items;
                // items sudah diubah di atas, recalc total
                s.total = Math.max(0, s.total - removedTotal);
                if (GAS_URL) {
                    if (stockUpdates.length > 0) gasPost({ action: 'stockOpname', updates: stockUpdates }).catch(function(){});
                }
                showToast(selectedItems.length + ' produk dibatalkan dari transaksi ' + trxId + '. Stok dikembalikan.', 'success');
            }

            renderContent();
        }

        async function prosesRefund(trxId) {
            // Legacy: full refund (dipanggil dari tempat lain jika ada)
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) return;
            var allIndexes = s.items.map(function(_, i){ return i; });
            prosesRefundItems(trxId, allIndexes, true);
        }

        function previewStrukLaporan(trxId) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) { showAlert('Tidak Ditemukan', 'Data transaksi tidak ditemukan.', 'error'); return; }

            var d   = new Date(s.date);
            var tgl = d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'});
            var jam = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            var itemsHtml = s.items.map(function(it) {
                var nama = it.name.length > 24 ? it.name.slice(0,23) + '\u2026' : it.name;

                changeFmt:   s.kembalian ? formatRp(s.kembalian) : '',
                footer:      footerStruk,
                hutangHtml:  hutangHtml

            // Tampilkan HTML di modal preview (sama persis dengan struk asli)

        function downloadTrxPDF(trxId) {
            var s = state.salesHistory.find(function(x){ return x.id === trxId; });
            if (!s) { showAlert('Tidak Ditemukan', 'Data transaksi tidak ditemukan.', 'error'); return; }
            var jsPDFLib = window.jspdf;
            if (!jsPDFLib) { showAlert('Error', 'Library PDF tidak tersedia.', 'error'); return; }

            // Ukuran kertas thermal 58mm, tinggi dinamis — mulai 220mm, tambah jika perlu
            var doc = new jsPDFLib.jsPDF({ format: [58, 220], unit: 'mm' });
            var d   = new Date(s.date);
            var tgl = d.toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit', year:'numeric'});
            var jam = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            var lm = 3, pw = 52, y = 6;

            // Helper: cetak teks dengan word-wrap, return y baru
            function printWrapped(txt, x, startY, maxW, align, lineH) {
                lineH = lineH || 3.8;
                var lines = doc.splitTextToSize(String(txt), maxW);
                lines.forEach(function(line) {
                    if (align === 'center') doc.text(line, x, startY, {align:'center'});
                    else if (align === 'right') doc.text(line, x, startY, {align:'right'});
                    else doc.text(line, x, startY);
                    startY += lineH;
                });
                return startY;
            }

            // Helper: baris label-nilai sejajar kanan
            function row(label, val, bold) {
                doc.setFont(undefined, 'normal'); doc.setFontSize(7);
                doc.text(String(label), lm, y);
                doc.setFont(undefined, bold ? 'bold' : 'normal');
                doc.text(String(val), lm + pw, y, {align:'right'});
                y += 4;
            }

            // Helper: garis separator
            function line(dashed) {
                doc.setLineWidth(dashed ? 0.15 : 0.3);
                doc.setLineDash(dashed ? [1, 1] : []);
                doc.line(lm, y, lm + pw, y);
                y += 2.5;
            }

            // ── HEADER TOKO ──────────────────────────────────
            doc.setFontSize(11); doc.setFont(undefined, 'bold');
            y = printWrapped(namaTokoStruk, lm + pw/2, y, pw, 'center', 5.5);
            doc.setFontSize(7); doc.setFont(undefined, 'normal');
            if (alamatTokoStruk) {
                y = printWrapped(alamatTokoStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            if (noHpTokoStruk) {
                y = printWrapped('Telp: ' + noHpTokoStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            y += 1;
            line(false);

            // ── INFO TRANSAKSI ────────────────────────────────
            doc.setFontSize(7);
            row('No. Trx', s.id);
            row('Tanggal', tgl);
            row('Jam', jam);
            row('Kasir', s.kasir || 'Admin');
            if (s.member || s.customerName) {
                var nm = s.member || s.customerName;
                row('Member', nm.length > 18 ? nm.slice(0,17)+'…' : nm);
                row('ID Member', maskMemberId(s.memberId || s.customerId || ''));
            }
            line(true);

            // ── ITEM PRODUK ───────────────────────────────────
            s.items.forEach(function(it) {
                var nama = it.name.length > 28 ? it.name.slice(0,27)+'…' : it.name;
                doc.setFontSize(7.5); doc.setFont(undefined, 'bold');
                doc.text(nama, lm, y); y += 4;
                doc.setFontSize(7); doc.setFont(undefined, 'normal');
                var qtyHarga = '  ' + it.qty + ' x ' + formatRp(it.price);
                doc.text(qtyHarga, lm, y);
                doc.text(formatRp(it.total), lm + pw, y, {align:'right'});
                y += 4.2;
            });
            line(true);

            // ── RINGKASAN ─────────────────────────────────────
            var subtotalVal = s.items.reduce(function(a,b){ return a+b.total; }, 0);
            doc.setFontSize(7);
            row('Subtotal', formatRp(subtotalVal));
            if ((s.discount||0) > 0)   row('Diskon', '-' + formatRp(s.discount));
            if ((s.poinRedeem||0) > 0) row('Poin (' + (s.poinRedeem||0) + ')', '-' + formatRp(s.poinRedeem));

            // Garis solid sebelum TOTAL
            doc.setLineDash([]); doc.setLineWidth(0.3); doc.line(lm, y, lm+pw, y); y += 2.5;
            doc.setFontSize(9); doc.setFont(undefined, 'bold');
            doc.text('TOTAL', lm, y);
            doc.text(formatRp(s.total), lm+pw, y, {align:'right'});
            y += 5;

            doc.setFontSize(7); doc.setFont(undefined, 'normal');
            var metode = s.method || s.paymentMethod || 'Tunai';
            row('Metode', metode);
            if (metode === 'Tunai' && s.bayar) {
                row('Tunai', formatRp(s.bayar));
                row('Kembali', formatRp(s.kembalian || 0));
            }

            // ── CATATAN HUTANG ────────────────────────────────
            var custId = s.memberId || s.customerId || '';
            if (custId) {
                var hList = hutangPiutangList.filter(function(h){
                    return h.tipe === 'pelanggan' && h.idPelanggan === custId && h.status !== 'lunas';
                });
                if (hList.length > 0) {
                    var totalSisaHutang = hList.reduce(function(acc,h){ return acc+(h.jumlah-h.sudahDibayar); }, 0);
                    line(true);
                    // Kotak hutang — border merah
                    var boxX = lm, boxW = pw, boxStartY = y;
                    doc.setFontSize(7.5); doc.setFont(undefined, 'bold');
                    doc.setTextColor(220, 38, 38);
                    doc.text('!! CATATAN HUTANG !!', lm + pw/2, y, {align:'center'}); y += 4.5;
                    doc.setFont(undefined, 'normal'); doc.setFontSize(7);
                    hList.slice(0, 3).forEach(function(h) {
                        var sisa = h.jumlah - h.sudahDibayar;
                        var ket  = h.keterangan.length > 20 ? h.keterangan.slice(0,19)+'…' : h.keterangan;
                        doc.text(ket, lm, y);
                        doc.setFont(undefined, 'bold');
                        doc.text(formatRp(sisa), lm+pw, y, {align:'right'});
                        doc.setFont(undefined, 'normal');
                        y += 4;
                    });
                    if (hList.length > 3) {
                        doc.text('(+' + (hList.length-3) + ' lainnya)', lm+pw/2, y, {align:'center'}); y += 4;
                    }
                    // Garis dashed sebelum total hutang
                    doc.setLineWidth(0.15); doc.setLineDash([1,1]);
                    doc.line(lm, y, lm+pw, y); y += 2.5;
                    doc.setFont(undefined, 'bold'); doc.setFontSize(7.5);
                    doc.text('Total Sisa Hutang', lm, y);
                    doc.text(formatRp(totalSisaHutang), lm+pw, y, {align:'right'});
                    y += 2.5;
                    // Gambar kotak merah di sekitar blok hutang
                    doc.setLineDash([]); doc.setLineWidth(0.4); doc.setDrawColor(220, 38, 38);
                    doc.rect(boxX - 1, boxStartY - 3.5, boxW + 2, y - boxStartY + 4.5);
                    doc.setDrawColor(0); doc.setTextColor(0);
                    y += 3;
                }
            }

            // ── FOOTER ───────────────────────────────────────
            line(true);
            doc.setFontSize(7); doc.setFont(undefined, 'italic'); doc.setTextColor(80);
            if (footerStruk) {
                y = printWrapped(footerStruk, lm + pw/2, y, pw, 'center', 3.8);
            }
            doc.setTextColor(0);

            doc.save('Struk_' + s.id + '.pdf');
        }

        function downloadLaporanCSV() {
            const now = new Date();
            const filtered = getFilteredSales();

            const headers = ['No Transaksi','Tanggal','Waktu','Item','Member','Metode','Total'];
            const csvRows = [headers.join(',')];
            filtered.forEach(s => {
                const d = new Date(s.date);
                csvRows.push([
                    s.id,
                    d.toLocaleDateString('id-ID'),
                    d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),
                    '"' + s.items.map(it=>`${it.name}(${it.qty})`).join('; ') + '"',
                    s.member || '-',
                    s.method,
                    s.total
                ].join(','));
            });

            const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Laporan_${getPeriodLabel(state.laporanFilter).replace(/ /g,'_')}_${now.toLocaleDateString('id-ID').replace(/\//g,'-')}.csv`;
            a.click();
        }

        async function saveCustomer(e, action) {
            e.preventDefault();
            const isEdit = action === 'edit';
            const existingCust = isEdit ? state.customers.find(c => c.id === document.getElementById('c-id').value) : null;

            const customerData = {
                id: document.getElementById('c-id').value,
                name: document.getElementById('c-name').value,
                phone: normalizePhoneNumber(document.getElementById('c-phone').value),
                address: document.getElementById('c-address').value,
                email: existingCust ? existingCust.email : '',
                poin: isEdit ? (Number(document.getElementById('c-poin').value) || 0) : 0,
                poinAkumulasi: isEdit ? (Number(document.getElementById('c-poin-akum').value) || 0) : 0,
                totalBelanja: existingCust ? existingCust.totalBelanja : 0
            };

            if (action === 'add') {
                state.customers.unshift(customerData);
            } else {
                const idx = state.customers.findIndex(c => c.id === customerData.id);
                if (idx !== -1) state.customers[idx] = { ...state.customers[idx], ...customerData };
            }
            rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
            closeCustomerModal();
            renderContent();
            showToast(action === 'add' ? 'Pelanggan ditambahkan!' : 'Data pelanggan diperbarui!', 'success');

            if (GAS_URL) {
                try {
                    if (action === 'add') {
                        await gasPost({ action: 'addCustomer', customer: customerData });
                    } else {
                        await gasPost({ action: 'editCustomer', customer: customerData });
                        // Sync poin jika diedit
                        await gasPost({ action: 'updatePoinAfterCheckout', customerId: customerData.id, poin: customerData.poin, poinAkumulasi: customerData.poinAkumulasi, totalBelanja: customerData.totalBelanja });
                    }
                } catch (err) { console.error("Gagal sinkron pelanggan:", err); }
            }
        }

        // Reset akumulasi satu pelanggan
        function resetAkumulasiSatu(id) {
            const c = state.customers.find(x => x.id === id);
            if (!c) return;
            showConfirm(
                'Reset Akumulasi ' + c.name,
                'Reset poin akumulasi ' + c.name + ' ke 0? (Poin aktif tidak berubah)\nLakukan setelah THR untuk member ini sudah diberikan.',
                'warning',
                async () => {
                    c.poinAkumulasi = 0;
                    const rc = rewardData.customers.find(x => x.id === id);
                    if (rc) rc.poinAkumulasi = 0;
                    renderContent();
                    showToast('Akumulasi ' + c.name + ' direset ke 0.', 'success');
                    if (GAS_URL) gasPost({ action: 'updatePoinAfterCheckout', customerId: id, poin: c.poin, poinAkumulasi: 0, totalBelanja: c.totalBelanja }).catch(() => {});
                }
            );
        }

        async function deleteCustomer(id) {
            showConfirm('Hapus Pelanggan', 'Yakin ingin menghapus pelanggan ini? Data poin juga akan hilang.', 'error', async () => {
                state.customers = state.customers.filter(c => c.id !== id);
                rewardData.customers = state.customers.map(c => ({ ...c, tier: getTierInfo(c.poin).name }));
                const itemsPerPage = 10;
                const totalPages = Math.max(1, Math.ceil(state.customers.length / itemsPerPage));
                if (state.customerPage > totalPages) state.customerPage = totalPages;
                renderContent();
                showToast('Pelanggan berhasil dihapus.', 'success');
                if (GAS_URL) {
                    try { await gasPost({ action: 'deleteCustomer', customer: { id } }); }
                    catch (err) { console.error("Gagal hapus pelanggan:", err); }
                }
            });
        }

        function handleCustomerSearch(e) {
            state.customerSearch = e.target.value.toLowerCase();
            state.customerPage = 1;
            renderCustomerTableOnly();
        }

        // Render hanya tabel pelanggan tanpa full re-render (agar input tidak kehilangan fokus)
        function renderCustomerTableOnly() {
            var container = document.getElementById('customer-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'customer-search-input') ? inp.selectionStart : null;

            var q = state.customerSearch;
            var list = state.customers.filter(function(c) {
                return c.name.toLowerCase().includes(q) || (c.phone && c.phone.toLowerCase().includes(q)) || (c.id && c.id.toLowerCase().includes(q));
            });
            if (state.customerSort === 'az') list.sort(function(a,b){ return a.name.localeCompare(b.name); });
            else if (state.customerSort === 'za') list.sort(function(a,b){ return b.name.localeCompare(a.name); });
            else if (state.customerSort === 'addr') list.sort(function(a,b){ return (a.address||'').localeCompare(b.address||''); });
            else if (state.customerSort === 'poin_high') list.sort(function(a,b){ return (b.poin||0)-(a.poin||0); });
            else if (state.customerSort === 'akum_high') list.sort(function(a,b){ return (b.poinAkumulasi||0)-(a.poinAkumulasi||0); });

            var itemsPerPage = 10;
            var totalPages = Math.max(1, Math.ceil(list.length / itemsPerPage));

                            + '<td class="py-3 px-4 text-center"><span class="text-sm font-semibold text-purple-600">' + (c.poinAkumulasi||0).toLocaleString('id-ID') + '</span></td>'

                            + (currentUser && currentUser.role !== 'admin' ? '' : '<button onclick="resetAkumulasiSatu(\'' + c.id + '\')" title="Reset Akumulasi" class="p-1.5 text-purple-500 hover:bg-purple-50 rounded transition-colors"><i class="ph ph-arrow-counter-clockwise text-lg"></i></button>')
                            + (currentUser && currentUser.role !== 'admin' ? '' : '<button onclick="deleteCustomer(\'' + c.id + '\')" title="Hapus" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition-colors"><i class="ph ph-trash text-lg"></i></button>')

            if (searchInput && cursorPos !== null) {
                searchInput.focus();
                try { searchInput.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
            }

        // Render hanya tabel stock opname tanpa full re-render (agar input tidak kehilangan fokus)

            var container = document.getElementById('opname-table-container');
            if (!container) { renderContent(); return; }
            var inp = document.activeElement;
            var cursorPos = (inp && inp.id === 'opname-search-input') ? inp.selectionStart : null;

            var q = state.opnameSearch;
            var displayData = stockOpnameData.filter(function(x) {
                return !q || x.name.toLowerCase().includes(q) || x.id.toLowerCase().includes(q) || x.category.toLowerCase().includes(q);
            });
            if (state.opnameSort === 'az') displayData.sort(function(a,b){ return a.name.localeCompare(b.name); });
            else if (state.opnameSort === 'za') displayData.sort(function(a,b){ return b.name.localeCompare(a.name); });
            else if (state.opnameSort === 'cat') displayData.sort(function(a,b){ return a.category.localeCompare(b.category); });
            else if (state.opnameSort === 'diff_minus') displayData.sort(function(a,b){ return a.diff - b.diff; });
            else if (state.opnameSort === 'diff_plus') displayData.sort(function(a,b){ return b.diff - a.diff; });

            var opnamePP = 25;
            var totalPages = Math.max(1, Math.ceil(displayData.length / opnamePP));
            if (state.opnamePage > totalPages) state.opnamePage = totalPages;
            var pagedData = displayData.slice((state.opnamePage - 1) * opnamePP, state.opnamePage * opnamePP);

            var tbody = container.querySelector('#opname-tbody');

                tbody.innerHTML = pagedData.length === 0
                    ? '<tr><td colspan="6" class="text-center py-6 text-gray-400 text-sm">Produk tidak ditemukan.</td></tr>'

                        return '<tr class="border-b border-gray-100 hover:bg-gray-50/50">'
                            + '<td class="py-3 px-4 text-sm font-mono text-gray-500">' + item.id + '</td>'
                            + '<td class="py-3 px-4 text-sm font-medium text-gray-800">' + item.name + '</td>'
                            + '<td class="py-3 px-4 text-sm text-center"><span class="px-2 py-1 bg-gray-100 rounded text-xs">' + item.category + '</span></td>'
                            + '<td class="py-3 px-4 text-sm font-bold text-center text-gray-700">' + item.systemStock + '</td>'
                            + '<td class="py-3 px-4 text-center"><input type="number" min="0" value="' + item.actualStock + '" onchange="handleOpnameInput(\'' + item.id + '\', this.value)" onkeyup="handleOpnameInput(\'' + item.id + '\', this.value)" class="w-20 px-2 py-1.5 border border-gray-300 rounded-md text-sm text-center focus:ring-1 focus:ring-green-500 focus:outline-none" /></td>'
                            + '<td id="diff-' + item.id + '" class="text-sm font-bold text-center ' + (item.diff < 0 ? 'text-red-500' : item.diff > 0 ? 'text-blue-500' : 'text-gray-400') + '">'

                    }).join('');
            }

            var pagination = container.querySelector('.opname-pagination');
            if (pagination) {

                    pagination.innerHTML = '<div class="p-4 border-t border-gray-100 flex justify-between items-center">'
                        + '<button onclick="state.opnamePage--; renderOpnameTableOnly()" ' + (state.opnamePage===1?'disabled':'') + ' class="px-4 py-1.5 border border-gray-200 text-gray-600 text-sm font-medium rounded-lg hover:bg-gray-50 disabled:opacity-50 transition-colors">&lsaquo; Prev</button>'
